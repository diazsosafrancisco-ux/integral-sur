// Pantalla con gráficos del mes (solo admin)
// Usa Chart.js global window.Chart

function ChartCanvas({ config, height = 220 }) {
  const ref = useRef(null);
  const chartRef = useRef(null);

  useEffect(() => {
    if (!ref.current || !window.Chart) return;
    if (chartRef.current) chartRef.current.destroy();
    const ctx = ref.current.getContext('2d');
    chartRef.current = new window.Chart(ctx, config);
    return () => {
      if (chartRef.current) chartRef.current.destroy();
    };
  }, [config]);

  return <canvas ref={ref} style={{maxHeight: height, width: '100%'}}/>;
}

function Dashboard({ session, onToast }) {
  const { list: ventas } = useFirebaseList('ventas');
  const { list: clientes } = useFirebaseList('clientes');
  const [mesOffset, setMesOffset] = useState(0); // 0 = este mes, -1 = mes pasado, etc.

  // Calcular mes objetivo
  const fechaObjetivo = useMemo(() => {
    const d = new Date();
    d.setMonth(d.getMonth() + mesOffset);
    return d;
  }, [mesOffset]);

  const mesActualStr = useMemo(() => {
    return fechaObjetivo.toLocaleDateString('es-CL', { month: 'long', year: 'numeric' });
  }, [fechaObjetivo]);

  const año = fechaObjetivo.getFullYear();
  const mes = fechaObjetivo.getMonth();
  const diasEnMes = new Date(año, mes + 1, 0).getDate();

  // Filtrar ventas del mes objetivo
  const ventasDelMes = useMemo(() => {
    return ventas.filter(v => {
      const fStr = isoToLocalDate(v.fecha || v.creadoEn);
      if (!fStr) return false;
      const d = new Date(fStr + 'T12:00:00');
      return d.getFullYear() === año && d.getMonth() === mes;
    });
  }, [ventas, año, mes]);

  // KPIs principales
  const kpis = useMemo(() => {
    let totalBruto = 0, totalNeto = 0, totalIva = 0;
    let totalMermas = 0, descMermas = 0;
    let cobrado = 0, pendiente = 0;
    let efectivo = 0, transferencia = 0, credito = 0;
    let countBoletas = 0, countFacturas = 0;
    let totalBoletas = 0, totalFacturas = 0;
    const clientesUnicos = new Set();
    ventasDelMes.forEach(v => {
      totalBruto += v.totalBruto || 0;
      totalNeto += v.totalNeto || 0;
      totalIva += v.totalIva || 0;
      totalMermas += v.totalMermas || 0;
      descMermas += v.descuentoMermas || 0;
      if (v.cobroEstado === 'cobrado') cobrado += v.totalBruto || 0;
      else pendiente += v.totalBruto || 0;
      const d = desgloseVenta(v);
      efectivo += d.efectivo;
      transferencia += d.transferencia;
      credito += d.porCobrar;
      if (v.tipoDoc === 'factura') { countFacturas++; totalFacturas += v.totalBruto || 0; }
      else { countBoletas++; totalBoletas += v.totalBruto || 0; }
      if (v.clienteId) clientesUnicos.add(v.clienteId);
    });
    const promedio = ventasDelMes.length > 0 ? totalBruto / ventasDelMes.length : 0;
    return {
      count: ventasDelMes.length,
      totalBruto, totalNeto, totalIva,
      totalMermas, descMermas,
      cobrado, pendiente,
      efectivo, transferencia, credito,
      countBoletas, countFacturas, totalBoletas, totalFacturas,
      clientesUnicos: clientesUnicos.size,
      promedio,
    };
  }, [ventasDelMes]);

  // Comparativa con mes anterior
  const ventasMesAnterior = useMemo(() => {
    const d = new Date(fechaObjetivo);
    d.setMonth(d.getMonth() - 1);
    const aPrev = d.getFullYear();
    const mPrev = d.getMonth();
    return ventas.filter(v => {
      const fStr = isoToLocalDate(v.fecha || v.creadoEn);
      if (!fStr) return false;
      const dd = new Date(fStr + 'T12:00:00');
      return dd.getFullYear() === aPrev && dd.getMonth() === mPrev;
    });
  }, [ventas, fechaObjetivo]);

  const totalMesAnterior = ventasMesAnterior.reduce((s,v) => s + (v.totalBruto||0), 0);
  const variacion = totalMesAnterior > 0 ? ((kpis.totalBruto - totalMesAnterior) / totalMesAnterior) * 100 : 0;

  // Datos por día (gráfico de barras)
  const ventasPorDia = useMemo(() => {
    const arr = Array(diasEnMes).fill(0);
    ventasDelMes.forEach(v => {
      const fStr = isoToLocalDate(v.fecha || v.creadoEn);
      const d = new Date(fStr + 'T12:00:00');
      arr[d.getDate() - 1] += v.totalBruto || 0;
    });
    return arr;
  }, [ventasDelMes, diasEnMes]);

  // Top 10 clientes
  const topClientes = useMemo(() => {
    const map = {};
    ventasDelMes.forEach(v => {
      if (!map[v.clienteId]) map[v.clienteId] = { total: 0, count: 0 };
      map[v.clienteId].total += v.totalBruto || 0;
      map[v.clienteId].count++;
    });
    return Object.entries(map)
      .map(([id, data]) => {
        const cli = clientes.find(c => c.id === id);
        return { id, nombre: cli?.razonSocial || '(?)', ...data };
      })
      .sort((a,b) => b.total - a.total)
      .slice(0, 10);
  }, [ventasDelMes, clientes]);

  // Top calibres - con cajas y bandejas
  const topCalibres = useMemo(() => {
    const map = {};
    CALIBRES.forEach(c => map[c] = { unidades: 0, ventas: 0, cajas: 0, bandejas: 0 });
    ventasDelMes.forEach(v => {
      (v.items||[]).forEach(it => {
        if (!map[it.calibre]) map[it.calibre] = { unidades: 0, ventas: 0, cajas: 0, bandejas: 0 };
        map[it.calibre].cajas += it.cajas || 0;
        map[it.calibre].bandejas += it.bandejas || 0;
        map[it.calibre].unidades += it.unidadesTotal || 0;
        map[it.calibre].ventas += 1;
      });
    });
    return Object.entries(map)
      .map(([calibre, data]) => ({ calibre, ...data }))
      .sort((a,b) => b.unidades - a.unidades);
  }, [ventasDelMes]);

  // Colores tema
  const colors = {
    accent: '#e8651e', accentSoft: '#fde4d3',
    good: '#2f7d32', goodSoft: '#a8d4a9',
    warn: '#b8740a', warnSoft: '#f0d49a',
    bad: '#b13c2a', badSoft: '#e8a59a',
    accent2: '#7c4dff', accent2Soft: '#c9b8ff',
    ink: '#1a1815',
  };

  const isDark = document.body.classList.contains('dark');
  const gridColor = isDark ? '#3a3530' : '#e8dfd0';
  const tickColor = isDark ? '#c0b7aa' : '#595048';

  // Config gráfico ventas por día
  const configDia = {
    type: 'bar',
    data: {
      labels: Array.from({length: diasEnMes}, (_,i) => i + 1),
      datasets: [{
        label: 'Ventas',
        data: ventasPorDia,
        backgroundColor: colors.accent,
        borderRadius: 4,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: tickColor, font: { size: 9 } }, grid: { color: gridColor } },
        y: {
          ticks: { color: tickColor, font: { size: 9 }, callback: v => '$' + (v/1000).toFixed(0) + 'k' },
          grid: { color: gridColor }
        }
      }
    }
  };

  // Config formas de pago (donut)
  const configPagos = {
    type: 'doughnut',
    data: {
      labels: ['Efectivo', 'Transferencia', 'Crédito'],
      datasets: [{
        data: [kpis.efectivo, kpis.transferencia, kpis.credito],
        backgroundColor: [colors.good, colors.accent, colors.warn],
        borderColor: isDark ? '#2a2724' : '#ffffff',
        borderWidth: 2,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { position: 'bottom', labels: { color: tickColor, font: { size: 11 } } } }
    }
  };

  // Config top clientes (barras horizontales)
  const configClientes = {
    type: 'bar',
    data: {
      labels: topClientes.slice(0, 8).map(c => c.nombre.slice(0, 18)),
      datasets: [{
        data: topClientes.slice(0, 8).map(c => c.total),
        backgroundColor: colors.accent2,
        borderRadius: 4,
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: tickColor, font: { size: 9 }, callback: v => '$' + (v/1000).toFixed(0) + 'k' }, grid: { color: gridColor } },
        y: { ticks: { color: tickColor, font: { size: 10 } }, grid: { display: false } }
      }
    }
  };

  // Config calibres
  const configCalibres = {
    type: 'bar',
    data: {
      labels: topCalibres.map(c => c.calibre),
      datasets: [{
        label: 'Unidades vendidas',
        data: topCalibres.map(c => c.unidades),
        backgroundColor: [colors.accent, colors.good, colors.warn, colors.accent2],
        borderRadius: 4,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: tickColor, font: { size: 10 } }, grid: { display: false } },
        y: { ticks: { color: tickColor, font: { size: 9 } }, grid: { color: gridColor } }
      }
    }
  };

  const KpiCard = ({ label, value, sub, color }) => (
    <div style={{
      background: 'var(--card)', borderRadius: 12, padding: 12,
      border: '1px solid var(--line)',
      borderLeft: color ? `4px solid ${color}` : '1px solid var(--line)'
    }}>
      <div style={{fontSize:10, color:'var(--ink-mute)', textTransform:'uppercase', letterSpacing:1, fontWeight:700, marginBottom:4}}>{label}</div>
      <div style={{fontSize:15, fontWeight:700, fontFamily:'JetBrains Mono, monospace'}}>{value}</div>
      {sub && <div style={{fontSize:10, color:'var(--ink-mute)', marginTop:2}}>{sub}</div>}
    </div>
  );

  return (
    <div className="pad">
      <h2 className="section-title">Dashboard</h2>
      <div className="section-sub" style={{textTransform:'capitalize'}}>{mesActualStr}</div>

      {/* Selector mes */}
      <div className="card" style={{display:'flex', justifyContent:'space-between', alignItems:'center', gap:8}}>
        <button className="btn ghost sm" onClick={()=>setMesOffset(mesOffset - 1)}>← Anterior</button>
        <strong style={{textTransform:'capitalize'}}>{mesActualStr}</strong>
        <button className="btn ghost sm" onClick={()=>setMesOffset(mesOffset + 1)} disabled={mesOffset >= 0}>Siguiente →</button>
      </div>

      {ventasDelMes.length === 0 ? (
        <div className="empty">Sin ventas en este mes</div>
      ) : (
        <>
          {/* KPIs principales */}
          <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:8, marginTop:14}}>
            <KpiCard label="Total ventas" value={fmt$(kpis.totalBruto)} sub={`${kpis.count} ventas`} color={colors.accent}/>
            <KpiCard label="Promedio" value={fmt$(kpis.promedio)} sub="por venta" color={colors.accent2}/>
            <KpiCard label="Clientes" value={kpis.clientesUnicos} sub="únicos atendidos" color={colors.good}/>
            <KpiCard
              label="Variación"
              value={(variacion >= 0 ? '+' : '') + variacion.toFixed(1) + '%'}
              sub="vs mes anterior"
              color={variacion >= 0 ? colors.good : colors.bad}
            />
          </div>

          {/* Gráfico ventas por día */}
          <div className="card" style={{marginTop:14}}>
            <h3 style={{fontSize:14, margin:'0 0 10px 0'}}>📈 Ventas por día</h3>
            <ChartCanvas config={configDia} height={200}/>
          </div>

          {/* Formas de pago */}
          <div className="card" style={{marginTop:14}}>
            <h3 style={{fontSize:14, margin:'0 0 10px 0'}}>💰 Formas de pago</h3>
            <ChartCanvas config={configPagos} height={200}/>
            <div style={{display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:6, marginTop:10, fontSize:11, fontFamily:'JetBrains Mono, monospace'}}>
              <div style={{textAlign:'center'}}>
                <div style={{color:'var(--good)', fontWeight:700}}>💵 {fmt$(kpis.efectivo)}</div>
              </div>
              <div style={{textAlign:'center'}}>
                <div style={{color:'var(--accent)', fontWeight:700}}>🏦 {fmt$(kpis.transferencia)}</div>
              </div>
              <div style={{textAlign:'center'}}>
                <div style={{color:'var(--warn)', fontWeight:700}}>⏰ {fmt$(kpis.credito)}</div>
              </div>
            </div>
          </div>

          {/* Top clientes */}
          {topClientes.length > 0 && (
            <div className="card" style={{marginTop:14}}>
              <h3 style={{fontSize:14, margin:'0 0 10px 0'}}>🥇 Top clientes del mes</h3>
              <ChartCanvas config={configClientes} height={Math.min(topClientes.length, 8) * 28 + 40}/>
              <div style={{marginTop:10, fontSize:11}}>
                {topClientes.slice(0, 5).map((c, i) => (
                  <div key={c.id} style={{display:'flex', justifyContent:'space-between', padding:'4px 0', borderTop: i > 0 ? '1px solid var(--line)' : 'none'}}>
                    <span>{i+1}. {c.nombre.slice(0, 30)}</span>
                    <strong style={{fontFamily:'JetBrains Mono, monospace', color:'var(--accent)'}}>{fmt$(c.total)}</strong>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Top calibres */}
          {topCalibres.length > 0 && (
            <div className="card" style={{marginTop:14}}>
              <h3 style={{fontSize:14, margin:'0 0 10px 0'}}>🥚 Calibres más vendidos</h3>
              <ChartCanvas config={configCalibres} height={200}/>
              <div style={{marginTop:10, fontSize:11}}>
                {topCalibres.map((c, i) => (
                  <div key={c.calibre} style={{display:'flex', justifyContent:'space-between', alignItems:'center', padding:'6px 0', borderTop: i > 0 ? '1px solid var(--line)' : 'none'}}>
                    <span style={{fontWeight:600}}>{c.calibre}</span>
                    <div style={{textAlign:'right'}}>
                      <div style={{fontFamily:'JetBrains Mono, monospace', fontSize:12}}>
                        {c.cajas > 0 && <>📦 {c.cajas} {c.cajas===1?'caja':'cajas'}</>}
                        {c.cajas > 0 && c.bandejas > 0 && ' · '}
                        {c.bandejas > 0 && <>🥚 {c.bandejas} {c.bandejas===1?'bd':'bd'}</>}
                      </div>
                      <div style={{fontFamily:'JetBrains Mono, monospace', fontSize:10, color:'var(--ink-mute)'}}>({fmtN(c.unidades)}u)</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Resumen documentos + cobros */}
          <div className="card" style={{marginTop:14}}>
            <h3 style={{fontSize:14, margin:'0 0 10px 0'}}>📋 Detalle del mes</h3>
            <div style={{fontFamily:'JetBrains Mono, monospace', fontSize:12, lineHeight:1.8}}>
              <div style={{display:'flex', justifyContent:'space-between'}}><span>🧾 Boletas:</span><span>{kpis.countBoletas} · {fmt$(kpis.totalBoletas)}</span></div>
              <div style={{display:'flex', justifyContent:'space-between'}}><span>📄 Facturas:</span><span>{kpis.countFacturas} · {fmt$(kpis.totalFacturas)}</span></div>
              <hr style={{border:'none', borderTop:'1px solid var(--line)', margin:'6px 0'}}/>
              <div style={{display:'flex', justifyContent:'space-between'}}><span>Neto:</span><span>{fmt$(kpis.totalNeto)}</span></div>
              <div style={{display:'flex', justifyContent:'space-between'}}><span>IVA 19%:</span><span>{fmt$(kpis.totalIva)}</span></div>
              <hr style={{border:'none', borderTop:'1px solid var(--line)', margin:'6px 0'}}/>
              <div style={{display:'flex', justifyContent:'space-between', color:'var(--good)'}}><span>✓ Cobrado:</span><span>{fmt$(kpis.cobrado)}</span></div>
              <div style={{display:'flex', justifyContent:'space-between', color:'var(--warn)'}}><span>⏰ Por cobrar:</span><span>{fmt$(kpis.pendiente)}</span></div>
              {kpis.totalMermas > 0 && (
                <>
                  <hr style={{border:'none', borderTop:'1px solid var(--line)', margin:'6px 0'}}/>
                  <div style={{display:'flex', justifyContent:'space-between', color:'var(--bad)'}}><span>⚠️ Mermas:</span><span>{fmtN(kpis.totalMermas)}u · -{fmt$(kpis.descMermas)}</span></div>
                </>
              )}
            </div>
          </div>
        </>
      )}
    </div>
  );
}

// Permite al admin cargar clientes en lote desde un archivo Excel
// Los clientes incompletos quedan marcados para que el vendedor complete los datos

function ImportarClientes({ session, onToast, onNavigate }) {
  const isAdmin = session.role === 'admin';
  const [archivo, setArchivo] = useState(null);
  const [vendedorAsignado, setVendedorAsignado] = useState('');
  const [filas, setFilas] = useState([]);
  const [preview, setPreview] = useState([]);
  const [importando, setImportando] = useState(false);
  const [columnas, setColumnas] = useState({
    razonSocial: 0,
    direccion: 1,
    comuna: 2,
    telefono: 3,
    correo: 4,
    rut: -1,
    contacto: -1,
  });
  const [tieneEncabezados, setTieneEncabezados] = useState(false);

  if (!isAdmin) return <div className="pad"><div className="empty">Solo administradores</div></div>;

  const procesarArchivo = (file) => {
    if (!file) return;
    if (!window.XLSX) return onToast('Librería Excel no cargada','error');
    setArchivo(file);
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = new Uint8Array(e.target.result);
        const wb = window.XLSX.read(data, { type: 'array' });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const json = window.XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
        setFilas(json);
        // Auto-detectar si hay encabezados (primera fila tiene "nombre", "rut", "telefono", etc.)
        const primeraFila = (json[0] || []).map(c => String(c||'').toLowerCase());
        const tieneHeaders = primeraFila.some(c => c.includes('rut') || c.includes('nombre') || c.includes('razón') || c.includes('razon') || c.includes('teléfono') || c.includes('telefono') || c.includes('correo') || c.includes('email'));
        setTieneEncabezados(tieneHeaders);
        if (tieneHeaders) {
          // Mapear automáticamente columnas
          const mapeo = {};
          primeraFila.forEach((h, idx) => {
            if (!mapeo.razonSocial && (h.includes('nombre') || h.includes('razón') || h.includes('razon') || h.includes('cliente'))) mapeo.razonSocial = idx;
            if (!mapeo.direccion && h.includes('direcc')) mapeo.direccion = idx;
            if (!mapeo.comuna && (h.includes('comuna') || h.includes('ciudad'))) mapeo.comuna = idx;
            if (!mapeo.telefono && (h.includes('tel') || h.includes('fono') || h.includes('celular'))) mapeo.telefono = idx;
            if (!mapeo.correo && (h.includes('correo') || h.includes('mail') || h.includes('email'))) mapeo.correo = idx;
            if (!mapeo.rut && h.includes('rut')) mapeo.rut = idx;
            if (!mapeo.contacto && (h.includes('contacto') || h.includes('encargado'))) mapeo.contacto = idx;
          });
          setColumnas({
            razonSocial: mapeo.razonSocial !== undefined ? mapeo.razonSocial : 0,
            direccion: mapeo.direccion !== undefined ? mapeo.direccion : 1,
            comuna: mapeo.comuna !== undefined ? mapeo.comuna : 2,
            telefono: mapeo.telefono !== undefined ? mapeo.telefono : 3,
            correo: mapeo.correo !== undefined ? mapeo.correo : 4,
            rut: mapeo.rut !== undefined ? mapeo.rut : -1,
            contacto: mapeo.contacto !== undefined ? mapeo.contacto : -1,
          });
        }
        onToast(`Archivo cargado: ${json.length} filas`,'success');
      } catch(err) {
        console.error(err);
        onToast('Error al leer archivo Excel','error');
      }
    };
    reader.readAsArrayBuffer(file);
  };

  // Construir preview con los datos
  useEffect(() => {
    if (filas.length === 0) {
      setPreview([]);
      return;
    }
    const inicio = tieneEncabezados ? 1 : 0;
    const datos = [];
    for (let i = inicio; i < filas.length; i++) {
      const row = filas[i];
      if (!row || row.length === 0) continue;
      const get = (idx) => idx >= 0 && idx < row.length ? String(row[idx] || '').trim() : '';
      const razonSocial = get(columnas.razonSocial);
      if (!razonSocial) continue; // Saltar filas sin nombre
      const cliente = {
        razonSocial,
        rut: get(columnas.rut),
        contacto: get(columnas.contacto) || razonSocial, // Si no hay contacto, usar razón social
        telefono: get(columnas.telefono),
        telefonoContacto: get(columnas.telefono),
        correo: get(columnas.correo).toLowerCase(),
        direccion: get(columnas.direccion),
        comuna: get(columnas.comuna),
      };
      // Marcar campos faltantes
      const faltantes = [];
      if (!cliente.rut) faltantes.push('RUT');
      if (!cliente.telefonoContacto) faltantes.push('teléfono');
      if (!cliente.direccion) faltantes.push('dirección');
      cliente._faltantes = faltantes;
      cliente._incompleto = faltantes.length > 0;
      datos.push(cliente);
    }
    setPreview(datos);
  }, [filas, columnas, tieneEncabezados]);

  const importar = async () => {
    if (preview.length === 0) return onToast('No hay clientes para importar','warn');
    if (!vendedorAsignado) return onToast('Selecciona un vendedor','error');
    if (!confirm(`¿Importar ${preview.length} clientes y asignarlos a ${VENDEDORES.find(v => v.id === vendedorAsignado)?.name}?\n\nLos clientes con datos faltantes quedarán marcados para que el vendedor los complete.`)) return;

    setImportando(true);
    let importados = 0;
    let conFaltantes = 0;
    try {
      for (const c of preview) {
        const id = uid();
        const datos = {
          razonSocial: (c.razonSocial||'').toUpperCase(),
          rut: c.rut || '',
          contacto: (c.contacto||'').toUpperCase(),
          telefono: c.telefono || '',
          telefonoContacto: c.telefonoContacto || '',
          correo: (c.correo||'').toLowerCase(),
          direccion: (c.direccion||'').toUpperCase(),
          comuna: (c.comuna||'').toUpperCase(),
          vendedorId: vendedorAsignado,
          formasPagoHabilitadas: ['efectivo', 'transferencia'],
          status: 'aprobado',
          datosCompletos: !c._incompleto,
          camposFaltantes: c._faltantes || [],
          creadoPor: session.id,
          creadoEn: nowISO(),
          importadoDesde: 'excel',
        };
        await fbSet(`clientes/${id}`, datos);
        importados++;
        if (c._incompleto) conFaltantes++;
      }
      await fbLog(session.id, 'import', 'clientes', { cantidad: importados, vendedor: vendedorAsignado, conFaltantes });
      onToast(`✓ ${importados} clientes importados${conFaltantes > 0 ? ` (${conFaltantes} incompletos)` : ''}`,'success');
      setFilas([]);
      setPreview([]);
      setArchivo(null);
      setVendedorAsignado('');
      setTimeout(() => onNavigate && onNavigate('clientes'), 1500);
    } catch(e) {
      console.error(e);
      onToast('Error al importar','error');
    }
    setImportando(false);
  };

  const cancelar = () => {
    setFilas([]);
    setPreview([]);
    setArchivo(null);
    setVendedorAsignado('');
  };

  return (
    <div className="pad">
      <h2 className="section-title">Importar clientes</h2>
      <div className="section-sub">Carga masiva desde Excel · solo admin</div>

      <div className="alert-banner info" style={{fontSize:11}}>
        <span className="ico">ℹ️</span>
        <div>Sube un archivo Excel (.xlsx) con tus clientes. El sistema importará lo que tenga. Los clientes con datos faltantes (RUT, teléfono, dirección) quedarán marcados como "incompletos" para que el vendedor los complete.</div>
      </div>

      {!archivo ? (
        <>
          <div style={{fontSize:11, fontWeight:700, color:'var(--ink-soft)', textTransform:'uppercase', letterSpacing:1.2, margin:'14px 0 6px 4px'}}>📁 Seleccionar archivo</div>
          <div className="card" style={{textAlign:'center', padding:24, border:'2px dashed var(--line)'}}>
            <div style={{fontSize:40, marginBottom:8}}>📊</div>
            <label className="btn accent" style={{cursor:'pointer', display:'inline-block'}}>
              Elegir archivo Excel
              <input
                type="file"
                accept=".xlsx,.xls"
                onChange={e => procesarArchivo(e.target.files[0])}
                style={{display:'none'}}
              />
            </label>
            <div style={{fontSize:11, color:'var(--ink-mute)', marginTop:10}}>
              Formato sugerido (con o sin encabezados):<br/>
              <strong>Razón social · Dirección · Comuna · Teléfono · Correo</strong>
            </div>
          </div>
        </>
      ) : (
        <>
          <div className="card">
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:6}}>
              <strong style={{fontSize:13}}>📊 {archivo.name}</strong>
              <button className="btn ghost sm" onClick={cancelar}>Cambiar</button>
            </div>
            <div style={{fontSize:11, color:'var(--ink-soft)'}}>
              {preview.length} clientes detectados {tieneEncabezados && '(con encabezados)'}
            </div>
          </div>

          {/* Mapeo de columnas */}
          <div style={{fontSize:11, fontWeight:700, color:'var(--ink-soft)', textTransform:'uppercase', letterSpacing:1.2, margin:'14px 0 6px 4px'}}>🔗 Mapeo de columnas</div>
          <div className="card">
            <div style={{display:'flex', alignItems:'center', gap:6, marginBottom:10}}>
              <input type="checkbox" id="hasHeaders" checked={tieneEncabezados} onChange={e=>setTieneEncabezados(e.target.checked)}/>
              <label htmlFor="hasHeaders" style={{fontSize:12, cursor:'pointer'}}>Mi archivo tiene encabezados en la primera fila</label>
            </div>
            <div style={{fontSize:11, color:'var(--ink-mute)', marginBottom:10}}>
              Asigna cada columna del Excel al campo correspondiente. Las columnas vacías se pueden omitir.
            </div>
            {[
              { k: 'razonSocial', l: 'Razón social / Nombre *', req: true },
              { k: 'rut', l: 'RUT' },
              { k: 'contacto', l: 'Contacto / Encargado' },
              { k: 'telefono', l: 'Teléfono' },
              { k: 'correo', l: 'Correo electrónico' },
              { k: 'direccion', l: 'Dirección' },
              { k: 'comuna', l: 'Comuna' },
            ].map(c => (
              <div key={c.k} style={{display:'flex', alignItems:'center', gap:8, marginBottom:6}}>
                <span style={{fontSize:12, flex:1}}>{c.l}</span>
                <select
                  className="inp"
                  value={columnas[c.k]}
                  onChange={e=>setColumnas({...columnas, [c.k]: parseInt(e.target.value)})}
                  style={{maxWidth:140, marginBottom:0, padding:'6px 8px', fontSize:12}}
                >
                  <option value="-1">— No usar —</option>
                  {filas.length > 0 && filas[0].map((_, idx) => (
                    <option key={idx} value={idx}>Columna {idx+1}{tieneEncabezados && filas[0][idx] ? `: ${String(filas[0][idx]).substring(0,15)}` : ''}</option>
                  ))}
                </select>
              </div>
            ))}
          </div>

          {/* Vendedor asignado */}
          <div style={{fontSize:11, fontWeight:700, color:'var(--ink-soft)', textTransform:'uppercase', letterSpacing:1.2, margin:'14px 0 6px 4px'}}>👤 Asignar a vendedor</div>
          <div className="card">
            <select
              className="inp"
              value={vendedorAsignado}
              onChange={e=>setVendedorAsignado(e.target.value)}
              style={{marginBottom:0}}
            >
              <option value="">-- Selecciona vendedor --</option>
              {VENDEDORES.map(v => <option key={v.id} value={v.id}>{v.name}</option>)}
            </select>
            <div style={{fontSize:11, color:'var(--ink-mute)', marginTop:6}}>
              Todos los clientes importados quedarán asignados a este vendedor.
            </div>
          </div>

          {/* Preview */}
          {preview.length > 0 && (
            <>
              <div style={{fontSize:11, fontWeight:700, color:'var(--ink-soft)', textTransform:'uppercase', letterSpacing:1.2, margin:'14px 0 6px 4px'}}>
                👀 Vista previa ({preview.length} clientes)
              </div>
              <div className="card" style={{padding:8, maxHeight:300, overflowY:'auto'}}>
                {preview.slice(0, 20).map((c, i) => (
                  <div key={i} style={{
                    padding:'8px 10px',
                    borderBottom: i<preview.length-1?'1px solid var(--line)':'none',
                    background: c._incompleto ? 'var(--warn-bg)' : 'transparent',
                    borderRadius: c._incompleto ? 6 : 0,
                    marginBottom: c._incompleto ? 4 : 0,
                  }}>
                    <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:2}}>
                      <strong style={{fontSize:13}}>{c.razonSocial}</strong>
                      {c._incompleto && <span style={{fontSize:10, color:'var(--warn)', fontWeight:700}}>⚠️ Incompleto</span>}
                    </div>
                    <div style={{fontSize:11, color:'var(--ink-soft)'}}>
                      {c.rut && <>RUT: {c.rut} · </>}
                      {c.telefono && <>📞 {c.telefono} · </>}
                      {c.comuna && <>{c.comuna}</>}
                    </div>
                    {c._faltantes.length > 0 && (
                      <div style={{fontSize:10, color:'var(--warn)', marginTop:2}}>
                        Falta: {c._faltantes.join(', ')}
                      </div>
                    )}
                  </div>
                ))}
                {preview.length > 20 && <div style={{fontSize:11, color:'var(--ink-mute)', textAlign:'center', padding:8}}>... y {preview.length - 20} clientes más</div>}
              </div>
            </>
          )}

          <button
            className="btn accent full"
            onClick={importar}
            disabled={importando || preview.length === 0 || !vendedorAsignado}
            style={{marginTop:14}}
          >
            {importando ? 'Importando...' : `✓ Importar ${preview.length} clientes`}
          </button>
          <button className="btn ghost full" onClick={cancelar} style={{marginTop:6}}>
            Cancelar
          </button>
        </>
      )}
    </div>
  );
}

// =========================== AJUSTES DE STOCK ===========================
// Permite ajustar manualmente el stock de bodega (carga inicial, mermas, inventario físico)
// Cada ajuste queda registrado con motivo y autor

const MOTIVOS_AJUSTE = [
  { id: 'carga_inicial', label: '📦 Carga inicial', tipo: 'positivo', desc: 'Stock que tenía antes de usar el sistema' },
  { id: 'compra_no_registrada', label: '🛒 Compra no registrada', tipo: 'positivo', desc: 'Compra olvidada o sin documento' },
  { id: 'devolucion_cliente', label: '↩️ Devolución cliente', tipo: 'positivo', desc: 'Cliente devolvió mercadería' },
  { id: 'merma_bodega', label: '💔 Merma en bodega', tipo: 'negativo', desc: 'Huevos rotos en bodega' },
  { id: 'accidente', label: '⚠️ Accidente', tipo: 'negativo', desc: 'Pérdida por accidente' },
  { id: 'vencimiento', label: '⏰ Vencimiento', tipo: 'negativo', desc: 'Producto vencido' },
  { id: 'robo', label: '🚨 Robo o pérdida', tipo: 'negativo', desc: 'Mercadería desaparecida' },
  { id: 'inventario_fisico', label: '⚖️ Inventario físico', tipo: 'ambos', desc: 'Ajuste por conteo real' },
  { id: 'otros', label: '📝 Otros', tipo: 'ambos', desc: 'Otro motivo' },
];

function AjustesStock({ session, onToast }) {
  const isAdmin = session.role === 'admin';
  const { list: ajustes } = useFirebaseList('ajustesStock');
  const { data: stockBodega } = useFirebaseValue('stockBodega');
  const [modal, setModal] = useState(null);
  const [tab, setTab] = useState('hacer');

  const ajustesSorted = useMemo(() =>
    [...ajustes].sort((a,b) => (b.fecha||'').localeCompare(a.fecha||'')), [ajustes]);

  if (!isAdmin) return <div className="pad"><div className="empty">Solo administradores</div></div>;

  return (
    <div className="pad">
      <h2 className="section-title">Ajustes de stock</h2>
      <div className="section-sub">Ajustes manuales · bodega · trazabilidad</div>

      <div className="tabs">
        <button className={`tab ${tab==='hacer'?'active':''}`} onClick={()=>setTab('hacer')}>➕ Hacer ajuste</button>
        <button className={`tab ${tab==='historial'?'active':''}`} onClick={()=>setTab('historial')}>📋 Historial ({ajustes.length})</button>
        <button className={`tab ${tab==='stock'?'active':''}`} onClick={()=>setTab('stock')}>📦 Stock actual</button>
      </div>

      {tab === 'stock' && (
        <>
          <div style={{fontSize:11, fontWeight:700, color:'var(--ink-soft)', textTransform:'uppercase', letterSpacing:1.2, margin:'14px 0 6px 4px'}}>📦 Stock bodega actual</div>
          <div className="card">
            {CALIBRES.map((c, i) => (
              <div key={c} style={{display:'flex', justifyContent:'space-between', padding:'8px 0', borderBottom: i<3?'1px solid var(--line)':'none'}}>
                <strong style={{fontSize:14}}>{c}</strong>
                <div style={{textAlign:'right'}}>
                  <strong style={{fontFamily:'JetBrains Mono, monospace', fontSize:16, color:'var(--accent)'}}>{fmtN((stockBodega && stockBodega[c]) || 0)}u</strong>
                  <div style={{fontSize:10, color:'var(--ink-mute)'}}>
                    {Math.floor(((stockBodega && stockBodega[c]) || 0) / 180)} cajas · {Math.floor((((stockBodega && stockBodega[c]) || 0) % 180) / 30)} bandejas
                  </div>
                </div>
              </div>
            ))}
          </div>
          <button className="btn accent full" onClick={()=>setTab('hacer')} style={{marginTop:10}}>
            ✏️ Hacer un ajuste
          </button>
        </>
      )}

      {tab === 'hacer' && (
        <>
          <div className="alert-banner info" style={{fontSize:12}}>
            <span className="ico">ℹ️</span>
            <div>Todos los ajustes quedan registrados en auditoría. Selecciona el tipo y motivo correspondiente.</div>
          </div>

          <div style={{fontSize:11, fontWeight:700, color:'var(--ink-soft)', textTransform:'uppercase', letterSpacing:1.2, margin:'18px 0 8px 4px'}}>➕ Aumentar stock</div>
          <div style={{display:'grid', gap:8}}>
            {MOTIVOS_AJUSTE.filter(m => m.tipo === 'positivo' || m.tipo === 'ambos').map(m => (
              <div key={m.id} className="card" onClick={()=>setModal({motivo: m.id, signo: '+'})} style={{cursor:'pointer'}}>
                <div style={{display:'flex', alignItems:'center', gap:10}}>
                  <span style={{fontSize:22}}>{m.label.split(' ')[0]}</span>
                  <div style={{flex:1}}>
                    <strong style={{fontSize:13}}>{m.label.substring(m.label.indexOf(' ')+1)}</strong>
                    <div style={{fontSize:11, color:'var(--ink-mute)'}}>{m.desc}</div>
                  </div>
                  <span style={{color:'var(--good)', fontSize:18}}>+</span>
                </div>
              </div>
            ))}
          </div>

          <div style={{fontSize:11, fontWeight:700, color:'var(--ink-soft)', textTransform:'uppercase', letterSpacing:1.2, margin:'18px 0 8px 4px'}}>➖ Reducir stock</div>
          <div style={{display:'grid', gap:8}}>
            {MOTIVOS_AJUSTE.filter(m => m.tipo === 'negativo').map(m => (
              <div key={m.id} className="card" onClick={()=>setModal({motivo: m.id, signo: '-'})} style={{cursor:'pointer'}}>
                <div style={{display:'flex', alignItems:'center', gap:10}}>
                  <span style={{fontSize:22}}>{m.label.split(' ')[0]}</span>
                  <div style={{flex:1}}>
                    <strong style={{fontSize:13}}>{m.label.substring(m.label.indexOf(' ')+1)}</strong>
                    <div style={{fontSize:11, color:'var(--ink-mute)'}}>{m.desc}</div>
                  </div>
                  <span style={{color:'var(--bad)', fontSize:18}}>-</span>
                </div>
              </div>
            ))}
          </div>

          <div style={{fontSize:11, fontWeight:700, color:'var(--ink-soft)', textTransform:'uppercase', letterSpacing:1.2, margin:'18px 0 8px 4px'}}>⚖️ Inventario físico</div>
          <div className="card" onClick={()=>setModal({motivo: 'inventario_fisico', signo: '='})} style={{cursor:'pointer'}}>
            <div style={{display:'flex', alignItems:'center', gap:10}}>
              <span style={{fontSize:22}}>⚖️</span>
              <div style={{flex:1}}>
                <strong style={{fontSize:13}}>Inventario físico (conteo real)</strong>
                <div style={{fontSize:11, color:'var(--ink-mute)'}}>Define el stock exacto según conteo · sistema calcula la diferencia</div>
              </div>
              <span style={{fontSize:18}}>=</span>
            </div>
          </div>
        </>
      )}

      {tab === 'historial' && (
        <>
          {ajustesSorted.length === 0 ? <div className="empty">Sin ajustes registrados</div> :
            ajustesSorted.map(a => {
              const motivo = MOTIVOS_AJUSTE.find(m => m.id === a.motivo);
              const totalU = (a.items||[]).reduce((s,i) => s + Math.abs(i.unidadesDiff||0), 0);
              const esPositivo = a.signo === '+' || a.signo === '=' && (a.items||[]).some(i => (i.unidadesDiff||0) > 0);
              return (
                <div key={a.id} className="card" style={{borderLeft:`4px solid var(--${esPositivo?'good':'bad'})`}}>
                  <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:6}}>
                    <div style={{flex:1}}>
                      <strong style={{fontSize:14}}>{motivo ? motivo.label : a.motivo}</strong>
                      <div style={{fontSize:11, color:'var(--ink-mute)', marginTop:2}}>
                        {new Date((a.fecha || a.creadoEn) + (a.fecha?'T12:00:00':'')).toLocaleDateString('es-CL', {day:'numeric', month:'short', year:'numeric'})}
                      </div>
                    </div>
                    <strong style={{
                      fontSize:14,
                      fontFamily:'JetBrains Mono, monospace',
                      color: esPositivo ? 'var(--good)' : 'var(--bad)'
                    }}>
                      {a.signo === '=' ? '⚖️' : a.signo}{fmtN(totalU)}u
                    </strong>
                  </div>
                  <div style={{fontSize:11, color:'var(--ink-soft)'}}>
                    {(a.items||[]).filter(i => i.unidadesDiff !== 0).map((it, idx) => (
                      <span key={idx} style={{marginRight:10}}>
                        {it.calibre}: <strong>{it.unidadesDiff > 0 ? '+' : ''}{fmtN(it.unidadesDiff)}u</strong>
                      </span>
                    ))}
                  </div>
                  {a.descripcion && (
                    <div style={{fontSize:12, color:'var(--ink-soft)', marginTop:6, fontStyle:'italic', padding:'6px 10px', background:'var(--bg-2)', borderRadius:6}}>
                      "{a.descripcion}"
                    </div>
                  )}
                </div>
              );
            })
          }
        </>
      )}

      {modal && <ModalAjusteStock session={session} motivo={modal.motivo} signo={modal.signo} stockActual={stockBodega} onClose={()=>setModal(null)} onToast={onToast}/>}
    </div>
  );
}

function ModalAjusteStock({ session, motivo, signo, stockActual, onClose, onToast }) {
  const motivoInfo = MOTIVOS_AJUSTE.find(m => m.id === motivo);
  const esInventario = motivo === 'inventario_fisico';

  const [items, setItems] = useState(() => {
    const base = {};
    CALIBRES.forEach(c => {
      if (esInventario) {
        // En inventario físico, mostrar el stock actual para que ingrese el real
        base[c] = { cajas: 0, bandejas: 0, sueltos: 0 };
      } else {
        base[c] = { cajas: 0, bandejas: 0, sueltos: 0 };
      }
    });
    return base;
  });
  const [fecha, setFecha] = useState(todayStr());
  const [descripcion, setDescripcion] = useState('');
  const [saving, setSaving] = useState(false);

  const setVal = (cal, field, val) => {
    const v = parseInt(val)||0;
    setItems(prev => ({...prev, [cal]: { ...prev[cal], [field]: v < 0 ? 0 : v }}));
  };

  // Calcular unidades por calibre
  const itemsCalc = useMemo(() => {
    return CALIBRES.map(c => {
      const stockHoy = (stockActual && stockActual[c]) || 0;
      const ingresadasU = items[c].cajas * 180 + items[c].bandejas * 30 + items[c].sueltos;
      let unidadesDiff = 0;
      let unidadesFinal = stockHoy;

      if (esInventario) {
        // Inventario: el valor ingresado ES el nuevo stock total
        unidadesFinal = ingresadasU;
        unidadesDiff = ingresadasU - stockHoy;
      } else if (signo === '+') {
        unidadesDiff = ingresadasU;
        unidadesFinal = stockHoy + ingresadasU;
      } else { // '-'
        unidadesDiff = -ingresadasU;
        unidadesFinal = stockHoy - ingresadasU;
      }

      return {
        calibre: c,
        cajas: items[c].cajas,
        bandejas: items[c].bandejas,
        sueltos: items[c].sueltos,
        unidadesIngresadas: ingresadasU,
        unidadesDiff,
        stockAnterior: stockHoy,
        stockFinal: unidadesFinal,
      };
    });
  }, [items, stockActual, esInventario, signo]);

  const totalDiff = itemsCalc.reduce((s,i) => s + i.unidadesDiff, 0);
  const totalAbs = itemsCalc.reduce((s,i) => s + Math.abs(i.unidadesDiff), 0);
  const hayCambios = totalAbs > 0;
  const stockNegativo = itemsCalc.some(i => i.stockFinal < 0);

  const guardar = async () => {
    if (!hayCambios) return onToast('No hay cambios para guardar','warn');
    if (stockNegativo) return onToast('No puede quedar stock negativo','error');
    if (!descripcion.trim() && motivo !== 'carga_inicial') return onToast('Agrega descripción/justificación','error');

    const confirmMsg = esInventario
      ? `¿Aplicar inventario físico?\n\n${itemsCalc.filter(i => i.unidadesDiff !== 0).map(i => `${i.calibre}: ${i.stockAnterior}u → ${i.stockFinal}u (${i.unidadesDiff>0?'+':''}${i.unidadesDiff})`).join('\n')}`
      : `¿Aplicar ajuste de ${totalAbs} unidades?\n\n${itemsCalc.filter(i => i.unidadesDiff !== 0).map(i => `${i.calibre}: ${i.unidadesDiff>0?'+':''}${i.unidadesDiff}u`).join('\n')}`;
    if (!confirm(confirmMsg)) return;

    setSaving(true);
    try {
      // 1. Crear registro de ajuste
      const ajusteId = uid();
      const ajusteData = {
        motivo,
        signo: esInventario ? '=' : signo,
        items: itemsCalc.filter(i => i.unidadesDiff !== 0).map(i => ({
          calibre: i.calibre,
          cajas: i.cajas,
          bandejas: i.bandejas,
          sueltos: i.sueltos,
          unidadesDiff: i.unidadesDiff,
          stockAnterior: i.stockAnterior,
          stockFinal: i.stockFinal,
        })),
        descripcion: descripcion.trim(),
        fecha,
        creadoPor: session.id,
        creadoEn: nowISO(),
        totalDiff,
      };
      await fbSet(`ajustesStock/${ajusteId}`, ajusteData);

      // 2. Actualizar stockBodega
      const nuevoStock = { ...(stockActual || {}) };
      itemsCalc.forEach(i => {
        nuevoStock[i.calibre] = i.stockFinal;
      });
      await fbSet('stockBodega', nuevoStock);

      // 3. Registrar en auditoría
      await fbLog(session.id, 'ajuste_stock', 'stockBodega', {
        ajusteId, motivo, totalDiff,
        cambios: itemsCalc.filter(i => i.unidadesDiff !== 0).map(i => `${i.calibre}: ${i.unidadesDiff>0?'+':''}${i.unidadesDiff}u`),
      });

      onToast(esInventario ? 'Inventario aplicado' : `Ajuste aplicado · ${totalDiff>0?'+':''}${totalDiff}u`,'success');
      onClose();
    } catch(e) {
      console.error(e);
      onToast('Error al guardar ajuste','error');
    }
    setSaving(false);
  };

  const titulo = esInventario ? '⚖️ Inventario físico' : signo === '+' ? `➕ ${motivoInfo?.label}` : `➖ ${motivoInfo?.label}`;

  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <h3>{titulo}</h3>

        {motivoInfo && (
          <div className="alert-banner info" style={{fontSize:11}}>
            <span className="ico">ℹ️</span>
            <div>{motivoInfo.desc}</div>
          </div>
        )}

        {esInventario && (
          <div className="alert-banner" style={{fontSize:11, background:'var(--warn-bg)', color:'var(--warn)'}}>
            <span className="ico">⚖️</span>
            <div>Ingresa el <strong>stock REAL contado</strong>. El sistema calculará la diferencia con lo registrado.</div>
          </div>
        )}

        {CALIBRES.map(c => {
          const stockHoy = (stockActual && stockActual[c]) || 0;
          const calc = itemsCalc.find(i => i.calibre === c);
          return (
            <div key={c} style={{padding:'10px', marginTop:8, borderRadius:8, border:'1px solid var(--line)', background: calc && calc.unidadesDiff !== 0 ? 'var(--bg-2)' : 'transparent'}}>
              <div style={{display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:6}}>
                <strong style={{fontSize:14}}>{c}</strong>
                <span style={{fontSize:10, color:'var(--ink-mute)', fontFamily:'JetBrains Mono, monospace'}}>
                  Actual: {fmtN(stockHoy)}u
                </span>
              </div>
              <div style={{display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:6}}>
                <div>
                  <label className="fld" style={{fontSize:10}}>Cajas (180u)</label>
                  <input type="number" min="0" className="inp" value={items[c].cajas || ''} onChange={e=>setVal(c, 'cajas', e.target.value)} style={{padding:'6px 8px', marginBottom:0, fontSize:13}}/>
                </div>
                <div>
                  <label className="fld" style={{fontSize:10}}>Bandejas (30u)</label>
                  <input type="number" min="0" className="inp" value={items[c].bandejas || ''} onChange={e=>setVal(c, 'bandejas', e.target.value)} style={{padding:'6px 8px', marginBottom:0, fontSize:13}}/>
                </div>
                <div>
                  <label className="fld" style={{fontSize:10}}>Sueltos (1u)</label>
                  <input type="number" min="0" className="inp" value={items[c].sueltos || ''} onChange={e=>setVal(c, 'sueltos', e.target.value)} style={{padding:'6px 8px', marginBottom:0, fontSize:13}}/>
                </div>
              </div>
              {calc && calc.unidadesIngresadas > 0 && (
                <div style={{fontSize:11, marginTop:6, padding:'6px 8px', background:'var(--bg)', borderRadius:6}}>
                  {esInventario ? (
                    <>
                      📊 Nuevo stock: <strong>{fmtN(calc.unidadesIngresadas)}u</strong>
                      {' · '}
                      <span style={{color: calc.unidadesDiff === 0 ? 'var(--ink-mute)' : calc.unidadesDiff > 0 ? 'var(--good)' : 'var(--bad)'}}>
                        Diferencia: {calc.unidadesDiff > 0 ? '+' : ''}{fmtN(calc.unidadesDiff)}u
                      </span>
                    </>
                  ) : signo === '+' ? (
                    <>📊 {fmtN(stockHoy)}u + <strong style={{color:'var(--good)'}}>{fmtN(calc.unidadesIngresadas)}u</strong> = <strong>{fmtN(calc.stockFinal)}u</strong></>
                  ) : (
                    <>📊 {fmtN(stockHoy)}u - <strong style={{color:'var(--bad)'}}>{fmtN(calc.unidadesIngresadas)}u</strong> = <strong style={{color: calc.stockFinal < 0 ? 'var(--bad)' : 'inherit'}}>{fmtN(calc.stockFinal)}u</strong></>
                  )}
                </div>
              )}
            </div>
          );
        })}

        <label className="fld">Fecha *</label>
        <input type="date" className="inp" value={fecha} onChange={e=>setFecha(e.target.value)}/>

        <label className="fld">Descripción / Justificación {motivo === 'carga_inicial' ? '' : '*'}</label>
        <textarea
          className="inp" rows="3"
          value={descripcion}
          onChange={e=>setDescripcion(e.target.value)}
          placeholder={motivo === 'merma_bodega' ? "Ej: 2 bandejas rotas al mover cajas" : motivo === 'accidente' ? "Ej: Caja cayó al suelo" : motivo === 'carga_inicial' ? "Opcional - stock antes del sistema" : "Detalla qué pasó..."}
          style={{resize:'none', fontFamily:'inherit'}}
        />

        {hayCambios && (
          <div className="card" style={{background: stockNegativo ? 'var(--bad-bg)' : 'var(--good-bg)', marginTop:10}}>
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
              <strong>{esInventario ? 'Diferencia total' : 'Cambio total'}</strong>
              <strong style={{
                fontSize:18,
                fontFamily:'JetBrains Mono, monospace',
                color: totalDiff === 0 ? 'var(--ink)' : totalDiff > 0 ? 'var(--good)' : 'var(--bad)'
              }}>
                {totalDiff > 0 ? '+' : ''}{fmtN(totalDiff)}u
              </strong>
            </div>
            {stockNegativo && <div style={{fontSize:11, color:'var(--bad)', marginTop:4}}>⚠️ Stock negativo en algunos calibres</div>}
          </div>
        )}

        <div className="actions">
          <button className="btn ghost" onClick={onClose}>Cancelar</button>
          <button className="btn accent" onClick={guardar} disabled={saving || !hayCambios || stockNegativo}>
            {saving ? '...' : esInventario ? 'Aplicar inventario' : 'Aplicar ajuste'}
          </button>
        </div>
      </div>
    </div>
  );
}

// =========================== ACTIVOS FIJOS ===========================
// Vehículos, inmuebles y equipos que son parte del patrimonio
// Calcula depreciación según vida útil (normas chilenas SII)

// Vida útil según SII Chile (en años, depreciación lineal)
const VIDA_UTIL = {
  vehiculo_liviano: { years: 7, label: '🚗 Vehículo liviano (auto, camioneta)' },
  vehiculo_pesado: { years: 7, label: '🚛 Vehículo pesado (camión, furgón)' },
  inmueble_construccion: { years: 50, label: '🏢 Inmueble - Construcción' },
  inmueble_terreno: { years: 0, label: '🏞️ Terreno (no se deprecia)' },
  equipos_oficina: { years: 7, label: '💻 Equipos de oficina (PC, muebles)' },
  maquinaria: { years: 15, label: '⚙️ Maquinaria e instalaciones' },
  herramientas: { years: 3, label: '🔧 Herramientas y útiles' },
};

function calcularDepreciacion(activo) {
  // Depreciación lineal según SII chileno
  const vidaUtil = VIDA_UTIL[activo.tipo];
  if (!vidaUtil || vidaUtil.years === 0) {
    return { depAcumulada: 0, valorLibro: activo.valorInicial, depAnual: 0, depMensual: 0, mesesTranscurridos: 0, pctDepreciado: 0 };
  }
  const valorInicial = activo.valorInicial || 0;
  const depAnual = valorInicial / vidaUtil.years;
  const depMensual = depAnual / 12;
  const fechaIni = new Date(activo.fechaAdquisicion + 'T12:00:00');
  const hoy = new Date();
  const mesesTrans = Math.max(0, (hoy.getFullYear() - fechaIni.getFullYear()) * 12 + (hoy.getMonth() - fechaIni.getMonth()));
  const mesesMax = vidaUtil.years * 12;
  const mesesEfectivos = Math.min(mesesTrans, mesesMax);
  const depAcumulada = depMensual * mesesEfectivos;
  const valorLibro = Math.max(0, valorInicial - depAcumulada);
  const pctDepreciado = mesesMax > 0 ? (mesesEfectivos / mesesMax * 100) : 0;
  return { depAcumulada, valorLibro, depAnual, depMensual, mesesTranscurridos: mesesTrans, pctDepreciado };
}

function ActivosFijos({ session, onToast }) {
  const isAdmin = session.role === 'admin';
  const { list: activos } = useFirebaseList('activosFijos');
  const [modal, setModal] = useState(null);

  if (!isAdmin) return <div className="pad"><div className="empty">Solo administradores</div></div>;

  // Totales
  const totales = useMemo(() => {
    let valorInicial = 0, valorLibro = 0, depAcumulada = 0;
    activos.forEach(a => {
      valorInicial += a.valorInicial || 0;
      const dep = calcularDepreciacion(a);
      valorLibro += dep.valorLibro;
      depAcumulada += dep.depAcumulada;
    });
    return { valorInicial, valorLibro, depAcumulada };
  }, [activos]);

  return (
    <div className="pad">
      <h2 className="section-title">Activos fijos</h2>
      <div className="section-sub">Vehículos, inmuebles y equipos · patrimonio</div>

      <div className="alert-banner info" style={{fontSize:11}}>
        <span className="ico">ℹ️</span>
        <div>La depreciación se calcula automáticamente según las normas del SII chileno (vida útil estándar). Estos activos son parte del patrimonio en el Balance General.</div>
      </div>

      {/* Resumen */}
      <div className="card" style={{background:'var(--bg-2)', marginTop:10}}>
        <div style={{display:'flex', justifyContent:'space-between', marginBottom:6, fontSize:13}}>
          <span>Valor inicial total:</span>
          <strong style={{fontFamily:'JetBrains Mono, monospace'}}>{fmt$(totales.valorInicial)}</strong>
        </div>
        <div style={{display:'flex', justifyContent:'space-between', marginBottom:6, fontSize:13, color:'var(--bad)'}}>
          <span>(-) Depreciación acumulada:</span>
          <strong style={{fontFamily:'JetBrains Mono, monospace'}}>-{fmt$(totales.depAcumulada)}</strong>
        </div>
        <hr style={{border:'none', borderTop:'1px solid var(--line)', margin:'6px 0'}}/>
        <div style={{display:'flex', justifyContent:'space-between'}}>
          <strong>Valor libro (contable):</strong>
          <strong style={{fontFamily:'JetBrains Mono, monospace', color:'var(--accent)', fontSize:16}}>
            {fmt$(totales.valorLibro)}
          </strong>
        </div>
      </div>

      <button className="btn accent full" onClick={()=>setModal({})} style={{marginTop:14, marginBottom:10}}>
        ➕ Registrar activo fijo
      </button>

      {activos.length === 0 ? <div className="empty">Sin activos fijos registrados</div> :
        activos.map(a => {
          const tipoInfo = VIDA_UTIL[a.tipo];
          const dep = calcularDepreciacion(a);
          return (
            <div key={a.id} className="card" onClick={()=>setModal(a)} style={{cursor:'pointer'}}>
              <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:6}}>
                <div style={{flex:1}}>
                  <strong style={{fontSize:14}}>{a.nombre}</strong>
                  <div style={{fontSize:11, color:'var(--ink-soft)', marginTop:2}}>
                    {tipoInfo ? tipoInfo.label : a.tipo} · Adquirido: {new Date(a.fechaAdquisicion + 'T12:00:00').toLocaleDateString('es-CL')}
                  </div>
                  {a.descripcion && <div style={{fontSize:11, color:'var(--ink-soft)', fontStyle:'italic', marginTop:4}}>"{a.descripcion}"</div>}
                </div>
              </div>
              <div style={{padding:'8px 10px', background:'var(--bg-2)', borderRadius:6, marginTop:6}}>
                <div style={{display:'flex', justifyContent:'space-between', fontSize:11, marginBottom:3}}>
                  <span style={{color:'var(--ink-soft)'}}>Valor inicial:</span>
                  <span style={{fontFamily:'JetBrains Mono, monospace'}}>{fmt$(a.valorInicial)}</span>
                </div>
                {tipoInfo && tipoInfo.years > 0 && (
                  <>
                    <div style={{display:'flex', justifyContent:'space-between', fontSize:11, marginBottom:3, color:'var(--bad)'}}>
                      <span>Depreciación acumulada:</span>
                      <span style={{fontFamily:'JetBrains Mono, monospace'}}>-{fmt$(dep.depAcumulada)}</span>
                    </div>
                    <div style={{display:'flex', justifyContent:'space-between', fontSize:11, marginBottom:6}}>
                      <span style={{color:'var(--ink-soft)'}}>Vida útil: {tipoInfo.years} años · Avance:</span>
                      <span style={{fontFamily:'JetBrains Mono, monospace'}}>{dep.pctDepreciado.toFixed(1)}%</span>
                    </div>
                    <div style={{height:4, background:'var(--line)', borderRadius:2, overflow:'hidden', marginBottom:6}}>
                      <div style={{height:'100%', width: dep.pctDepreciado + '%', background:'var(--warn)'}}/>
                    </div>
                  </>
                )}
                <div style={{display:'flex', justifyContent:'space-between'}}>
                  <strong style={{fontSize:13}}>Valor libro:</strong>
                  <strong style={{fontFamily:'JetBrains Mono, monospace', color:'var(--accent)', fontSize:14}}>{fmt$(dep.valorLibro)}</strong>

      }

      {modal && <ModalActivoFijo session={session} activo={modal.id?modal:null} onClose={()=>setModal(null)} onToast={onToast}/>}
    </div>
  );
}

function ModalActivoFijo({ session, activo, onClose, onToast }) {
  const [nombre, setNombre] = useState(activo?.nombre || '');
  const [tipo, setTipo] = useState(activo?.tipo || 'vehiculo_pesado');
  const [valorInicial, setValorInicial] = useState(activo?.valorInicial || '');
  const [fechaAdquisicion, setFechaAdquisicion] = useState(activo?.fechaAdquisicion || todayStr());
  const [descripcion, setDescripcion] = useState(activo?.descripcion || '');
  const [saving, setSaving] = useState(false);

  const tipoInfo = VIDA_UTIL[tipo];

  // Cálculo en vivo
  const calcPreview = useMemo(() => {
    if (!valorInicial || !fechaAdquisicion) return null;
    return calcularDepreciacion({
      tipo, valorInicial: parseFloat(valorInicial), fechaAdquisicion,
    });
  }, [tipo, valorInicial, fechaAdquisicion]);

  const guardar = async () => {
    if (!nombre.trim()) return onToast('Falta nombre','error');
    const v = parseFloat(valorInicial);
    if (!v || v <= 0) return onToast('Valor inválido','error');
    setSaving(true);
    try {
      const datos = {
        nombre: nombre.trim(),
        tipo,
        valorInicial: v,
        fechaAdquisicion,
        descripcion: descripcion.trim(),
        creadoPor: session.id,
        creadoEn: activo?.creadoEn || nowISO(),
      };
      if (activo) {
        await fbSet(`activosFijos/${activo.id}`, datos);
        await fbLog(session.id, 'update', 'activosFijos', { id: activo.id, nombre: datos.nombre });
        onToast('Activo actualizado','success');
      } else {
        await fbSet(`activosFijos/${uid()}`, datos);
        await fbLog(session.id, 'create', 'activosFijos', { nombre: datos.nombre, valor: v });
        onToast('Activo registrado','success');
      }
      onClose();
    } catch(e) { onToast('Error','error'); }
    setSaving(false);
  };

  const eliminar = async () => {
    if (!activo || !confirm(`¿Eliminar "${activo.nombre}"?`)) return;
    try {
      await fbRemove(`activosFijos/${activo.id}`);
      await fbLog(session.id, 'delete', 'activosFijos', { id: activo.id });
      onToast('Eliminado','warn');
      onClose();
    } catch(e) { onToast('Error','error'); }
  };

  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <h3>{activo ? '✏️ Editar activo fijo' : '➕ Nuevo activo fijo'}</h3>

        <label className="fld">Nombre del activo *</label>
        <input className="inp" value={nombre} onChange={e=>setNombre(e.target.value)} placeholder="Ej: Camión Hyundai HD78 patente AB-CD-12"/>

        <label className="fld">Tipo de activo *</label>
        <select className="inp" value={tipo} onChange={e=>setTipo(e.target.value)}>
          {Object.entries(VIDA_UTIL).map(([k, v]) => (
            <option key={k} value={k}>{v.label} {v.years > 0 ? `(${v.years} años)` : '(no se deprecia)'}</option>
          ))}
        </select>

        {tipoInfo && (
          <div className="alert-banner info" style={{fontSize:11}}>
            <span className="ico">ℹ️</span>
            <div>
              {tipoInfo.years > 0 ?
                <>Vida útil según SII: <strong>{tipoInfo.years} años</strong>. Depreciación lineal mensual.</> :
                <>Los terrenos <strong>no se deprecian</strong> según normas chilenas, pero forman parte del patrimonio.</>
              }
            </div>
          </div>
        )}

        <label className="fld">Valor inicial (compra) *</label>
        <input
          type="number"
          className="inp"
          value={valorInicial}
          onChange={e=>setValorInicial(e.target.value)}
          placeholder="Ej: 15000000"
        />

        <label className="fld">Fecha de adquisición *</label>
        <input type="date" className="inp" value={fechaAdquisicion} onChange={e=>setFechaAdquisicion(e.target.value)}/>

        <label className="fld">Descripción / notas</label>
        <textarea
          className="inp" rows="2"
          value={descripcion}
          onChange={e=>setDescripcion(e.target.value)}
          placeholder="Ej: Comprado a TransAuto · Factura 1234"
          style={{resize:'none', fontFamily:'inherit'}}
        />

        {calcPreview && tipoInfo && tipoInfo.years > 0 && (
          <div className="card" style={{background:'var(--bg-2)', marginTop:10}}>
            <div style={{fontSize:11, fontWeight:700, color:'var(--ink-soft)', textTransform:'uppercase', marginBottom:6}}>📊 Preview depreciación</div>
            <div style={{display:'flex', justifyContent:'space-between', fontSize:12, marginBottom:3}}>
              <span>Depreciación anual:</span>
              <span style={{fontFamily:'JetBrains Mono, monospace'}}>{fmt$(calcPreview.depAnual)}</span>
            </div>
            <div style={{display:'flex', justifyContent:'space-between', fontSize:12, marginBottom:3}}>
              <span>Depreciación mensual:</span>
              <span style={{fontFamily:'JetBrains Mono, monospace'}}>{fmt$(calcPreview.depMensual)}</span>
            </div>
            <div style={{display:'flex', justifyContent:'space-between', fontSize:12, marginBottom:3, color:'var(--bad)'}}>
              <span>Acumulada al día de hoy:</span>
              <span style={{fontFamily:'JetBrains Mono, monospace'}}>-{fmt$(calcPreview.depAcumulada)}</span>
            </div>
            <hr style={{border:'none', borderTop:'1px solid var(--line)', margin:'6px 0'}}/>
            <div style={{display:'flex', justifyContent:'space-between'}}>
              <strong>Valor libro hoy:</strong>
              <strong style={{fontFamily:'JetBrains Mono, monospace', color:'var(--accent)'}}>{fmt$(calcPreview.valorLibro)}</strong>
            </div>
          </div>
        )}

        <div className="actions">
          <button className="btn ghost" onClick={onClose}>Cancelar</button>
          {activo && <button className="btn danger" onClick={eliminar}>Eliminar</button>}
          <button className="btn accent" onClick={guardar} disabled={saving}>{saving?'...':'Guardar'}</button>
        </div>
      </div>
    </div>
  );
}

// =========================== CAPITAL Y CAJA ===========================
// Registro de aportes de capital, retiros, y saldos de caja/banco
// /capital/inicial/{amount}
// /capital/movimientos/{id}: { tipo: aporte|retiro, monto, fecha, descripcion }
// /caja/saldoInicial/{efectivo, banco, fecha}

function Capital({ session, onToast }) {
  const isAdmin = session.role === 'admin';
  const { data: capitalInicial } = useFirebaseValue('capital/inicial');
  const { data: saldoInicialCaja } = useFirebaseValue('caja/saldoInicial');
  const { list: movimientos } = useFirebaseList('capital/movimientos');
  const [modal, setModal] = useState(null);
  const [modalCaja, setModalCaja] = useState(false);
  const [modalCapital, setModalCapital] = useState(false);

  const movsSorted = useMemo(() =>
    [...movimientos].sort((a,b) => (b.fecha||'').localeCompare(a.fecha||'')), [movimientos]);

  const totalAportes = useMemo(() =>
    movimientos.filter(m => m.tipo === 'aporte').reduce((s,m) => s + (m.monto||0), 0), [movimientos]);
  const totalRetiros = useMemo(() =>
    movimientos.filter(m => m.tipo === 'retiro').reduce((s,m) => s + (m.monto||0), 0), [movimientos]);

  if (!isAdmin) return <div className="pad"><div className="empty">Solo administradores</div></div>;

  const capInic = (capitalInicial && capitalInicial.monto) || 0;
  const capActual = capInic + totalAportes - totalRetiros;
  const efectivoInic = (saldoInicialCaja && saldoInicialCaja.efectivo) || 0;
  const bancoInic = (saldoInicialCaja && saldoInicialCaja.banco) || 0;

  return (
    <div className="pad">
      <h2 className="section-title">Capital y caja</h2>
      <div className="section-sub">Aportes, retiros y saldos iniciales</div>

      {/* Capital */}
      <div style={{fontSize:11, fontWeight:700, color:'var(--ink-soft)', textTransform:'uppercase', letterSpacing:1.2, margin:'14px 0 6px 4px'}}>💰 Capital</div>

      <div className="card" style={{background:'var(--bg-2)'}}>
        <div style={{display:'flex', justifyContent:'space-between', marginBottom:6}}>
          <span style={{fontSize:13}}>Capital inicial aportado</span>
          <strong style={{fontFamily:'JetBrains Mono, monospace'}}>{fmt$(capInic)}</strong>
        </div>
        <div style={{display:'flex', justifyContent:'space-between', marginBottom:6, fontSize:12, color:'var(--ink-soft)'}}>
          <span>+ Aportes posteriores</span>
          <span style={{fontFamily:'JetBrains Mono, monospace'}}>{fmt$(totalAportes)}</span>
        </div>
        <div style={{display:'flex', justifyContent:'space-between', marginBottom:6, fontSize:12, color:'var(--ink-soft)'}}>
          <span>- Retiros de socios</span>
          <span style={{fontFamily:'JetBrains Mono, monospace'}}>{fmt$(totalRetiros)}</span>
        </div>
        <hr style={{border:'none', borderTop:'1px solid var(--line)', margin:'8px 0'}}/>
        <div style={{display:'flex', justifyContent:'space-between'}}>
          <strong>Capital actual</strong>
          <strong style={{fontFamily:'JetBrains Mono, monospace', color:'var(--accent)', fontSize:16}}>{fmt$(capActual)}</strong>
        </div>
      </div>

      <button className="btn ghost full" onClick={()=>setModalCapital(true)} style={{marginBottom:8}}>
        ⚙️ Configurar capital inicial
      </button>
      <button className="btn accent full" onClick={()=>setModal({tipo:'aporte'})} style={{marginBottom:6}}>
        ➕ Registrar aporte de capital
      </button>
      <button className="btn full" onClick={()=>setModal({tipo:'retiro'})} style={{marginBottom:14, background:'var(--warn-bg)', color:'var(--warn)', borderColor:'var(--warn)'}}>
        ➖ Registrar retiro de utilidades
      </button>

      {/* Caja y banco */}
      <div style={{fontSize:11, fontWeight:700, color:'var(--ink-soft)', textTransform:'uppercase', letterSpacing:1.2, margin:'18px 0 6px 4px'}}>🏦 Saldo inicial caja y banco</div>
      <div className="card">
        <div style={{display:'flex', justifyContent:'space-between', marginBottom:6}}>
          <span style={{fontSize:13}}>💵 Efectivo en caja</span>
          <strong style={{fontFamily:'JetBrains Mono, monospace'}}>{fmt$(efectivoInic)}</strong>
        </div>
        <div style={{display:'flex', justifyContent:'space-between'}}>
          <span style={{fontSize:13}}>🏦 Banco</span>
          <strong style={{fontFamily:'JetBrains Mono, monospace'}}>{fmt$(bancoInic)}</strong>
        </div>
        {saldoInicialCaja && saldoInicialCaja.fecha && (
          <div style={{fontSize:10, color:'var(--ink-mute)', marginTop:8}}>Al {saldoInicialCaja.fecha}</div>
        )}
      </div>
      <button className="btn ghost full" onClick={()=>setModalCaja(true)} style={{marginBottom:14}}>
        ⚙️ Configurar saldo inicial
      </button>

      {/* Movimientos */}
      <div style={{fontSize:11, fontWeight:700, color:'var(--ink-soft)', textTransform:'uppercase', letterSpacing:1.2, margin:'18px 0 6px 4px'}}>📋 Movimientos</div>
      {movsSorted.length === 0 ? <div className="empty">Sin movimientos</div> :
        movsSorted.map(m => (
          <div key={m.id} className="card" onClick={()=>setModal(m)} style={{cursor:'pointer', borderLeft: `4px solid var(--${m.tipo==='aporte'?'good':'warn'})`}}>
            <div style={{display:'flex', justifyContent:'space-between'}}>
              <div>
                <strong>{m.tipo === 'aporte' ? '➕ Aporte' : '➖ Retiro'}</strong>
                <div style={{fontSize:11, color:'var(--ink-soft)', marginTop:2}}>
                  {new Date(m.fecha + 'T12:00:00').toLocaleDateString('es-CL', {day:'numeric', month:'short', year:'numeric'})}
                </div>
                {m.descripcion && <div style={{fontSize:12, color:'var(--ink-soft)', marginTop:4, fontStyle:'italic'}}>"{m.descripcion}"</div>}
              </div>
              <strong style={{fontFamily:'JetBrains Mono, monospace', color: m.tipo==='aporte'?'var(--good)':'var(--warn)'}}>
                {m.tipo === 'aporte' ? '+' : '-'}{fmt$(m.monto)}
              </strong>
            </div>
          </div>
        ))
      }

      {modal && <ModalMovimientoCapital session={session} mov={modal.id?modal:null} tipo={modal.tipo} onClose={()=>setModal(null)} onToast={onToast}/>}
      {modalCaja && <ModalSaldoInicial session={session} actual={saldoInicialCaja} onClose={()=>setModalCaja(false)} onToast={onToast}/>}
      {modalCapital && <ModalCapitalInicial session={session} actual={capitalInicial} onClose={()=>setModalCapital(false)} onToast={onToast}/>}
    </div>
  );
}

function ModalCapitalInicial({ session, actual, onClose, onToast }) {
  const [monto, setMonto] = useState((actual && actual.monto) || '');
  const [fecha, setFecha] = useState((actual && actual.fecha) || todayStr());
  const [saving, setSaving] = useState(false);

  const guardar = async () => {
    const m = parseFloat(monto);
    if (!m || m < 0) return onToast('Monto inválido','error');
    setSaving(true);
    try {
      await fbSet('capital/inicial', {
        monto: m,
        fecha,
        actualizadoEn: nowISO(),
        actualizadoPor: session.id,
      });
      await fbLog(session.id, 'update', 'capital', { monto: m });
      onToast('Capital inicial actualizado','success');
      onClose();
    } catch(e) { onToast('Error','error'); }
    setSaving(false);
  };

  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <h3>💰 Capital inicial</h3>
        <div className="alert-banner info" style={{fontSize:11, marginTop:8}}>
          <span className="ico">ℹ️</span>
          <div>Monto total aportado al iniciar la empresa por los socios.</div>
        </div>

        <label className="fld">Monto *</label>
        <input type="number" className="inp" value={monto} onChange={e=>setMonto(e.target.value)} placeholder="Ej: 5000000" min="0"/>

        <label className="fld">Fecha de constitución</label>
        <input type="date" className="inp" value={fecha} onChange={e=>setFecha(e.target.value)}/>

        <div className="actions">
          <button className="btn ghost" onClick={onClose}>Cancelar</button>
          <button className="btn accent" onClick={guardar} disabled={saving}>{saving?'...':'Guardar'}</button>
        </div>
      </div>
    </div>
  );
}

function ModalSaldoInicial({ session, actual, onClose, onToast }) {
  const [efectivo, setEfectivo] = useState((actual && actual.efectivo) || '');
  const [banco, setBanco] = useState((actual && actual.banco) || '');
  const [fecha, setFecha] = useState((actual && actual.fecha) || todayStr());
  const [saving, setSaving] = useState(false);

  const guardar = async () => {
    const e = parseFloat(efectivo) || 0;
    const b = parseFloat(banco) || 0;
    if (e < 0 || b < 0) return onToast('Montos inválidos','error');
    setSaving(true);
    try {
      await fbSet('caja/saldoInicial', {
        efectivo: e,
        banco: b,
        fecha,
        actualizadoEn: nowISO(),
        actualizadoPor: session.id,
      });
      await fbLog(session.id, 'update', 'caja', { efectivo: e, banco: b });
      onToast('Saldo inicial actualizado','success');
      onClose();
    } catch(err) { onToast('Error','error'); }
    setSaving(false);
  };

  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <h3>🏦 Saldo inicial caja y banco</h3>
        <div className="alert-banner info" style={{fontSize:11, marginTop:8}}>
          <span className="ico">ℹ️</span>
          <div>Saldo de efectivo y banco al iniciar el uso del sistema.</div>
        </div>

        <label className="fld">💵 Efectivo en caja</label>
        <input type="number" className="inp" value={efectivo} onChange={e=>setEfectivo(e.target.value)} placeholder="0" min="0"/>

        <label className="fld">🏦 Saldo banco</label>
        <input type="number" className="inp" value={banco} onChange={e=>setBanco(e.target.value)} placeholder="0" min="0"/>

        <label className="fld">Al día</label>
        <input type="date" className="inp" value={fecha} onChange={e=>setFecha(e.target.value)}/>

        <div className="actions">
          <button className="btn ghost" onClick={onClose}>Cancelar</button>
          <button className="btn accent" onClick={guardar} disabled={saving}>{saving?'...':'Guardar'}</button>
        </div>
      </div>
    </div>
  );
}

function ModalMovimientoCapital({ session, mov, tipo, onClose, onToast }) {
  const tipoActual = mov?.tipo || tipo || 'aporte';
  const [monto, setMonto] = useState(mov?.monto || '');
  const [fecha, setFecha] = useState(mov?.fecha || todayStr());
  const [descripcion, setDescripcion] = useState(mov?.descripcion || '');
  const [saving, setSaving] = useState(false);

  const guardar = async () => {
    const m = parseFloat(monto);
    if (!m || m <= 0) return onToast('Monto inválido','error');
    setSaving(true);
    try {
      const datos = {
        tipo: tipoActual, monto: m, fecha, descripcion: descripcion.trim(),
        creadoPor: session.id, creadoEn: mov?.creadoEn || nowISO(),
      };
      if (mov) {
        await fbSet(`capital/movimientos/${mov.id}`, datos);
      } else {
        await fbSet(`capital/movimientos/${uid()}`, datos);
      }
      await fbLog(session.id, mov?'update':'create', 'capital/movimientos', { tipo: tipoActual, monto: m });
      onToast(`${tipoActual === 'aporte' ? 'Aporte' : 'Retiro'} registrado`,'success');
      onClose();
    } catch(e) { onToast('Error','error'); }
    setSaving(false);
  };

  const eliminar = async () => {
    if (!mov || !confirm('¿Eliminar?')) return;
    try {
      await fbRemove(`capital/movimientos/${mov.id}`);
      await fbLog(session.id, 'delete', 'capital/movimientos', { id: mov.id });
      onToast('Eliminado','warn');
      onClose();
    } catch(e) { onToast('Error','error'); }
  };

  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <h3>{tipoActual === 'aporte' ? '➕ Aporte de capital' : '➖ Retiro de utilidades'}</h3>

        <label className="fld">Monto *</label>
        <input type="number" className="inp" value={monto} onChange={e=>setMonto(e.target.value)} placeholder="Ej: 100000" min="0"/>

        <label className="fld">Fecha *</label>
        <input type="date" className="inp" value={fecha} onChange={e=>setFecha(e.target.value)}/>

        <label className="fld">Descripción</label>
        <textarea
          className="inp" rows="2"
          value={descripcion} onChange={e=>setDescripcion(e.target.value)}
          placeholder="Ej: Aporte socio Francisco para compra camión"
          style={{resize:'none', fontFamily:'inherit'}}
        />

        <div className="actions">
          <button className="btn ghost" onClick={onClose}>Cancelar</button>
          {mov && <button className="btn danger" onClick={eliminar}>Eliminar</button>}
          <button className="btn accent" onClick={guardar} disabled={saving}>{saving?'...':'Guardar'}</button>
        </div>
      </div>
    </div>
  );
}

// =========================== GASTOS OPERACIONALES ===========================
// Registro de gastos NO relacionados con compra de huevos
// Categorías: sueldos, arriendo, combustible, servicios, mantención, otros

const CATEGORIAS_GASTOS = [
  { id: 'sueldos', label: 'Sueldos y honorarios', icono: '👥', tipo: 'fijo' },
  { id: 'arriendo', label: 'Arriendo y locales', icono: '🏢', tipo: 'fijo' },
  { id: 'servicios', label: 'Servicios básicos (luz, agua, internet)', icono: '💡', tipo: 'fijo' },
  { id: 'combustible', label: 'Combustible', icono: '⛽', tipo: 'variable' },
  { id: 'mantencion', label: 'Mantención vehículo', icono: '🔧', tipo: 'variable' },
  { id: 'insumos', label: 'Insumos y materiales', icono: '📦', tipo: 'variable' },
  { id: 'transporte', label: 'Transporte y peajes', icono: '🛣️', tipo: 'variable' },
  { id: 'viatico', label: 'Viático y movilización', icono: '🚐', tipo: 'variable' },
  { id: 'colacion', label: 'Colación y alimentación', icono: '🍽️', tipo: 'variable' },
  { id: 'comisiones', label: 'Comisiones bancarias', icono: '🏦', tipo: 'fijo' },
  { id: 'impuestos', label: 'Impuestos y patentes', icono: '📋', tipo: 'fijo' },
  { id: 'otros', label: 'Otros', icono: '📝', tipo: 'variable' },
];

function Gastos({ session, onToast }) {
  const isAdmin = session.role === 'admin';
  const { list: gastos } = useFirebaseList('gastos');
  const [modal, setModal] = useState(null);
  const [filtroCategoria, setFiltroCategoria] = useState('todas');
  const [filtroTipo, setFiltroTipo] = useState('todos');

  const gastosFiltrados = useMemo(() => {
    let arr = [...gastos].sort((a,b) => (b.fecha||'').localeCompare(a.fecha||''));
    if (filtroCategoria !== 'todas') arr = arr.filter(g => g.categoria === filtroCategoria);
    if (filtroTipo !== 'todos') arr = arr.filter(g => {
      const cat = CATEGORIAS_GASTOS.find(c => c.id === g.categoria);
      return cat && cat.tipo === filtroTipo;
    });
    return arr;
  }, [gastos, filtroCategoria, filtroTipo]);

  // Totales del mes actual
  const totalMes = useMemo(() => {
    const hoy = new Date();
    const mes = `${hoy.getFullYear()}-${String(hoy.getMonth()+1).padStart(2,'0')}`;
    return gastos.filter(g => (g.fecha||'').startsWith(mes))
      .reduce((s,g) => s + (g.monto||0), 0);
  }, [gastos]);

  // Totales por categoría (mes actual)
  const totalesPorCat = useMemo(() => {
    const hoy = new Date();
    const mes = `${hoy.getFullYear()}-${String(hoy.getMonth()+1).padStart(2,'0')}`;
    const res = {};
    CATEGORIAS_GASTOS.forEach(c => { res[c.id] = 0; });
    gastos.filter(g => (g.fecha||'').startsWith(mes)).forEach(g => {
      if (res[g.categoria] !== undefined) res[g.categoria] += g.monto || 0;
    });
    return res;
  }, [gastos]);

  if (!isAdmin) return <div className="pad"><div className="empty">Solo administradores</div></div>;

  return (
    <div className="pad">
      <h2 className="section-title">Gastos operacionales</h2>
      <div className="section-sub">Gastos NO relacionados con compra de huevos</div>

      <div className="card" style={{background:'var(--bg-2)'}}>
        <div style={{fontSize:11, color:'var(--ink-soft)', textTransform:'uppercase', letterSpacing:1.2}}>Total del mes</div>
        <div style={{fontSize:24, fontWeight:700, fontFamily:'JetBrains Mono, monospace', color:'var(--accent)'}}>{fmt$(totalMes)}</div>
      </div>

      <button className="btn accent full" onClick={()=>setModal({})} style={{marginBottom:14}}>
        ➕ Registrar gasto
      </button>

      <div style={{display:'flex', gap:6, marginBottom:10, flexWrap:'wrap'}}>
        <select className="inp" value={filtroTipo} onChange={e=>setFiltroTipo(e.target.value)} style={{flex:1, marginBottom:0, padding:'8px 10px'}}>
          <option value="todos">Todos los tipos</option>
