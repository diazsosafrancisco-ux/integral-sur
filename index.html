            <div><strong>Día cerrado</strong> · Esta venta ya no se puede modificar. Solo el administrador puede hacerlo.</div>
          </div>
        )}

        {/* Banner informativo si editamos venta mixta */}
        {editando && venta.formaPago === 'mixto' && venta.montosMixto && (
          <div className="alert-banner" style={{fontSize:11, background:'var(--accent-soft)', color:'var(--accent)', marginBottom:10}}>
            <span className="ico">🔀</span>
            <div>
              <strong>Pago mixto · Total {fmt$(venta.totalBruto)}</strong>
              <div style={{fontSize:11, marginTop:4, fontFamily:'JetBrains Mono, monospace', color:'var(--ink-soft)'}}>
                {(venta.montosMixto.efectivo||0) > 0 && <>💵 Efectivo: {fmt$(venta.montosMixto.efectivo)}<br/></>}
                {(venta.montosMixto.transferencia||0) > 0 && <>🏦 Transferencia: {fmt$(venta.montosMixto.transferencia)} {venta.transferenciaConfirmada ? '✓' : '(sin confirmar)'}<br/></>}
                {(venta.montosMixto.pendiente||0) > 0 && <>⏰ Por cobrar: {fmt$(venta.montosMixto.pendiente)}{venta.fechaCompromiso ? ` · vence ${venta.fechaCompromiso}` : ''}</>}
              </div>
            </div>
          </div>
        )}

        {cargandoPrecios && !editando ? (
          <>
            <div style={{textAlign:'center', padding:'30px 12px'}}>
              <div style={{fontSize:28, marginBottom:8}}>⏳</div>
              <div style={{fontSize:13, color:'var(--ink-soft)'}}>Verificando precios del día...</div>
            </div>
            <div className="actions">
              <button className="btn ghost full" onClick={onClose}>Cancelar</button>
            </div>
          </>
        ) : sinPreciosHoy && !editando ? (
          <>
            <div style={{textAlign:'center', padding:'24px 12px'}}>
              <div style={{fontSize:54, marginBottom:10, animation:'pulse 1.5s infinite'}}>🚨</div>
              <h3 style={{color:'var(--bad)', margin:'0 0 10px'}}>Sin precios configurados</h3>
              <div style={{fontSize:13, color:'var(--ink-soft)', lineHeight:1.6, padding:'0 8px'}}>
                No se pueden registrar ventas porque el administrador aún no configuró los precios del día.<br/><br/>
                <strong>Contacta al administrador</strong> para que configure los precios de hoy.
              </div>
            </div>
            <div className="actions">
              <button className="btn accent full" onClick={onClose}>Entendido</button>
            </div>
          </>
        ) : (
          <>

        {!sinPreciosHoy && !infoPrecios.esDeHoy && !editando && (
          <div className="alert-banner" style={{fontSize:12, background:'var(--warn-bg)', color:'var(--warn)', marginTop:10}}>
            <span className="ico">⚠️</span>
            <div>Usando precios del {infoPrecios.fechaUsada} (no hay precios cargados para hoy)</div>
          </div>
        )}

        {editando && (
          <div className="alert-banner info" style={{fontSize:12, marginTop:10}}>
            <span className="ico">ℹ️</span>
            <div>Modificar revertirá el stock anterior y aplicará el nuevo. Queda registrado en auditoría.</div>
          </div>
        )}

        <label className="fld">Cliente *</label>

        {/* Si viene preseleccionado desde la ruta: solo mostrar nombre, sin lista */}
        {clienteId && !editando ? (
          <div style={{
            padding:'10px 12px', background:'var(--accent-soft)',
            borderRadius:8, borderLeft:'3px solid var(--accent)',
            marginBottom:8, display:'flex', justifyContent:'space-between', alignItems:'center'
          }}>
            <div>
              <strong style={{fontSize:14}}>{misClientes.find(c=>c.id===clienteId)?.razonSocial || clienteId}</strong>
              {misClientes.find(c=>c.id===clienteId)?.direccion && (
                <div style={{fontSize:11, color:'var(--ink-soft)', marginTop:2}}>
                  📍 {misClientes.find(c=>c.id===clienteId)?.direccion}
                </div>
              )}
            </div>
            <button onClick={()=>setClienteId('')} style={{
              background:'none', border:'none', color:'var(--ink-soft)',
              fontSize:20, cursor:'pointer', padding:'0 4px'
            }}>×</button>
          </div>
        ) : (
          /* Sin cliente preseleccionado: mostrar buscador + lista */
          <>
            <input
              type="search"
              className="inp"
              placeholder="🔍 Buscar por nombre, dirección, contacto..."
              value={busquedaCliente}
              onChange={e=>setBusquedaCliente(e.target.value)}
              style={{marginBottom:6}}
            />
            {(() => {
              const q = busquedaCliente.toLowerCase().trim();
              let filtrados = misClientes.filter(c => {
                const dias = c.diasVisita || [];
                if (dias.length === 1 && dias[0] === 6) return false;
                return true;
              });
              if (q) {
                filtrados = filtrados.filter(c =>
                  (c.razonSocial||'').toLowerCase().includes(q) ||
                  (c.contacto||'').toLowerCase().includes(q) ||
                  (c.direccion||'').toLowerCase().includes(q) ||
                  (c.comuna||'').toLowerCase().includes(q) ||
                  (c.rut||'').toLowerCase().includes(q)
                );
              }
              if (filtrados.length === 0) {
                return (
                  <div style={{padding:14, background:'var(--bg-2)', borderRadius:8, textAlign:'center', fontSize:12, color:'var(--ink-mute)', marginBottom:8}}>
                    {q ? `Sin resultados para "${q}"` : 'Sin clientes disponibles'}
                  </div>
                );
              }
              return (
                <div style={{maxHeight:220, overflowY:'auto', border:'1px solid var(--line)', borderRadius:8, marginBottom:8}}>
                  {filtrados.map(c => (
                    <div key={c.id} onClick={()=>{ setClienteId(c.id); setBusquedaCliente(''); }}
                      style={{
                        padding:'8px 10px', borderBottom:'1px solid var(--line)', cursor:'pointer',
                        background: clienteId===c.id ? 'var(--accent-soft)' : 'transparent',
                        borderLeft: clienteId===c.id ? '3px solid var(--accent)' : '3px solid transparent',
                      }}>
                      <strong style={{fontSize:13}}>{c.razonSocial}</strong>
                      <div style={{fontSize:11, color:'var(--ink-soft)', marginTop:2}}>
                        {c.contacto && <>👤 {c.contacto}</>}
                        {c.direccion && <> · 📍 {c.direccion}{c.comuna?`, ${c.comuna}`:''}</>}
                      </div>
                    </div>
                  ))}
                </div>
              );
            })()}
          </>
        )}

        {/* Select para edición */}
        {editando && (
          <select className="inp" value={clienteId} onChange={e=>setClienteId(e.target.value)}>
            <option value="">-- Selecciona --</option>
            {misClientes.map(c => <option key={c.id} value={c.id}>{c.razonSocial}{c.status==='pendiente'?' ⏳':''}</option>)}
          </select>
        )}

        {!cliente ? (
          <div style={{padding:20, textAlign:'center', color:'var(--ink-mute)'}}>
            Selecciona un cliente para continuar
          </div>
        ) : (
          <>
            {tieneDeuda && !editando && (
              <div style={{
                background: estadoDeuda.bgColor || 'var(--warn-bg)',
                border: `1.5px solid ${estadoDeuda.color || 'var(--warn)'}`,
                borderRadius:10, padding:'10px 12px', marginTop:10,
              }}>
                <div style={{display:'flex', alignItems:'center', gap:8, marginBottom:8}}>
                  <span style={{fontSize:22}}>{estadoDeuda.icono || '⚠️'}</span>
                  <div>
                    <strong style={{color: estadoDeuda.color || 'var(--warn)', fontSize:13}}>
                      Cliente con deuda pendiente
                    </strong>
                    <div style={{fontSize:11, color: estadoDeuda.color || 'var(--warn)'}}>
                      {estadoDeuda.mensaje}
                    </div>
                  </div>
                </div>
                {/* Desglose de deudas anteriores */}
                {deudaCliente.ventas.map((d,i) => {
                  const saldo = saldoVenta(d);
                  const est = getDeudaEstado(d.fechaCompromiso);
                  return (
                    <div key={i} style={{
                      background:'rgba(0,0,0,0.08)', borderRadius:6,
                      padding:'6px 8px', marginBottom:4, fontSize:11,
                      fontFamily:'JetBrains Mono, monospace',
                    }}>
                      <div style={{display:'flex', justifyContent:'space-between'}}>
                        <span style={{color:'var(--ink-soft)'}}>
                          {new Date(d.creadoEn).toLocaleDateString('es-CL',{day:'numeric',month:'short'})}
                          {d.formaPago==='mixto'?' · 🔀 Mixto':''}
                        </span>
                        <strong style={{color: estadoDeuda.color || 'var(--warn)'}}>
                          {fmt$(saldo)}
                        </strong>
                      </div>
                      {d.totalAbonado > 0 && (
                        <div style={{fontSize:10, color:'var(--good)'}}>✓ abonado {fmt$(d.totalAbonado)} de {fmt$(d.totalBruto)}</div>
                      )}
                      {d.formaPago==='mixto' && d.montosMixto?.pendiente > 0 && (
                        <div style={{fontSize:10, color:'var(--ink-mute)'}}>pendiente de mixto: {fmt$(d.montosMixto.pendiente)}</div>
                      )}
                      {est.tipo !== 'sinFecha' && (
                        <div style={{fontSize:10, color: est.color}}>{est.icono} {est.mensaje}</div>
                      )}
                    </div>
                  );
                })}
                <div style={{display:'flex', justifyContent:'space-between', borderTop:'1px solid rgba(0,0,0,0.1)', paddingTop:6, marginTop:4}}>
                  <strong style={{fontSize:12, color: estadoDeuda.color || 'var(--warn)'}}>Total adeudado:</strong>
                  <strong style={{fontSize:14, color: estadoDeuda.color || 'var(--warn)', fontFamily:'JetBrains Mono, monospace'}}>
                    {fmt$(deudaCliente.total)}
                  </strong>
                </div>
              </div>
            )}

            <div className="row">
              <div>
                <label className="fld">Documento *</label>
                <div style={{display:'flex', gap:4}}>
                  <button className="btn sm" onClick={()=>setTipoDoc('boleta')} style={{flex:1, background: tipoDoc==='boleta'?'var(--ink)':'transparent', color: tipoDoc==='boleta'?'var(--ink-on)':'var(--ink-soft)', border:'1.5px solid var(--line)'}}>🧾 Boleta</button>
                  <button className="btn sm" onClick={()=>setTipoDoc('factura')} style={{flex:1, background: tipoDoc==='factura'?'var(--ink)':'transparent', color: tipoDoc==='factura'?'var(--ink-on)':'var(--ink-soft)', border:'1.5px solid var(--line)'}}>📄 Factura</button>
                </div>
              </div>
              <div>
                <label className="fld">Forma de pago *</label>
                <select className="inp" value={formaPago} onChange={e=>setFormaPago(e.target.value)} style={{padding:'8px 10px', marginBottom:0}}>
                  {formasDisponibles.map(fp => (
                    <option key={fp} value={fp}>
                      {fp==='efectivo'?'💵 Efectivo':fp==='transferencia'?'🏦 Transferencia':fp==='pendiente'?'⏰ Pendiente':'🔀 Mixto (combinar)'}
                    </option>
                  ))}
                </select>
              </div>
            </div>

            {/* BLOQUE PAGO MIXTO */}
            {formaPago === 'mixto' && (
              <div className="card" style={{marginTop:10, background:'var(--bg-2)', padding:12}}>
                <div style={{fontSize:11, fontWeight:700, color:'var(--ink-soft)', textTransform:'uppercase', letterSpacing:1.2, marginBottom:8}}>
                  🔀 Combinación de pago
                </div>
                <div style={{fontSize:11, color:'var(--ink-mute)', marginBottom:10}}>
                  Total a distribuir: <strong style={{fontFamily:'JetBrains Mono, monospace', color:'var(--accent)'}}>{fmt$(totales.bruto)}</strong>
                </div>

                {(cliente?.formasPago?.efectivo) && (
                  <div style={{marginBottom:8}}>
                    <label className="fld" style={{fontSize:11}}>💵 Efectivo</label>
                    <input
                      type="number"
                      className="inp"
                      value={montosMixto.efectivo || ''}
                      onChange={e=>setMontosMixto({...montosMixto, efectivo: parseFloat(e.target.value)||0})}
                      placeholder="0"
                      min="0"
                      style={{fontFamily:'JetBrains Mono, monospace', textAlign:'right', marginBottom:0}}
                    />
                  </div>
                )}

                {(cliente?.formasPago?.transferencia) && (
                  <div style={{marginBottom:8}}>
                    <label className="fld" style={{fontSize:11}}>🏦 Transferencia</label>
                    <input
                      type="number"
                      className="inp"
                      value={montosMixto.transferencia || ''}
                      onChange={e=>setMontosMixto({...montosMixto, transferencia: parseFloat(e.target.value)||0})}
                      placeholder="0"
                      min="0"
                      style={{fontFamily:'JetBrains Mono, monospace', textAlign:'right', marginBottom:0}}
                    />
                  </div>
                )}

                {(cliente?.formasPago?.pendiente) && (
                  <div style={{marginBottom:8}}>
                    <label className="fld" style={{fontSize:11}}>⏰ Crédito / Pendiente</label>
                    <input
                      type="number"
                      className="inp"
                      value={montosMixto.pendiente || ''}
                      onChange={e=>setMontosMixto({...montosMixto, pendiente: parseFloat(e.target.value)||0})}
                      placeholder="0"
                      min="0"
                      style={{fontFamily:'JetBrains Mono, monospace', textAlign:'right', marginBottom:0}}
                    />
                  </div>
                )}

                {/* Resumen suma vs total */}
                {(() => {
                  const sumaMixto = (montosMixto.efectivo||0) + (montosMixto.transferencia||0) + (montosMixto.pendiente||0);
                  const diff = totales.bruto - sumaMixto;
                  const cuadra = Math.abs(diff) < 1;
                  return (
                    <div style={{
                      marginTop:8, padding:'8px 10px', borderRadius:6,
                      background: cuadra ? 'var(--good-bg)' : 'var(--warn-bg)',
                      border:'1px solid ' + (cuadra ? 'var(--good)' : 'var(--warn)'),
                    }}>
                      <div style={{display:'flex', justifyContent:'space-between', fontSize:12}}>
                        <span>Suma actual:</span>
                        <strong style={{fontFamily:'JetBrains Mono, monospace'}}>{fmt$(sumaMixto)}</strong>
                      </div>
                      <div style={{display:'flex', justifyContent:'space-between', fontSize:12, marginTop:2}}>
                        <span>Total venta:</span>
                        <strong style={{fontFamily:'JetBrains Mono, monospace'}}>{fmt$(totales.bruto)}</strong>
                      </div>
                      <hr style={{border:'none', borderTop:'1px solid var(--line)', margin:'4px 0'}}/>
                      <div style={{display:'flex', justifyContent:'space-between', fontSize:12, fontWeight:700,
                        color: cuadra ? 'var(--good)' : 'var(--warn)',
                      }}>
                        <span>{cuadra ? '✓ Cuadra' : '⚠ Diferencia:'}</span>
                        <strong style={{fontFamily:'JetBrains Mono, monospace'}}>
                          {cuadra ? '$0' : fmt$(diff)}
                        </strong>
                      </div>
                    </div>
                  );
                })()}
              </div>
            )}

            {/* Fecha compromiso: aplica para pago pendiente Y mixto (si tiene parte pendiente) */}
            {(formaPago === 'pendiente' || (formaPago === 'mixto' && montosMixto.pendiente > 0)) && (
              <>
                <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginTop:10}}>
                  <label className="fld" style={{margin:0}}>Fecha de compromiso *</label>
                  <button
                    onClick={()=>setModoPrueba(!modoPrueba)}
                    style={{background:'transparent', border:'none', fontSize:14, padding:'2px 6px', cursor:'pointer', opacity: modoPrueba ? 1 : 0.4}}
                    title="Modo prueba: permite fecha pasada">
                    🧪
                  </button>
                </div>
                <input type="date" className="inp" value={fechaCompromiso} min={modoPrueba ? undefined : todayStr()} onChange={e=>setFechaCompromiso(e.target.value)}/>
                {modoPrueba && fechaCompromiso < todayStr() && (
                  <div style={{fontSize:10, color:'var(--bad)', marginTop:-6, marginBottom:6}}>⚠️ Fecha pasada (modo prueba activo)</div>
                )}
              </>
            )}

            <hr className="div"/>
            <div style={{fontSize:11, fontWeight:700, color:'var(--ink-soft)', textTransform:'uppercase', letterSpacing:1.4, marginBottom:8}}>Productos</div>

            {CALIBRES.map(c => {
              const stockCal = stockDisponiblePorCalibre[c] || 0;
              const bd = unitsBreakdown(stockCal);
              const lineaCaja = calcLinea(c, 'caja');
              const lineaBd = calcLinea(c, 'bandeja');
              const tieneStockCero = stockCal === 0 && items[c].caja.cantidad === 0 && items[c].bandeja.cantidad === 0;

              return (
                <div key={c} style={{padding:'10px', marginTop:8, borderRadius:8, background: tieneStockCero?'var(--bg-2)':'transparent', border:'1px solid var(--line)', opacity: tieneStockCero?0.5:1}}>
                  <div style={{display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:6}}>
                    <strong>{c}</strong>
                    <span style={{fontSize:10, color:'var(--ink-mute)', fontFamily:'JetBrains Mono, monospace'}}>
                      Disponible: {bd.cajasInt > 0 ? `${bd.cajasInt}cj` : ''}{bd.cajasInt > 0 && bd.bandejasInt > 0 ? ' · ' : ''}{bd.bandejasInt > 0 ? `${bd.bandejasInt}bd` : ''}{bd.cajasInt === 0 && bd.bandejasInt === 0 ? '0cj' : ''}
                    </span>
                  </div>
                  {['caja','bandeja'].map(fmt => {
                    const cfg = items[c][fmt];
                    const linea = fmt === 'caja' ? lineaCaja : lineaBd;
                    return (
                      <div key={fmt} style={{padding:'6px 0', borderTop: fmt==='bandeja'?'1px dashed var(--line)':'none'}}>
                        <div style={{fontSize:11, color:'var(--accent)', marginBottom:4}}>{FORMATOS[fmt].label} ({FORMATOS[fmt].unidades}u)</div>
                        <div className="row">
                          <div>
                            <label className="fld" style={{fontSize:10}}>Cant.</label>
                            <input type="number" min="0" className="inp" value={cfg.cantidad||''} onChange={e=>setVal(c, fmt, 'cantidad', e.target.value)} style={{padding:'7px 9px', marginBottom:0}} disabled={tieneStockCero}/>
                          </div>
                          <div>
                            <label className="fld" style={{fontSize:10}}>Rotos ⚠️</label>
                            <input type="number" min="0" className="inp" value={cfg.mermas||''} onChange={e=>setVal(c, fmt, 'mermas', e.target.value)} style={{padding:'7px 9px', marginBottom:0}} disabled={cfg.cantidad === 0}/>
                          </div>
                        </div>
                        {linea && (
                          <div style={{fontSize:10, color:'var(--ink-mute)', marginTop:4, fontFamily:'JetBrains Mono, monospace', textAlign:'right', lineHeight:1.5}}>
                            {linea.mermas > 0 && <>Bruto sin merma: {fmt$(linea.subtotalBrutoSinMerma)}<br/>Desc. merma ({linea.mermas}u): -{fmt$(linea.descuentoBruto)}<br/></>}
                            <strong style={{color:'var(--accent)'}}>Subtotal: {fmt$(linea.totalBruto)}</strong>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              );
            })}

            {/* Descuentos negociados por calibre */}
            {totales.bruto > 0 && (
              <div style={{marginTop:14}}>
                <button
                  type="button"
                  onClick={()=>setMostrarDescuentos(!mostrarDescuentos)}
                  style={{
                    width:'100%',
                    background: mostrarDescuentos ? 'var(--warn-bg)' : 'transparent',
                    border: '1.5px dashed var(--warn)',
                    color:'var(--warn)',
                    padding:'8px 10px',
                    borderRadius:8,
                    fontSize:12,
                    cursor:'pointer',
                    fontWeight:600,
                  }}>
                  {mostrarDescuentos ? '➖ Ocultar descuentos' : '🏷️ Aplicar descuento negociado'}
                </button>
                {mostrarDescuentos && (
                  <div style={{padding:12, background:'var(--warn-bg)', borderRadius:8, marginTop:8}}>
                    <div style={{fontSize:11, color:'var(--warn)', marginBottom:8, fontWeight:600}}>
                      💡 Descuento en pesos POR UNIDAD. Requiere aprobación del administrador.
                    </div>
                    {CALIBRES.filter(c => {
                      const tieneItems = items[c].caja.cantidad > 0 || items[c].bandeja.cantidad > 0;
                      return tieneItems;
                    }).map(c => {
                      const totalU = (items[c].caja.cantidad * 180) + (items[c].bandeja.cantidad * 30) - (items[c].caja.mermas + items[c].bandeja.mermas);
                      const descTotal = (descuentos[c] || 0) * totalU;
                      return (
                        <div key={c} style={{display:'flex', alignItems:'center', gap:6, marginBottom:6}}>
                          <strong style={{fontSize:12, flex:'0 0 70px'}}>{c}</strong>
                          <span style={{fontSize:10, color:'var(--ink-soft)', flex:'0 0 50px'}}>{fmtN(totalU)}u</span>
                          <span style={{fontSize:11}}>-$</span>
                          <input
                            type="number"
                            min="0"
                            className="inp"
                            value={descuentos[c] || ''}
                            onChange={e=>setDescuentos({...descuentos, [c]: parseFloat(e.target.value)||0})}
                            placeholder="0"
                            style={{flex:1, marginBottom:0, padding:'4px 8px', fontSize:13, textAlign:'right', fontFamily:'JetBrains Mono, monospace'}}
                          />
                          <span style={{fontSize:10, color:'var(--ink-soft)'}}>/u</span>
                          {descTotal > 0 && (
                            <span style={{fontSize:11, fontFamily:'JetBrains Mono, monospace', color:'var(--bad)', flex:'0 0 70px', textAlign:'right'}}>
                              -{fmt$(descTotal)}
                            </span>
                          )}
                        </div>
                      );
                    })}
                    {totales.descNegBruto > 0 && (
                      <div className="alert-banner" style={{fontSize:11, marginTop:8, background:'var(--bad-bg)', color:'var(--bad)'}}>
                        <span className="ico">⚠️</span>
                        <div>
                          <strong>Esta venta requiere aprobación del administrador</strong><br/>
                          Descuento total: -{fmt$(totales.descNegBruto)}
                        </div>
                      </div>
                    )}
                  </div>
                )}
              </div>
            )}

            <div style={{padding:'10px 12px', background:'var(--bg-2)', borderRadius:8, marginTop:12, fontFamily:'JetBrains Mono, monospace', fontSize:12, lineHeight:1.8}}>
              <div style={{display:'flex', justifyContent:'space-between'}}><span>Neto:</span><span>{fmt$(totales.neto)}</span></div>
              <div style={{display:'flex', justifyContent:'space-between'}}><span>IVA 19%:</span><span>{fmt$(totales.iva)}</span></div>
              {totales.mermas > 0 && (
                <div style={{display:'flex', justifyContent:'space-between', color:'var(--bad)'}}><span>Desc. mermas ({totales.mermas}u):</span><span>-{fmt$(totales.descMerma)}</span></div>
              )}
              {totales.descNegBruto > 0 && (
                <div style={{display:'flex', justifyContent:'space-between', color:'var(--warn)'}}><span>Desc. negociado:</span><span>-{fmt$(totales.descNegBruto)}</span></div>
              )}
              <div style={{borderTop:'1px solid var(--line)', marginTop:6, paddingTop:6, display:'flex', justifyContent:'space-between', fontSize:14, fontWeight:700, color:'var(--accent)'}}>
                <span>TOTAL:</span><span>{fmt$(totales.bruto)}</span>
              </div>
            </div>
          </>
        )}

        <div className="actions">
          <button className="btn ghost" onClick={onClose}>Cancelar</button>
          <button
            className={tieneDeuda && !editando ? 'btn danger' : 'btn accent'}
            onClick={guardar}
            disabled={saving || !clienteId || totales.bruto === 0 || (sinPreciosHoy && !editando)}>
            {saving ? 'Guardando...' : editando ? '✏️ Guardar cambios' : sinPreciosHoy ? '🚨 Sin precios del día' : tieneDeuda ? '⚠️ Vender con deuda' : 'Registrar venta'}
          </button>
        </div>
          </>
        )}
          </>
        )}
      </div>
    </div>
  );
}

function ModalVisitaCerrada({ cliente, session, onClose, onToast }) {
  const [foto, setFoto] = useState(null);
  const [previewUrl, setPreviewUrl] = useState(null);
  const [observaciones, setObservaciones] = useState('');
  const [saving, setSaving] = useState(false);
  const [whatsappEnviado, setWhatsappEnviado] = useState(false);
  const fileInputRef = React.useRef(null);

  const procesarArchivo = (file) => {
    if (!file) return;
    if (!file.type.startsWith('image/')) return onToast('Solo imágenes','error');
    if (file.size > 5*1024*1024) return onToast('Máx 5 MB','error');
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const maxDim = 1200;
        let w = img.width, h = img.height;
        if (w > maxDim || h > maxDim) {
          if (w > h) { h = h * maxDim / w; w = maxDim; }
          else { w = w * maxDim / h; h = maxDim; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        const dataUrl = canvas.toDataURL('image/jpeg', 0.75);
        setFoto(dataUrl);
        setPreviewUrl(dataUrl);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  };

  const enviarWhatsApp = async () => {
    const tel = cliente.telefonoContacto || cliente.telefono;
    if (!tel) return onToast('Cliente sin teléfono','warn');
    const fechaHoy = new Date().toLocaleDateString('es-CL', {day:'numeric', month:'long'});
    const mensaje = `🥚 *INTEGRAL SUR · Distribuidora*\n\nHola ${cliente.contacto || cliente.razonSocial}, esperamos que se encuentre muy bien 😊\n\nPasamos hoy ${fechaHoy} por su local pero no lo encontramos abierto 🔒\n\n${observaciones ? `📝 ${observaciones}\n\n` : ''}Sin ningún problema, cuando guste nos avisa y coordinamos para regresar a su local y realizar la entrega que necesite. Estamos siempre disponibles para usted. 📲\n\n¡Que tenga un excelente día! 🌟\n¡Gracias por elegirnos siempre! 🙏🥚`;

    // Intentar compartir con foto adjunta via Web Share API
    if (foto && navigator.canShare) {
      try {
        const res = await fetch(foto);
        const blob = await res.blob();
        const file = new File([blob], `local_cerrado_${cliente.razonSocial.replace(/\s+/g,'_')}.jpg`, { type: 'image/jpeg' });
        if (navigator.canShare({ files: [file] })) {
          await navigator.share({ text: mensaje, files: [file] });
          setWhatsappEnviado(true);
          fbLog(session.id, 'whatsapp', 'visitas', { clienteId: cliente.id, momento: 'local_cerrado' });
          return;
        }
      } catch(e) {
        if (e.name === 'AbortError') return;
      }
    }
    // Fallback: solo texto
    const ok = abrirWhatsApp(tel, mensaje);
    if (ok) {
      setWhatsappEnviado(true);
      fbLog(session.id, 'whatsapp', 'visitas', { clienteId: cliente.id, momento: 'local_cerrado' });
      if (foto) onToast('📲 WhatsApp abierto · adjunta la foto manualmente','warn');
    } else {
      onToast('No se pudo abrir WhatsApp','error');
    }
  };

  const guardarVisita = async () => {
    if (!foto) {
      return onToast('📸 La foto del local es obligatoria','error');
    }
    if (!whatsappEnviado) {
      if (!confirm('No has enviado el WhatsApp al cliente. ¿Continuar de todas formas?')) return;
    }
    setSaving(true);
    try {
      const id = uid();
      const datos = {
        clienteId: cliente.id,
        vendedorId: session.id,
        tipo: 'local_cerrado',
        observaciones: observaciones.trim(),
        whatsappEnviado: whatsappEnviado,
        foto,
        creadoEn: nowISO(),
        creadoPor: session.id,
      };
      await fbSet(`visitas/${id}`, datos);
      await fbLog(session.id, 'visita_cerrada', 'visitas', { clienteId: cliente.id, razonSocial: cliente.razonSocial });

      // Notificar al admin
      await crearNotificacion(session, {
        tipo: 'visita_cerrada',
        titulo: '🔒 Visita · Local cerrado',
        mensaje: `${session.name || 'Vendedor'} reporta local cerrado en ${cliente.razonSocial}`,
        link: 'clientes',
        clienteId: cliente.id,
        prioridad: 'normal',
      });

      onToast('✓ Visita registrada','success');
      onClose();
    } catch(e) {
      console.error(e);
      onToast('Error al guardar','error');
    }
    setSaving(false);
  };

  const tieneTel = cliente && (cliente.telefonoContacto || cliente.telefono);

  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <h3>🔒 Local cerrado</h3>

        <div className="card" style={{background:'var(--bg-2)'}}>
          <div style={{fontSize:11, color:'var(--ink-soft)', marginBottom:4}}>Cliente</div>
          <strong>{cliente.razonSocial}</strong>
          {cliente.direccion && (
            <div style={{fontSize:11, color:'var(--ink-soft)', marginTop:4}}>
              📍 {cliente.direccion}{cliente.comuna ? `, ${cliente.comuna}` : ''}
            </div>
          )}
          {cliente.contacto && <div style={{fontSize:11, color:'var(--ink-soft)', marginTop:2}}>👤 {cliente.contacto}</div>}
        </div>

        <label className="fld" style={{marginTop:12}}>📷 Foto del local * (obligatorio)</label>
        <div style={{marginBottom:8}}>
          <button className="btn ghost full" style={{padding:'12px'}}
            onClick={() => {
              if (fileInputRef.current) {
                fileInputRef.current.setAttribute('capture', 'environment');
                fileInputRef.current.click();
              }
            }}>
            {foto ? '📸 Tomar otra foto' : '📸 Tomar foto del local'}
          </button>
        </div>
        {/* Solo cámara — no galería */}
        <input ref={fileInputRef} type="file" accept="image/*" capture="environment"
          onChange={e=>procesarArchivo(e.target.files[0])} style={{display:'none'}}/>

        {previewUrl && (
          <div style={{padding:8, background:'var(--bg-2)', borderRadius:8, textAlign:'center', marginBottom:8}}>
            <img src={previewUrl} alt="Local" style={{maxWidth:'100%', maxHeight:200, borderRadius:6}}/>
            <button className="btn ghost sm" onClick={()=>{setFoto(null); setPreviewUrl(null);}} style={{marginTop:6, fontSize:11}}>🗑️ Quitar</button>
          </div>
        )}

        {!foto && (
          <div className="alert-banner" style={{fontSize:11, background:'var(--bad-bg)', color:'var(--bad)', marginBottom:8}}>
            <span className="ico">📸</span>
            <div><strong>Foto obligatoria</strong> · Adjunta foto del local cerrado como evidencia.</div>
          </div>
        )}

        <label className="fld" style={{marginTop:8}}>Observaciones (opcional)</label>
        <textarea
          className="inp"
          value={observaciones}
          onChange={e=>setObservaciones(e.target.value)}
          placeholder="Ej: pasaré mañana, llamar antes, etc."
          rows={2}
          style={{resize:'vertical'}}
        />

        {tieneTel && (
          <button
            className="btn full"
            onClick={enviarWhatsApp}
            style={{background:'#25D366', color:'white', border:'none', marginTop:10, padding:'10px', fontSize:13}}>
            {whatsappEnviado ? '✓ WhatsApp enviado · enviar otra vez' : '📲 Enviar WhatsApp al cliente'}
          </button>
        )}

        <div className="actions" style={{marginTop:12}}>
          <button className="btn ghost" onClick={onClose}>Cancelar</button>
          <button className="btn accent" onClick={guardarVisita} disabled={saving || !foto}>
            {saving ? '...' : '✓ Registrar visita'}
          </button>
        </div>
      </div>
    </div>
  );
}

// =========================== VISITAS REGISTRADAS ===========================
// Listado de visitas con local cerrado (visible para admin y vendedor)

function Visitas({ session, onToast }) {
  const isAdmin = session.role === 'admin';
  const { list: visitas, loading } = useFirebaseList('visitas');
  const { list: clientes } = useFirebaseList('clientes');
  const [filtroVendedor, setFiltroVendedor] = useState('todos');
  const [filtroFecha, setFiltroFecha] = useState('');
  const [verFoto, setVerFoto] = useState(null);

  const visibles = useMemo(() => {
    let arr = visitas;
    if (!isAdmin) arr = arr.filter(v => v.vendedorId === session.id);
    else if (filtroVendedor !== 'todos') arr = arr.filter(v => v.vendedorId === filtroVendedor);
    if (filtroFecha) arr = arr.filter(v => isoToLocalDate(v.creadoEn) === filtroFecha);
    return arr.sort((a,b) => (b.creadoEn||'').localeCompare(a.creadoEn||''));
  }, [visitas, session, isAdmin, filtroVendedor, filtroFecha]);

  const eliminar = async (v) => {
    if (!confirm('¿Eliminar este registro de visita?')) return;
    try {
      await fbRemove(`visitas/${v.id}`);
      await fbLog(session.id, 'delete', 'visitas', { id: v.id, clienteId: v.clienteId });
      onToast('Visita eliminada','warn');
    } catch(e) { onToast('Error','error'); }
  };

  return (
    <div className="page">
      <h2 className="section-title">📋 Visitas</h2>
      <div className="section-sub">Registro de visitas con local cerrado · {visibles.length} en total</div>

      <div className="card">
        {isAdmin && (
          <>
            <label className="fld">Vendedor</label>
            <select className="inp" value={filtroVendedor} onChange={e=>setFiltroVendedor(e.target.value)} style={{marginBottom:8}}>
              <option value="todos">Todos</option>
              {VENDEDORES.map(v => <option key={v.id} value={v.id}>{v.name}</option>)}
            </select>
          </>
        )}
        <label className="fld">Fecha</label>
        <input type="date" className="inp" value={filtroFecha} onChange={e=>setFiltroFecha(e.target.value)} style={{marginBottom:0}}/>
        {filtroFecha && (
          <button className="btn ghost sm" onClick={()=>setFiltroFecha('')} style={{marginTop:6, fontSize:11}}>Limpiar fecha</button>
        )}
      </div>

      {loading ? <div className="empty">Cargando...</div> : visibles.length === 0 ? (
        <div className="empty">Sin visitas registradas</div>
      ) : visibles.map(v => {
        const cli = clientes.find(c => c.id === v.clienteId);
        const ven = VENDEDORES.find(vv => vv.id === v.vendedorId);
        return (
          <div key={v.id} className="card" style={{borderLeft:'4px solid var(--warn)'}}>
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', gap:8}}>
              <div style={{flex:1, minWidth:0}}>
                <div style={{display:'flex', gap:6, alignItems:'center', flexWrap:'wrap', marginBottom:4}}>
                  <strong style={{fontSize:14}}>🔒 {cli?.razonSocial || '(cliente eliminado)'}</strong>
                  {v.whatsappEnviado && <span style={{fontSize:10, padding:'1px 6px', background:'#25D366', color:'white', borderRadius:8}}>📲 WA enviado</span>}
                </div>
                <div style={{fontSize:11, color:'var(--ink-soft)'}}>
                  {new Date(v.creadoEn).toLocaleString('es-CL', {day:'numeric', month:'short', hour:'2-digit', minute:'2-digit'})}
                  {isAdmin && ven && <> · 👤 {ven.name}</>}
                </div>
                {cli && cli.direccion && (
                  <div style={{fontSize:11, color:'var(--ink-mute)', marginTop:2}}>
                    📍 {cli.direccion}{cli.comuna ? `, ${cli.comuna}` : ''}
                  </div>
                )}
                {v.observaciones && (
                  <div style={{fontSize:12, marginTop:6, padding:'6px 8px', background:'var(--bg-2)', borderRadius:6}}>
                    📝 {v.observaciones}
                  </div>
                )}
              </div>
              <div style={{display:'flex', flexDirection:'column', gap:4}}>
                {v.foto && (
                  <button
                    className="btn ghost sm"
                    onClick={()=>setVerFoto(v.foto)}
                    style={{fontSize:10, padding:'4px 8px'}}>
                    👁️ Ver foto
                  </button>
                )}
                {isAdmin && (
                  <button className="btn danger sm" onClick={()=>eliminar(v)} style={{fontSize:10, padding:'4px 8px'}}>🗑️</button>
                )}
              </div>
            </div>
          </div>
        );
      })}

      {verFoto && (
        <div className="modal-bg" onClick={()=>setVerFoto(null)}>
          <div className="modal" style={{maxWidth:600}} onClick={e=>e.stopPropagation()}>
            <h3>📷 Foto del local</h3>
            <div style={{textAlign:'center', padding:10}}>
              <img src={verFoto} alt="Local" style={{maxWidth:'100%', maxHeight:'70vh', borderRadius:6}}/>
            </div>
            <div className="actions">
              <button className="btn accent" onClick={()=>setVerFoto(null)}>Cerrar</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function ModalAdjuntarComprobante({ venta, cliente, session, onClose, onToast }) {
  const [foto, setFoto] = useState(null);
  const [previewUrl, setPreviewUrl] = useState(null);
  const [saving, setSaving] = useState(false);
  const fileInputRef = React.useRef(null);

  const procesarArchivo = (file) => {
    if (!file) return;
    if (!file.type.startsWith('image/')) return onToast('Solo imágenes','error');
    if (file.size > 5*1024*1024) return onToast('Máx 5 MB','error');
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const maxDim = 1200;
        let w = img.width, h = img.height;
        if (w > maxDim || h > maxDim) {
          if (w > h) { h = h * maxDim / w; w = maxDim; }
          else { w = w * maxDim / h; h = maxDim; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        const dataUrl = canvas.toDataURL('image/jpeg', 0.75);
        setFoto(dataUrl);
        setPreviewUrl(dataUrl);
      };

  const confirmar = async () => {
