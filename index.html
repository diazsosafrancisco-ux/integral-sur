            <button className="btn accent" onClick={guardar} disabled={saving || (parseFloat(efectivoDeclarado)||0) === 0 && (resumen.efectivoEsperado||0) > 0}>
              {saving ? '...' : yaAprobando ? 'Aprobar cierre' : 'Enviar a admin'}
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

// =========================== AUDITORÍA ===========================
// Sistema que registra automáticamente todas las acciones del sistema
// fbLog(usuario, accion, entidad, datos) → guarda en /auditoria

async function fbLog(usuarioId, accion, entidad, datos) {
  try {
    const logId = uid();
    await fbSet(`auditoria/${logId}`, {
      usuarioId,
      accion,
      entidad,
      datos: datos || null,
      timestamp: nowISO(),
    });
  } catch(e) { console.error('Audit error:', e); }
}

function Auditoria({ session, onToast }) {
  const { list: logs, loading } = useFirebaseList('auditoria');
  const [filtroUsuario, setFiltroUsuario] = useState('todos');
  const [filtroEntidad, setFiltroEntidad] = useState('todos');
  const [filtroFecha, setFiltroFecha] = useState('');

  const logsFiltrados = useMemo(() => {
    let arr = logs;
    if (filtroUsuario !== 'todos') arr = arr.filter(l => l.usuarioId === filtroUsuario);
    if (filtroEntidad !== 'todos') arr = arr.filter(l => l.entidad === filtroEntidad);
    if (filtroFecha) arr = arr.filter(l => isoToLocalDate(l.timestamp) === filtroFecha);
    return arr.sort((a,b) => (b.timestamp||'').localeCompare(a.timestamp||''));
  }, [logs, filtroUsuario, filtroEntidad, filtroFecha]);

  const limpiarAuditoria = async () => {
    if (!confirm('⚠️ ¿Eliminar TODA la auditoría? Esto no se puede deshacer.')) return;
    if (!confirm('⚠️ Estás seguro? Confirma nuevamente.')) return;
    try {
      await fbRemove('auditoria');
      onToast('Auditoría limpiada','warn');
    } catch(e) { onToast('Error','error'); }
  };

  if (loading) return <div className="pad"><div className="empty">Cargando...</div></div>;

  const usuariosUnicos = [...new Set(logs.map(l => l.usuarioId))];
  const entidadesUnicas = [...new Set(logs.map(l => l.entidad))];

  const iconoAccion = (a) => a==='create'?'➕':a==='update'?'✏️':a==='delete'?'🗑️':a==='approve'?'✅':a==='reject'?'✕':a==='login'?'🔑':a==='logout'?'🚪':'📝';
  const colorAccion = (a) => a==='create'?'good':a==='update'?'accent':a==='delete'?'bad':a==='approve'?'good':a==='reject'?'bad':'warn';

  return (
    <div className="pad">
      <h2 className="section-title">Auditoría</h2>
      <div className="section-sub">Historial de cambios · {logsFiltrados.length} registros</div>

      <div className="card">
        <label className="fld">Usuario</label>
        <select className="inp" value={filtroUsuario} onChange={e=>setFiltroUsuario(e.target.value)} style={{marginBottom:8}}>
          <option value="todos">Todos</option>
          {usuariosUnicos.map(uid_ => {
            const u = Object.values(USER_MAP).find(x => x.id === uid_);
            return <option key={uid_} value={uid_}>{u?.name || uid_}</option>;
          })}
        </select>
        <label className="fld">Módulo</label>
        <select className="inp" value={filtroEntidad} onChange={e=>setFiltroEntidad(e.target.value)} style={{marginBottom:8}}>
          <option value="todos">Todos</option>
          {entidadesUnicas.map(e => <option key={e} value={e}>{e}</option>)}
        </select>
        <label className="fld">Fecha</label>
        <div style={{display:'flex', gap:6, alignItems:'center'}}>
          <input type="date" className="inp" value={filtroFecha} onChange={e=>setFiltroFecha(e.target.value)} style={{marginBottom:0, flex:1}}/>
          {filtroFecha && <button className="btn ghost sm" onClick={()=>setFiltroFecha('')}>Limpiar</button>}
        </div>
      </div>

      {logsFiltrados.length === 0 ? <div className="empty">Sin registros</div> :
        logsFiltrados.slice(0, 200).map(l => {
          const u = Object.values(USER_MAP).find(x => x.id === l.usuarioId);
          return (
            <div key={l.id} className="card" style={{padding:'10px 12px'}}>
              <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', gap:6, flexWrap:'wrap'}}>
                <div style={{flex:1, minWidth:0}}>
                  <div style={{display:'flex', gap:6, alignItems:'center', flexWrap:'wrap'}}>
                    <span style={{fontSize:16}}>{iconoAccion(l.accion)}</span>
                    <span className={`badge ${colorAccion(l.accion)}`}>{l.accion}</span>
                    <strong style={{fontSize:13}}>{l.entidad}</strong>
                  </div>
                  <div style={{fontSize:11, color:'var(--ink-soft)', marginTop:4}}>
                    👤 {u?.name || l.usuarioId} · {new Date(l.timestamp).toLocaleString('es-CL', {day:'numeric', month:'short', hour:'2-digit', minute:'2-digit'})}
                  </div>
                  {l.datos && (
                    <div style={{fontSize:10, color:'var(--ink-mute)', marginTop:4, fontFamily:'JetBrains Mono, monospace', wordBreak:'break-word'}}>
                      {typeof l.datos === 'string' ? l.datos : JSON.stringify(l.datos).slice(0, 200)}
                    </div>
                  )}
                </div>
              </div>
            </div>
          );
        })
      }
      {logsFiltrados.length > 200 && (
        <div style={{fontSize:11, color:'var(--ink-mute)', textAlign:'center', padding:10}}>
          Mostrando últimos 200 de {logsFiltrados.length}. Usa filtros para refinar.
        </div>
      )}

      <button className="btn danger full" onClick={limpiarAuditoria} style={{marginTop:20}}>
        🗑️ Limpiar toda la auditoría
      </button>
    </div>
  );
}

// =========================== BACKUP ===========================
function Backup({ session, onToast }) {
  const [downloading, setDownloading] = useState(false);
  const [restoring, setRestoring] = useState(false);
  const [resetting, setResetting] = useState(false);

  const resetearSistema = async () => {
    if (!confirm('⚠️ ATENCIÓN: Esto BORRA stock, ventas, compras, reservas, retornos y cierres.\n\nMantiene: Clientes, Proveedores, Precios, Auditoría.\n\n¿Descargaste un backup ANTES?\n\n¿Confirmas?')) return;
    if (!confirm('⚠️ Segunda confirmación: ¿REALMENTE quieres borrar todos los datos operativos?\n\nEsta acción NO se puede deshacer.')) return;
    const palabra = prompt('Para confirmar, escribe la palabra "BORRAR" (en mayúsculas):');
    if (palabra !== 'BORRAR') {
      onToast('Operación cancelada','warn');
      return;
    }
    setResetting(true);
    try {
      const paths = ['stockBodega','stockVehiculo','ventas','compras','reservas','retornos','cierres'];
      for (const p of paths) {
        await fbRemove(p);
      }
      await fbLog(session.id, 'reset', 'sistema', { borrados: paths });
      onToast('✓ Sistema reseteado · datos operativos limpios','success');
    } catch(e) { console.error(e); onToast('Error al resetear','error'); }
    setResetting(false);
  };

  const descargar = async () => {
    setDownloading(true);
    try {
      const paths = ['clientes','proveedores','precios','compras','stockBodega','stockVehiculo','reservas','ventas','retornos','cierres','auditoria'];
      const backup = { version: '5.0', creadoEn: nowISO(), creadoPor: session.id, datos: {} };
      for (const p of paths) {
        backup.datos[p] = await fbGet(p);
      }
      // Crear blob y descargar
      const json = JSON.stringify(backup, null, 2);
      const blob = new Blob([json], {type:'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const filename = `integral-sur-backup-${todayStr()}.json`;
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 200);
      onToast(`Backup descargado: ${filename}`,'success');
      await fbLog(session.id, 'backup', 'sistema', { archivo: filename });
    } catch(e) { console.error(e); onToast('Error al generar backup','error'); }
    setDownloading(false);
  };

  const restaurar = async () => {
    if (!confirm('⚠️ Restaurar SOBREESCRIBE TODOS los datos actuales. ¿Continuar?')) return;
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json';
    input.onchange = async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      setRestoring(true);
      try {
        const text = await file.text();
        const backup = JSON.parse(text);
        if (!backup.datos) throw new Error('Archivo no válido');
        if (!confirm(`Backup del ${backup.creadoEn}. ¿Confirmar restauración?`)) { setRestoring(false); return; }
        for (const [path, value] of Object.entries(backup.datos)) {
          if (value !== null && value !== undefined) {
            await fbSet(path, value);
          }
        }
        onToast('Backup restaurado · refresca la página','success');
        await fbLog(session.id, 'restore', 'sistema', { archivo: file.name });
      } catch(err) { onToast('Error: ' + err.message,'error'); }
      setRestoring(false);
    };
    input.click();
  };

  return (
    <div className="pad">
      <h2 className="section-title">Backup</h2>
      <div className="section-sub">Respaldo y restauración de datos</div>

      <div className="card">
        <h3>📥 Descargar respaldo</h3>
        <p style={{fontSize:12, color:'var(--ink-soft)', lineHeight:1.5, marginBottom:12}}>
          Descarga un archivo JSON con todos los datos del sistema. Guárdalo en un lugar seguro (Google Drive, correo, disco).
        </p>
        <button className="btn accent full" onClick={descargar} disabled={downloading}>
          {downloading ? 'Generando...' : '⬇️ Descargar backup ahora'}
        </button>
      </div>

      <div className="card">
        <h3>📤 Restaurar respaldo</h3>
        <div className="alert-banner" style={{fontSize:12, background:'var(--bad-bg)', color:'var(--bad)', marginTop:0}}>
          <span className="ico">⚠️</span>
          <div>Esta operación SOBREESCRIBE todos los datos actuales. Úsalo con precaución.</div>
        </div>
        <button className="btn danger full" onClick={restaurar} disabled={restoring} style={{marginTop:10}}>
          {restoring ? 'Restaurando...' : '⬆️ Restaurar desde archivo'}
        </button>
      </div>

      <div className="card" style={{background:'var(--bg-2)'}}>
        <h3 style={{fontSize:14}}>💡 Recomendación</h3>
        <p style={{fontSize:12, color:'var(--ink-soft)', lineHeight:1.6, margin:0}}>
          Descarga un backup al final de cada mes y guárdalo en tu Google Drive. Si pasara algo (error humano, eliminación accidental), podrás restaurar todos los datos al momento del último backup.
        </p>
      </div>

      <hr className="div"/>

      <div className="card" style={{borderLeft: '4px solid var(--bad)'}}>
        <h3 style={{color:'var(--bad)'}}>🗑️ Resetear datos operativos</h3>
        <div className="alert-banner" style={{fontSize:12, background:'var(--bad-bg)', color:'var(--bad)', marginTop:0, marginBottom:10}}>
          <span className="ico">⚠️</span>
          <div>
            <strong>ATENCIÓN:</strong> Esta acción BORRA permanentemente:
            <ul style={{margin:'4px 0 0 0', paddingLeft:18}}>
              <li>Stock bodega + vehículos</li>
              <li>Ventas + cobros</li>
              <li>Compras</li>
              <li>Reservas + retornos + cierres</li>
            </ul>
            <strong>Mantiene:</strong> Clientes, Proveedores, Precios, Auditoría.
          </div>
        </div>
        <p style={{fontSize:11, color:'var(--ink-mute)', lineHeight:1.5, marginBottom:10}}>
          Útil para empezar a operar limpio. Descarga un backup ANTES por si necesitas volver atrás.
        </p>
        <button className="btn danger full" onClick={resetearSistema} disabled={resetting}>
          {resetting ? 'Borrando...' : '🗑️ Resetear datos operativos'}
        </button>
      </div>
    </div>
  );
}

// =========================== SIMULADOR DE PRECIO ===========================
// Calculadora rápida en pantalla principal
// Ingresas precio bruto compra + utilidad deseada = precio venta neto/bruto/IVA

function SimuladorPrecio() {
  const [abierto, setAbierto] = useState(false);
  const [precioBruto, setPrecioBruto] = useState('');
  const [utilidad, setUtilidad] = useState('');
  const [modo, setModo] = useState('peso'); // 'peso' o 'porc'

  const parsedBruto = parseFloat(precioBruto) || 0;
  const parsedUtil = parseFloat(utilidad) || 0;

  const calc = useMemo(() => {
    const costoBruto = parsedBruto;
    const costoNeto = costoBruto / (1 + IVA_RATE);
    const ivaCompra = costoBruto - costoNeto;
    let ventaNeto = 0;
    if (modo === 'peso') {
      ventaNeto = costoNeto + parsedUtil;
    } else {
      ventaNeto = costoNeto * (1 + parsedUtil / 100);
    }
    const ivaVenta = ventaNeto * IVA_RATE;
    const ventaBruto = ventaNeto + ivaVenta;
    const utilidadFinal = ventaNeto - costoNeto;
    const margenPct = costoNeto > 0 ? (utilidadFinal / costoNeto * 100) : 0;
    return { costoBruto, costoNeto, ivaCompra, ventaNeto, ivaVenta, ventaBruto, utilidadFinal, margenPct };
  }, [parsedBruto, parsedUtil, modo]);

  const reset = () => { setPrecioBruto(''); setUtilidad(''); };

  return (
    <div className="card" style={{padding:0, overflow:'hidden', marginTop:14}}>
      <div
        onClick={()=>setAbierto(!abierto)}
        style={{
          padding:'12px 14px',
          cursor:'pointer',
          background: abierto ? 'var(--accent-soft)' : 'transparent',
          display:'flex', alignItems:'center', gap:10,
          borderBottom: abierto ? '1px solid var(--line)' : 'none',
        }}
      >
        <span style={{fontSize:22}}>🧮</span>
        <div style={{flex:1}}>
          <strong style={{fontSize:14}}>Simulador de precio</strong>
          <div style={{fontSize:11, color:'var(--ink-soft)'}}>Calcula precio venta con IVA y utilidad</div>
        </div>
        <span style={{fontSize:14, color:'var(--ink-soft)'}}>{abierto ? '▲' : '▼'}</span>
      </div>

      {abierto && (
        <div style={{padding:14}}>
          <label className="fld">💰 Precio bruto de compra (con IVA)</label>
          <input
            type="number"
            className="inp"
            value={precioBruto}
            onChange={e=>setPrecioBruto(e.target.value)}
            placeholder="Ej: 5000"
            style={{fontSize:18, fontFamily:'JetBrains Mono, monospace', textAlign:'right'}}
          />

          <div style={{display:'flex', gap:6, marginBottom:8}}>
            <button
              className="btn sm"
              onClick={()=>setModo('peso')}
              style={{flex:1, background: modo==='peso'?'var(--ink)':'transparent', color: modo==='peso'?'var(--ink-on)':'var(--ink-soft)', border:'1.5px solid var(--line)'}}
            >
              💵 Utilidad en $
            </button>
            <button
              className="btn sm"
              onClick={()=>setModo('porc')}
              style={{flex:1, background: modo==='porc'?'var(--ink)':'transparent', color: modo==='porc'?'var(--ink-on)':'var(--ink-soft)', border:'1.5px solid var(--line)'}}
            >
              📊 Utilidad en %
            </button>
          </div>

          <label className="fld">{modo==='peso'?'➕ Utilidad en pesos (sobre neto)':'➕ Utilidad en porcentaje (sobre neto)'}</label>
          <input
            type="number"
            className="inp"
            value={utilidad}
            onChange={e=>setUtilidad(e.target.value)}
            placeholder={modo==='peso'?"Ej: 800":"Ej: 25"}
            style={{fontSize:18, fontFamily:'JetBrains Mono, monospace', textAlign:'right'}}
          />

          {parsedBruto > 0 && (
            <>
              <div style={{fontSize:11, fontWeight:700, color:'var(--ink-soft)', textTransform:'uppercase', letterSpacing:1.2, margin:'12px 0 6px 4px'}}>
                📊 Resultado
              </div>
              <div className="card" style={{background:'var(--bg-2)', padding:12, marginBottom:8}}>
                <div style={{display:'flex', justifyContent:'space-between', fontSize:12, marginBottom:4}}>
                  <span style={{color:'var(--ink-soft)'}}>Costo neto (sin IVA):</span>
                  <span style={{fontFamily:'JetBrains Mono, monospace'}}>{fmt$(calc.costoNeto)}</span>
                </div>
                <div style={{display:'flex', justifyContent:'space-between', fontSize:12, marginBottom:4}}>
                  <span style={{color:'var(--ink-soft)'}}>IVA compra (19%):</span>
                  <span style={{fontFamily:'JetBrains Mono, monospace'}}>{fmt$(calc.ivaCompra)}</span>
                </div>
                <hr style={{border:'none', borderTop:'1px solid var(--line)', margin:'6px 0'}}/>
                <div style={{display:'flex', justifyContent:'space-between', fontSize:12, marginBottom:4}}>
                  <span style={{color:'var(--good)'}}>+ Utilidad:</span>
                  <span style={{fontFamily:'JetBrains Mono, monospace', color:'var(--good)', fontWeight:700}}>
                    {fmt$(calc.utilidadFinal)} ({calc.margenPct.toFixed(1)}%)
                  </span>
                </div>
                <hr style={{border:'none', borderTop:'1px solid var(--line)', margin:'6px 0'}}/>
                <div style={{display:'flex', justifyContent:'space-between', fontSize:12, marginBottom:4}}>
                  <span style={{color:'var(--ink-soft)'}}>Venta neto:</span>
                  <span style={{fontFamily:'JetBrains Mono, monospace'}}>{fmt$(calc.ventaNeto)}</span>
                </div>
                <div style={{display:'flex', justifyContent:'space-between', fontSize:12, marginBottom:4}}>
                  <span style={{color:'var(--ink-soft)'}}>IVA venta (19%):</span>
                  <span style={{fontFamily:'JetBrains Mono, monospace'}}>{fmt$(calc.ivaVenta)}</span>
                </div>
              </div>

              <div className="card" style={{background:'var(--accent-soft)', borderLeft:'4px solid var(--accent)', padding:14}}>
                <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                  <strong style={{fontSize:14}}>💲 Precio venta (bruto)</strong>
                  <strong style={{fontSize:22, fontFamily:'JetBrains Mono, monospace', color:'var(--accent)'}}>
                    {fmt$(calc.ventaBruto)}
                  </strong>
                </div>
              </div>
            </>
          )}

          <button className="btn ghost full" onClick={reset} style={{marginTop:10}}>
            🔄 Limpiar
          </button>
        </div>
      )}
    </div>
  );
}

// =========================== VISTA HOY ===========================
// Resumen rápido del día al entrar
function Hoy({ session, onToast, onNavigate }) {
  const isAdmin = session.role === 'admin';
  const { list: ventas, loading: loadVentas } = useFirebaseList('ventas');
  const { list: reservas } = useFirebaseList('reservas');
  const { list: clientes } = useFirebaseList('clientes');
  const { list: retornos } = useFirebaseList('retornos');
  const { list: cierres } = useFirebaseList('cierres');
  const { list: cargas } = useFirebaseList('cargas');
  const { list: visitas } = useFirebaseList('visitas');
  const { data: vehiculo } = useFirebaseValue(`stockVehiculo/${session.id}`, !isAdmin);
  const { data: precios } = useFirebaseValue('precios');

  // Mostrar contenido base inmediato — los banners se irán completando
  const cargandoDatos = loadVentas && ventas.length === 0;
  const [modalVisitaCerrada, setModalVisitaCerrada] = useState(null);
  // Persiste en Firebase para que no reaparezca aunque se cierre y reabra la app
  const claveVisto = `cobrosVistos/${todayStr()}/${session?.id || 'unknown'}`;
  const { data: cobrosVistosData } = useFirebaseValue(claveVisto);
  const cobrosHoyVistos = !!cobrosVistosData;
  const marcarCobrosVistos = () => {
    fbSet(claveVisto, { visto: true, en: nowISO() }).catch(() => {});
  };

  const hoy = todayStr();
  const diaNombre = new Date().toLocaleDateString('es-CL', { weekday: 'long' });
  const fechaFormat = new Date().toLocaleDateString('es-CL', { day: 'numeric', month: 'long', year: 'numeric' });

  // Visitas de hoy del vendedor
  const visitasHoy = useMemo(() => {
    let arr = visitas.filter(v => isoToLocalDate(v.creadoEn) === hoy);
    if (!isAdmin) arr = arr.filter(v => v.vendedorId === session.id);
    return arr;
  }, [visitas, hoy, isAdmin, session]);

  // Verificar precios del día
  const infoPrecios = useMemo(() => verificarPreciosDia(precios, hoy), [precios, hoy]);

  // Filtrar por hoy y por vendedor si aplica
  const ventasHoy = useMemo(() => {
    let arr = ventas.filter(v => isoToLocalDate(v.fecha || v.creadoEn) === hoy);
    if (!isAdmin) arr = arr.filter(v => v.vendedorId === session.id);
    return arr;
  }, [ventas, isAdmin, session, hoy]);

  // Reservas/retornos/cierres pendientes (para admin: todos, para vendedor: solo suyos)
  const reservasPendientes = useMemo(() =>
    reservas.filter(r => r.status === 'pendiente' && (isAdmin || r.vendedorId === session.id)),
    [reservas, isAdmin, session]);
  const reservasAprobadas = useMemo(() =>
    reservas.filter(r => r.status === 'aprobada' && (isAdmin || r.vendedorId === session.id)),
    [reservas, isAdmin, session]);
  const retornosPendientes = useMemo(() =>
    retornos.filter(r => r.status === 'pendiente' && (isAdmin || r.vendedorId === session.id)),
    [retornos, isAdmin, session]);
  const cierresPendientes = useMemo(() =>
    cierres.filter(c => c.status === 'pendiente' && (isAdmin || c.vendedorId === session.id)),
    [cierres, isAdmin, session]);
  const cargasPendientes = useMemo(() =>
    cargas.filter(c => c.status === 'pendiente' && (isAdmin || c.vendedorId === session.id)),
    [cargas, isAdmin, session]);
  const clientesPendientes = useMemo(() =>
    clientes.filter(c => c.status === 'pendiente' && (isAdmin || c.creadoPor === session.id)),
    [clientes, isAdmin, session]);
  const descuentosPendientes = useMemo(() =>
    ventas.filter(v => v.requiereAprobacion && v.aprobacionEstado === 'pendiente' && (isAdmin || v.vendedorId === session.id)),
    [ventas, isAdmin, session]);
  // Transferencias del día sin comprobante adjunto (alerta)
  const transferenciasSinComprob = useMemo(() => {
    return ventas.filter(v => {
      if (!isAdmin && v.vendedorId !== session.id) return false;
      // Solo transferencias pendientes de confirmar (pendiente hoy + atrasadas)
      // Excluye automáticamente las ya confirmadas, cobradas o con comprobante
      return transferenciaPendienteConfirmar(v);
    });
  }, [ventas, isAdmin, session]);

  // Transferencias ATRASADAS (de días anteriores que aún no se confirmaron)
  const transferenciasAtrasadas = useMemo(() => {
    return ventas.filter(v => {
      if (!isAdmin && v.vendedorId !== session.id) return false;
      if (!transferenciaPendienteConfirmar(v)) return false;
      const fechaV = isoToLocalDate(v.fecha || v.creadoEn);
      return fechaV && fechaV < todayStr();
    });
  }, [ventas, isAdmin, session]);

  // Facturas pendientes de emitir (todas las facturas activas sin emitir)
  const facturasPorEmitir = useMemo(() => {
    return ventas.filter(v => {
      if (!isAdmin && v.vendedorId !== session.id) return false;
      return v.tipoDoc === 'factura' && ventaActiva(v) && !v.facturaEmitida;
    });
  }, [ventas, isAdmin, session]);

  // Verificar si hoy es sábado o si hay facturas atrasadas
  const esSabado = new Date().getDay() === 6;
  const hoyFech = new Date(); hoyFech.setHours(0,0,0,0);
  const facturasAtrasadas = facturasPorEmitir.filter(v => {
    const fv = new Date(v.creadoEn || Date.now());
    fv.setHours(0,0,0,0);
    return Math.floor((hoyFech - fv) / 86400000) > 7;
  });

  // Totales ventas hoy
  const totales = useMemo(() => {
    let bruto = 0, efectivo = 0, transferencia = 0, credito = 0, mermas = 0;
    ventasHoy.forEach(v => {
      bruto += v.totalBruto || 0;
      const d = desgloseVenta(v);
      efectivo += d.efectivo;
      transferencia += d.transferencia;
      credito += d.porCobrar;
      mermas += v.totalMermas || 0;
    });
    return { bruto, efectivo, transferencia, credito, mermas, count: ventasHoy.length };
  }, [ventasHoy]);

  // Cobros recibidos HOY de ventas anteriores (para mostrar al admin el dinero entrante real)
  const cobrosRecibidosHoy = useMemo(() => {
    let arr = ventas.filter(v => {
      // Venta de un día ANTERIOR cobrada o abonada HOY
      if (isoToLocalDate(v.fecha || v.creadoEn) === hoy) return false; // ventas de hoy, no cuentan
      if (!isAdmin && v.vendedorId !== session.id) return false;

      // 1. Crédito cobrado hoy completamente
      if (v.formaPago === 'pendiente' && v.cobroEstado === 'cobrado' && v.cobradoEn &&
          isoToLocalDate(v.cobradoEn) === hoy) return true;

      // 2. Abono recibido hoy (cualquier forma de pago)
      if (v.abonos?.some(ab => isoToLocalDate(ab.fecha) === hoy)) return true;

      // 3. Transferencia de día anterior confirmada hoy
      if (v.transferenciaConfirmadaEn && isoToLocalDate(v.transferenciaConfirmadaEn) === hoy &&
          isoToLocalDate(v.creadoEn) !== hoy) return true;

      return false;
    });

    let efectivo = 0, transferencia = 0, total = 0;
    arr.forEach(v => {
      // Abonos de hoy
      const abonosHoy = (v.abonos||[]).filter(ab => isoToLocalDate(ab.fecha) === hoy);
      if (abonosHoy.length > 0) {
        abonosHoy.forEach(ab => {
          total += ab.monto || 0;
          efectivo += ab.efectivo || (ab.forma==='efectivo' ? ab.monto : 0);
          transferencia += ab.transferencia || (ab.forma==='transferencia' ? ab.monto : 0);
          if (ab.forma==='mixto') { efectivo += ab.efectivo||0; transferencia += ab.transferencia||0; }
        });
        return;
      }
      // Cobro completo hoy
      const monto = saldoVenta(v) === 0 ? v.totalBruto : (v.totalBruto - (v.totalAbonado||0));
      total += monto;
      if (v.cobroFormaReal === 'efectivo' || (!v.cobroFormaReal && v.formaPago === 'efectivo'))
        efectivo += v.montoCobradoEfectivo || monto;
      else if (v.cobroFormaReal === 'transferencia' || v.transferenciaConfirmadaEn)
        transferencia += v.montoCobradoTransferencia || monto;
      else if (v.cobroFormaReal === 'mixto') {
        efectivo += v.montoCobradoEfectivo || 0;
        transferencia += v.montoCobradoTransferencia || 0;
      }
    });
    return { ventas: arr, efectivo, transferencia, total };
  }, [ventas, isAdmin, session, hoy]);

  // Deudas vencidas (todas las que tiene el sistema)
  const deudasVencidas = useMemo(() => {
    let arr = ventas.filter(v => v.cobroEstado === 'pendiente' && v.fechaCompromiso && v.fechaCompromiso < hoy);
    if (!isAdmin) arr = arr.filter(v => v.vendedorId === session.id);
    return arr;
  }, [ventas, isAdmin, session, hoy]);

  // Clientes de hoy (que les toca visita)
  const diaSemana = (new Date().getDay() + 6) % 7; // Lun=0
  const clientesDelDia = useMemo(() => {
    let arr = clientes.filter(c => c.status === 'aprobado' && (c.diasVisita||[]).includes(diaSemana));
    if (!isAdmin) arr = arr.filter(c => c.vendedorId === session.id);
    return arr;
  }, [clientes, diaSemana, isAdmin, session]);

  // Stock total en vehículo (vendedor)
  const stockVehiculoTotal = useMemo(() => {
    if (!vehiculo) return 0;
    return Object.values(vehiculo).reduce((s,n) => s + (n||0), 0);
  }, [vehiculo]);

  const KpiCard = ({ ico, label, value, sub, color, onClick }) => (
    <div onClick={onClick} style={{
      background: 'var(--card)', borderRadius: 14, padding: 14,
      border: '1px solid var(--line)', cursor: onClick ? 'pointer' : 'default',
      borderLeft: color ? `4px solid ${color}` : '1px solid var(--line)'
    }}>
      <div style={{display:'flex', alignItems:'center', gap:8, marginBottom:4}}>
        <span style={{fontSize:20}}>{ico}</span>
        <span style={{fontSize:11, color:'var(--ink-mute)', textTransform:'uppercase', letterSpacing:1, fontWeight:700}}>{label}</span>
      </div>
      <div style={{fontSize:18, fontWeight:700, fontFamily:'JetBrains Mono, monospace'}}>{value}</div>
      {sub && <div style={{fontSize:11, color:'var(--ink-mute)', marginTop:2}}>{sub}</div>}
    </div>
  );

  // Saludo según hora del día
  const hora = new Date().getHours();
  const saludo = hora < 12 ? 'Buen día' : hora < 19 ? 'Buenas tardes' : 'Buenas noches';
  const emoji = hora < 12 ? '☀️' : hora < 19 ? '🌤️' : '🌙';

  return (
    <div className="pad">
      <div style={{display:'flex', alignItems:'center', gap:14, marginBottom:4}}>
        <img src={LOGO_B64} alt="Integral Sur" style={{width:56, height:56, borderRadius:'50%', objectFit:'cover', flexShrink:0}}/>
        <div style={{flex:1, minWidth:0}}>
          <h2 className="section-title" style={{margin:0, fontSize:22}}>{emoji} {saludo}, {session.name.split(' ')[0]}</h2>
          <div className="section-sub" style={{textTransform:'capitalize', margin:0}}>{diaNombre} · {fechaFormat}</div>
        </div>
      </div>

      {/* Indicador de carga — solo mientras no hay datos */}
      {cargandoDatos && (
        <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, marginTop:14, marginBottom:14}}>
          {[0,1,2,3].map(i => (
            <div key={i} style={{
              height:72, borderRadius:12, background:'var(--bg-2)',
              animation:'pulse 1.4s ease-in-out infinite',
              animationDelay:`${i*0.1}s`,
            }}/>
          ))}
        </div>
      )}

      {/* Alertas urgentes */}

      {/* PRECIOS DEL DÍA — alerta destacada con acciones rápidas */}
      {!infoPrecios.cargando && !infoPrecios.preciosAprobadosHoy && (
        <div className="card" style={{background:'var(--bad-bg)', borderLeft:'4px solid var(--bad)', padding:14}}>
          <div style={{display:'flex', alignItems:'center', gap:10, marginBottom:10}}>
            <span style={{fontSize:30}}>🚨</span>
            <div style={{flex:1}}>
              <strong style={{color:'var(--bad)', fontSize:15}}>
                {isAdmin ? 'Revisa los precios del día' : 'Precios del día no aprobados'}
              </strong>
              <div style={{fontSize:12, color:'var(--bad)', marginTop:2}}>
                {isAdmin
                  ? (infoPrecios.hayHistoricos
                      ? `Última config: ${infoPrecios.fechaAnterior} · ¿Usar los mismos o configurar nuevos?`
                      : 'Configura precios para empezar a vender')
                  : 'No se pueden registrar ventas hasta que admin apruebe los precios de hoy'}
              </div>
            </div>
          </div>

          {isAdmin && (
            <div style={{display:'grid', gap:6, marginTop:8}}>
              {infoPrecios.hayHistoricos && (
                <button
                  className="btn accent full"
                  onClick={async (e) => {
                    e.stopPropagation();
                    if (!confirm(`¿Usar los mismos precios del ${infoPrecios.fechaAnterior} para hoy (${hoy})?\n\nLos vendedores podrán empezar a vender.`)) return;
                    try {
                      const preciosAyer = await fbGet(`precios/${infoPrecios.fechaAnterior}`);
                      if (!preciosAyer) return onToast('No se pudo cargar precios anteriores','error');
                      // Limpiar el campo _aprobado del día anterior para no copiarlo
                      const limpio = { ...preciosAyer, _aprobado: true, _aprobadoEn: nowISO(), _aprobadoPor: session.id };
                      await fbSet(`precios/${hoy}`, limpio);
                      await fbLog(session.id, 'approve', 'precios', { fecha: hoy, desde: infoPrecios.fechaAnterior });
                      onToast('✓ Precios aprobados · vendedores ya pueden vender','success');
                    } catch(e) { console.error(e); onToast('Error al aprobar','error'); }
                  }}>
                  ✅ Usar precios del {infoPrecios.fechaAnterior}
                </button>
              )}
              <button className="btn full" onClick={()=>onNavigate('precios')}>
                ✏️ Configurar nuevos precios
              </button>
            </div>
          )}
        </div>
      )}


      {deudasVencidas.length > 0 && (
        <div className="card" style={{background:'var(--bad-bg)', borderLeft:'4px solid var(--bad)', cursor:'pointer'}} onClick={()=>onNavigate('cobros')}>
          <div style={{display:'flex', alignItems:'center', gap:10}}>
            <span style={{fontSize:24}}>🚨</span>
            <div style={{flex:1}}>
              <strong style={{color:'var(--bad)'}}>{deudasVencidas.length} {deudasVencidas.length===1?'cobro vencido':'cobros vencidos'}</strong>
              <div style={{fontSize:12, color:'var(--bad)', fontFamily:'JetBrains Mono, monospace'}}>
                {fmt$(deudasVencidas.reduce((s,v) => s + (v.totalBruto||0), 0))}
              </div>
            </div>
            <span style={{color:'var(--bad)', fontSize:18}}>→</span>
          </div>
        </div>
      )}

      {/* Acciones pendientes para admin */}
      {isAdmin && (reservasPendientes.length > 0 || retornosPendientes.length > 0 || cierresPendientes.length > 0 || clientesPendientes.length > 0 || cargasPendientes.length > 0 || descuentosPendientes.length > 0) && (
        <div className="card" style={{background:'var(--warn-bg)', borderLeft:'4px solid var(--warn)'}}>
          <strong style={{color:'var(--warn)'}}>⏳ Pendientes por aprobar</strong>
          <div style={{marginTop:8, display:'grid', gap:6}}>
            {clientesPendientes.length > 0 && (
              <div onClick={()=>onNavigate('clientes')} style={{cursor:'pointer', fontSize:13}}>👥 {clientesPendientes.length} {clientesPendientes.length===1?'cliente':'clientes'} → revisar</div>
            )}
            {descuentosPendientes.length > 0 && (
              <div onClick={()=>onNavigate('ventas')} style={{cursor:'pointer', fontSize:13}}>🏷️ {descuentosPendientes.length} {descuentosPendientes.length===1?'descuento negociado':'descuentos negociados'} → aprobar</div>
            )}
            {cargasPendientes.length > 0 && (
              <div onClick={()=>onNavigate('cargas')} style={{cursor:'pointer', fontSize:13}}>🚚 {cargasPendientes.length} {cargasPendientes.length===1?'carga inicial':'cargas iniciales'} → aprobar</div>
            )}
            {reservasPendientes.length > 0 && (
              <div onClick={()=>onNavigate('reservas')} style={{cursor:'pointer', fontSize:13}}>📋 {reservasPendientes.length} {reservasPendientes.length===1?'reserva':'reservas'} → aprobar</div>
            )}
            {retornosPendientes.length > 0 && (
              <div onClick={()=>onNavigate('retornos')} style={{cursor:'pointer', fontSize:13}}>📦 {retornosPendientes.length} {retornosPendientes.length===1?'descarga':'descargas'} → revisar</div>
            )}
            {cierresPendientes.length > 0 && (
              <div onClick={()=>onNavigate('cierres')} style={{cursor:'pointer', fontSize:13}}>📊 {cierresPendientes.length} {cierresPendientes.length===1?'cierre de caja':'cierres de caja'} → aprobar</div>
            )}
          </div>
        </div>
      )}

      {/* Alerta transferencias ATRASADAS → va directo al tab transf_antiguas */}
      {transferenciasAtrasadas.length > 0 && (
        <div className="card" style={{background:'var(--bad-bg)', borderLeft:'4px solid var(--bad)', cursor:'pointer'}}
          onClick={()=>onNavigate('cobros', { tab: 'transf_antiguas' })}>
          <div style={{display:'flex', alignItems:'center', gap:10}}>
            <span style={{fontSize:22}}>🚨</span>
            <div style={{flex:1}}>
              <strong style={{color:'var(--bad)'}}>
                {transferenciasAtrasadas.length} {transferenciasAtrasadas.length===1?'transferencia atrasada':'transferencias atrasadas'}
              </strong>
              <div style={{fontSize:12, color:'var(--bad)'}}>
                De días anteriores sin confirmar · Toca para ver el detalle →
              </div>
            </div>
            <span style={{color:'var(--bad)', fontSize:18}}>→</span>
          </div>
        </div>
      )}

      {/* Banner facturas — aparece solo el sábado entre 8am y medianoche mientras hay pendientes */}
      {(() => {
        const ahora = new Date();
        const esSab = ahora.getDay() === 6;
        const esDom = ahora.getDay() === 0;
        const hora = ahora.getHours();
        // Sábado desde 8am, o domingo todo el día (desaparece domingo a medianoche)
        const dentroDelHorario = (esSab && hora >= 8) || esDom;
        if (!dentroDelHorario) return null;
        if (facturasPorEmitir.length === 0) return null; // desaparece si llega a cero
        return (
          <div className="card" style={{
            background:'var(--bad-bg)', borderLeft:'4px solid var(--bad)',
            cursor:'pointer', borderRadius:12,
          }} onClick={()=>onNavigate('facturas')}>
            <div style={{display:'flex', alignItems:'center', gap:10}}>
              <span style={{fontSize:26}}>📄</span>
              <div style={{flex:1}}>
                <strong style={{color:'var(--bad)', fontSize:14, display:'block'}}>
                  📅 Sábado · Día de facturación
                </strong>
                <div style={{fontSize:13, color:'var(--bad)', fontWeight:600, marginTop:2}}>
                  {facturasPorEmitir.length} factura{facturasPorEmitir.length>1?'s':''} pendiente{facturasPorEmitir.length>1?'s':''}
                  {facturasAtrasadas.length > 0 && ` · ${facturasAtrasadas.length} atrasada${facturasAtrasadas.length>1?'s':''}`}
                </div>
                <div style={{fontSize:11, color:'var(--ink-soft)', marginTop:2}}>
                  Emite y envía hoy · el banner desaparece a medianoche o al llegar a 0 →
                </div>
              </div>
              <span style={{color:'var(--bad)', fontSize:18}}>→</span>
            </div>
          </div>
        );
      })()}

      {/* Alerta transferencias sin comprobante → va a ventas con filtro sinComprobante */}
      {transferenciasSinComprob.length > 0 && (
        <div className="card" style={{background:'var(--warn-bg)', borderLeft:'4px solid var(--warn)', cursor:'pointer'}}
          onClick={()=>onNavigate('ventas', { filtro: 'sinComprobante' })}>
          <div style={{display:'flex', alignItems:'center', gap:10}}>
            <span style={{fontSize:22}}>📸</span>
            <div style={{flex:1}}>
              <strong style={{color:'var(--warn)'}}>
                {transferenciasSinComprob.length} {transferenciasSinComprob.length===1?'transferencia sin comprobante':'transferencias sin comprobante'}
              </strong>
              <div style={{fontSize:12, color:'var(--warn)'}}>
                Adjunta la foto del comprobante · Toca para ver →
              </div>
            </div>
            <span style={{color:'var(--warn)', fontSize:18}}>→</span>
          </div>
        </div>
      )}

      {/* Reservas aprobadas listas para retirar (vendedor) */}
      {!isAdmin && reservasAprobadas.length > 0 && (
        <div className="card" style={{background:'var(--good-bg)', borderLeft:'4px solid var(--good)', cursor:'pointer'}} onClick={()=>onNavigate('reservas')}>
          <div style={{display:'flex', alignItems:'center', gap:10}}>
            <span style={{fontSize:24}}>📦</span>
            <div style={{flex:1}}>
              <strong style={{color:'var(--good)'}}>{reservasAprobadas.length} {reservasAprobadas.length===1?'reserva aprobada':'reservas aprobadas'}</strong>
              <div style={{fontSize:12, color:'var(--good)'}}>Listas para retirar</div>
            </div>
            <span style={{color:'var(--good)', fontSize:18}}>→</span>
          </div>
        </div>
      )}

      {/* KPIs — con desglose de ventas del día + recaudaciones anteriores */}
      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, marginTop:14}}>
        <KpiCard ico="💰" label="Ventas hoy" value={fmt$(totales.bruto)}
          sub={`${totales.count} ${totales.count===1?'venta':'ventas'}`}
          color="var(--accent)" onClick={()=>onNavigate('ventas')}/>

        {/* Efectivo: total = ventas del día + recaudaciones anteriores */}
        <div className="card" style={{cursor:'pointer', padding:'10px 12px'}}
          onClick={()=>onNavigate('ventas', { filtro: 'efectivo_hoy' })}>
          <div style={{fontSize:20, marginBottom:2}}>💵</div>
          <div style={{fontSize:11, color:'var(--ink-soft)'}}>Efectivo</div>
          <strong style={{fontSize:16, color:'var(--good)', fontFamily:'JetBrains Mono, monospace'}}>
            {fmt$(totales.efectivo + (cobrosRecibidosHoy.efectivo||0))}
          </strong>
          {cobrosRecibidosHoy.efectivo > 0 && totales.efectivo > 0 && (
            <div style={{fontSize:10, color:'var(--ink-mute)', marginTop:2, lineHeight:1.4}}>
              <div>Ventas: {fmt$(totales.efectivo)}</div>
              <div style={{color:'var(--good)'}}>+ Recaud.: {fmt$(cobrosRecibidosHoy.efectivo)}</div>
            </div>
          )}
          {cobrosRecibidosHoy.efectivo > 0 && totales.efectivo === 0 && (
            <div style={{fontSize:10, color:'var(--good)', marginTop:2}}>
              Recaud. deudas ant.
            </div>
          )}
        </div>

        {/* Transferencias: total = ventas del día + recaudaciones anteriores */}
        <div className="card" style={{cursor:'pointer', padding:'10px 12px'}}
          onClick={()=>onNavigate('ventas', { filtro: 'transf_hoy' })}>
          <div style={{fontSize:20, marginBottom:2}}>🏦</div>
          <div style={{fontSize:11, color:'var(--ink-soft)'}}>Transferencias</div>
          <strong style={{fontSize:16, color:'var(--accent)', fontFamily:'JetBrains Mono, monospace'}}>
            {fmt$(totales.transferencia + (cobrosRecibidosHoy.transferencia||0))}
          </strong>
          {cobrosRecibidosHoy.transferencia > 0 && totales.transferencia > 0 && (
            <div style={{fontSize:10, color:'var(--ink-mute)', marginTop:2, lineHeight:1.4}}>
              <div>Ventas: {fmt$(totales.transferencia)}</div>
              <div style={{color:'var(--accent)'}}>+ Recaud.: {fmt$(cobrosRecibidosHoy.transferencia)}</div>
            </div>
          )}
          {cobrosRecibidosHoy.transferencia > 0 && totales.transferencia === 0 && (
            <div style={{fontSize:10, color:'var(--accent)', marginTop:2}}>
              Recaud. deudas ant.
            </div>
          )}
        </div>

        <KpiCard ico="⏰" label="Por cobrar" value={fmt$(totales.credito)}
          sub={totales.credito > 0 ? 'créditos hoy' : ''}
          color="var(--warn)" onClick={()=>onNavigate('ventas', { filtro: 'pendiente_hoy' })}/>
      </div>

      {/* Banner cobros de deudas anteriores — siempre visible (no desaparece al ver) */}
      {cobrosRecibidosHoy.ventas.length > 0 && (
        <div className="card" style={{background:'var(--good-bg)', borderLeft:'4px solid var(--good)',
          cursor:'pointer', marginTop:10}}
          onClick={()=>onNavigate('cobros', { tab: 'historico', filtroFecha: hoy })}>
          <div style={{display:'flex', alignItems:'center', gap:10}}>
            <span style={{fontSize:22}}>💰</span>
            <div style={{flex:1}}>
              <strong style={{color:'var(--good)', display:'block'}}>
                Recaudado de deudas anteriores · {fmt$(cobrosRecibidosHoy.total)}
              </strong>
              <div style={{fontSize:11, fontFamily:'JetBrains Mono, monospace', color:'var(--good)', marginTop:2}}>
                {cobrosRecibidosHoy.efectivo > 0 && <span>💵 {fmt$(cobrosRecibidosHoy.efectivo)}</span>}
                {cobrosRecibidosHoy.efectivo > 0 && cobrosRecibidosHoy.transferencia > 0 && <span> · </span>}
                {cobrosRecibidosHoy.transferencia > 0 && <span>🏦 {fmt$(cobrosRecibidosHoy.transferencia)}</span>}
              </div>
              <div style={{fontSize:11, color:'var(--ink-soft)', marginTop:2}}>
                {cobrosRecibidosHoy.ventas.length} pago{cobrosRecibidosHoy.ventas.length>1?'s':''} recibido{cobrosRecibidosHoy.ventas.length>1?'s':''} hoy · Toca para ver →
              </div>
            </div>
            <span style={{color:'var(--good)', fontSize:18}}>→</span>
          </div>
        </div>
      )}

      {totales.mermas > 0 && (
        <div className="card" style={{background:'var(--bad-bg)', color:'var(--bad)', marginTop:10}}>
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
            <span>⚠️ Mermas del día</span>
            <strong style={{fontFamily:'JetBrains Mono, monospace'}}>{fmtN(totales.mermas)}u</strong>
          </div>
        </div>
      )}

      {/* Calibres vendidos HOY (en cajas y bandejas) - visible para vendedor y admin */}
      {(() => {
        const calibresDia = {};
        CALIBRES.forEach(c => calibresDia[c] = { cajas: 0, bandejas: 0, unidades: 0 });
        ventasHoy.forEach(v => {
          (v.items||[]).forEach(it => {
            if (calibresDia[it.calibre]) {
              calibresDia[it.calibre].cajas += (it.cajas||0);
              calibresDia[it.calibre].bandejas += (it.bandejas||0);
              calibresDia[it.calibre].unidades += (it.cajas||0)*180 + (it.bandejas||0)*30;
            }
          });
        });
        const conVentas = CALIBRES.filter(c => calibresDia[c].unidades > 0);
        if (conVentas.length === 0) return null;
        const totalCajas = conVentas.reduce((s,c) => s + calibresDia[c].cajas, 0);
        const totalBandejas = conVentas.reduce((s,c) => s + calibresDia[c].bandejas, 0);
        return (
          <div className="card" style={{marginTop:10, padding:14}}>
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:10}}>
              <strong style={{fontSize:13}}>🥚 Vendido hoy por calibre</strong>
              <span style={{fontSize:11, color:'var(--ink-soft)', fontFamily:'JetBrains Mono, monospace'}}>
                📦 {totalCajas} cajas · 🥚 {totalBandejas} band.
              </span>
            </div>
            {conVentas.map((c, idx) => {
              const data = calibresDia[c];
              const partes = [];
              if (data.cajas > 0) partes.push(<span key="c"><strong style={{fontFamily:'JetBrains Mono, monospace', color:'var(--accent)'}}>{data.cajas}</strong> {data.cajas===1?'caja':'cajas'}</span>);
              if (data.bandejas > 0) partes.push(<span key="b"><strong style={{fontFamily:'JetBrains Mono, monospace', color:'var(--accent)'}}>{data.bandejas}</strong> {data.bandejas===1?'bandeja':'bandejas'}</span>);
              return (
                <div key={c} style={{
                  display:'flex', justifyContent:'space-between', alignItems:'center',
                  padding:'6px 0',
                  borderBottom: idx < conVentas.length-1 ? '1px solid var(--line)' : 'none',
                }}>
                  <strong style={{fontSize:13}}>{c}</strong>
                  <div style={{fontSize:12, color:'var(--ink-soft)'}}>
                    {partes.reduce((acc, p, i) => i === 0 ? [p] : [...acc, ' · ', p], [])}
                    <span style={{marginLeft:8, color:'var(--ink-mute)', fontSize:10}}>({fmtN(data.unidades)}u)</span>
                  </div>
                </div>
              );
            })}
          </div>
        );
      })()}

      {/* Mini Dashboard del admin - resumen del mes */}
      {/* Simulador de precio - disponible para todos */}
      <SimuladorPrecio/>

      {/* Mini Dashboard del admin - resumen del mes */}
      {isAdmin && <MiniDashboardAdmin ventas={ventas} clientes={clientes} onNavigate={onNavigate}/>}

      {/* Stock del vehículo (vendedor) */}
      {!isAdmin && (
        <div className="card" style={{marginTop:14, cursor:'pointer'}} onClick={()=>onNavigate('stock')}>
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
            <div>
              <strong>📦 Mi vehículo</strong>
              <div style={{fontSize:12, color:'var(--ink-soft)'}}>
                {(() => {
                  const b = unitsBreakdown(stockVehiculoTotal);
                  if (b.cajasInt === 0 && b.bandejasInt === 0) return '0 cajas disponibles';
                  const partes = [];
                  if (b.cajasInt > 0) partes.push(`${fmtN(b.cajasInt)} caj`);
                  if (b.bandejasInt > 0) partes.push(`${fmtN(b.bandejasInt)} bd`);
                  return partes.join(' · ') + ' disponibles';
                })()}
              </div>
            </div>
            <span style={{fontSize:18}}>→</span>
          </div>
        </div>
      )}

      {/* Clientes del día */}
      {/* ===== RUTA DEL DÍA — VENDEDOR ===== */}
      {!isAdmin && clientesDelDia.length > 0 && (() => {
        // Clasificar cada cliente
        const clasificados = clientesDelDia.map(c => {
          const vendio   = ventasHoy.some(v => v.clienteId === c.id);
          const visita   = visitasHoy.find(v => v.clienteId === c.id);
          const cerrado  = visita?.tipo === 'local_cerrado';
          const conStock = visita?.tipo === 'tiene_stock' || visita?.tipo === 'visita_cliente_con_stock';
          let estado;
          if (vendio)       estado = 'vendido';
          else if (cerrado) estado = 'cerrado';
          else if (conStock) estado = 'con_stock';
          else              estado = 'pendiente';
          return { c, estado, visita };
        });

        const vendidos   = clasificados.filter(x => x.estado === 'vendido');
        const cerrados   = clasificados.filter(x => x.estado === 'cerrado');
        const conStock   = clasificados.filter(x => x.estado === 'con_stock');
        const pendientes = clasificados.filter(x => x.estado === 'pendiente');
        const total      = clasificados.length;
        const atendidos  = vendidos.length + cerrados.length + conStock.length;

        const grupos = [
          { key:'pendiente', label:'Por visitar', ico:'⏳', items: pendientes, color:'var(--ink-soft)', bg:'var(--bg-2)' },
          { key:'vendido',   label:'Vendidos',    ico:'✅', items: vendidos,   color:'var(--good)',     bg:'var(--good-bg)' },
          { key:'cerrado',   label:'Local cerrado', ico:'🔒', items: cerrados, color:'var(--warn)',     bg:'var(--warn-bg)' },
          { key:'con_stock', label:'Con stock',   ico:'📦', items: conStock,   color:'var(--accent)', bg:'var(--accent-soft)' },
        ].filter(g => g.items.length > 0);

        return (
          <div style={{marginTop:14}}>
            {/* Encabezado ruta */}
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:10}}>
              <strong style={{fontSize:15, display:'flex', alignItems:'center', gap:6}}>
                <span>🗺️</span> Ruta de hoy
              </strong>
              <span style={{fontSize:12, color:'var(--ink-soft)'}}>
                {atendidos}/{total} atendidos
              </span>
            </div>

            {/* Barra de progreso */}
            <div style={{height:8, borderRadius:8, background:'var(--bg-2)', overflow:'hidden', marginBottom:12}}>
              <div style={{
                height:'100%',
                width: `${total > 0 ? (atendidos/total)*100 : 0}%`,
                background:'var(--good)',
                borderRadius:8,
                transition:'width 0.4s ease'
              }}/>
            </div>

            {/* Resumen pills */}
            <div style={{display:'flex', gap:6, flexWrap:'wrap', marginBottom:12}}>
              {vendidos.length > 0 && (
                <span style={{fontSize:11, fontWeight:700, padding:'4px 10px', borderRadius:20,
                  background:'var(--good-bg)', color:'var(--good)', border:'1px solid var(--good)'}}>
                  ✅ {vendidos.length} vendido{vendidos.length>1?'s':''}
                </span>
              )}
              {pendientes.length > 0 && (
                <span style={{fontSize:11, fontWeight:700, padding:'4px 10px', borderRadius:20,
                  background:'var(--bg-2)', color:'var(--ink-soft)', border:'1px solid var(--line)'}}>
                  ⏳ {pendientes.length} por visitar
                </span>
              )}
              {cerrados.length > 0 && (
                <span style={{fontSize:11, fontWeight:700, padding:'4px 10px', borderRadius:20,
                  background:'var(--warn-bg)', color:'var(--warn)', border:'1px solid var(--warn)'}}>
                  🔒 {cerrados.length} cerrado{cerrados.length>1?'s':''}
                </span>
              )}
              {conStock.length > 0 && (
                <span style={{fontSize:11, fontWeight:700, padding:'4px 10px', borderRadius:20,
                  background:'var(--accent-soft)', color:'var(--accent)', border:'1px solid var(--accent)'}}>
                  📦 {conStock.length} con stock
                </span>
              )}
            </div>

            {/* Grupos de clientes */}
            {grupos.map(grupo => (
              <div key={grupo.key} style={{marginBottom:10}}>
                <div style={{fontSize:11, fontWeight:700, color:grupo.color,
                  textTransform:'uppercase', letterSpacing:1, marginBottom:6,
                  display:'flex', alignItems:'center', gap:6}}>
                  {grupo.ico} {grupo.label} ({grupo.items.length})
                </div>

                {grupo.items.map(({ c, visita }) => {
                  const deudaPendiente = ventas.some(v =>
                    v.clienteId === c.id && v.cobroEstado === 'pendiente'
                  );
                  return (
                    <div key={c.id} className="card" style={{
                      borderLeft: `4px solid ${grupo.color}`,
                      padding:'10px 12px',
                      marginBottom:6,
                      background: grupo.bg,
                    }}>
                      <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', gap:8}}>
                        <div style={{flex:1, minWidth:0}}>
                          <div style={{fontWeight:700, fontSize:13, marginBottom:2}}>
                            {c.razonSocial || c.nombre}
                          </div>
                          {c.direccion && (
                            <div style={{fontSize:11, color:'var(--ink-soft)'}}>
                              📍 {c.direccion}{c.comuna ? `, ${c.comuna}` : ''}
                            </div>
                          )}
                          {(c.telefonoContacto || c.telefono) && (
                            <div style={{fontSize:11, color:'var(--ink-soft)'}}>
                              📞 {c.telefonoContacto || c.telefono}
                            </div>
                          )}
                          {/* Venta del día */}
                          {grupo.key === 'vendido' && (() => {
                            const venta = ventasHoy.find(v => v.clienteId === c.id);
                            return venta ? (
                              <div style={{fontSize:12, color:'var(--good)', fontWeight:700, marginTop:3,
                                fontFamily:'JetBrains Mono, monospace'}}>
                                💰 {fmt$(venta.totalBruto)} · {fmtVentaCajas(venta)}
                              </div>
                            ) : null;
                          })()}
                          {/* Observación de visita */}
                          {visita?.observaciones && (
                            <div style={{fontSize:11, color:'var(--ink-soft)', marginTop:3,
                              fontStyle:'italic'}}>
                              "{visita.observaciones}"
                            </div>
                          )}
                          {/* Deuda pendiente */}
                          {deudaPendiente && (
                            <div style={{fontSize:11, color:'var(--warn)', fontWeight:600, marginTop:3}}>
                              ⚠️ Tiene cobro pendiente
                            </div>
                          )}
                        </div>

                        {/* Acciones según estado */}
                        {grupo.key === 'pendiente' && (
                          <div style={{display:'flex', flexDirection:'column', gap:4}}>
                            <button
                              className="btn sm"
                              onClick={() => setModalVisitaCerrada(c)}
                              style={{fontSize:10, background:'var(--warn-bg)',
                                color:'var(--warn)', border:'1px solid var(--warn)'}}>
                              🔒 Cerrado
                            </button>
                          </div>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>
            ))}

            {total === 0 && (
              <div className="empty">No hay clientes asignados para hoy</div>
            )}
          </div>
        );
      })()}

      {/* Vista simplificada para ADMIN (solo resumen) */}
      {isAdmin && clientesDelDia.length > 0 && (
        <div className="card" style={{marginTop:14}}>
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8}}>
            <strong style={{display:'flex', alignItems:'center', gap:6}}>
              <span style={{color:'var(--accent)'}}><IconoCalendario size={18}/></span>
              Visitas de hoy
            </strong>
            <span className="badge accent">{clientesDelDia.length}</span>
          </div>
          {clientesDelDia.slice(0, 5).map(c => {
            const ven = VENDEDORES.find(v => v.id === c.vendedorId);
            const visitoHoy = visitasHoy.find(vh => vh.clienteId === c.id);
            const vendioHoy = ventasHoy.some(vt => vt.clienteId === c.id);
            return (
              <div key={c.id} style={{padding:'8px 0', borderTop:'1px solid var(--line)'}}>
                <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', gap:8}}>
                  <div style={{flex:1, minWidth:0}}>
                    <div style={{fontSize:13, fontWeight:600}}>
                      {vendioHoy && <span style={{color:'var(--good)', marginRight:4}}>✓</span>}
                      {visitoHoy?.tipo === 'local_cerrado' && <span style={{marginRight:4}}>🔒</span>}
                      {visitoHoy?.tipo === 'tiene_stock' && <span style={{marginRight:4}}>📦</span>}
                      {c.razonSocial}
                    </div>
                    <div style={{fontSize:11, color:'var(--ink-mute)'}}>
                      {c.direccion}{ven && <> · {ven.name}</>}
                    </div>
                  </div>
                </div>
              </div>
            );
          })}
          {clientesDelDia.length > 5 && (
            <div style={{fontSize:11, color:'var(--ink-mute)', textAlign:'center',
              marginTop:6, cursor:'pointer'}} onClick={()=>onNavigate('clientes')}>
              Ver todos ({clientesDelDia.length}) →
            </div>
          )}
        </div>
      )}
      {modalVisitaCerrada && (
        <ModalVisitaCerrada
          cliente={modalVisitaCerrada}
          session={session}
          onClose={()=>setModalVisitaCerrada(null)}
          onToast={onToast}
        />
      )}
    </div>
  );
}

// =========================== MINI DASHBOARD ADMIN ===========================
// Resumen del mes en la pantalla principal del admin
// Muestra: KPIs del mes, gráfico simple de ventas por día, top 3 clientes, top calibres

function MiniDashboardAdmin({ ventas, clientes, onNavigate }) {
  const hoy = new Date();
  const anio = hoy.getFullYear();
  const mes = hoy.getMonth();
  const diasEnMes = new Date(anio, mes+1, 0).getDate();
  const diaActual = hoy.getDate();
  const mesNombre = hoy.toLocaleDateString('es-CL', { month: 'long', year: 'numeric' });

  // Ventas del mes
  const ventasMes = useMemo(() => {
    return ventas.filter(v => {
      const fStr = isoToLocalDate(v.fecha || v.creadoEn);
      if (!fStr) return false;
      const d = new Date(fStr + 'T12:00:00');
      return d.getFullYear() === anio && d.getMonth() === mes;
    });
  }, [ventas, anio, mes]);

  // KPIs del mes
  const kpisMes = useMemo(() => {
    let totalBruto = 0, totalMermas = 0, efectivo = 0, transferencia = 0, credito = 0;
    const clientesUnicos = new Set();
    ventasMes.forEach(v => {
      totalBruto += v.totalBruto || 0;
      totalMermas += v.totalMermas || 0;
      const fp = v.formaPago || 'pendiente';
      if (fp === 'efectivo') efectivo += v.totalBruto || 0;
      else if (fp === 'transferencia') transferencia += v.totalBruto || 0;
      else credito += v.totalBruto || 0;
      if (v.clienteId) clientesUnicos.add(v.clienteId);
    });
    return { totalBruto, totalMermas, efectivo, transferencia, credito, clientesUnicos: clientesUnicos.size, ventasCount: ventasMes.length };
  }, [ventasMes]);

  // Mes anterior para comparación
  const ventasMesAnt = useMemo(() => {
    const fechaAnt = new Date(anio, mes-1, 1);
    const aAnt = fechaAnt.getFullYear();
    const mAnt = fechaAnt.getMonth();
    return ventas.filter(v => {
      const fStr = isoToLocalDate(v.fecha || v.creadoEn);
      if (!fStr) return false;
      const d = new Date(fStr + 'T12:00:00');
      return d.getFullYear() === aAnt && d.getMonth() === mAnt;
    });
  }, [ventas, anio, mes]);
  const totalMesAnt = ventasMesAnt.reduce((s,v) => s + (v.totalBruto||0), 0);
  const variacion = totalMesAnt > 0 ? ((kpisMes.totalBruto - totalMesAnt) / totalMesAnt) * 100 : 0;

  // Ventas por día (para gráfico)
  const ventasPorDia = useMemo(() => {
    const arr = Array(diasEnMes).fill(0);
    ventasMes.forEach(v => {
      const fStr = isoToLocalDate(v.fecha || v.creadoEn);
      if (!fStr) return;
      const d = new Date(fStr + 'T12:00:00');
      arr[d.getDate() - 1] += v.totalBruto || 0;
    });
    return arr;
  }, [ventasMes, diasEnMes]);
  const maxDia = Math.max(...ventasPorDia, 1);

  // Top 3 clientes
  const topClientes = useMemo(() => {
    const map = {};
    ventasMes.forEach(v => {
      if (!map[v.clienteId]) map[v.clienteId] = 0;
      map[v.clienteId] += v.totalBruto || 0;
    });
    return Object.entries(map)
      .map(([id, total]) => {
        const cli = clientes.find(c => c.id === id);
        return { id, nombre: (cli && cli.razonSocial) || '(?)', total };
      })
      .sort((a,b) => b.total - a.total)
      .slice(0, 3);
  }, [ventasMes, clientes]);

  // Top calibres - separado por cajas, bandejas y total unidades
  const topCalibres = useMemo(() => {
    const map = {};
    CALIBRES.forEach(c => map[c] = { cajas: 0, bandejas: 0, unidades: 0 });
    ventasMes.forEach(v => {
      (v.items||[]).forEach(it => {
        if (map[it.calibre]) {
          map[it.calibre].cajas += (it.cajas||0);
          map[it.calibre].bandejas += (it.bandejas||0);
          map[it.calibre].unidades += (it.cajas||0)*180 + (it.bandejas||0)*30;
        }
      });
    });
    return Object.entries(map)
      .map(([calibre, data]) => ({ calibre, ...data }))
      .sort((a,b) => b.unidades - a.unidades);
  }, [ventasMes]);
  const maxCalibre = Math.max(...topCalibres.map(t => t.unidades), 1);

  // Si no hay ventas del mes, mostrar mensaje simple
  if (kpisMes.ventasCount === 0) {
    return (
      <div className="card" style={{marginTop:14, textAlign:'center', padding:20}}>
        <div style={{fontSize:32, marginBottom:8}}>📊</div>
        <div style={{fontSize:13, color:'var(--ink-soft)'}}>
          Sin ventas registradas en {mesNombre}
        </div>
      </div>
    );
  }

  return (
    <>
      {/* Título del mes */}
      <div style={{fontSize:11, fontWeight:700, color:'var(--ink-soft)', textTransform:'uppercase', letterSpacing:1.2, margin:'18px 0 6px 4px', display:'flex', justifyContent:'space-between', alignItems:'center'}}>
        <span>📊 Resumen de {mesNombre}</span>
        <span style={{cursor:'pointer', color:'var(--accent)', textTransform:'none', letterSpacing:0}} onClick={()=>onNavigate('dashboard')}>Ver dashboard →</span>
      </div>

      {/* KPIs mes */}
      <div className="card" style={{padding:14}}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:8}}>
          <div>
            <div style={{fontSize:11, color:'var(--ink-mute)', textTransform:'uppercase', letterSpacing:1}}>Total ventas mes</div>
            <div style={{fontSize:24, fontWeight:700, fontFamily:'JetBrains Mono, monospace', color:'var(--accent)'}}>{fmt$(kpisMes.totalBruto)}</div>
          </div>
          {totalMesAnt > 0 && (
            <div style={{textAlign:'right'}}>
              <div style={{fontSize:11, color:'var(--ink-mute)'}}>vs mes anterior</div>
              <div style={{fontSize:14, fontWeight:700, color: variacion >= 0 ? 'var(--good)' : 'var(--bad)'}}>
                {variacion >= 0 ? '▲' : '▼'} {Math.abs(variacion).toFixed(1)}%
              </div>
            </div>
          )}
        </div>
        <div style={{display:'flex', gap:8, fontSize:11, color:'var(--ink-soft)', flexWrap:'wrap'}}>
          <span>📋 {kpisMes.ventasCount} ventas</span>
          <span>·</span>
          <span>👥 {kpisMes.clientesUnicos} clientes</span>
          {kpisMes.totalMermas > 0 && <><span>·</span><span style={{color:'var(--bad)'}}>📉 {fmtN(kpisMes.totalMermas)}u mermas</span></>}
        </div>
      </div>

      {/* Mini gráfico de barras ventas por día */}
      <div className="card" style={{padding:14}}>
        <div style={{fontSize:12, fontWeight:600, marginBottom:10}}>📈 Ventas por día del mes</div>
        <div style={{display:'flex', alignItems:'flex-end', gap:2, height:80, marginBottom:6}}>
          {ventasPorDia.map((v, i) => {
            const altura = v > 0 ? Math.max(4, (v / maxDia) * 100) : 2;
            const esHoy = (i + 1) === diaActual;
            return (
              <div
                key={i}
                title={`Día ${i+1}: ${fmt$(v)}`}
                style={{
                  flex:1,
                  height: altura + '%',
                  background: esHoy ? 'var(--accent)' : v > 0 ? 'var(--accent-soft, #f0c8a0)' : 'var(--line)',
                  borderRadius:'2px 2px 0 0',
                  transition: 'height 0.3s',
                  minWidth:0,
                }}
              />
            );
          })}
        </div>
        <div style={{display:'flex', justifyContent:'space-between', fontSize:9, color:'var(--ink-mute)'}}>
          <span>Día 1</span>
          <span>Día {Math.ceil(diasEnMes/2)}</span>
          <span>Día {diasEnMes}</span>
        </div>
      </div>

      {/* Formas de pago */}
      <div className="card" style={{padding:14}}>
        <div style={{fontSize:12, fontWeight:600, marginBottom:10}}>💳 Formas de pago del mes</div>
        {[
          { label: '💵 Efectivo', valor: kpisMes.efectivo, color: 'var(--good)' },
          { label: '🏦 Transferencia', valor: kpisMes.transferencia, color: 'var(--accent)' },
          { label: '⏰ Crédito', valor: kpisMes.credito, color: 'var(--warn)' },
        ].map((fp, i) => {
          const pct = kpisMes.totalBruto > 0 ? (fp.valor / kpisMes.totalBruto) * 100 : 0;
          return (
            <div key={i} style={{marginBottom: i<2 ? 8 : 0}}>
              <div style={{display:'flex', justifyContent:'space-between', fontSize:12, marginBottom:3}}>
                <span>{fp.label}</span>
                <span style={{fontFamily:'JetBrains Mono, monospace'}}>{fmt$(fp.valor)} <span style={{color:'var(--ink-mute)', fontSize:10}}>({pct.toFixed(0)}%)</span></span>
              </div>
              <div style={{height:6, background:'var(--line)', borderRadius:3, overflow:'hidden'}}>
                <div style={{height:'100%', width: pct + '%', background: fp.color, transition: 'width 0.3s'}}/>
              </div>
            </div>
          );
        })}
      </div>

      {/* Top clientes */}
      {topClientes.length > 0 && (
        <div className="card" style={{padding:14, cursor:'pointer'}} onClick={()=>onNavigate('clientes')}>
          <div style={{display:'flex', justifyContent:'space-between', marginBottom:10}}>
            <span style={{fontSize:12, fontWeight:600}}>🏆 Top clientes del mes</span>
            <span style={{fontSize:11, color:'var(--accent)'}}>Ver todos →</span>
          </div>
          {topClientes.map((c, i) => (
            <div key={c.id} style={{display:'flex', justifyContent:'space-between', padding:'4px 0', fontSize:12, borderBottom: i<2 ? '1px solid var(--line)' : 'none'}}>
              <span style={{display:'flex', alignItems:'center', gap:6, flex:1, minWidth:0}}>
                <span style={{
                  width:20, height:20, borderRadius:'50%', background: i===0?'#ffd700':i===1?'#c0c0c0':'#cd7f32',
                  color:'white', display:'flex', alignItems:'center', justifyContent:'center', fontSize:10, fontWeight:700, flexShrink:0,
                }}>{i+1}</span>
                <span style={{overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>{c.nombre}</span>
              </span>
              <strong style={{fontFamily:'JetBrains Mono, monospace', color:'var(--accent)'}}>{fmt$(c.total)}</strong>
            </div>
          ))}
        </div>
      )}

      {/* Top calibres */}
      {topCalibres.some(t => t.unidades > 0) && (
        <div className="card" style={{padding:14}}>
          <div style={{fontSize:12, fontWeight:600, marginBottom:10}}>🥚 Calibres más vendidos del mes</div>
          {topCalibres.map(t => {
            const pct = (t.unidades / maxCalibre) * 100;
            const partes = [];
            if (t.cajas > 0) partes.push(`📦 ${t.cajas} ${t.cajas===1?'caja':'cajas'}`);
            if (t.bandejas > 0) partes.push(`🥚 ${t.bandejas} ${t.bandejas===1?'bandeja':'bandejas'}`);
            return (
              <div key={t.calibre} style={{marginBottom:10}}>
                <div style={{display:'flex', justifyContent:'space-between', fontSize:12, marginBottom:3}}>
                  <strong>{t.calibre}</strong>
                  <span style={{fontFamily:'JetBrains Mono, monospace', fontSize:11, color:'var(--ink-soft)'}}>{fmtN(t.unidades)}u</span>
                </div>
                {partes.length > 0 && (
                  <div style={{fontSize:11, color:'var(--ink-soft)', marginBottom:4}}>
                    {partes.join(' · ')}
                  </div>
                )}
                <div style={{height:6, background:'var(--line)', borderRadius:3, overflow:'hidden'}}>
                  <div style={{height:'100%', width: pct + '%', background: 'var(--accent)', transition: 'width 0.3s'}}/>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </>
  );
}
