        }),
      });
      await fbLog(session.id, 'adjuntar_comprobante', 'ventas', {
        ventaId: venta.id,
        cliente: cliente?.razonSocial,
      });
      onToast('✓ Comprobante adjuntado','success');
      onClose();
    } catch(e) {
      console.error(e);
      onToast('Error al adjuntar','error');
    }
    setSaving(false);
  };

  const monto = venta.formaPago === 'mixto' && venta.montosMixto ? (venta.montosMixto.transferencia||0) :
                venta.formaPago === 'pendiente' ? (venta.montoCobradoTransferencia || venta.totalBruto) :
                venta.totalBruto;
  const fechaVenta = new Date(venta.creadoEn).toLocaleDateString('es-CL', {day:'numeric', month:'long', year:'numeric'});

  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <h3>📷 Adjuntar comprobante</h3>

        <div className="card" style={{background:'var(--bg-2)'}}>
          <div style={{fontSize:11, color:'var(--ink-soft)', marginBottom:4}}>Cliente</div>
          <strong>{cliente?.razonSocial || '(?)'}</strong>
          <div style={{display:'flex', justifyContent:'space-between', marginTop:8, fontSize:13}}>
            <span>Fecha:</span><strong>{fechaVenta}</strong>
          </div>
          <div style={{display:'flex', justifyContent:'space-between', marginTop:4}}>
            <span style={{fontSize:13}}>Transferencia:</span>
            <strong style={{fontFamily:'JetBrains Mono, monospace', color:'var(--accent)'}}>{fmt$(monto)}</strong>
          </div>
        </div>

        <label className="fld" style={{marginTop:12}}>📷 Foto del comprobante *</label>
        <div style={{display:'flex', gap:8, marginBottom:8}}>
          <button className="btn ghost" style={{flex:1, padding:'10px'}}
            onClick={() => {
              if (fileInputRef.current) {
                fileInputRef.current.removeAttribute('capture');
                fileInputRef.current.click();
              }
            }}>📂 Galería</button>
          <button className="btn ghost" style={{flex:1, padding:'10px'}}
            onClick={() => {
              if (fileInputRef.current) {
                fileInputRef.current.setAttribute('capture', 'environment');
                fileInputRef.current.click();
              }
            }}>📸 Cámara</button>
        </div>
        <input ref={fileInputRef} type="file" accept="image/*"
          onChange={e=>procesarArchivo(e.target.files[0])} style={{display:'none'}}/>

        {previewUrl && (
          <div style={{marginTop:8, padding:8, background:'var(--bg-2)', borderRadius:8, textAlign:'center'}}>
            <img src={previewUrl} alt="Comprobante" style={{maxWidth:'100%', maxHeight:200, borderRadius:6}}/>
            <button className="btn ghost sm"
              onClick={() => { setFoto(null); setPreviewUrl(null); }}
              style={{marginTop:6, fontSize:11}}>🗑️ Quitar</button>
          </div>
        )}

        <div className="actions">
          <button className="btn ghost" onClick={onClose}>Cancelar</button>
          <button className="btn accent" onClick={confirmar} disabled={saving || !foto}>
            {saving ? '...' : '✓ Guardar comprobante'}
          </button>
        </div>
      </div>
    </div>
  );
}

// =========================== MODAL CONFIRMAR TRANSFERENCIA ===========================
function ModalConfirmarTransferencia({ venta, cliente, session, onClose, onToast }) {
  const monto = venta.formaPago === 'mixto' && venta.montosMixto
    ? (venta.montosMixto.transferencia || 0)
    : saldoVenta(venta);

  const [modo, setModo] = useState('cobro'); // cobro | abono | reprogramar
  const [foto, setFoto] = useState(null);
  const [previewUrl, setPreviewUrl] = useState(null);
  // Abono
  const [montoAbono, setMontoAbono] = useState('');
  const [formaAbono, setFormaAbono] = useState('transferencia');
  const [montoAbonoEf, setMontoAbonoEf] = useState('');
  const [montoAbonoTr, setMontoAbonoTr] = useState('');
  // Reprogramar
  const [nuevaFecha, setNuevaFecha] = useState(() => {
    const d = new Date(); d.setDate(d.getDate() + 7);
    return d.toISOString().slice(0,10);
  });
  const [obsReprog, setObsReprog] = useState('');
  const [saving, setSaving] = useState(false);
  const fileInputRef = React.useRef(null);

  const procesarArchivo = (file) => {
    if (!file || !file.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const maxDim = 1200; let w = img.width, h = img.height;
        if (w > maxDim || h > maxDim) { if (w>h){h=h*maxDim/w;w=maxDim;}else{w=w*maxDim/h;h=maxDim;} }
        const canvas = document.createElement('canvas'); canvas.width=w; canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        const dataUrl = canvas.toDataURL('image/jpeg',0.75);
        setFoto(dataUrl); setPreviewUrl(dataUrl);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  };

  const confirmar = async () => {
    setSaving(true);
    try {
      if (modo === 'cobro') {
        const updates = {
          cobroEstado: 'cobrado', cobradoEn: nowISO(), cobradoPor: session.id,
          transferenciaConfirmada: true, transferenciaConfirmadaEn: nowISO(),
          transferenciaConfirmadaPor: session.id,
          cobroFormaReal: 'transferencia',
        };
        if (foto) updates.transferenciaComprobante = foto;
        await fbUpdate(`ventas/${venta.id}`, updates);
        await crearNotificacion(session, {
          tipo: 'transferencia_recibida', titulo: '✓ Transferencia recibida',
          mensaje: `${cliente?.razonSocial} pagó ${fmt$(monto)} por transferencia`,
          link: 'ventas', prioridad: 'normal',
        });
        onToast('✓ Transferencia confirmada','success');

      } else if (modo === 'abono') {
        let montoAb, efAb=0, trAb=0;
        if (formaAbono === 'mixto') {
          efAb = parseFloat(montoAbonoEf)||0; trAb = parseFloat(montoAbonoTr)||0;
          montoAb = efAb + trAb;
        } else {
          montoAb = parseFloat(montoAbono)||0;
          if (formaAbono==='efectivo') efAb=montoAb; else trAb=montoAb;
        }
        if (montoAb <= 0) return onToast('Ingresa el monto del abono','error');
        const saldoActual = saldoVenta(venta);
        const saldoPendiente = Math.max(0, saldoActual - montoAb);
        const abonos = [...(venta.abonos||[]), {
          monto: montoAb, efectivo: efAb, transferencia: trAb,
          forma: formaAbono, fecha: nowISO(), por: session.id,
          ...(foto?{comprobante:foto}:{}),
        }];
        const updates = {
          abonos, totalAbonado: (venta.totalAbonado||0)+montoAb, saldoPendiente,
          cobroEstado: saldoPendiente<=0 ? 'cobrado' : 'pendiente',
          ultimoAbono: nowISO(),
          ...(trAb>0?{transferenciaConfirmada:true, transferenciaConfirmadaEn:nowISO()}:{}),
          ...(foto?{transferenciaComprobante:foto}:{}),
        };
        await fbUpdate(`ventas/${venta.id}`, updates);
        onToast(`✓ Abono de ${fmt$(montoAb)} · Saldo: ${fmt$(saldoPendiente)}`,'success');

      } else {
        if (!nuevaFecha) return onToast('Ingresa la nueva fecha','error');
        await fbUpdate(`ventas/${venta.id}`, {
          fechaCompromiso: nuevaFecha, reprogramado: true,
          reprogramaciones: (venta.reprogramaciones||0)+1,
          ultimaReprogramacion: nowISO(), ultimaReprogramacionPor: session.id,
          obsReprogramacion: obsReprog.trim()||null,
        });
        onToast(`✓ Reprogramado al ${new Date(nuevaFecha+'T12:00:00').toLocaleDateString('es-CL',{day:'numeric',month:'long'})}`,'success');
      }
      onClose();
    } catch(e) { console.error(e); onToast('Error','error'); }
    setSaving(false);
  };

  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <h3>🏦 Gestionar transferencia</h3>

        <div className="card" style={{background:'var(--bg-2)', marginBottom:10}}>
          <strong style={{fontSize:14}}>{cliente?.razonSocial}</strong>
          <div style={{display:'flex', justifyContent:'space-between', marginTop:6}}>
            <span style={{fontSize:12, color:'var(--ink-soft)'}}>Monto pendiente:</span>
            <strong style={{fontFamily:'JetBrains Mono, monospace', color:'var(--accent)', fontSize:16}}>{fmt$(monto)}</strong>
          </div>
          {venta.reprogramado && (
            <div style={{fontSize:11, color:'var(--warn)', marginTop:4, fontWeight:700}}>
              🔄 {venta.reprogramaciones>=2?`${venta.reprogramaciones}ª oportunidad`:'2ª oportunidad'}
            </div>
          )}
        </div>

        {/* Selector de acción */}
        <div style={{display:'flex', gap:4, marginBottom:14}}>
          {[
            {id:'cobro', lbl:'✅ Pago completo'},
            {id:'abono', lbl:'💸 Abono'},
            {id:'reprogramar', lbl:'📅 Reprogramar'},
          ].map(opt=>(
            <button key={opt.id} onClick={()=>setModo(opt.id)} className="btn sm"
              style={{flex:1, padding:'8px 4px', fontSize:11, fontWeight:700,
                background:modo===opt.id?'var(--accent)':'var(--bg-2)',
                color:modo===opt.id?'var(--accent-on)':'var(--ink)',
                border:`1.5px solid ${modo===opt.id?'var(--accent)':'var(--line)'}`}}>
              {opt.lbl}
            </button>
          ))}
        </div>

        {/* Cobro completo */}
        {modo === 'cobro' && (
          <>
            <label className="fld">📷 Comprobante (opcional)</label>
            <div style={{display:'flex', gap:8, marginBottom:8}}>
              <button className="btn ghost" style={{flex:1}} onClick={()=>{fileInputRef.current?.removeAttribute('capture');fileInputRef.current?.click();}}>📂 Galería</button>
              <button className="btn ghost" style={{flex:1}} onClick={()=>{fileInputRef.current?.setAttribute('capture','environment');fileInputRef.current?.click();}}>📸 Cámara</button>
            </div>
            {previewUrl && <img src={previewUrl} style={{width:'100%', borderRadius:8, marginBottom:8, maxHeight:150, objectFit:'cover'}}/>}
          </>
        )}

        {/* Abono */}
        {modo === 'abono' && (
          <>
            <label className="fld">Forma del abono</label>
            <div style={{display:'flex', gap:4, marginBottom:10}}>
              {['transferencia','efectivo','mixto'].map(fp=>(
                <button key={fp} onClick={()=>setFormaAbono(fp)} className="btn sm"
                  style={{flex:1, background:formaAbono===fp?'var(--ink)':'transparent',
                    color:formaAbono===fp?'var(--ink-on)':'var(--ink-soft)',
                    border:'1.5px solid var(--line)', fontSize:11}}>
                  {fp==='transferencia'?'🏦 Transf.':fp==='efectivo'?'💵 Efectivo':'🔀 Mixto'}
                </button>
              ))}
            </div>
            {formaAbono !== 'mixto' ? (
              <>
                <label className="fld">Monto del abono</label>
                <input type="number" className="inp" value={montoAbono} onChange={e=>setMontoAbono(e.target.value)} placeholder="$0"/>
                {parseFloat(montoAbono)>0 && <div style={{fontSize:12,color:'var(--accent)',marginTop:4,fontFamily:'JetBrains Mono, monospace'}}>Saldo restante: {fmt$(Math.max(0,monto-(parseFloat(montoAbono)||0)))}</div>}
              </>
            ) : (
              <div style={{background:'var(--bg-2)', borderRadius:8, padding:'10px 12px'}}>
                <label className="fld" style={{fontSize:11}}>💵 Efectivo</label>
                <input type="number" className="inp" value={montoAbonoEf} onChange={e=>setMontoAbonoEf(e.target.value)} style={{marginBottom:8}}/>
                <label className="fld" style={{fontSize:11}}>🏦 Transferencia</label>
                <input type="number" className="inp" value={montoAbonoTr} onChange={e=>setMontoAbonoTr(e.target.value)} style={{marginBottom:0}}/>
              </div>
            )}
            {(formaAbono==='transferencia'||formaAbono==='mixto') && (
              <>
                <label className="fld" style={{marginTop:8}}>📷 Comprobante (opcional)</label>
                <div style={{display:'flex', gap:8}}>
                  <button className="btn ghost" style={{flex:1}} onClick={()=>{fileInputRef.current?.removeAttribute('capture');fileInputRef.current?.click();}}>📂 Galería</button>
                  <button className="btn ghost" style={{flex:1}} onClick={()=>{fileInputRef.current?.setAttribute('capture','environment');fileInputRef.current?.click();}}>📸 Cámara</button>
                </div>
                {previewUrl && <img src={previewUrl} style={{width:'100%', borderRadius:8, marginTop:6, maxHeight:120, objectFit:'cover'}}/>}
              </>
            )}
          </>
        )}

        {/* Reprogramar */}
        {modo === 'reprogramar' && (
          <>
            {!venta.reprogramado
              ? <div style={{padding:'8px 10px', background:'var(--bg-2)', borderRadius:8, fontSize:12, marginBottom:10}}>El cliente quedará marcado con 🔄 <strong>2ª oportunidad</strong>.</div>
              : <div style={{padding:'8px 10px', background:'var(--warn-bg)', borderRadius:8, fontSize:12, color:'var(--warn)', fontWeight:600, marginBottom:10}}>⚠️ Ya fue reprogramado {venta.reprogramaciones||1} vez{(venta.reprogramaciones||1)>1?'es':''}.</div>
            }
            <label className="fld">Nueva fecha de compromiso</label>
            <input type="date" className="inp" value={nuevaFecha} onChange={e=>setNuevaFecha(e.target.value)} min={todayStr()}/>
            <label className="fld">Observaciones (opcional)</label>
            <input type="text" className="inp" value={obsReprog} onChange={e=>setObsReprog(e.target.value)} placeholder="Ej: acordó pagar el viernes"/>
          </>
        )}

        <input ref={fileInputRef} type="file" accept="image/*"
          onChange={e=>procesarArchivo(e.target.files[0])} style={{display:'none'}}/>

        <div className="actions" style={{marginTop:14}}>
          <button className="btn ghost" onClick={onClose} disabled={saving}>Cancelar</button>
          <button className="btn accent" onClick={confirmar} disabled={saving}>
            {saving?'...':modo==='cobro'?'✓ Confirmar pago':modo==='abono'?'✓ Registrar abono':'📅 Reprogramar'}
          </button>
        </div>
      </div>
    </div>
  );
}

// =========================== MODAL COBRO PENDIENTE ===========================
// Modal para cobrar una venta pendiente con elección de forma de pago

function ModalCobroPendiente({ venta, cliente, session, onClose, onToast }) {
  const [modo, setModo] = useState('cobro'); // cobro | abono | reprogramar
  const [formaPago, setFormaPago] = useState('efectivo');
  const totalDeuda = venta.totalBruto;

  // Cobro completo
  const [montoEfectivo, setMontoEfectivo] = useState(totalDeuda);
  const [montoTransf, setMontoTransf] = useState(0);
  const [foto, setFoto] = useState(null);
  const [previewUrl, setPreviewUrl] = useState(null);

  // Abono
  const [montoAbono, setMontoAbono] = useState('');
  const [formaAbono, setFormaAbono] = useState('efectivo');
  const [montoAbonoEf, setMontoAbonoEf] = useState('');
  const [montoAbonoTr, setMontoAbonoTr] = useState('');
  const [fotoAbono, setFotoAbono] = useState(null);

  // Reprogramar
  const [nuevaFecha, setNuevaFecha] = useState(() => {
    const d = new Date(); d.setDate(d.getDate() + 7);
    return d.toISOString().slice(0,10);
  });
  const [obsReprog, setObsReprog] = useState('');

  const [saving, setSaving] = useState(false);
  const fileInputRef = React.useRef(null);
  const fileAbonoRef = React.useRef(null);

  const est = getDeudaEstado(venta.fechaCompromiso);

  // Ajustar montos según forma de pago cobro completo
  useEffect(() => {
    if (formaPago === 'efectivo') { setMontoEfectivo(totalDeuda); setMontoTransf(0); }
    else if (formaPago === 'transferencia') { setMontoEfectivo(0); setMontoTransf(totalDeuda); }
    else { setMontoEfectivo(0); setMontoTransf(0); }
  }, [formaPago, totalDeuda]);

  const procesarArchivo = (file, setter) => {
    if (!file) return;
    if (!file.type.startsWith('image/')) return onToast('Solo imágenes','error');
    if (file.size > 5*1024*1024) return onToast('Máx 5 MB','error');
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const maxDim = 1200; let w = img.width, h = img.height;
        if (w > maxDim || h > maxDim) { if (w > h) { h = h*maxDim/w; w = maxDim; } else { w = w*maxDim/h; h = maxDim; } }
        const canvas = document.createElement('canvas'); canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        const dataUrl = canvas.toDataURL('image/jpeg', 0.75);
        setter(dataUrl);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  };

  const confirmar = async () => {
    setSaving(true);
    try {
      if (modo === 'cobro') {
        // Cobro completo
        const sumaMixto = (parseFloat(montoEfectivo)||0) + (parseFloat(montoTransf)||0);
        if (formaPago === 'mixto' && Math.abs(sumaMixto - totalDeuda) >= 1)
          return onToast(`Los montos no cuadran. Suma: ${fmt$(sumaMixto)} · Total: ${fmt$(totalDeuda)}`,'error');
        if (formaPago === 'mixto' && (montoEfectivo <= 0 || montoTransf <= 0))
          return onToast('En pago mixto, ambos montos deben ser > 0','error');

        const updates = {
          cobroEstado: 'cobrado',
          cobradoEn: nowISO(),
          cobradoPor: session.id,
          cobroFormaReal: formaPago,
          montoCobradoEfectivo: formaPago === 'efectivo' ? totalDeuda : parseFloat(montoEfectivo)||0,
          montoCobradoTransferencia: formaPago === 'transferencia' ? totalDeuda : parseFloat(montoTransf)||0,
        };
        if ((formaPago === 'transferencia' || (formaPago==='mixto' && montoTransf>0)) && foto) {
          updates.transferenciaComprobante = foto;
          updates.transferenciaConfirmada = true;
          updates.transferenciaConfirmadaEn = nowISO();
        }
        await fbUpdate(`ventas/${venta.id}`, updates);
        await fbLog(session.id, 'cobrar_pendiente', 'ventas', { ventaId: venta.id, monto: totalDeuda, formaPago, cliente: cliente?.razonSocial });
        if (session.role !== 'admin') {
          await crearNotificacion(session, { tipo: 'cobro_recibido', titulo: '💰 Cobro registrado',
            mensaje: `${session.name} cobró ${fmt$(totalDeuda)} a ${cliente?.razonSocial}`, link: 'cobros', prioridad: 'normal' });
        }
        onToast('✓ Cobro completo registrado','success');

      } else if (modo === 'abono') {
        // Abono parcial
        let montoAb, efAb = 0, trAb = 0;
        if (formaAbono === 'mixto') {
          efAb = parseFloat(montoAbonoEf)||0; trAb = parseFloat(montoAbonoTr)||0;
          montoAb = efAb + trAb;
          if (montoAb <= 0) return onToast('Ingresa los montos del abono','error');
        } else {
          montoAb = parseFloat(montoAbono)||0;
          if (montoAb <= 0) return onToast('Ingresa el monto del abono','error');
          if (montoAb >= totalDeuda) return onToast('El abono cubre la deuda completa — usa "Cobrar completo"','warn');
          if (formaAbono === 'efectivo') efAb = montoAb;
          else trAb = montoAb;
        }
        const saldoPendiente = Math.round(totalDeuda - montoAb);
        const abonos = [...(venta.abonos || []), {
          monto: montoAb, efectivo: efAb, transferencia: trAb,
          forma: formaAbono, fecha: nowISO(), por: session.id,
          ...(fotoAbono ? { comprobante: fotoAbono } : {}),
        }];
        const updates = {
          abonos,
          totalAbonado: (venta.totalAbonado || 0) + montoAb,
          saldoPendiente,
          cobroEstado: saldoPendiente <= 0 ? 'cobrado' : 'pendiente',
          ...(saldoPendiente <= 0 ? { cobradoEn: nowISO(), cobradoPor: session.id } : {}),
          ultimoAbono: nowISO(),
        };
        await fbUpdate(`ventas/${venta.id}`, updates);
        await fbLog(session.id, 'abono', 'ventas', { ventaId: venta.id, montoAbono: montoAb, saldoPendiente, cliente: cliente?.razonSocial });
        if (session.role !== 'admin') {
          await crearNotificacion(session, { tipo: 'abono_recibido', titulo: '💰 Abono recibido',
            mensaje: `${session.name} recibió abono de ${fmt$(montoAb)} de ${cliente?.razonSocial}. Saldo: ${fmt$(saldoPendiente)}`, link: 'cobros', prioridad: 'normal' });
        }
        onToast(`✓ Abono de ${fmt$(montoAb)} registrado · Saldo: ${fmt$(saldoPendiente)}`,'success');

      } else {
        // Reprogramar
        if (!nuevaFecha) return onToast('Ingresa la nueva fecha','error');
        const esPrimeraReprog = !venta.reprogramado;
        await fbUpdate(`ventas/${venta.id}`, {
          fechaCompromiso: nuevaFecha,
          reprogramado: true,
          reprogramaciones: (venta.reprogramaciones || 0) + 1,
          ultimaReprogramacion: nowISO(),
          ultimaReprogramacionPor: session.id,
          obsReprogramacion: obsReprog.trim() || null,
        });
        await fbLog(session.id, 'reprogramar', 'ventas', { ventaId: venta.id, nuevaFecha, cliente: cliente?.razonSocial });
        onToast(`✓ Deuda reprogramada al ${new Date(nuevaFecha+'T12:00:00').toLocaleDateString('es-CL',{day:'numeric',month:'long'})}${esPrimeraReprog?'':' (2ª oportunidad)'}`, 'success');
      }
      onClose();
    } catch(e) { console.error(e); onToast('Error al registrar','error'); }
    setSaving(false);
  };

  const enviarWARecordatorio = () => {
    const tel = cliente?.telefonoContacto || cliente?.telefono;
    if (!tel) return onToast('Cliente sin teléfono','warn');
    const fechaVenta = new Date(venta.creadoEn).toLocaleDateString('es-CL',{day:'numeric',month:'long'});
    const fechaComp = venta.fechaCompromiso ? new Date(venta.fechaCompromiso+'T12:00:00').toLocaleDateString('es-CL',{day:'numeric',month:'long'}) : null;
    let mensaje;
    if (est?.tipo === 'vencida') {
      mensaje = `🥚 *INTEGRAL SUR · Distribuidora*\n\nHola ${cliente.contacto||cliente.razonSocial}, esperamos que se encuentre bien 😊\n\nNos ponemos en contacto porque tenemos un pago pendiente que necesitamos regularizar juntos:\n\n🚨 Su pago se encuentra *VENCIDO hace ${Math.abs(est.dias)} día${Math.abs(est.dias)!==1?'s':''}*\n💰 *Monto: ${fmt$(totalDeuda)}*\n📅 Venta del ${fechaVenta}${fechaComp?`\n📅 Vencimiento: ${fechaComp}`:''}\n\n🙏 Le pedimos regularizar a la brevedad.\n\n¡Muchas gracias por su confianza y apoyo! 🙏🥚`;
    } else if (est?.tipo === 'venceHoy') {
      mensaje = `🥚 *INTEGRAL SUR · Distribuidora*\n\nHola ${cliente.contacto||cliente.razonSocial}, le escribimos para recordarle que hoy vence su compromiso de pago 🤝\n\n💰 *Monto: ${fmt$(totalDeuda)}*\n📅 Venta del ${fechaVenta}\n\nQuedamos atentos. Cualquier consulta, estamos disponibles para usted.\n\n¡Gracias por su preferencia y confianza! 🙏🥚`;
    } else {
      mensaje = `🥚 *INTEGRAL SUR · Distribuidora*\n\nHola ${cliente.contacto||cliente.razonSocial}, esperamos que se encuentre bien 😊\n\nLe recordamos el pago pendiente:\n\n💰 *Monto: ${fmt$(totalDeuda)}*\n📅 Venta del ${fechaVenta}${fechaComp?`\n📅 Compromiso: ${fechaComp}`:''}\n\nQuedamos atentos.\n\n¡Gracias por elegirnos y por su confianza! 🙏🥚`;
    }
    abrirWhatsApp(tel, mensaje);
  };

  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <h3>💰 Gestionar pago pendiente</h3>

        {/* Info del cliente y deuda */}
        <div className="card" style={{background:'var(--bg-2)', marginBottom:10}}>
          <strong style={{fontSize:14}}>{cliente?.razonSocial}</strong>
          <div style={{display:'flex', justifyContent:'space-between', marginTop:6, alignItems:'center'}}>
            <span style={{fontSize:12, color:'var(--ink-soft)'}}>
              {venta.totalAbonado > 0 ? 'Saldo pendiente:' : 'Monto pendiente:'}
            </span>
            <strong style={{fontFamily:'JetBrains Mono, monospace', color:'var(--accent)', fontSize:16}}>
              {fmt$(venta.saldoPendiente || totalDeuda)}
            </strong>
          </div>
          {venta.totalAbonado > 0 && (
            <div style={{fontSize:11, color:'var(--good)', marginTop:2}}>
              ✅ Ya abonado: {fmt$(venta.totalAbonado)} de {fmt$(totalDeuda)}
            </div>
          )}
          {est && est.tipo !== 'sinFecha' && (
            <div style={{fontSize:11, marginTop:6, color: est.color, fontWeight:600}}>
              {est.icono} {est.mensaje}
            </div>
          )}
          {/* Badge reprogramado */}
          {venta.reprogramado && (
            <div style={{marginTop:6, display:'inline-flex', alignItems:'center', gap:4,
              fontSize:11, fontWeight:700, color:'var(--warn)',
              background:'var(--warn-bg)', padding:'3px 8px', borderRadius:4}}>
              🔄 {venta.reprogramaciones >= 2 ? `${venta.reprogramaciones}ª oportunidad` : '2ª oportunidad'}
            </div>
          )}
          {(cliente?.telefonoContacto || cliente?.telefono) && (
            <button onClick={enviarWARecordatorio}
              style={{marginTop:8, width:'100%', padding:'8px', background:'#25D366',
                color:'white', border:'none', borderRadius:8, fontSize:12, cursor:'pointer', fontWeight:600}}>
              📲 Enviar recordatorio por WhatsApp
            </button>
          )}
        </div>

        {/* Selector de acción */}
        <div style={{display:'flex', gap:4, marginBottom:14}}>
          {[
            {id:'cobro', lbl:'💵 Cobrar completo'},
            {id:'abono', lbl:'💸 Abonar'},
            {id:'reprogramar', lbl:'📅 Reprogramar'},
          ].map(opt => (
            <button key={opt.id} onClick={()=>setModo(opt.id)} className="btn sm"
              style={{flex:1, padding:'8px 4px', fontSize:11, fontWeight:700,
                background: modo===opt.id ? 'var(--accent)' : 'var(--bg-2)',
                color: modo===opt.id ? 'var(--accent-on)' : 'var(--ink)',
                border: `1.5px solid ${modo===opt.id?'var(--accent)':'var(--line)'}`,
              }}>
              {opt.lbl}
            </button>
          ))}
        </div>

        {/* === COBRO COMPLETO === */}
        {modo === 'cobro' && (
          <>
            <label className="fld">Forma de pago</label>
            <div style={{display:'flex', gap:4, marginBottom:10}}>
              {['efectivo','transferencia','mixto'].map(fp => (
                <button key={fp} onClick={()=>setFormaPago(fp)} className="btn sm"
                  style={{flex:1, background: formaPago===fp?'var(--ink)':'transparent',
                    color: formaPago===fp?'var(--ink-on)':'var(--ink-soft)',
                    border:'1.5px solid var(--line)', fontSize:11}}>
                  {fp==='efectivo'?'💵 Efectivo':fp==='transferencia'?'🏦 Transf.':'🔀 Mixto'}
                </button>
              ))}
            </div>
            {formaPago === 'mixto' && (
              <div style={{background:'var(--bg-2)', borderRadius:8, padding:'10px 12px', marginBottom:10}}>
                <label className="fld" style={{fontSize:11}}>💵 Efectivo</label>
                <input type="number" className="inp" value={montoEfectivo} onChange={e=>setMontoEfectivo(e.target.value)} style={{marginBottom:8}}/>
                <label className="fld" style={{fontSize:11}}>🏦 Transferencia</label>
                <input type="number" className="inp" value={montoTransf} onChange={e=>setMontoTransf(e.target.value)} style={{marginBottom:0}}/>
                <div style={{fontSize:11, marginTop:6, color: Math.abs((parseFloat(montoEfectivo)||0)+(parseFloat(montoTransf)||0)-totalDeuda)<1?'var(--good)':'var(--warn)'}}>
                  Suma: {fmt$((parseFloat(montoEfectivo)||0)+(parseFloat(montoTransf)||0))} / Total: {fmt$(totalDeuda)}
                </div>
              </div>
            )}
            {(formaPago === 'transferencia' || (formaPago==='mixto' && parseFloat(montoTransf)>0)) && (
              <>
                <label className="fld">📎 Comprobante transferencia</label>
                <button className="btn ghost full" onClick={()=>fileInputRef.current?.click()} style={{marginBottom:6}}>
                  {foto ? '✓ Foto adjunta · Cambiar' : '📷 Adjuntar foto comprobante'}
                </button>
                <input ref={fileInputRef} type="file" accept="image/*"
                  onChange={e=>procesarArchivo(e.target.files[0], setFoto)} style={{display:'none'}}/>
                {previewUrl && <img src={previewUrl} alt="comp" style={{width:'100%', borderRadius:8, marginBottom:6, maxHeight:120, objectFit:'cover'}}/>}
              </>
            )}
          </>
        )}

        {/* === ABONO === */}
        {modo === 'abono' && (
          <>
            <div style={{padding:'8px 10px', background:'var(--accent-soft)', borderRadius:8, marginBottom:10, fontSize:12}}>
              Ingresa el monto que abona el cliente. El saldo restante queda pendiente.
            </div>
            <label className="fld">Forma de abono</label>
            <div style={{display:'flex', gap:4, marginBottom:10}}>
              {['efectivo','transferencia','mixto'].map(fp => (
                <button key={fp} onClick={()=>setFormaAbono(fp)} className="btn sm"
                  style={{flex:1, background: formaAbono===fp?'var(--ink)':'transparent',
                    color: formaAbono===fp?'var(--ink-on)':'var(--ink-soft)',
                    border:'1.5px solid var(--line)', fontSize:11}}>
                  {fp==='efectivo'?'💵 Efectivo':fp==='transferencia'?'🏦 Transf.':'🔀 Mixto'}
                </button>
              ))}
            </div>
            {formaAbono !== 'mixto' ? (
              <>
                <label className="fld">Monto del abono</label>
                <input type="number" className="inp" value={montoAbono}
                  onChange={e=>setMontoAbono(e.target.value)} placeholder="$0"/>
                {parseFloat(montoAbono) > 0 && (
                  <div style={{fontSize:12, color:'var(--accent)', marginTop:4, fontFamily:'JetBrains Mono, monospace'}}>
                    Saldo restante: {fmt$(Math.max(0, (venta.saldoPendiente||totalDeuda) - (parseFloat(montoAbono)||0)))}
                  </div>
                )}
              </>
            ) : (
              <div style={{background:'var(--bg-2)', borderRadius:8, padding:'10px 12px', marginBottom:10}}>
                <label className="fld" style={{fontSize:11}}>💵 Efectivo</label>
                <input type="number" className="inp" value={montoAbonoEf}
                  onChange={e=>setMontoAbonoEf(e.target.value)} style={{marginBottom:8}}/>
                <label className="fld" style={{fontSize:11}}>🏦 Transferencia</label>
                <input type="number" className="inp" value={montoAbonoTr}
                  onChange={e=>setMontoAbonoTr(e.target.value)} style={{marginBottom:0}}/>
                {(parseFloat(montoAbonoEf)||0)+(parseFloat(montoAbonoTr)||0) > 0 && (
                  <div style={{fontSize:11, marginTop:6, color:'var(--accent)'}}>
                    Total abono: {fmt$((parseFloat(montoAbonoEf)||0)+(parseFloat(montoAbonoTr)||0))} · 
                    Saldo: {fmt$(Math.max(0,(venta.saldoPendiente||totalDeuda)-((parseFloat(montoAbonoEf)||0)+(parseFloat(montoAbonoTr)||0))))}
                  </div>
                )}
              </div>
            )}
            {(formaAbono === 'transferencia' || formaAbono === 'mixto') && (
              <>
                <label className="fld">📎 Comprobante (opcional)</label>
                <button className="btn ghost full" onClick={()=>fileAbonoRef.current?.click()} style={{marginBottom:6}}>
                  {fotoAbono ? '✓ Foto adjunta · Cambiar' : '📷 Adjuntar comprobante'}
                </button>
                <input ref={fileAbonoRef} type="file" accept="image/*"
                  onChange={e=>procesarArchivo(e.target.files[0], setFotoAbono)} style={{display:'none'}}/>
              </>
            )}
          </>
        )}

        {/* === REPROGRAMAR === */}
        {modo === 'reprogramar' && (
          <>
            {venta.reprogramado && (
              <div style={{padding:'8px 10px', background:'var(--warn-bg)', borderRadius:8,
                fontSize:12, color:'var(--warn)', fontWeight:600, marginBottom:10}}>
                ⚠️ Este cliente ya fue reprogramado {venta.reprogramaciones||1} vez{(venta.reprogramaciones||1)>1?'es':''}. 
                Quedará marcado como {venta.reprogramaciones>=1?`${(venta.reprogramaciones||1)+1}ª oportunidad`:'2ª oportunidad'}.
              </div>
            )}
            {!venta.reprogramado && (
              <div style={{padding:'8px 10px', background:'var(--bg-2)', borderRadius:8, fontSize:12, marginBottom:10}}>
                El cliente quedará marcado con 🔄 <strong>2ª oportunidad</strong> visible en cobros.
              </div>
            )}
            <label className="fld">Nueva fecha de compromiso</label>
            <input type="date" className="inp" value={nuevaFecha}
              onChange={e=>setNuevaFecha(e.target.value)}
              min={todayStr()}/>
            <label className="fld">Observaciones (opcional)</label>
            <input type="text" className="inp" value={obsReprog}
              onChange={e=>setObsReprog(e.target.value)}
              placeholder="Ej: acordó pagar el viernes en efectivo"/>
          </>
        )}

        <div className="actions" style={{marginTop:14}}>
          <button className="btn ghost" onClick={onClose} disabled={saving}>Cancelar</button>
          <button className="btn accent" onClick={confirmar} disabled={saving}>
            {saving ? '...' :
              modo === 'cobro' ? '✓ Confirmar cobro' :
              modo === 'abono' ? '✓ Registrar abono' :
              '📅 Reprogramar'}
          </button>
        </div>
      </div>
    </div>
  );
}

function Facturas({ session, onToast }) {
  const isAdmin = session.role === 'admin';
  const { list: ventas, loading } = useFirebaseList('ventas');
  const { list: clientes } = useFirebaseList('clientes');
  const [tab, setTab] = useState('por_emitir');
  const [filtroVendedor, setFiltroVendedor] = useState('todos');
  const [modalGrupo, setModalGrupo] = useState(null);
  const [modalSinCobrar, setModalSinCobrar] = useState(null); // grupo de emitidas sin cobrar
  const [busqueda, setBusqueda] = useState('');
  const [verPdf, setVerPdf] = useState(null);

  const facturas = useMemo(() => {
    let arr = ventas.filter(v => v.tipoDoc === 'factura' && ventaActiva(v));
    if (!isAdmin) arr = arr.filter(v => v.vendedorId === session.id);
    else if (filtroVendedor !== 'todos') arr = arr.filter(v => v.vendedorId === filtroVendedor);
    return arr;
  }, [ventas, isAdmin, session, filtroVendedor]);

  // Agrupar por cliente — con info de cobro
  const gruposPorCliente = useMemo(() => {
    const map = {};
    facturas.forEach(v => {
      if (!map[v.clienteId]) map[v.clienteId] = [];
      map[v.clienteId].push(v);
    });
    return Object.entries(map).map(([clienteId, vs]) => {
      const cli = clientes.find(c => c.id === clienteId);
      const sinEmitir = vs.filter(v => !v.facturaEmitida)
        .sort((a,b) => (a.creadoEn||'').localeCompare(b.creadoEn||''));
      const emitidas = vs.filter(v => v.facturaEmitida)
        .sort((a,b) => (b.facturaEmitidaEn||'').localeCompare(a.facturaEmitidaEn||''));

      // Emitidas con cobro pendiente (formaPago pendiente y no cobradas)
      const emitidasSinCobrar = emitidas.filter(v =>
        v.cobroEstado !== 'cobrado' &&
        (v.formaPago === 'pendiente' || v.cobroEstado === 'pendiente')
      );
      const emitidasCobradas = emitidas.filter(v =>
        v.cobroEstado === 'cobrado' ||
        (v.formaPago !== 'pendiente' && v.cobroEstado !== 'pendiente')
      );

      const totalSinEmitir = sinEmitir.reduce((s,v) => s + (v.totalBruto||0), 0);
      const totalEmitidas = emitidas.reduce((s,v) => s + (v.totalBruto||0), 0);
      const totalSinCobrar = emitidasSinCobrar.reduce((s,v) => s + (v.totalBruto||0), 0);
      const totalCobrado = emitidasCobradas.reduce((s,v) => s + (v.totalBruto||0), 0);

      const hoyD = new Date();
      const masAntigua = sinEmitir.length > 0
        ? sinEmitir.reduce((a,b) => (a.creadoEn||'') < (b.creadoEn||'') ? a : b) : null;
      const diasAtrasada = masAntigua
        ? Math.floor((hoyD - new Date(masAntigua.creadoEn)) / 86400000) : 0;

      return {
        clienteId, cliente: cli,
        sinEmitir, emitidas, emitidasSinCobrar, emitidasCobradas,
        totalSinEmitir, totalEmitidas, totalSinCobrar, totalCobrado,
        diasAtrasada,
      };
    });
  }, [facturas, clientes]);

  const gruposFiltrados = useMemo(() => {
    if (!busqueda.trim()) return gruposPorCliente;
    const q = busqueda.toLowerCase().trim();
    return gruposPorCliente.filter(g =>
      (g.cliente?.razonSocial||'').toLowerCase().includes(q) ||
      (g.cliente?.rut||'').toLowerCase().includes(q)
    );
  }, [gruposPorCliente, busqueda]);

  const porEmitir   = gruposFiltrados.filter(g => g.sinEmitir.length > 0);
  const sinCobrar   = gruposFiltrados.filter(g => g.emitidasSinCobrar.length > 0);
  const soloEmitidas = gruposFiltrados.filter(g => g.emitidas.length > 0 && g.sinEmitir.length === 0);
  const atrasadas   = porEmitir.filter(g => g.diasAtrasada > 7);

  const totalGlobalSinEmitir = porEmitir.reduce((s,g) => s + g.totalSinEmitir, 0);
  const totalGlobalSinCobrar = sinCobrar.reduce((s,g) => s + g.totalSinCobrar, 0);
  const totalGlobalEmitidas  = soloEmitidas.reduce((s,g) => s + g.totalEmitidas, 0);

  return (
    <div className="pad">
      <h2 className="section-title">📄 Facturas</h2>
      <div className="section-sub">{isAdmin ? 'Consolidado por cliente' : 'Mis clientes'}</div>

      {/* El banner del sábado aparece en el dashboard Hoy — aquí solo el listado */}

      <div className="card">
        <input type="search" className="inp" placeholder="🔍 Razón social o RUT..."
          value={busqueda} onChange={e=>setBusqueda(e.target.value)}
          style={{marginBottom: isAdmin?8:0}}/>
        {isAdmin && (
          <select className="inp" value={filtroVendedor}
            onChange={e=>setFiltroVendedor(e.target.value)} style={{marginBottom:0}}>
            <option value="todos">Todos los vendedores</option>
            {VENDEDORES.map(v => <option key={v.id} value={v.id}>{v.name}</option>)}
          </select>
        )}
      </div>

      {/* Tabs — scroll horizontal en móvil */}
      <div className="tabs" style={{overflowX:'auto', whiteSpace:'nowrap'}}>
        <button className={`tab ${tab==='por_emitir'?'active':''}`} onClick={()=>setTab('por_emitir')}>
          📝 Por emitir{porEmitir.length>0?` (${porEmitir.length})`:''}
        </button>
        <button className={`tab ${tab==='sin_cobrar'?'active':''}`} onClick={()=>setTab('sin_cobrar')}
          style={{color: sinCobrar.length>0 ? 'var(--warn)' : undefined}}>
          ⏳ Sin cobrar{sinCobrar.length>0?` (${sinCobrar.length})`:''}
        </button>
        <button className={`tab ${tab==='emitidas'?'active':''}`} onClick={()=>setTab('emitidas')}>
          ✅ Emitidas{soloEmitidas.length>0?` (${soloEmitidas.length})`:''}
        </button>
        <button className={`tab ${tab==='atrasadas'?'active':''}`} onClick={()=>setTab('atrasadas')}
          style={{color: atrasadas.length>0 ? 'var(--bad)' : undefined}}>
          🚨 Atrasadas{atrasadas.length>0?` (${atrasadas.length})`:''}
        </button>
      </div>

      {/* Banners resumen */}
      {tab === 'por_emitir' && (
        <div className="card" style={{background:'var(--warn-bg)', marginBottom:10}}>
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
            <strong style={{color:'var(--warn)'}}>📝 {porEmitir.length} cliente{porEmitir.length!==1?'s':''} por facturar</strong>
            <strong style={{fontFamily:'JetBrains Mono, monospace', color:'var(--warn)'}}>{fmt$(totalGlobalSinEmitir)}</strong>
          </div>
          <div style={{fontSize:11, marginTop:4, color:'var(--warn)'}}>
            Las entregas pendientes de cobro se muestran marcadas dentro del consolidado
          </div>
        </div>
      )}
      {tab === 'sin_cobrar' && (
        <div className="card" style={{background:'var(--warn-bg)', marginBottom:10}}>
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
            <strong style={{color:'var(--warn)'}}>⏳ {sinCobrar.length} cliente{sinCobrar.length!==1?'s':''} con facturas sin cobrar</strong>
            <strong style={{fontFamily:'JetBrains Mono, monospace', color:'var(--warn)'}}>{fmt$(totalGlobalSinCobrar)}</strong>
          </div>
          <div style={{fontSize:11, marginTop:4, color:'var(--ink-soft)'}}>
            Se eliminan automáticamente al registrar el cobro en el módulo Cobros
          </div>
        </div>
      )}
      {tab === 'emitidas' && (
        <div className="card" style={{background:'var(--good-bg)', marginBottom:10}}>
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
            <strong style={{color:'var(--good)'}}>✅ {soloEmitidas.length} cliente{soloEmitidas.length!==1?'s':''} con facturas emitidas y cobradas</strong>
            <strong style={{fontFamily:'JetBrains Mono, monospace', color:'var(--good)'}}>{fmt$(totalGlobalEmitidas)}</strong>
          </div>
        </div>
      )}
      {tab === 'atrasadas' && (
        <div className="card" style={{background:'var(--bad-bg)', marginBottom:10}}>
          <strong style={{color:'var(--bad)'}}>🚨 {atrasadas.length} cliente{atrasadas.length!==1?'s':''} con facturas atrasadas +7 días</strong>
        </div>
      )}

      {/* Listado */}
      {tab === 'sin_cobrar' ? (
        sinCobrar.length === 0
          ? <div className="empty">✓ Sin facturas pendientes de cobro</div>
          : sinCobrar.map(g => (
              <CardFacturaSinCobrar
                key={g.clienteId}
                grupo={g}
                session={session}
                onAbrir={() => setModalSinCobrar(g)}
                onVerPdf={setVerPdf}
              />
            ))
      ) : (
        (() => {
          const lista = tab === 'por_emitir' ? porEmitir
            : tab === 'emitidas' ? soloEmitidas : atrasadas;
          return lista.length === 0
            ? <div className="empty">{tab==='por_emitir'?'✓ Todos al día':tab==='emitidas'?'Sin emitidas aún':'Sin atrasadas'}</div>
            : lista.map(g => (
                <CardClienteFactura
                  key={g.clienteId}
                  grupo={g}
                  session={session}
                  onAbrir={() => setModalGrupo(g)}
                  onVerPdf={setVerPdf}
                  atrasada={tab==='atrasadas'}
                />
              ));
        })()
      )}

      {modalGrupo && (
        <ModalFacturaConsolidada
          grupo={modalGrupo}
          session={session}
          onClose={() => setModalGrupo(null)}
          onToast={onToast}
        />
      )}

      {modalSinCobrar && (
        <ModalFacturasSinCobrar
          grupo={modalSinCobrar}
          session={session}
          onClose={() => setModalSinCobrar(null)}
          onToast={onToast}
        />
      )}

      {verPdf && (
        <div className="modal-bg" onClick={()=>setVerPdf(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <h3>📄 PDF adjunto</h3>
            <div style={{textAlign:'center', padding:10}}>
              {verPdf.startsWith('data:image')
                ? <img src={verPdf} alt="Factura" style={{maxWidth:'100%', maxHeight:'70vh', borderRadius:6}}/>
                : <a href={verPdf} download="factura.pdf" className="btn accent">⬇️ Descargar PDF</a>}
            </div>
            <div className="actions">
              <button className="btn accent" onClick={()=>setVerPdf(null)}>Cerrar</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// Card agrupado por cliente
function CardClienteFactura({ grupo: g, session, onAbrir, onVerPdf, atrasada }) {
  const isAdmin = session.role === 'admin';
  const tieneEmitidas = g.emitidas.length > 0;
  const tieneSinEmitir = g.sinEmitir.length > 0;
  const borderColor = atrasada ? 'var(--bad)' : tieneSinEmitir ? 'var(--warn)' : 'var(--good)';

  // Período de las ventas sin emitir
  const fechas = g.sinEmitir.map(v => isoToLocalDate(v.fecha || v.creadoEn)).sort();
  const periodoStr = fechas.length > 1
    ? `${fechas[0]} → ${fechas[fechas.length-1]}`
    : fechas[0] || '';

  return (
    <div className="card" style={{borderLeft:`4px solid ${borderColor}`, cursor:'pointer'}} onClick={onAbrir}>

// Modal consolidado: muestra todas las ventas sin emitir de un cliente y emite una sola factura
function ModalFacturaConsolidada({ grupo, session, onClose, onToast }) {
  const { cliente, sinEmitir, emitidas } = grupo;
  const [pdfFile, setPdfFile] = useState(null);
  const [numeroFactura, setNumeroFactura] = useState('');
  const [saving, setSaving] = useState(false);
  const fileInputRef = React.useRef(null);
  const { data: preciosData } = useFirebaseValue('precios');
  const { data: configRedondeo } = useFirebaseValue('config/redondeo');

  const procesarPdf = (file) => {
    if (!file) return;
    if (file.size > 8 * 1024 * 1024) return onToast('Archivo muy grande (máx 8 MB)','error');
    const reader = new FileReader();
    reader.onload = e => setPdfFile(e.target.result);
    reader.readAsDataURL(file);
  };

  // Calcular líneas de detalle por venta
  const ventasConDetalle = useMemo(() => {
    const modoRedondeo = configRedondeo?.modo || 'ninguno';
    return sinEmitir.map(venta => {
      const fechaVenta = isoToLocalDate(venta.fecha || venta.creadoEn);
      const descPorCal = venta.descuentosPorCalibre || {};
      const lineas = (venta.items || []).map(it => {
        const fmt = it.formato || (it.cajas > 0 ? 'caja' : 'bandeja');
        const cantidad = fmt === 'caja' ? (it.cajas||0) : (it.bandejas||0);
        const unidadesPorFmt = FORMATOS[fmt]?.unidades || 180;
        const mermas = it.mermas || 0;
        const unidadesEfectivas = (it.unidadesTotal || cantidad * unidadesPorFmt) - mermas;
        let precioNetoXFmt = 0, totalNeto = 0, fuentePrecio = 'historico';
        const pricing = computePrice(preciosData, fechaVenta, it.calibre, fmt, 'factura');
        if (pricing) {
          const brutoRedondeado = aplicarRedondeo(pricing.ventaBrutoUnit * unidadesPorFmt, modoRedondeo);
          const netoXFmt = brutoRedondeado / (1 + IVA_RATE);
          const netoXUnit = netoXFmt / unidadesPorFmt;
          const descNetoUnit = (descPorCal[it.calibre]||0) / (1+IVA_RATE);
          precioNetoXFmt = Math.round(netoXFmt);
          totalNeto = Math.round((netoXUnit - descNetoUnit) * unidadesEfectivas);
        } else {
          fuentePrecio = 'guardado';
          totalNeto = it.subtotalNeto || it.totalNeto || 0;
          precioNetoXFmt = unidadesEfectivas > 0
            ? Math.round(totalNeto / unidadesEfectivas * unidadesPorFmt) : 0;
        }
        if (cantidad === 0) return null;
        return { calibre: it.calibre, formato: fmt, cantidad, precioNetoXFmt, totalNeto, mermas, descUnit: descPorCal[it.calibre]||0, fuentePrecio };
      }).filter(Boolean);

      const totalNetoVenta = lineas.reduce((s,l) => s + l.totalNeto, 0);
      return { venta, lineas, totalNetoVenta };
    });
  }, [sinEmitir, preciosData, configRedondeo]);

  // Totales globales del consolidado
  const totalNetoConsolidado = ventasConDetalle.reduce((s,v) => s + v.totalNetoVenta, 0);
  const totalBrutoConsolidado = sinEmitir.reduce((s,v) => s + (v.totalBruto||0), 0);
  const totalIvaConsolidado = totalBrutoConsolidado - totalNetoConsolidado;

  // Período del consolidado
  const fechasVentas = sinEmitir.map(v => isoToLocalDate(v.fecha || v.creadoEn)).sort();
  const periodoStr = fechasVentas.length > 1
    ? `${fechasVentas[0]} al ${fechasVentas[fechasVentas.length-1]}`
    : fechasVentas[0] || '';

  const marcarTodasEmitidas = async () => {
    if (!numeroFactura.trim()) return onToast('Ingresa el número de factura','error');
    setSaving(true);
    try {
      for (const v of sinEmitir) {
        const updates = {
          facturaEmitida: true,
          facturaEmitidaEn: nowISO(),
          facturaEmitidaPor: session.id,
          numeroFactura: numeroFactura.trim(),
          facturaConsolidada: true,
          facturaConsolidadaIds: sinEmitir.map(vv => vv.id),
        };
        if (pdfFile) updates.facturaPdf = pdfFile;
        await fbUpdate(`ventas/${v.id}`, updates);
      }
      await fbLog(session.id, 'factura_consolidada', 'ventas', {
        cliente: cliente?.razonSocial,
        ventas: sinEmitir.length,
        numero: numeroFactura,
        total: totalBrutoConsolidado,
      });
      // Notificar al admin si fue emitida por un vendedor
      if (session.role !== 'admin') {
        await crearNotificacion(session, {
          tipo: 'factura_emitida',
          titulo: '📄 Factura emitida por vendedor',
          mensaje: `${session.name} emitió factura N°${numeroFactura} a ${cliente?.razonSocial} · ${fmt$(totalBrutoConsolidado)}`,
          link: 'facturas',
          prioridad: 'normal',
        });
      }
      onToast(`✓ ${sinEmitir.length} venta${sinEmitir.length>1?'s':''} marcadas como factura N°${numeroFactura}`,'success');
      onClose();
    } catch(e) { console.error(e); onToast('Error al guardar','error'); }
    setSaving(false);
  };

  const enviarWhatsApp = async () => {
    const tel = cliente?.telefonoContacto || cliente?.telefono;
    if (!tel) return onToast('Cliente sin teléfono','error');

    const msg = `🥚 *INTEGRAL SUR · Distribuidora*\n\nHola ${cliente?.contacto || cliente?.razonSocial}, esperamos que todo vaya muy bien 😊\n\nLe enviamos su factura del período ${periodoStr}:\n\n📄 *Factura N° ${numeroFactura || '(sin número)'}*\n📦 ${sinEmitir.length} entrega${sinEmitir.length>1?'s':''}\n💰 Total: ${fmt$(totalBrutoConsolidado)}\n\nAdjuntamos el PDF de su factura.\n\nQuedamos atentos ante cualquier consulta. Fue un gusto atenderle esta semana.\n\n¡Gracias por su preferencia y confianza en nosotros! 🙏🥚`;

    // Si hay PDF adjunto, usar Web Share API para compartir PDF + mensaje juntos
    if (pdfFile && navigator.canShare) {
      try {
        // Convertir base64 a File
        const res = await fetch(pdfFile);
        const blob = await res.blob();
        const fileName = `Factura_${numeroFactura || 'SN'}_${cliente?.razonSocial?.replace(/\s+/g,'_') || 'cliente'}.pdf`;
        const file = new File([blob], fileName, { type: blob.type });

        if (navigator.canShare({ files: [file] })) {
          await navigator.share({
            text: msg,
            files: [file],
          });
          onToast('✓ Compartido con el PDF adjunto','success');
          return;
        }
      } catch(e) {
        if (e.name !== 'AbortError') {
          // Si falla el share, continuar con WhatsApp normal
          console.warn('Share API error:', e);
        } else {
          return; // Usuario canceló
        }
      }
    }

    // Fallback: abrir WhatsApp con el mensaje (sin PDF si no soporta share)
    if (!pdfFile && !confirm('No hay PDF adjunto. ¿Enviar solo el mensaje de texto?')) return;
    abrirWhatsApp(tel, msg);
    if (pdfFile) onToast('📲 WhatsApp abierto · adjunta el PDF manualmente desde tu galería','warn');
    else onToast('📲 WhatsApp abierto','success');
  };

  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <h3>📄 Factura consolidada</h3>

        {/* Cliente */}
        <div className="card" style={{background:'var(--bg-2)', marginBottom:10}}>
          <strong style={{fontSize:14}}>{cliente?.razonSocial}</strong>
          {cliente?.rut && <div style={{fontSize:12, fontFamily:'JetBrains Mono, monospace', marginTop:3}}>RUT: <strong>{cliente.rut}</strong></div>}
          {cliente?.giro && <div style={{fontSize:11, color:'var(--ink-soft)', marginTop:2}}>Giro: {cliente.giro}</div>}
          {cliente?.direccion && <div style={{fontSize:11, color:'var(--ink-soft)', marginTop:2}}>📍 {cliente.direccion}{cliente.comuna?`, ${cliente.comuna}`:''}</div>}
          {(cliente?.telefonoContacto||cliente?.telefono) && <div style={{fontSize:11, color:'var(--ink-soft)', marginTop:2}}>📞 {cliente.telefonoContacto||cliente.telefono}</div>}
          <div style={{marginTop:6, padding:'4px 8px', background:'var(--accent-soft)', borderRadius:6, fontSize:12, fontWeight:600}}>
            📅 Período: {periodoStr} · {sinEmitir.length} entrega{sinEmitir.length!==1?'s':''}
          </div>
        </div>

        {/* Detalle por venta */}
        {ventasConDetalle.map(({ venta, lineas, totalNetoVenta }, vi) => {
          const esPendienteCobro = venta.cobroEstado !== 'cobrado' &&
            (venta.formaPago === 'pendiente' || venta.cobroEstado === 'pendiente');
          return (
          <div key={venta.id} style={{marginBottom:10, border:`1px solid ${esPendienteCobro?'var(--warn)':'var(--line)'}`, borderRadius:10, overflow:'hidden'}}>
            {/* Encabezado de la venta */}
            <div style={{padding:'8px 12px', background: esPendienteCobro ? 'var(--warn-bg)' : 'var(--bg-2)', borderBottom:'1px solid var(--line)', display:'flex', justifyContent:'space-between', alignItems:'center'}}>
              <span style={{fontSize:12, fontWeight:700}}>
                📦 {new Date(venta.creadoEn).toLocaleDateString('es-CL', {weekday:'long', day:'numeric', month:'long'})}
              </span>
              <div style={{display:'flex', alignItems:'center', gap:6}}>
                {esPendienteCobro
                  ? <span style={{fontSize:10, fontWeight:700, color:'var(--warn)', background:'var(--warn-bg)', padding:'2px 6px', borderRadius:4, border:'1px solid var(--warn)'}}>⏳ Sin cobrar</span>
                  : <span style={{fontSize:10, fontWeight:700, color:'var(--good)', background:'var(--good-bg)', padding:'2px 6px', borderRadius:4}}>✅ Cobrada</span>
                }
                <span style={{fontSize:12, fontFamily:'JetBrains Mono, monospace', color:'var(--ink-soft)'}}>
                  {new Date(venta.creadoEn).toLocaleTimeString('es-CL', {hour:'2-digit', minute:'2-digit'})}
                </span>
              </div>
            </div>

            {/* Líneas de producto */}
            <div style={{padding:'8px 12px'}}>
              {lineas.map((l, li) => {
                const unidadesPorFmt = FORMATOS[l.formato]?.unidades || 180;
                const precioBrutoXFmt = Math.round(l.precioNetoXFmt * (1 + IVA_RATE));
                const precioBrutoXUnit = Math.round(precioBrutoXFmt / unidadesPorFmt);
                const precioNetoXUnit  = Math.round(l.precioNetoXFmt / unidadesPorFmt * 100) / 100;
                return (
                <div key={li} style={{
                  fontSize:12, padding:'8px 0',
                  borderBottom: li < lineas.length-1 ? '1px dashed var(--line)' : 'none',
                  fontFamily:'JetBrains Mono, monospace',
                }}>
                  <div style={{fontWeight:700, fontSize:13, fontFamily:'Manrope, sans-serif', marginBottom:4}}>
                    {l.calibre} · {l.cantidad} {l.formato==='caja'?`caja${l.cantidad>1?'s':''}`:
                      `bandeja${l.cantidad>1?'s':''}`}
                    {l.mermas > 0 && <span style={{color:'var(--warn)', fontSize:11}}> ({l.mermas}u merma)</span>}
                  </div>
                  <div style={{display:'grid', gridTemplateColumns:'1fr auto', gap:'2px 8px', fontSize:11}}>
                    <span style={{color:'var(--ink-soft)'}}>Precio bruto x u (c/IVA):</span>
                    <span style={{textAlign:'right'}}>{fmt$(precioBrutoXUnit)}</span>
                    <span style={{color:'var(--ink-soft)'}}>Precio neto x u (s/IVA):</span>
                    <span style={{textAlign:'right'}}>{fmt$(precioNetoXUnit)}</span>
                    <span style={{color:'var(--ink-soft)'}}>Neto x {l.formato==='caja'?'caja':'bandeja'}:</span>
                    <span style={{textAlign:'right'}}>{fmt$(l.precioNetoXFmt)}</span>
                    {l.descUnit > 0 && <>
                      <span style={{color:'var(--warn)'}}>Descuento x u:</span>
                      <span style={{textAlign:'right', color:'var(--warn)'}}>-{fmt$(Math.round(l.descUnit/(1+IVA_RATE)))}</span>
                    </>}
                    <span style={{color:'var(--ink-soft)', borderTop:'1px solid var(--line)', paddingTop:3, marginTop:2}}>Total bruto:</span>
                    <span style={{textAlign:'right', borderTop:'1px solid var(--line)', paddingTop:3, marginTop:2}}>{fmt$(Math.round(l.totalNeto*(1+IVA_RATE)))}</span>
                    <span style={{color:'var(--accent)', fontWeight:700, fontSize:12}}>Total neto:</span>
                    <strong style={{textAlign:'right', color:'var(--accent)', fontSize:12}}>{fmt$(l.totalNeto)}</strong>
                  </div>
                  {l.fuentePrecio==='guardado' && <div style={{fontSize:10, color:'var(--ink-mute)', marginTop:4}}>⚠️ Sin histórico de precios · usando datos guardados</div>}
                </div>
                );
              })}

              {/* Subtotal de la venta */}
              <div style={{display:'flex', justifyContent:'space-between', marginTop:8, padding:'6px 0', borderTop:'2px solid var(--line)', fontSize:12, fontFamily:'JetBrains Mono, monospace'}}>
                <span style={{color:'var(--ink-soft)'}}>Subtotal neto esta entrega:</span>
                <strong>{fmt$(totalNetoVenta)}</strong>
              </div>
            </div>
          </div>
          );
        })}

        {/* Totales consolidados */}
        <div style={{padding:'12px 14px', background:'var(--accent-soft)', borderRadius:10, fontFamily:'JetBrains Mono, monospace', fontSize:13}}>
          <div style={{fontWeight:700, marginBottom:8, fontSize:12, textTransform:'uppercase', letterSpacing:1, color:'var(--ink-soft)', fontFamily:'Manrope, sans-serif'}}>

            <span style={{color:'var(--ink-soft)'}}>Neto:</span><strong>{fmt$(totalNetoConsolidado)}</strong>

        {/* Facturas ya emitidas de este cliente */}
        {emitidas.length > 0 && (
          <div style={{marginTop:10, padding:'8px 12px', background:'var(--good-bg)', borderRadius:8, fontSize:12}}>
            <strong style={{color:'var(--good)'}}>✅ Facturas ya emitidas de este cliente</strong>
            {emitidas.map(v => (
              <div key={v.id} style={{marginTop:4, color:'var(--good)', fontFamily:'JetBrains Mono, monospace', fontSize:11}}>
                N°{v.numeroFactura} · {isoToLocalDate(v.facturaEmitidaEn)} · {fmt$(v.totalBruto)}
              </div>
            ))}
          </div>
        )}

        {/* Acciones: emitir */}
        {sinEmitir.length > 0 && (
          <>
            <label className="fld" style={{marginTop:14}}>N° de factura SII *</label>
            <input type="text" className="inp" value={numeroFactura}
              onChange={e=>setNumeroFactura(e.target.value)} placeholder="Ej: 12345"/>

            <label className="fld">📎 Adjuntar PDF (opcional)</label>
            <button className="btn ghost full" onClick={()=>fileInputRef.current?.click()} style={{padding:'10px'}}>
              {pdfFile ? '✓ PDF adjuntado · Cambiar' : '📂 Seleccionar PDF de la factura'}
            </button>
            <input ref={fileInputRef} type="file" accept=".pdf,image/*"
              onChange={e=>procesarPdf(e.target.files[0])} style={{display:'none'}}/>
            {pdfFile && <div style={{fontSize:11, color:'var(--good)', marginTop:4}}>✓ Archivo adjunto listo</div>}

            <div className="actions" style={{marginTop:14}}>
              <button className="btn ghost" onClick={onClose}>Cancelar</button>
              {(cliente?.telefonoContacto||cliente?.telefono) && (
                <button className="btn" onClick={enviarWhatsApp}
                  style={{background:'#25D366', color:'white', border:'none', flex:1}}>
                  {pdfFile ? '📲 Enviar con PDF' : '📲 WhatsApp'}
                </button>
              )}
              <button className="btn accent" onClick={marcarTodasEmitidas}
                disabled={saving || !numeroFactura.trim()}>
                {saving ? '...' : `✓ Emitir (${sinEmitir.length} venta${sinEmitir.length>1?'s':''})`}
              </button>
            </div>
          </>
        )}

        {sinEmitir.length === 0 && (
          <div className="actions" style={{marginTop:14}}>
            <button className="btn accent full" onClick={onClose}>Cerrar</button>
          </div>
        )}
      </div>
    </div>
  );
}

function Cobros({ session, onToast, tabInicial, filtroFechaInicial }) {
  const isAdmin = session.role === 'admin';
  const { list: ventas, loading } = useFirebaseList('ventas');
  const { list: clientes } = useFirebaseList('clientes');
  const [filtroVendedor, setFiltroVendedor] = useState('todos');
  const [tab, setTab] = useState(tabInicial || 'pendientes');
  const [filtroCobradoHoy, setFiltroCobradoHoy] = useState(!!filtroFechaInicial);
  const [modalCobro, setModalCobro] = useState(null);
  const [modalTransf, setModalTransf] = useState(null);

  // Si se navega desde el banner de hoy, activar automáticamente el filtro
  useEffect(() => {
    if (tabInicial) setTab(tabInicial);
    if (filtroFechaInicial) setFiltroCobradoHoy(true);
  }, [tabInicial, filtroFechaInicial]);

  const hoy = todayStr();

  // Ventas que tienen deuda pendiente (créditos):
  // - formaPago='pendiente' (crédito puro)
  // - formaPago='mixto' con parte pendiente > 0
  const ventasCredito = useMemo(() => {
    let arr = ventas.filter(v => {
      if (v.formaPago === 'pendiente') return true;
      if (v.formaPago === 'mixto' && v.montosMixto && (v.montosMixto.pendiente||0) > 0) return true;
      return false;
    });
    if (!isAdmin) arr = arr.filter(v => v.vendedorId === session.id);
    else if (filtroVendedor !== 'todos') arr = arr.filter(v => v.vendedorId === filtroVendedor);
    return arr;
  }, [ventas, session, isAdmin, filtroVendedor]);

  // Transferencias PENDIENTES de días anteriores (NO de hoy)
  // El día de la venta ya pasó y aún no se confirmó → se vuelve cobro urgente
  const transferenciasAntiguas = useMemo(() => {
    let arr = ventas.filter(v => {
      if (!transferenciaPendienteConfirmar(v)) return false;
      const fechaV = isoToLocalDate(v.fecha || v.creadoEn);
      return fechaV && fechaV < hoy;
    });
    if (!isAdmin) arr = arr.filter(v => v.vendedorId === session.id);
    else if (filtroVendedor !== 'todos') arr = arr.filter(v => v.vendedorId === filtroVendedor);
    // Ordenar por fecha (más antiguas primero = más urgentes)
    return arr.sort((a,b) => (a.creadoEn || '').localeCompare(b.creadoEn || ''));
  }, [ventas, session, isAdmin, filtroVendedor, hoy]);

  // Helper: monto realmente PENDIENTE de una venta (considera abonos)
  const montoPendienteDe = (v) => saldoVenta(v);

  const pendientes = useMemo(() =>
    ventasCredito.filter(v => v.cobroEstado === 'pendiente')
      .sort((a,b) => (a.fechaCompromiso || a.creadoEn || '').localeCompare(b.fechaCompromiso || b.creadoEn || '')),
    [ventasCredito]);

  const historico = useMemo(() => {
    let arr = ventasCredito.filter(v => v.cobroEstado === 'cobrado');
    // Si viene del banner de hoy, filtrar solo los cobrados hoy
    if (filtroCobradoHoy) {
      arr = arr.filter(v => v.cobradoEn && isoToLocalDate(v.cobradoEn) === hoy);
    }
    return arr.sort((a,b) => (b.cobradoEn || b.creadoEn || '').localeCompare(a.cobradoEn || a.creadoEn || ''));
  }, [ventasCredito, filtroCobradoHoy, hoy]);

  const totalPendiente = pendientes.reduce((s,v) => s + montoPendienteDe(v), 0);
  const totalHistorico = historico.reduce((s,v) => s + (v.totalBruto||0), 0);

  // Agrupar pendientes por cliente y ordenar por URGENCIA
  // Prioridad: vencidos (más antiguos primero) → vence hoy → por vencer (menor a mayor plazo) → al día → sin fecha
  const pendientesPorCliente = useMemo(() => {
    const g = {};
    pendientes.forEach(v => {
      if (!g[v.clienteId]) g[v.clienteId] = { ventas: [], total: 0, minDias: 99999, urgencia: 99 };
      g[v.clienteId].ventas.push(v);
      g[v.clienteId].total += montoPendienteDe(v);
      const est = getDeudaEstado(v.fechaCompromiso);
      let urg = 4;
      if (est.tipo === 'vencida') urg = 0;
      else if (est.tipo === 'venceHoy') urg = 1;
      else if (est.tipo === 'porVencer') urg = 2;
      else if (est.tipo === 'alDia') urg = 3;
      if (urg < g[v.clienteId].urgencia) {
        g[v.clienteId].urgencia = urg;
        g[v.clienteId].minDias = est.dias != null ? est.dias : 99999;
      } else if (urg === g[v.clienteId].urgencia && est.dias != null && est.dias < g[v.clienteId].minDias) {
        g[v.clienteId].minDias = est.dias;
      }
    });
    // Ordenar ventas internas de cada cliente por urgencia
    Object.values(g).forEach(data => {
      data.ventas.sort((a, b) => {
        const ea = getDeudaEstado(a.fechaCompromiso);
        const eb = getDeudaEstado(b.fechaCompromiso);
        const ua = ea.tipo === 'vencida' ? 0 : ea.tipo === 'venceHoy' ? 1 : ea.tipo === 'porVencer' ? 2 : ea.tipo === 'alDia' ? 3 : 4;
        const ub = eb.tipo === 'vencida' ? 0 : eb.tipo === 'venceHoy' ? 1 : eb.tipo === 'porVencer' ? 2 : eb.tipo === 'alDia' ? 3 : 4;
        if (ua !== ub) return ua - ub;
        return (ea.dias || 0) - (eb.dias || 0);
      });
    });
    return Object.entries(g).map(([clienteId, data]) => ({ clienteId, ...data }))
      .sort((a, b) => {
        if (a.urgencia !== b.urgencia) return a.urgencia - b.urgencia;
        if (a.minDias !== b.minDias) return a.minDias - b.minDias;
        return b.total - a.total;
      });
  }, [pendientes]);

  const [filtroUrgencia, setFiltroUrgencia] = useState('todos');

  const pendientesFiltrados = useMemo(() => {
    if (filtroUrgencia === 'todos') return pendientesPorCliente;
    const map = { 'vencido': 0, 'hoy': 1, 'futuro': [2,3,4] };
    const urg = map[filtroUrgencia];
    return pendientesPorCliente.filter(g =>
      Array.isArray(urg) ? urg.includes(g.urgencia) : g.urgencia === urg
    );
  }, [pendientesPorCliente, filtroUrgencia]);

  const marcarCobrado = async (v) => {
    if (!confirm(`¿Marcar como cobrado ${fmt$(v.totalBruto)}?`)) return;
    try {
      await fbUpdate(`ventas/${v.id}`, {
        cobroEstado: 'cobrado',
        cobradoEn: nowISO(),
        cobradoPor: session.id,
      });
      await fbLog(session.id, 'approve', 'cobros', { ventaId: v.id, total: v.totalBruto });
      // Si no es admin notificar; si es admin no necesita notificarse a sí mismo
      if (session.role !== 'admin') {
        const cli = clientes.find(c => c.id === v.clienteId);
        await crearNotificacion(session, {
          tipo: 'cobro_recibido',
          titulo: '💰 Cobro registrado',
          mensaje: `${session.name || 'Vendedor'} cobró ${fmt$(v.totalBruto)} a ${cli?.razonSocial || 'cliente'}`,
          link: 'cobros',
          ventaId: v.id,
          clienteId: v.clienteId,
          prioridad: 'normal',
        });
      }
      onToast('Marcado como cobrado','success');
    } catch(e) { onToast('Error','error'); }
  };

  const revertirCobro = async (v) => {
    if (!confirm(`¿Revertir el cobro de ${fmt$(v.totalBruto)}? Volverá a quedar como pendiente.`)) return;
    try {
      await fbUpdate(`ventas/${v.id}`, {
        cobroEstado: 'pendiente',
        cobradoEn: null,
        cobradoPor: null,
      });
      await fbLog(session.id, 'update', 'cobros', { ventaId: v.id, accion: 'revertir cobro' });
      onToast('Cobro revertido · queda pendiente','warn');
    } catch(e) { onToast('Error','error'); }
  };

  if (loading) return <div className="pad"><div className="empty">Cargando...</div></div>;

  return (
    <div className="pad">
      <h2 className="section-title">Cobros</h2>
      <div className="section-sub">{isAdmin ? 'Todos los créditos' : 'Mis créditos'}</div>

      {isAdmin && (
        <div className="card">
          <label className="fld">Filtrar por vendedor</label>
          <div style={{display:'flex', gap:4}}>
            <button onClick={()=>setFiltroVendedor('todos')} className="btn sm" style={{flex:1, background: filtroVendedor==='todos'?'var(--ink)':'transparent', color: filtroVendedor==='todos'?'var(--ink-on)':'var(--ink-soft)', border:'1.5px solid var(--line)'}}>Todos</button>
            {VENDEDORES.map(v => (
              <button key={v.id} onClick={()=>setFiltroVendedor(v.id)} className="btn sm" style={{flex:1, background: filtroVendedor===v.id?'var(--ink)':'transparent', color: filtroVendedor===v.id?'var(--ink-on)':'var(--ink-soft)', border:'1.5px solid var(--line)'}}>{v.name}</button>
            ))}
          </div>
        </div>
      )}

      <div className="tabs">
        <button className={`tab ${tab==='pendientes'?'active':''}`} onClick={()=>setTab('pendientes')}>
          ⏰ Créditos {pendientes.length>0 && `(${pendientes.length})`}
        </button>
        <button className={`tab ${tab==='transf_antiguas'?'active':''}`} onClick={()=>setTab('transf_antiguas')}>
          🏦 Transf. atrasadas {transferenciasAntiguas.length>0 && `(${transferenciasAntiguas.length})`}
        </button>
        <button className={`tab ${tab==='historico'?'active':''}`} onClick={()=>setTab('historico')}>
          ✓ Historial {historico.length>0 && `(${historico.length})`}
        </button>
      </div>

      {/* Banner de contexto cuando viene del dashboard */}
      {tab === 'historico' && (
        <div className="card" style={{
          background: filtroCobradoHoy ? 'var(--good-bg)' : 'var(--bg-2)',
          borderLeft: `4px solid ${filtroCobradoHoy ? 'var(--good)' : 'var(--line)'}`,
          marginBottom: 10
        }}>
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
            <div>
              <strong style={{fontSize:13, color: filtroCobradoHoy ? 'var(--good)' : 'var(--ink)'}}>
                {filtroCobradoHoy
                  ? `💰 ${historico.length} cobro${historico.length!==1?'s':''} recibido${historico.length!==1?'s':''} hoy · ${fmt$(historico.reduce((s,v)=>s+(v.totalBruto||0),0))}`
                  : `✓ Historial completo · ${historico.length} cobro${historico.length!==1?'s':''}`
                }
              </strong>
              <div style={{fontSize:11, color:'var(--ink-soft)', marginTop:2}}>
                {filtroCobradoHoy ? 'Filtrando solo cobros recibidos hoy' : 'Mostrando todos los cobros'}
              </div>
            </div>
            <button
              className="btn ghost sm"
              onClick={() => setFiltroCobradoHoy(!filtroCobradoHoy)}
              style={{fontSize:11, whiteSpace:'nowrap'}}>
              {filtroCobradoHoy ? '📋 Ver todo' : '📅 Solo hoy'}
            </button>
          </div>
        </div>
      )}

      {tab === 'pendientes' ? (
        <>
          {/* Resumen total */}
          <div className="card" style={{background:'var(--warn-bg)', color:'var(--warn)'}}>
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
              <strong>{pendientes.length} {pendientes.length===1?'venta pendiente':'ventas pendientes'}</strong>
              <strong style={{fontSize:18, fontFamily:'JetBrains Mono, monospace'}}>{fmt$(totalPendiente)}</strong>
            </div>
          </div>

          {/* Filtro por urgencia */}
          <div style={{display:'flex', gap:4, marginBottom:8, flexWrap:'wrap'}}>
            {[
              { id:'todos', lbl:'Todos', count: pendientesPorCliente.length },
              { id:'vencido', lbl:'🚨 Vencidos', count: pendientesPorCliente.filter(g=>g.urgencia===0).length },
              { id:'hoy', lbl:'⏰ Vence hoy', count: pendientesPorCliente.filter(g=>g.urgencia===1).length },
              { id:'futuro', lbl:'📅 Futuros', count: pendientesPorCliente.filter(g=>g.urgencia>=2).length },
            ].map(f => (
              <button key={f.id} onClick={()=>setFiltroUrgencia(f.id)}
                className="btn sm"
                style={{
                  flex:'1 1 70px',
                  background: filtroUrgencia===f.id ? 'var(--ink)' : 'transparent',
                  color: filtroUrgencia===f.id ? 'var(--ink-on)' : 'var(--ink-soft)',
                  border:'1.5px solid var(--line)', fontSize:11,
                  opacity: f.count === 0 ? 0.4 : 1,
                }}>
                {f.lbl}{f.count > 0 ? ` (${f.count})` : ''}
              </button>
            ))}
          </div>

          {pendientesFiltrados.length === 0 ? (
            <div className="empty">
              {filtroUrgencia === 'todos' ? '✓ Sin cobros pendientes' :
               filtroUrgencia === 'vencido' ? '✓ Sin créditos vencidos' :
               filtroUrgencia === 'hoy' ? '✓ Ninguno vence hoy' :
               '✓ Sin créditos futuros'}
            </div>
          ) :
            pendientesFiltrados.map(g => {
              const cli = clientes.find(c => c.id === g.clienteId);
              // Color del borde según urgencia del cliente
              const borderColor = g.urgencia === 0 ? 'var(--bad)' :
                                   g.urgencia === 1 ? 'var(--warn)' :
                                   g.urgencia === 2 ? '#0a84ff' :
                                   'var(--line)';
              const badgeText = g.urgencia === 0 ? `🚨 VENCIDO hace ${Math.abs(g.minDias)}d` :
                                g.urgencia === 1 ? '⏰ VENCE HOY' :
                                g.urgencia === 2 ? `⏰ Vence en ${g.minDias}d` :
                                g.urgencia === 3 ? `📅 En ${g.minDias}d` :
                                '📅 Sin fecha';
              const badgeBg = g.urgencia === 0 ? 'var(--bad-bg)' :
                              g.urgencia === 1 ? 'var(--warn-bg)' :
                              g.urgencia === 2 ? '#cce5ff' :
                              'var(--bg-2)';
              return (
                <div key={g.clienteId} className="card" style={{borderLeft: `4px solid ${borderColor}`}}>
                  <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:6}}>
                    <strong style={{flex:1}}>{cli?.razonSocial || '(cliente eliminado)'}</strong>
                    <div style={{textAlign:'right', minWidth:100}}>
                      {/* Mostrar saldo pendiente real, no el total */}
                      <div style={{fontSize:10, color:'var(--ink-soft)'}}>
                        {g.ventas.some(v => v.formaPago === 'mixto' || (v.totalAbonado||0) > 0) ? 'Saldo pendiente:' : 'Por cobrar:'}
                      </div>
                      <strong style={{color: g.urgencia <= 1 ? 'var(--bad)' : 'var(--warn)', fontFamily:'JetBrains Mono, monospace', fontSize:16}}>
                        {fmt$(g.total)}
                      </strong>
                      {/* Si hay mixto, mostrar desglose pagado vs pendiente */}
                      {g.ventas.some(v => v.formaPago === 'mixto') && (() => {
                        const totalVenta = g.ventas.reduce((s,v) => s + (v.totalBruto||0), 0);
                        const yaPagado = totalVenta - g.total;
                        return yaPagado > 0 ? (
                          <div style={{fontSize:10, color:'var(--ink-mute)', marginTop:2}}>
                            de {fmt$(totalVenta)} · pagó {fmt$(yaPagado)}
                          </div>
                        ) : null;
                      })()}
                    </div>
                  </div>
                  <div style={{display:'flex', gap:6, marginBottom:8, alignItems:'center', flexWrap:'wrap'}}>
                    <span style={{
                      padding:'2px 8px',
                      borderRadius:10,
                      background: badgeBg,
                      color: borderColor,
                      fontSize:10,
                      fontWeight:700,
                    }}>{badgeText}</span>
                    <span style={{fontSize:10, color:'var(--ink-soft)'}}>
                      {g.ventas.length} {g.ventas.length===1?'venta':'ventas'}
                    </span>
                  </div>
                  {cli && <div style={{fontSize:11, color:'var(--ink-soft)', marginBottom:8}}>👤 {cli.contacto} · 📞 {cli.telefonoContacto}</div>}
                  {cli && (cli.telefonoContacto || cli.telefono) && (
                    <button className="btn sm full" style={{background:'#25D366', color:'white', border:'none', marginBottom:8, fontSize:12}}
                      onClick={() => {
                        const tel = cli.telefonoContacto || cli.telefono;
                        abrirWhatsApp(tel, mensajeEstadoCuentaWA(cli, g.ventas));
                        fbLog(session.id, 'whatsapp', 'cobros', { cliente: g.clienteId, total: g.total });
                      }}>
                      📲 Enviar estado de cuenta por WhatsApp
                    </button>
                  )}
                  {g.ventas.map(v => {
                    const ven = VENDEDORES.find(vv => vv.id === v.vendedorId);
                    const est = getDeudaEstado(v.fechaCompromiso);
                    const esMixto = v.formaPago === 'mixto';
                    const montoPendiente = montoPendienteDe(v);
                    return (
                      <div key={v.id} style={{padding:'8px 10px', background: est.bgColor, borderRadius:8, marginBottom:6, borderLeft:`3px solid ${est.color}`}}>
                        <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', gap:8}}>
                          <div style={{flex:1, minWidth:0}}>
                            <div style={{fontSize:12, fontWeight:600}}>
                              {new Date(v.creadoEn).toLocaleDateString('es-CL', {day:'numeric', month:'short'})}
                              {esMixto && <span style={{marginLeft:6, fontSize:10, color:'var(--accent)', fontWeight:700}}>🔀 MIXTO</span>}
                              {isAdmin && <> · {ven?.name}</>}
                            </div>
                            <div style={{fontSize:11, color:'var(--ink-mute)'}}>{fmtVentaCajas(v)} · {v.tipoDoc==='factura'?'Factura':'Boleta'}</div>
                            <div style={{fontSize:11, marginTop:3, color: est.color, fontWeight: est.tipo === 'vencida' || est.tipo === 'venceHoy' ? 700 : 500}}>
                              {est.mensaje}
                            </div>
                          </div>
                          <div style={{textAlign:'right', minWidth:90}}>
                            {v.totalAbonado > 0 ? (
                              <>
                                <div style={{fontSize:10, color:'var(--ink-soft)'}}>Saldo:</div>
                                <strong style={{fontFamily:'JetBrains Mono, monospace', fontSize:14, color:'var(--warn)'}}>{fmt$(saldoVenta(v))}</strong>
                                <div style={{fontSize:10, color:'var(--ink-mute)', marginTop:1}}>de {fmt$(v.totalBruto)}</div>
                                <div style={{fontSize:10, color:'var(--good)', marginTop:1}}>✓ abonado {fmt$(v.totalAbonado)}</div>
                              </>
                            ) : esMixto ? (
                              <>
                                <div style={{fontSize:10, color:'var(--ink-soft)'}}>Pendiente:</div>
