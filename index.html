          <option value="fijo">Solo fijos</option>
          <option value="variable">Solo variables</option>
        </select>
        <select className="inp" value={filtroCategoria} onChange={e=>setFiltroCategoria(e.target.value)} style={{flex:1, marginBottom:0, padding:'8px 10px'}}>
          <option value="todas">Todas las categorías</option>
          {CATEGORIAS_GASTOS.map(c => <option key={c.id} value={c.id}>{c.icono} {c.label}</option>)}
        </select>
      </div>

      {/* Resumen por categoría */}
      <div style={{fontSize:11, fontWeight:700, color:'var(--ink-soft)', textTransform:'uppercase', letterSpacing:1.2, margin:'14px 0 6px 4px'}}>📊 Por categoría (mes)</div>
      <div className="card">
        {CATEGORIAS_GASTOS.filter(c => totalesPorCat[c.id] > 0).map(c => (
          <div key={c.id} style={{display:'flex', justifyContent:'space-between', padding:'4px 0', fontSize:12}}>
            <span>{c.icono} {c.label}</span>
            <span style={{fontFamily:'JetBrains Mono, monospace'}}>{fmt$(totalesPorCat[c.id])}</span>
          </div>
        ))}
        {Object.values(totalesPorCat).every(v => v === 0) && (
          <div style={{fontSize:12, color:'var(--ink-mute)', textAlign:'center'}}>Sin gastos este mes</div>
        )}
      </div>

      <div style={{fontSize:11, fontWeight:700, color:'var(--ink-soft)', textTransform:'uppercase', letterSpacing:1.2, margin:'14px 0 6px 4px'}}>📋 Movimientos</div>
      {gastosFiltrados.length === 0 ? <div className="empty">Sin gastos</div> :
        gastosFiltrados.map(g => {
          const cat = CATEGORIAS_GASTOS.find(c => c.id === g.categoria);
          return (
            <div key={g.id} className="card" onClick={()=>setModal(g)} style={{cursor:'pointer'}}>
              <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start'}}>
                <div style={{flex:1}}>
                  <strong style={{fontSize:14}}>{cat ? cat.icono + ' ' + cat.label : g.categoria}</strong>
                  <div style={{fontSize:11, color:'var(--ink-soft)', marginTop:2}}>
                    {new Date(g.fecha + 'T12:00:00').toLocaleDateString('es-CL', {day:'numeric', month:'short', year:'numeric'})}
                    {cat && <span className={`badge ${cat.tipo==='fijo'?'good':'warn'}`} style={{marginLeft:8}}>{cat.tipo}</span>}
                  </div>
                  {g.descripcion && <div style={{fontSize:12, color:'var(--ink-soft)', marginTop:4, fontStyle:'italic'}}>"{g.descripcion}"</div>}
                </div>
                <strong style={{fontSize:14, color:'var(--bad)', fontFamily:'JetBrains Mono, monospace'}}>{fmt$(g.monto)}</strong>
              </div>
            </div>
          );
        })
      }

      {modal && <ModalGasto session={session} gasto={modal.id?modal:null} onClose={()=>setModal(null)} onToast={onToast}/>}
    </div>
  );
}

function ModalGasto({ session, gasto, onClose, onToast }) {
  const [categoria, setCategoria] = useState(gasto?.categoria || '');
  const [monto, setMonto] = useState(gasto?.monto || '');
  const [fecha, setFecha] = useState(gasto?.fecha || todayStr());
  const [descripcion, setDescripcion] = useState(gasto?.descripcion || '');
  const [formaPago, setFormaPago] = useState(gasto?.formaPago || 'efectivo');
  const [saving, setSaving] = useState(false);

  const guardar = async () => {
    if (!categoria) return onToast('Selecciona categoría','error');
    const m = parseFloat(monto);
    if (!m || m <= 0) return onToast('Monto inválido','error');
    setSaving(true);
    try {
      const datos = {
        categoria, monto: m, fecha, descripcion: descripcion.trim(), formaPago,
        creadoPor: session.id,
        creadoEn: gasto?.creadoEn || nowISO(),
      };
      if (gasto) {
        await fbSet(`gastos/${gasto.id}`, datos);
        await fbLog(session.id, 'update', 'gastos', { id: gasto.id, monto: m });
        onToast('Gasto actualizado','success');
      } else {
        const id = uid();
        await fbSet(`gastos/${id}`, datos);
        await fbLog(session.id, 'create', 'gastos', { id, monto: m, categoria });
        onToast('Gasto registrado','success');
      }
      onClose();
    } catch(e) { console.error(e); onToast('Error al guardar','error'); }
    setSaving(false);
  };

  const eliminar = async () => {
    if (!gasto) return;
    if (!confirm('¿Eliminar este gasto?')) return;
    try {
      await fbRemove(`gastos/${gasto.id}`);
      await fbLog(session.id, 'delete', 'gastos', { id: gasto.id });
      onToast('Gasto eliminado','warn');
      onClose();
    } catch(e) { onToast('Error','error'); }
  };

  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <h3>{gasto ? '✏️ Editar gasto' : '➕ Nuevo gasto'}</h3>

        <label className="fld">Categoría *</label>
        <select className="inp" value={categoria} onChange={e=>setCategoria(e.target.value)}>
          <option value="">-- Selecciona --</option>
          {CATEGORIAS_GASTOS.map(c => (
            <option key={c.id} value={c.id}>{c.icono} {c.label} ({c.tipo})</option>
          ))}
        </select>

        <label className="fld">Monto * (con IVA)</label>
        <input type="number" className="inp" value={monto} onChange={e=>setMonto(e.target.value)} placeholder="Ej: 50000" min="0"/>

        <label className="fld">Fecha *</label>
        <input type="date" className="inp" value={fecha} onChange={e=>setFecha(e.target.value)}/>

        <label className="fld">Forma de pago</label>
        <select className="inp" value={formaPago} onChange={e=>setFormaPago(e.target.value)}>
          <option value="efectivo">💵 Efectivo</option>
          <option value="transferencia">🏦 Transferencia</option>
          <option value="cheque">📄 Cheque</option>
          <option value="tarjeta">💳 Tarjeta</option>
        </select>

        <label className="fld">Descripción</label>
        <textarea
          className="inp" rows="2"
          value={descripcion} onChange={e=>setDescripcion(e.target.value)}
          placeholder="Ej: Boleta luz mes mayo"
          style={{resize:'none', fontFamily:'inherit'}}
        />

        <div className="actions">
          <button className="btn ghost" onClick={onClose}>Cancelar</button>
          {gasto && <button className="btn danger" onClick={eliminar}>Eliminar</button>}
          <button className="btn accent" onClick={guardar} disabled={saving}>
            {saving ? '...' : gasto ? 'Guardar' : 'Registrar'}
          </button>
        </div>
      </div>
    </div>
  );
}

// =========================== ESTADOS FINANCIEROS ===========================
// Los 4 estados financieros oficiales según normas contables chilenas
// 1. Balance General (Estado de Situación Financiera)
// 2. Estado de Resultados (Pérdidas y Ganancias)
// 3. Estado de Flujos de Efectivo
// 4. Estado de Cambios en el Patrimonio Neto

function EstadosFinancieros({ session, onToast }) {
  const { list: ventas } = useFirebaseList('ventas');
  const { list: compras } = useFirebaseList('compras');
  const { list: clientes } = useFirebaseList('clientes');
  const { list: gastos } = useFirebaseList('gastos');
  const { list: movsCapital } = useFirebaseList('capital/movimientos');
  const { data: capitalInicial } = useFirebaseValue('capital/inicial');
  const { data: saldoInicialCaja } = useFirebaseValue('caja/saldoInicial');
  const { data: stockBodega } = useFirebaseValue('stockBodega');
  const { data: precios } = useFirebaseValue('precios');
  const { list: activosFijos } = useFirebaseList('activosFijos');

  const today = new Date();
  const inicioMes = new Date(today.getFullYear(), today.getMonth(), 1);
  const finMes = new Date(today.getFullYear(), today.getMonth()+1, 0);
  const fmtDate = (d) => d.toISOString().slice(0,10);

  const [desde, setDesde] = useState(fmtDate(inicioMes));
  const [hasta, setHasta] = useState(fmtDate(finMes));
  const [vista, setVista] = useState('resumen'); // resumen | balance | resultados | flujo | patrimonio
  const [exportando, setExportando] = useState(false);

  // === FILTROS DE PERÍODO ===
  const ventasRango = useMemo(() => ventas.filter(v => {
    const f = isoToLocalDate(v.fecha || v.creadoEn);
    return f >= desde && f <= hasta;
  }), [ventas, desde, hasta]);

  const comprasRango = useMemo(() => compras.filter(c => {
    const f = isoToLocalDate(c.fecha || c.creadoEn);
    return f >= desde && f <= hasta;
  }), [compras, desde, hasta]);

  const gastosRango = useMemo(() => gastos.filter(g => {
    const f = g.fecha || isoToLocalDate(g.creadoEn);
    return f >= desde && f <= hasta;
  }), [gastos, desde, hasta]);

  const movsCapitalRango = useMemo(() => movsCapital.filter(m => {
    const f = m.fecha || isoToLocalDate(m.creadoEn);
    return f >= desde && f <= hasta;
  }), [movsCapital, desde, hasta]);

  // === ESTADO DE RESULTADOS (P&L) ===
  const pnl = useMemo(() => {
    let ingresosBrutos = 0, ingresosNetos = 0, ivaDebito = 0;
    let costoVentas = 0, mermasMonto = 0, mermasUnidades = 0, unidadesVendidas = 0;
    let porFormaPago = { efectivo: 0, transferencia: 0, pendiente: 0 };

    ventasRango.forEach(v => {
      const bruto = v.totalBruto || 0;
      const neto = v.totalNeto || (bruto / (1 + IVA_RATE));
      ingresosBrutos += bruto;
      ingresosNetos += neto;
      ivaDebito += (bruto - neto);
      (v.items || []).forEach(item => {
        const u = (item.cajas||0)*180 + (item.bandejas||0)*30;
        unidadesVendidas += u;
        if (item.costoNetoUnit) costoVentas += item.costoNetoUnit * u;
        const mu = item.mermas || 0;
        mermasUnidades += mu;
        if (item.costoNetoUnit) mermasMonto += item.costoNetoUnit * mu;
      });
      const d = desgloseVenta(v);
      porFormaPago.efectivo += d.efectivo;
      porFormaPago.transferencia += d.transferencia;
      porFormaPago.pendiente += d.porCobrar;
    });

    // Gastos operacionales del período (neto - se asume con IVA, lo desglosamos)
    let gastosFijos = 0, gastosVariables = 0, gastosTotal = 0;
    gastosRango.forEach(g => {
      const cat = CATEGORIAS_GASTOS.find(c => c.id === g.categoria);
      const monto = g.monto || 0;
      gastosTotal += monto;
      if (cat && cat.tipo === 'fijo') gastosFijos += monto;
      else gastosVariables += monto;
    });

    const utilidadBruta = ingresosNetos - costoVentas;
    const utilidadOperacional = utilidadBruta - mermasMonto - gastosTotal;
    const utilidadNeta = utilidadOperacional;
    const margenBruto = ingresosNetos > 0 ? (utilidadBruta / ingresosNetos * 100) : 0;
    const margenNeto = ingresosNetos > 0 ? (utilidadNeta / ingresosNetos * 100) : 0;

    return {
      ingresosBrutos, ingresosNetos, ivaDebito, costoVentas,
      utilidadBruta, mermasMonto, mermasUnidades,
      gastosFijos, gastosVariables, gastosTotal,
      utilidadOperacional, utilidadNeta, margenBruto, margenNeto,
      unidadesVendidas, porFormaPago,
    };
  }, [ventasRango, gastosRango]);

  // === EGRESOS COMPRAS ===
  const egresos = useMemo(() => {
    let totalBruto = 0, totalNeto = 0, ivaCredito = 0;
    comprasRango.forEach(c => {
      const b = c.totalBruto || 0;
      const n = c.totalNeto || (b / (1 + IVA_RATE));
      totalBruto += b; totalNeto += n; ivaCredito += (b - n);
    });
    return { totalBruto, totalNeto, ivaCredito, n: comprasRango.length };
  }, [comprasRango]);

  // === CUENTAS POR COBRAR (al cierre del período) ===
  const cxc = useMemo(() => {
    let total = 0, vencidas = 0, porVencer = 0;
    ventas.filter(v => {
      const f = isoToLocalDate(v.fecha || v.creadoEn);
      return v.formaPago === 'pendiente' && f <= hasta;
    }).forEach(v => {
      const b = v.totalBruto || 0;
      total += b;
      const est = getDeudaEstado(v.fechaCompromiso);
      if (est.tipo === 'vencida') vencidas += b;
      else porVencer += b;
    });
    return { total, vencidas, porVencer };
  }, [ventas, hasta]);

  // === INVENTARIO VALORIZADO ===
  const inventario = useMemo(() => {
    if (!stockBodega || !precios) return { bodega: 0, detalle: [] };
    const fechas = Object.keys(precios).sort();
    if (fechas.length === 0) return { bodega: 0, detalle: [] };
    const ultPrecio = precios[fechas[fechas.length-1]];
    let bodega = 0;
    const detalle = [];
    CALIBRES.forEach(c => {
      const u = stockBodega[c] || 0;
      const cajaCfg = ultPrecio[c] && ultPrecio[c].caja;
      const costoUnit = cajaCfg ? (cajaCfg.costo || 0) / (1+IVA_RATE) : 0;
      const valor = u * costoUnit;
      bodega += valor;
      detalle.push({ calibre: c, unidades: u, costoUnit, valor });
    });
    return { bodega, detalle };
  }, [stockBodega, precios]);

  // === FLUJO DE EFECTIVO ===
  const flujo = useMemo(() => {
    // Cobros del período (ventas pagadas en el período)
    const cobrosEfectivo = pnl.porFormaPago.efectivo;
    const cobrosTransfer = pnl.porFormaPago.transferencia;
    const cobrosOperacion = cobrosEfectivo + cobrosTransfer;

    // Pagos del período
    const pagosProveedores = egresos.totalBruto;
    const pagosGastos = pnl.gastosTotal;

    // Flujo operacional
    const flujoOperacion = cobrosOperacion - pagosProveedores - pagosGastos;

    // Inversión (futuro: compra de vehículos/equipos, por ahora 0)
    const flujoInversion = 0;

    // Financiamiento: aportes - retiros
    const aportes = movsCapitalRango.filter(m => m.tipo === 'aporte').reduce((s,m) => s + (m.monto||0), 0);
    const retiros = movsCapitalRango.filter(m => m.tipo === 'retiro').reduce((s,m) => s + (m.monto||0), 0);
    const flujoFinanciamiento = aportes - retiros;

    const variacionNeta = flujoOperacion + flujoInversion + flujoFinanciamiento;
    const saldoInicial = ((saldoInicialCaja && saldoInicialCaja.efectivo) || 0) + ((saldoInicialCaja && saldoInicialCaja.banco) || 0);
    const saldoFinal = saldoInicial + variacionNeta;

    return {
      cobrosEfectivo, cobrosTransfer, cobrosOperacion,
      pagosProveedores, pagosGastos,
      flujoOperacion, flujoInversion,
      aportes, retiros, flujoFinanciamiento,
      variacionNeta, saldoInicial, saldoFinal,
    };
  }, [pnl, egresos, movsCapitalRango, saldoInicialCaja]);

  // === BALANCE GENERAL (al cierre del período) ===
  const balance = useMemo(() => {
    // ACTIVOS CORRIENTES
    const efectivoCaja = ((saldoInicialCaja && saldoInicialCaja.efectivo) || 0);
    const efectivoBanco = ((saldoInicialCaja && saldoInicialCaja.banco) || 0);
    const cajaTotal = efectivoCaja + efectivoBanco + flujo.variacionNeta;
    const activoCorriente = cajaTotal + cxc.total + inventario.bodega;

    // ACTIVOS FIJOS (no corrientes)
    let activosFijosValor = 0;
    let depAcumuladaTotal = 0;
    activosFijos.forEach(a => {
      const dep = calcularDepreciacion(a);
      activosFijosValor += dep.valorLibro;
      depAcumuladaTotal += dep.depAcumulada;
    });
    const totalActivos = activoCorriente + activosFijosValor;

    // PASIVOS
    const cuentasPorPagar = 0;
    const totalPasivos = cuentasPorPagar;

    // PATRIMONIO
    const capInic = (capitalInicial && capitalInicial.monto) || 0;
    const aportesHist = movsCapital.filter(m => (m.fecha || '') <= hasta && m.tipo === 'aporte').reduce((s,m) => s + (m.monto||0), 0);
    const retirosHist = movsCapital.filter(m => (m.fecha || '') <= hasta && m.tipo === 'retiro').reduce((s,m) => s + (m.monto||0), 0);
    const capitalSocial = capInic + aportesHist;
    // Utilidades acumuladas + valor de activos fijos (que también son patrimonio)
    const utilidadesAcumuladas = pnl.utilidadNeta - retirosHist + activosFijosValor;
    const totalPatrimonio = capitalSocial + utilidadesAcumuladas;

    const totalPasPat = totalPasivos + totalPatrimonio;
    const cuadra = Math.abs(totalActivos - totalPasPat) < 1;

    return {
      cajaTotal, cxc: cxc.total, inventarioVal: inventario.bodega,
      activoCorriente, activosFijosValor, depAcumuladaTotal, totalActivos,
      cuentasPorPagar, totalPasivos,
      capInic, aportesHist, retirosHist, capitalSocial,
      utilidadesAcumuladas, totalPatrimonio,
      totalPasPat, cuadra,
    };
  }, [flujo, cxc, inventario, capitalInicial, movsCapital, saldoInicialCaja, hasta, pnl, activosFijos]);

  // === CAMBIOS EN EL PATRIMONIO (período actual) ===
  const cambiosPatrimonio = useMemo(() => {
    // Saldo inicial del período: capital al inicio
    const capInic = (capitalInicial && capitalInicial.monto) || 0;
    const aportesAntes = movsCapital.filter(m => (m.fecha || '') < desde && m.tipo === 'aporte').reduce((s,m) => s + (m.monto||0), 0);
    const retirosAntes = movsCapital.filter(m => (m.fecha || '') < desde && m.tipo === 'retiro').reduce((s,m) => s + (m.monto||0), 0);
    const capInicialPeriodo = capInic + aportesAntes;
    const utilAcumIni = 0 - retirosAntes; // Utilidades antes del período: complicado de calcular sin tracking, simplificado
    const patInicial = capInicialPeriodo + utilAcumIni;

    // Movimientos del período
    const aportesPer = movsCapitalRango.filter(m => m.tipo === 'aporte').reduce((s,m) => s + (m.monto||0), 0);
    const retirosPer = movsCapitalRango.filter(m => m.tipo === 'retiro').reduce((s,m) => s + (m.monto||0), 0);
    const utilidadPer = pnl.utilidadNeta;

    const patFinal = patInicial + aportesPer - retirosPer + utilidadPer;

    return {
      patInicial, capInicialPeriodo, utilAcumIni,
      aportesPer, retirosPer, utilidadPer,
      patFinal,
    };
  }, [capitalInicial, movsCapital, movsCapitalRango, desde, pnl]);

  // === ATAJOS RANGO ===
  const setRangoMesActual = () => {
    const d = new Date();
    setDesde(fmtDate(new Date(d.getFullYear(), d.getMonth(), 1)));
    setHasta(fmtDate(new Date(d.getFullYear(), d.getMonth()+1, 0)));
  };
  const setRangoMesAnterior = () => {
    const d = new Date();
    setDesde(fmtDate(new Date(d.getFullYear(), d.getMonth()-1, 1)));
    setHasta(fmtDate(new Date(d.getFullYear(), d.getMonth(), 0)));
  };
  const setRangoAnio = () => {
    const d = new Date();
    setDesde(fmtDate(new Date(d.getFullYear(), 0, 1)));
    setHasta(fmtDate(new Date(d.getFullYear(), 11, 31)));
  };

  // === EXPORTAR ===
  const exportExcel = async () => {
    if (!window.XLSX) return onToast('Librería Excel no cargada','error');
    setExportando(true);
    try {
      const wb = window.XLSX.utils.book_new();
      // Hoja Balance
      const balanceSheet = [
        ['BALANCE GENERAL - INTEGRAL SUR'],
        [`Al ${hasta}`], [''],
        ['ACTIVOS', 'Monto'],
        ['Activo Corriente', ''],
        ['  Efectivo y equivalentes (caja+banco)', balance.cajaTotal],
        ['  Cuentas por cobrar', balance.cxc],
        ['  Inventario (al costo)', balance.inventarioVal],
        ['Total Activo Corriente', balance.activoCorriente],
        ['', ''],
        ['TOTAL ACTIVOS', balance.totalActivos],
        ['', ''],
        ['PASIVOS', ''],
        ['  Cuentas por pagar', balance.cuentasPorPagar],
        ['Total Pasivos', balance.totalPasivos],
        ['', ''],
        ['PATRIMONIO', ''],
        ['  Capital social', balance.capitalSocial],
        ['  Utilidades acumuladas', balance.utilidadesAcumuladas],
        ['Total Patrimonio', balance.totalPatrimonio],
        ['', ''],
        ['TOTAL PASIVOS + PATRIMONIO', balance.totalPasPat],
      ];
      window.XLSX.utils.book_append_sheet(wb, window.XLSX.utils.aoa_to_sheet(balanceSheet), 'Balance');

      // Hoja P&L
      const pnlSheet = [
        ['ESTADO DE RESULTADOS - INTEGRAL SUR'],
        [`Período: ${desde} a ${hasta}`], [''],
        ['Concepto', 'Monto'],
        ['Ingresos por ventas (brutos)', pnl.ingresosBrutos],
        ['Ingresos netos (sin IVA)', pnl.ingresosNetos],
        ['(-) Costo de ventas', -pnl.costoVentas],
        ['UTILIDAD BRUTA', pnl.utilidadBruta],
        [`Margen bruto %`, pnl.margenBruto.toFixed(2) + '%'],
        [''],
        ['(-) Mermas', -pnl.mermasMonto],
        ['(-) Gastos fijos', -pnl.gastosFijos],
        ['(-) Gastos variables', -pnl.gastosVariables],
        ['UTILIDAD OPERACIONAL', pnl.utilidadOperacional],
        [''],
        ['UTILIDAD NETA', pnl.utilidadNeta],
        ['Margen neto %', pnl.margenNeto.toFixed(2) + '%'],
      ];
      window.XLSX.utils.book_append_sheet(wb, window.XLSX.utils.aoa_to_sheet(pnlSheet), 'Resultados');

      // Hoja Flujo
      const flujoSheet = [
        ['ESTADO DE FLUJOS DE EFECTIVO - INTEGRAL SUR'],
        [`Período: ${desde} a ${hasta}`], [''],
        ['ACTIVIDADES DE OPERACIÓN', ''],
        ['  Cobros efectivo', flujo.cobrosEfectivo],
        ['  Cobros transferencia', flujo.cobrosTransfer],
        ['  (-) Pagos a proveedores', -flujo.pagosProveedores],
        ['  (-) Gastos operacionales', -flujo.pagosGastos],
        ['Flujo neto operación', flujo.flujoOperacion],
        [''],
        ['ACTIVIDADES DE INVERSIÓN', ''],
        ['  (Sin movimientos)', 0],
        ['Flujo neto inversión', flujo.flujoInversion],
        [''],
        ['ACTIVIDADES DE FINANCIAMIENTO', ''],
        ['  Aportes de capital', flujo.aportes],
        ['  (-) Retiros de socios', -flujo.retiros],
        ['Flujo neto financiamiento', flujo.flujoFinanciamiento],
        [''],
        ['VARIACIÓN NETA DE EFECTIVO', flujo.variacionNeta],
        ['Saldo inicial', flujo.saldoInicial],
        ['SALDO FINAL', flujo.saldoFinal],
      ];
      window.XLSX.utils.book_append_sheet(wb, window.XLSX.utils.aoa_to_sheet(flujoSheet), 'Flujo Efectivo');

      // Hoja Patrimonio
      const patSheet = [
        ['ESTADO DE CAMBIOS EN EL PATRIMONIO - INTEGRAL SUR'],
        [`Período: ${desde} a ${hasta}`], [''],
        ['Concepto', 'Capital', 'Utilidades', 'Total'],
        ['Saldo inicial', cambiosPatrimonio.capInicialPeriodo, cambiosPatrimonio.utilAcumIni, cambiosPatrimonio.patInicial],
        ['+ Aportes', cambiosPatrimonio.aportesPer, 0, cambiosPatrimonio.aportesPer],
        ['- Retiros', 0, -cambiosPatrimonio.retirosPer, -cambiosPatrimonio.retirosPer],
        ['+ Utilidad del período', 0, cambiosPatrimonio.utilidadPer, cambiosPatrimonio.utilidadPer],
        ['Saldo final', cambiosPatrimonio.capInicialPeriodo + cambiosPatrimonio.aportesPer, cambiosPatrimonio.utilAcumIni - cambiosPatrimonio.retirosPer + cambiosPatrimonio.utilidadPer, cambiosPatrimonio.patFinal],
      ];
      window.XLSX.utils.book_append_sheet(wb, window.XLSX.utils.aoa_to_sheet(patSheet), 'Patrimonio');

      const filename = `Estados_Financieros_${desde}_a_${hasta}.xlsx`;
      window.XLSX.writeFile(wb, filename);
      await fbLog(session.id, 'export', 'estadosFinancieros', { formato: 'xlsx', desde, hasta });
      onToast('Excel descargado','success');
    } catch(e) { console.error(e); onToast('Error al exportar','error'); }
    setExportando(false);
  };

  const exportPDF = async () => {
    if (!window.jspdf || !window.jspdf.jsPDF) return onToast('Librería PDF no cargada','error');
    setExportando(true);
    try {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      const left = 14;
      let y = 16;

      const writeLine = (k, v, opts) => {
        opts = opts || {};
        doc.setFont(undefined, opts.bold ? 'bold' : 'normal');
        doc.setFontSize(opts.size || 10);
        doc.text(k, opts.indent ? left + 6 : left, y);
        if (v !== undefined && v !== null) doc.text(v, 195, y, { align: 'right' });
        y += opts.size ? opts.size * 0.5 + 1 : 5;
      };
      const title = (t) => { y += 3; writeLine(t, null, { bold: true, size: 12 }); };
      const sep = () => { doc.line(left, y, 195, y); y += 3; };

      doc.setFontSize(16); doc.setFont(undefined, 'bold');
      doc.text('Estados Financieros · Integral Sur', left, y); y += 8;
      doc.setFontSize(10); doc.setFont(undefined, 'normal');
      doc.text(`Período: ${desde} a ${hasta}`, left, y); y += 5;
      doc.text(`Generado: ${new Date().toLocaleString('es-CL')}`, left, y); y += 8;

      // BALANCE
      title('1. BALANCE GENERAL'); sep();
      writeLine('ACTIVOS', null, { bold: true });
      writeLine('Efectivo y equivalentes', fmt$(balance.cajaTotal), { indent: true });
      writeLine('Cuentas por cobrar', fmt$(balance.cxc), { indent: true });
      writeLine('Inventario', fmt$(balance.inventarioVal), { indent: true });
      writeLine('TOTAL ACTIVOS', fmt$(balance.totalActivos), { bold: true });
      y += 2;
      writeLine('PASIVOS', null, { bold: true });
      writeLine('Cuentas por pagar', fmt$(balance.cuentasPorPagar), { indent: true });
      writeLine('Total Pasivos', fmt$(balance.totalPasivos), { bold: true });
      y += 2;
      writeLine('PATRIMONIO', null, { bold: true });
      writeLine('Capital social', fmt$(balance.capitalSocial), { indent: true });
      writeLine('Utilidades acumuladas', fmt$(balance.utilidadesAcumuladas), { indent: true });
      writeLine('Total Patrimonio', fmt$(balance.totalPatrimonio), { bold: true });
      y += 2;
      writeLine('TOTAL PASIVOS + PATRIMONIO', fmt$(balance.totalPasPat), { bold: true });

      doc.addPage(); y = 16;

      // P&L
      title('2. ESTADO DE RESULTADOS'); sep();
      writeLine('Ingresos brutos', fmt$(pnl.ingresosBrutos));
      writeLine('Ingresos netos (sin IVA)', fmt$(pnl.ingresosNetos));
      writeLine('(-) Costo de ventas', '-' + fmt$(pnl.costoVentas));
      writeLine('UTILIDAD BRUTA', fmt$(pnl.utilidadBruta), { bold: true });
      writeLine('Margen bruto', pnl.margenBruto.toFixed(1) + '%', { indent: true });
      y += 2;
      writeLine('(-) Mermas', '-' + fmt$(pnl.mermasMonto));
      writeLine('(-) Gastos fijos', '-' + fmt$(pnl.gastosFijos));
      writeLine('(-) Gastos variables', '-' + fmt$(pnl.gastosVariables));
      writeLine('UTILIDAD OPERACIONAL', fmt$(pnl.utilidadOperacional), { bold: true });
      y += 2;
      writeLine('UTILIDAD NETA', fmt$(pnl.utilidadNeta), { bold: true, size: 12 });
      writeLine('Margen neto', pnl.margenNeto.toFixed(1) + '%', { indent: true });

      doc.addPage(); y = 16;

      // FLUJO
      title('3. ESTADO DE FLUJOS DE EFECTIVO'); sep();
      writeLine('ACTIVIDADES DE OPERACIÓN', null, { bold: true });
      writeLine('Cobros efectivo', fmt$(flujo.cobrosEfectivo), { indent: true });
      writeLine('Cobros transferencia', fmt$(flujo.cobrosTransfer), { indent: true });
      writeLine('(-) Pagos a proveedores', '-' + fmt$(flujo.pagosProveedores), { indent: true });
      writeLine('(-) Gastos operacionales', '-' + fmt$(flujo.pagosGastos), { indent: true });
      writeLine('Flujo neto operación', fmt$(flujo.flujoOperacion), { bold: true });
      y += 2;
      writeLine('ACTIVIDADES DE INVERSIÓN', null, { bold: true });
      writeLine('Flujo neto inversión', fmt$(flujo.flujoInversion), { bold: true });
      y += 2;
      writeLine('ACTIVIDADES DE FINANCIAMIENTO', null, { bold: true });
      writeLine('Aportes de capital', fmt$(flujo.aportes), { indent: true });
      writeLine('(-) Retiros de socios', '-' + fmt$(flujo.retiros), { indent: true });
      writeLine('Flujo neto financiamiento', fmt$(flujo.flujoFinanciamiento), { bold: true });
      y += 4;
      writeLine('VARIACIÓN NETA DE EFECTIVO', fmt$(flujo.variacionNeta), { bold: true });
      writeLine('Saldo inicial', fmt$(flujo.saldoInicial));
      writeLine('SALDO FINAL', fmt$(flujo.saldoFinal), { bold: true, size: 12 });

      doc.addPage(); y = 16;

      // PATRIMONIO
      title('4. ESTADO DE CAMBIOS EN EL PATRIMONIO'); sep();
      writeLine('Saldo inicial patrimonio', fmt$(cambiosPatrimonio.patInicial), { bold: true });
      y += 2;
      writeLine('+ Aportes período', fmt$(cambiosPatrimonio.aportesPer));
      writeLine('- Retiros período', '-' + fmt$(cambiosPatrimonio.retirosPer));
      writeLine('+ Utilidad del período', fmt$(cambiosPatrimonio.utilidadPer));
      y += 2;
      writeLine('SALDO FINAL PATRIMONIO', fmt$(cambiosPatrimonio.patFinal), { bold: true, size: 12 });

      const filename = `Estados_Financieros_${desde}_a_${hasta}.pdf`;
      doc.save(filename);
      await fbLog(session.id, 'export', 'estadosFinancieros', { formato: 'pdf', desde, hasta });
      onToast('PDF descargado','success');
    } catch(e) { console.error(e); onToast('Error al exportar PDF','error'); }
    setExportando(false);
  };

  return (
    <div className="pad">
      <h2 className="section-title">Estados Financieros</h2>
      <div className="section-sub">Los 4 estados financieros oficiales</div>

      <div className="card">
        <label className="fld">Período</label>
        <div className="row">
          <div>
            <label className="fld" style={{fontSize:10}}>Desde</label>
            <input type="date" className="inp" value={desde} onChange={e=>setDesde(e.target.value)} style={{marginBottom:0}}/>
          </div>
          <div>
            <label className="fld" style={{fontSize:10}}>Hasta</label>
            <input type="date" className="inp" value={hasta} onChange={e=>setHasta(e.target.value)} style={{marginBottom:0}}/>
          </div>
        </div>
        <div style={{display:'flex', gap:6, flexWrap:'wrap', marginTop:10}}>
          <button className="btn ghost sm" onClick={setRangoMesActual}>Mes actual</button>
          <button className="btn ghost sm" onClick={setRangoMesAnterior}>Mes anterior</button>
          <button className="btn ghost sm" onClick={setRangoAnio}>Año</button>
        </div>
      </div>

      <div className="tabs" style={{marginTop:10, display:'flex', gap:4, overflowX:'auto'}}>
        <button className={`tab ${vista==='resumen'?'active':''}`} onClick={()=>setVista('resumen')}>📊 Resumen</button>
        <button className={`tab ${vista==='balance'?'active':''}`} onClick={()=>setVista('balance')}>📋 Balance</button>
        <button className={`tab ${vista==='resultados'?'active':''}`} onClick={()=>setVista('resultados')}>💰 Resultados</button>
        <button className={`tab ${vista==='flujo'?'active':''}`} onClick={()=>setVista('flujo')}>💸 Flujo</button>
        <button className={`tab ${vista==='patrimonio'?'active':''}`} onClick={()=>setVista('patrimonio')}>📈 Patrimonio</button>
      </div>

      {/* === VISTA RESUMEN === */}
      {vista === 'resumen' && (
        <>
          <div style={{fontSize:11, fontWeight:700, color:'var(--ink-soft)', textTransform:'uppercase', letterSpacing:1.2, margin:'14px 0 6px 4px'}}>Indicadores clave</div>
          <div className="row">
            <div className="card" style={{textAlign:'center'}}>
              <div style={{fontSize:10, color:'var(--ink-mute)', textTransform:'uppercase'}}>Utilidad neta</div>
              <div style={{fontSize:18, fontWeight:700, color: pnl.utilidadNeta>=0?'var(--good)':'var(--bad)', fontFamily:'JetBrains Mono, monospace'}}>{fmt$(pnl.utilidadNeta)}</div>
              <div style={{fontSize:10, color:'var(--ink-mute)'}}>{pnl.margenNeto.toFixed(1)}% margen</div>
            </div>
            <div className="card" style={{textAlign:'center'}}>
              <div style={{fontSize:10, color:'var(--ink-mute)', textTransform:'uppercase'}}>Flujo neto</div>
              <div style={{fontSize:18, fontWeight:700, color: flujo.variacionNeta>=0?'var(--good)':'var(--bad)', fontFamily:'JetBrains Mono, monospace'}}>{fmt$(flujo.variacionNeta)}</div>
              <div style={{fontSize:10, color:'var(--ink-mute)'}}>variación efectivo</div>
            </div>
          </div>
          <div className="row">
            <div className="card" style={{textAlign:'center'}}>
              <div style={{fontSize:10, color:'var(--ink-mute)', textTransform:'uppercase'}}>Total activos</div>
              <div style={{fontSize:16, fontWeight:700, fontFamily:'JetBrains Mono, monospace'}}>{fmt$(balance.totalActivos)}</div>
            </div>
            <div className="card" style={{textAlign:'center'}}>
              <div style={{fontSize:10, color:'var(--ink-mute)', textTransform:'uppercase'}}>Patrimonio</div>
              <div style={{fontSize:16, fontWeight:700, fontFamily:'JetBrains Mono, monospace'}}>{fmt$(balance.totalPatrimonio)}</div>
            </div>
          </div>
        </>
      )}

      {/* === VISTA BALANCE === */}
      {vista === 'balance' && (
        <>
          <div style={{fontSize:11, fontWeight:700, color:'var(--ink-soft)', textTransform:'uppercase', letterSpacing:1.2, margin:'14px 0 6px 4px'}}>📋 Balance al {hasta}</div>
          <div className="card">
            <strong style={{color:'var(--accent)'}}>ACTIVOS</strong>
            <div style={{fontSize:11, color:'var(--ink-mute)', marginTop:4, marginBottom:4}}>Activo corriente</div>
            <Linea k="💵 Efectivo (caja + banco)" v={fmt$(balance.cajaTotal)}/>
            <Linea k="🏦 Cuentas por cobrar" v={fmt$(balance.cxc)} small="deudas clientes"/>
            <Linea k="📦 Inventario (al costo)" v={fmt$(balance.inventarioVal)} small="bodega"/>
            <Linea k="Total activo corriente" v={fmt$(balance.activoCorriente)} bold/>
            {balance.activosFijosValor > 0 && (
              <>
                <div style={{fontSize:11, color:'var(--ink-mute)', marginTop:10, marginBottom:4}}>Activo fijo (no corriente)</div>
                <Linea k="🚛 Activos fijos (valor libro)" v={fmt$(balance.activosFijosValor)} small={`Dep. acum: ${fmt$(balance.depAcumuladaTotal)}`}/>
              </>
            )}
            <hr style={{border:'none', borderTop:'1px solid var(--line)', margin:'8px 0'}}/>
            <Linea k="TOTAL ACTIVOS" v={fmt$(balance.totalActivos)} bold big positive/>
          </div>
          <div className="card">
            <strong style={{color:'var(--warn)'}}>PASIVOS</strong>
            <Linea k="📥 Cuentas por pagar" v={fmt$(balance.cuentasPorPagar)}/>
            <hr style={{border:'none', borderTop:'1px solid var(--line)', margin:'8px 0'}}/>
            <Linea k="Total Pasivos" v={fmt$(balance.totalPasivos)} bold/>
          </div>
          <div className="card">
            <strong style={{color:'var(--good)'}}>PATRIMONIO</strong>
            <Linea k="💰 Capital social" v={fmt$(balance.capitalSocial)} small={`inicial: ${fmt$(balance.capInic)} + aportes: ${fmt$(balance.aportesHist)}`}/>
            <Linea k="📈 Utilidades acumuladas" v={fmt$(balance.utilidadesAcumuladas)}/>
            <hr style={{border:'none', borderTop:'1px solid var(--line)', margin:'8px 0'}}/>
            <Linea k="Total Patrimonio" v={fmt$(balance.totalPatrimonio)} bold/>
          </div>
          <div className="card" style={{background: balance.cuadra?'var(--good-bg)':'var(--bad-bg)'}}>
            <Linea k={balance.cuadra?"✓ TOTAL PASIVOS + PATRIMONIO":"⚠ DIFERENCIA EN BALANCE"} v={fmt$(balance.totalPasPat)} bold big/>
            {!balance.cuadra && (() => {
              const diff = balance.totalActivos - balance.totalPasPat;
              const sugerencias = [];
              const capInicNulo = !capitalInicial || !capitalInicial.monto;
              const saldoCajaNulo = !saldoInicialCaja || (!saldoInicialCaja.efectivo && !saldoInicialCaja.banco);
              if (capInicNulo) sugerencias.push("Registrar el **capital inicial** de la empresa (Más → 🏦 Capital y caja)");
              if (saldoCajaNulo) sugerencias.push("Registrar el **saldo inicial de caja y banco** (Más → 🏦 Capital y caja)");
              if (diff > 0 && !capInicNulo) sugerencias.push(`Hay ${fmt$(diff)} de más en Activos. Esto sugiere que falta registrar **aportes de capital** o algún **pasivo** (préstamos, deudas)`);
              if (diff < 0) sugerencias.push(`Hay ${fmt$(Math.abs(diff))} de menos en Activos. Puede deberse a **retiros no registrados** o **gastos pagados sin registrar el banco correspondiente**`);
              return (
                <>
                  <div style={{fontSize:12, color:'var(--bad)', marginTop:8, fontWeight:600}}>
                    Diferencia: {fmt$(diff)}
                    {diff > 0 ? ' (Activos > Pasivos+Patrimonio)' : ' (Pasivos+Patrimonio > Activos)'}
                  </div>
                  <div style={{marginTop:10, padding:'10px 12px', background:'var(--bg-2)', borderRadius:6, fontSize:11}}>
                    <strong style={{color:'var(--ink)'}}>💡 Sugerencias para cuadrar:</strong>
                    <ul style={{margin:'6px 0 0 18px', padding:0, color:'var(--ink-soft)', lineHeight:1.6}}>
                      {sugerencias.length === 0 && (
                        <li>Verifica que todos los gastos, compras y movimientos del período estén registrados correctamente.</li>
                      )}
                      {sugerencias.map((s, i) => (
                        <li key={i} dangerouslySetInnerHTML={{__html: s.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')}}/>
                      ))}
                      <li style={{marginTop:6, color:'var(--ink-mute)', fontSize:10}}>
                        Tip: El balance cuadra cuando <strong>ACTIVOS = PASIVOS + PATRIMONIO</strong>. Si nunca registraste el capital inicial ni el saldo inicial del banco/caja, el sistema asume que parten de cero.
                      </li>
                    </ul>
                  </div>
                </>
              );
            })()}
          </div>
        </>
      )}

      {/* === VISTA RESULTADOS === */}
      {vista === 'resultados' && (
        <>
          <div style={{fontSize:11, fontWeight:700, color:'var(--ink-soft)', textTransform:'uppercase', letterSpacing:1.2, margin:'14px 0 6px 4px'}}>💰 Estado de Resultados</div>
          <div className="card">
            <Linea k="🧾 Ingresos brutos" v={fmt$(pnl.ingresosBrutos)} small={`${ventasRango.length} ventas`}/>
            <Linea k="Ingresos netos (sin IVA)" v={fmt$(pnl.ingresosNetos)} muted/>
            <Linea k="IVA débito" v={fmt$(pnl.ivaDebito)} muted small/>
            <hr style={{border:'none', borderTop:'1px solid var(--line)', margin:'8px 0'}}/>
            <Linea k="📦 (-) Costo de ventas" v={'-' + fmt$(pnl.costoVentas)} negative/>
            <Linea k="📈 Utilidad bruta" v={fmt$(pnl.utilidadBruta)} bold/>
            <Linea k="Margen bruto" v={pnl.margenBruto.toFixed(1) + '%'} small/>
            <hr style={{border:'none', borderTop:'1px solid var(--line)', margin:'8px 0'}}/>
            <Linea k="📉 (-) Mermas" v={'-' + fmt$(pnl.mermasMonto)} negative small={`${pnl.mermasUnidades}u`}/>
            <Linea k="🏢 (-) Gastos fijos" v={'-' + fmt$(pnl.gastosFijos)} negative/>
            <Linea k="⛽ (-) Gastos variables" v={'-' + fmt$(pnl.gastosVariables)} negative/>
            <hr style={{border:'none', borderTop:'2px solid var(--accent)', margin:'10px 0'}}/>
            <Linea k="💵 UTILIDAD NETA" v={fmt$(pnl.utilidadNeta)} bold big positive={pnl.utilidadNeta>0} negative={pnl.utilidadNeta<0}/>
            <Linea k="Margen neto" v={pnl.margenNeto.toFixed(1) + '%'} bold small/>
          </div>
        </>
      )}

      {/* === VISTA FLUJO === */}
      {vista === 'flujo' && (
        <>
          <div style={{fontSize:11, fontWeight:700, color:'var(--ink-soft)', textTransform:'uppercase', letterSpacing:1.2, margin:'14px 0 6px 4px'}}>💸 Estado de Flujos de Efectivo</div>
          <div className="card">
            <strong style={{color:'var(--accent)'}}>Actividades de operación</strong>
            <Linea k="💵 Cobros efectivo" v={fmt$(flujo.cobrosEfectivo)}/>
            <Linea k="🏦 Cobros transferencia" v={fmt$(flujo.cobrosTransfer)}/>
            <Linea k="📦 (-) Pagos a proveedores" v={'-' + fmt$(flujo.pagosProveedores)} negative small={`${egresos.n} ${egresos.n===1?'compra':'compras'} registradas`}/>
            <Linea k="🏢 (-) Gastos operacionales" v={'-' + fmt$(flujo.pagosGastos)} negative/>
            <hr style={{border:'none', borderTop:'1px solid var(--line)', margin:'8px 0'}}/>
            <Linea k="Flujo neto operación" v={fmt$(flujo.flujoOperacion)} bold positive={flujo.flujoOperacion>0} negative={flujo.flujoOperacion<0}/>
          </div>
          {/* Nota explicativa sobre pago a proveedores */}
          <div className="card" style={{background:'var(--bg-2)', fontSize:11, color:'var(--ink-soft)'}}>
            <strong style={{color:'var(--ink)', fontSize:12}}>ℹ️ ¿Cómo se calcula el pago a proveedores?</strong>
            <div style={{marginTop:6, lineHeight:1.5}}>
              Suma de todas las <strong>compras registradas</strong> en el período (sección Compras). Cada compra que registras al proveedor se considera una salida de dinero. <br/><br/>
              <strong>Para que cuadre el banco:</strong>
              <ul style={{margin:'4px 0 0 18px', padding:0}}>
                <li>Registra el <strong>saldo inicial</strong> (Más → 🏦 Capital y caja)</li>
                <li>Registra cada <strong>compra</strong> con monto bruto correcto</li>
                <li>Registra los <strong>gastos operacionales</strong></li>
                <li>El sistema calcula: <em>Saldo final = Saldo inicial + Cobros - Pagos proveedores - Gastos</em></li>
              </ul>
            </div>
          </div>
          <div className="card">
            <strong style={{color:'var(--warn)'}}>Actividades de inversión</strong>
            <Linea k="(Sin movimientos registrados)" v={fmt$(flujo.flujoInversion)} muted/>
            <Linea k="Flujo neto inversión" v={fmt$(flujo.flujoInversion)} bold/>
          </div>
          <div className="card">
            <strong style={{color:'var(--good)'}}>Actividades de financiamiento</strong>
            <Linea k="➕ Aportes de capital" v={fmt$(flujo.aportes)}/>
            <Linea k="➖ (-) Retiros de socios" v={'-' + fmt$(flujo.retiros)} negative/>
            <hr style={{border:'none', borderTop:'1px solid var(--line)', margin:'8px 0'}}/>
            <Linea k="Flujo neto financiamiento" v={fmt$(flujo.flujoFinanciamiento)} bold/>
          </div>
          <div className="card" style={{background:'var(--bg-2)'}}>
            <Linea k="VARIACIÓN NETA EFECTIVO" v={fmt$(flujo.variacionNeta)} bold positive={flujo.variacionNeta>0} negative={flujo.variacionNeta<0}/>
            <Linea k="Saldo inicial" v={fmt$(flujo.saldoInicial)} small/>
            <hr style={{border:'none', borderTop:'2px solid var(--accent)', margin:'10px 0'}}/>
            <Linea k="💰 SALDO FINAL" v={fmt$(flujo.saldoFinal)} bold big/>
          </div>
        </>
      )}

      {/* === VISTA PATRIMONIO === */}
      {vista === 'patrimonio' && (
        <>
          <div style={{fontSize:11, fontWeight:700, color:'var(--ink-soft)', textTransform:'uppercase', letterSpacing:1.2, margin:'14px 0 6px 4px'}}>📈 Cambios en el Patrimonio</div>
          <div className="card">
            <Linea k="Saldo inicial patrimonio" v={fmt$(cambiosPatrimonio.patInicial)} bold/>
            <div style={{fontSize:11, color:'var(--ink-mute)', marginTop:4, marginLeft:8}}>
              Al {desde}
            </div>
            <hr style={{border:'none', borderTop:'1px solid var(--line)', margin:'10px 0'}}/>
            <Linea k="➕ Aportes período" v={fmt$(cambiosPatrimonio.aportesPer)} positive/>
            <Linea k="➖ Retiros período" v={'-' + fmt$(cambiosPatrimonio.retirosPer)} negative/>
            <Linea k="📈 Utilidad del período" v={fmt$(cambiosPatrimonio.utilidadPer)} positive={cambiosPatrimonio.utilidadPer>0} negative={cambiosPatrimonio.utilidadPer<0}/>
            <hr style={{border:'none', borderTop:'2px solid var(--accent)', margin:'10px 0'}}/>
            <Linea k="🏦 SALDO FINAL" v={fmt$(cambiosPatrimonio.patFinal)} bold big positive/>
            <div style={{fontSize:11, color:'var(--ink-mute)', marginTop:4, marginLeft:8}}>
              Al {hasta}
            </div>
          </div>
        </>
      )}

      <div style={{display:'flex', gap:8, marginTop:18}}>
        <button className="btn accent" onClick={exportExcel} disabled={exportando} style={{flex:1}}>
          {exportando ? '...' : '📊 Excel'}
        </button>
        <button className="btn accent" onClick={exportPDF} disabled={exportando} style={{flex:1}}>
          {exportando ? '...' : '📄 PDF'}
        </button>
      </div>

      <div className="alert-banner info" style={{fontSize:11, marginTop:14}}>
        <span className="ico">ℹ️</span>
        <div>Para que los estados financieros sean exactos: registra gastos operacionales, capital inicial y saldos de caja/banco en Más → Capital y Gastos.</div>
      </div>
    </div>
  );
}

function Linea({ k, v, small, bold, big, muted, positive, negative }) {
  const color = positive ? 'var(--good)' : negative ? 'var(--bad)' : muted ? 'var(--ink-mute)' : 'var(--ink)';
  return (
    <div style={{display:'flex', justifyContent:'space-between', alignItems:'baseline', padding:'4px 0'}}>
      <span style={{fontSize: bold && big ? 14 : 13, fontWeight: bold ? 700 : 400, color: muted ? 'var(--ink-mute)' : 'var(--ink)'}}>
        {k}
        {small && <span style={{fontSize:10, color:'var(--ink-mute)', marginLeft:6, fontWeight:400}}>{small}</span>}
      </span>
      <span style={{fontFamily:'JetBrains Mono, monospace', fontSize: big ? 16 : 13, fontWeight: bold ? 700 : 500, color}}>
        {v}
      </span>
    </div>
  );
}

// =========================== REPORTES ===========================
// Exportación Excel (SheetJS) y PDF (jsPDF) - Solo admin
// Incluye formato SII oficial para Libro de Ventas

function Reportes({ session, onToast }) {
  const { list: ventas } = useFirebaseList('ventas');
  const { list: clientes } = useFirebaseList('clientes');
  const { list: cierres } = useFirebaseList('cierres');

  const [fechaDesde, setFechaDesde] = useState(() => {
    const d = new Date(); d.setDate(1);
    return d.toISOString().slice(0, 10);
  });
  const [fechaHasta, setFechaHasta] = useState(todayStr());
  const [tipoMes, setTipoMes] = useState(() => {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  });
  const [clienteEstadoId, setClienteEstadoId] = useState('');
  const [vendedorFiltro, setVendedorFiltro] = useState('todos');
  const [fechaDia, setFechaDia] = useState(todayStr());

  // Helper: filtrar ventas en rango
  const ventasEnRango = (desde, hasta, vendedorId) => {
    return ventas.filter(v => {
      const f = isoToLocalDate(v.fecha || v.creadoEn);
      if (!f) return false;
      if (f < desde || f > hasta) return false;
      if (vendedorId && vendedorId !== 'todos' && v.vendedorId !== vendedorId) return false;
      return true;
    });
  };

  // ============== EXCEL: Ventas del día ==============
  const exportarVentasDia = async () => {
    if (!window.XLSX) return onToast('Error: librería no cargada','error');
    const ventasDia = ventasEnRango(fechaDia, fechaDia, vendedorFiltro);
    if (ventasDia.length === 0) return onToast('Sin ventas en esa fecha','warn');

    const data = ventasDia.map(v => {
      const cli = clientes.find(c => c.id === v.clienteId);
      const vendedor = VENDEDORES.find(vv => vv.id === v.vendedorId);
      return {
        'Fecha': isoToLocalDate(v.fecha || v.creadoEn),
        'Hora': new Date(v.creadoEn).toLocaleTimeString('es-CL', { hour: '2-digit', minute: '2-digit' }),
        'Vendedor': vendedor?.name || '',
        'Cliente': cli?.razonSocial || '(?)',
        'RUT': cli?.rut || '',
        'Documento': v.tipoDoc === 'factura' ? 'Factura' : 'Boleta',
        'Detalle': (v.items||[]).map(i => `${i.cajas>0?i.cajas+'cj ':''}${i.bandejas>0?i.bandejas+'bd ':''}${i.calibre}`).join(' · '),
        'Unidades': v.totalUnidades,
        'Mermas': v.totalMermas || 0,
        'Neto': v.totalNeto,
        'IVA': v.totalIva,
        'Total': v.totalBruto,
        'Forma de pago': v.formaPago,
        'Estado': v.cobroEstado === 'cobrado' ? 'Cobrado' : 'Pendiente',
        'Fecha compromiso': v.fechaCompromiso || '',
      };
    });

    // Totales
    const totales = {
      'Fecha': 'TOTAL',
      'Cliente': `${ventasDia.length} ventas`,
      'Unidades': ventasDia.reduce((s,v) => s + (v.totalUnidades||0), 0),
      'Mermas': ventasDia.reduce((s,v) => s + (v.totalMermas||0), 0),
      'Neto': ventasDia.reduce((s,v) => s + (v.totalNeto||0), 0),
      'IVA': ventasDia.reduce((s,v) => s + (v.totalIva||0), 0),
      'Total': ventasDia.reduce((s,v) => s + (v.totalBruto||0), 0),
    };
    data.push({});
    data.push(totales);

    const ws = window.XLSX.utils.json_to_sheet(data);
    // Ajustar ancho columnas
    ws['!cols'] = [
      {wch:11},{wch:8},{wch:14},{wch:30},{wch:14},{wch:10},{wch:35},
      {wch:10},{wch:8},{wch:12},{wch:12},{wch:12},{wch:14},{wch:12},{wch:15}
    ];
    const wb = window.XLSX.utils.book_new();
    window.XLSX.utils.book_append_sheet(wb, ws, 'Ventas');
    const filename = `ventas-${fechaDia}.xlsx`;
    window.XLSX.writeFile(wb, filename);
    await fbLog(session.id, 'export', 'reportes', { tipo: 'ventas-dia', fecha: fechaDia, archivo: filename });
    onToast(`Descargado: ${filename}`,'success');
  };

  // ============== EXCEL: Ventas del mes ==============
  const exportarVentasMes = async () => {
    if (!window.XLSX) return onToast('Error: librería no cargada','error');
    const [año, mes] = tipoMes.split('-');
    const ultimoDia = new Date(parseInt(año), parseInt(mes), 0).getDate();
    const desde = `${tipoMes}-01`;
    const hasta = `${tipoMes}-${String(ultimoDia).padStart(2,'0')}`;
    const ventasMes = ventasEnRango(desde, hasta, vendedorFiltro);
    if (ventasMes.length === 0) return onToast('Sin ventas en ese mes','warn');

    const data = ventasMes.map(v => {
      const cli = clientes.find(c => c.id === v.clienteId);
      const vendedor = VENDEDORES.find(vv => vv.id === v.vendedorId);
      return {
        'Fecha': isoToLocalDate(v.fecha || v.creadoEn),
        'Hora': new Date(v.creadoEn).toLocaleTimeString('es-CL', { hour: '2-digit', minute: '2-digit' }),
        'Vendedor': vendedor?.name || '',
        'Cliente': cli?.razonSocial || '(?)',
        'RUT': cli?.rut || '',
        'Documento': v.tipoDoc === 'factura' ? 'Factura' : 'Boleta',
        'Detalle': (v.items||[]).map(i => `${i.cajas>0?i.cajas+'cj ':''}${i.bandejas>0?i.bandejas+'bd ':''}${i.calibre}`).join(' · '),
        'Unidades': v.totalUnidades,
        'Mermas': v.totalMermas || 0,
        'Neto': v.totalNeto,
        'IVA': v.totalIva,
        'Total': v.totalBruto,
        'Forma de pago': v.formaPago,
        'Estado cobro': v.cobroEstado === 'cobrado' ? 'Cobrado' : 'Pendiente',
      };
    });

    const totales = {
      'Fecha': 'TOTAL',
      'Cliente': `${ventasMes.length} ventas`,
      'Unidades': ventasMes.reduce((s,v) => s + (v.totalUnidades||0), 0),
      'Mermas': ventasMes.reduce((s,v) => s + (v.totalMermas||0), 0),
      'Neto': ventasMes.reduce((s,v) => s + (v.totalNeto||0), 0),
      'IVA': ventasMes.reduce((s,v) => s + (v.totalIva||0), 0),
      'Total': ventasMes.reduce((s,v) => s + (v.totalBruto||0), 0),
    };
    data.push({});
    data.push(totales);

    const ws = window.XLSX.utils.json_to_sheet(data);
    ws['!cols'] = [
      {wch:11},{wch:8},{wch:14},{wch:30},{wch:14},{wch:10},{wch:35},
      {wch:10},{wch:8},{wch:12},{wch:12},{wch:12},{wch:14},{wch:12}
    ];
    const wb = window.XLSX.utils.book_new();
    window.XLSX.utils.book_append_sheet(wb, ws, 'Ventas');
    const filename = `ventas-mes-${tipoMes}.xlsx`;
    window.XLSX.writeFile(wb, filename);
    await fbLog(session.id, 'export', 'reportes', { tipo: 'ventas-mes', mes: tipoMes, archivo: filename });
    onToast(`Descargado: ${filename}`,'success');
  };

  // ============== EXCEL: Libro de Ventas SII (formato oficial Chile) ==============
  // Formato basado en el Libro de Compras y Ventas (LCV) del SII
  const exportarSII = async () => {
    if (!window.XLSX) return onToast('Error: librería no cargada','error');
    const [año, mes] = tipoMes.split('-');
    const ultimoDia = new Date(parseInt(año), parseInt(mes), 0).getDate();
    const desde = `${tipoMes}-01`;
    const hasta = `${tipoMes}-${String(ultimoDia).padStart(2,'0')}`;
    const ventasMes = ventasEnRango(desde, hasta, 'todos');
    if (ventasMes.length === 0) return onToast('Sin ventas en ese mes','warn');

    // Formato SII: columnas obligatorias del Libro de Ventas
    const data = ventasMes
      .filter(v => v.cobroEstado !== 'eliminado')
      .map((v, idx) => {
        const cli = clientes.find(c => c.id === v.clienteId);
        // SII: 33=Factura electrónica, 39=Boleta electrónica
        const tipoDoc = v.tipoDoc === 'factura' ? 33 : 39;
        return {
          'Nro': idx + 1,
          'Tipo Doc': tipoDoc,
          'Tipo Doc Desc': v.tipoDoc === 'factura' ? 'Factura electrónica' : 'Boleta electrónica',
          'Folio': v.id.slice(-6).toUpperCase(),
          'Fecha Doc': isoToLocalDate(v.fecha || v.creadoEn),
          'RUT Receptor': cli?.rut || '',
          'Razón Social Receptor': cli?.razonSocial || '(?)',
          'Monto Exento': 0,
          'Monto Neto': Math.round(v.totalNeto || 0),
          'IVA (19%)': Math.round(v.totalIva || 0),
          'Monto Total': Math.round(v.totalBruto || 0),
        };
      });

    // Totales finales
    const totalNeto = data.reduce((s,r) => s + r['Monto Neto'], 0);
    const totalIva = data.reduce((s,r) => s + r['IVA (19%)'], 0);
    const totalBruto = data.reduce((s,r) => s + r['Monto Total'], 0);

    data.push({});
    data.push({
      'Nro': '',
      'Tipo Doc Desc': `TOTALES PERÍODO ${tipoMes}`,
      'Monto Exento': 0,
      'Monto Neto': totalNeto,
      'IVA (19%)': totalIva,
      'Monto Total': totalBruto,
    });

    const ws = window.XLSX.utils.json_to_sheet(data);
    ws['!cols'] = [
      {wch:5},{wch:8},{wch:22},{wch:10},{wch:12},
      {wch:14},{wch:35},{wch:12},{wch:14},{wch:14},{wch:14}
    ];

    // Hoja resumen
    const facturas = ventasMes.filter(v => v.tipoDoc === 'factura');
    const boletas = ventasMes.filter(v => v.tipoDoc !== 'factura');
    const resumen = [
      ['LIBRO DE VENTAS - INTEGRAL SUR'],
      [`Período: ${tipoMes}`],
      [`Generado: ${new Date().toLocaleString('es-CL')}`],
      [],
      ['Tipo Documento', 'Cantidad', 'Neto', 'IVA', 'Total'],
      ['Facturas electrónicas (33)', facturas.length,
        facturas.reduce((s,v) => s + (v.totalNeto||0), 0),
        facturas.reduce((s,v) => s + (v.totalIva||0), 0),
        facturas.reduce((s,v) => s + (v.totalBruto||0), 0)],
      ['Boletas electrónicas (39)', boletas.length,
        boletas.reduce((s,v) => s + (v.totalNeto||0), 0),
        boletas.reduce((s,v) => s + (v.totalIva||0), 0),
        boletas.reduce((s,v) => s + (v.totalBruto||0), 0)],
      ['TOTAL', ventasMes.length, totalNeto, totalIva, totalBruto],
    ];
    const wsRes = window.XLSX.utils.aoa_to_sheet(resumen);
    wsRes['!cols'] = [{wch:32},{wch:10},{wch:16},{wch:16},{wch:16}];

    const wb = window.XLSX.utils.book_new();
    window.XLSX.utils.book_append_sheet(wb, wsRes, 'Resumen');
    window.XLSX.utils.book_append_sheet(wb, ws, 'Libro de Ventas');

    const filename = `libro-ventas-SII-${tipoMes}.xlsx`;
    window.XLSX.writeFile(wb, filename);
    await fbLog(session.id, 'export', 'reportes', { tipo: 'sii', mes: tipoMes, archivo: filename });
    onToast(`Descargado: ${filename}`,'success');
  };

  // ============== EXCEL: Cobros pendientes ==============
  const exportarCobrosPendientes = async () => {
    if (!window.XLSX) return onToast('Error: librería no cargada','error');
    const pendientes = ventas.filter(v => v.cobroEstado === 'pendiente');
    if (pendientes.length === 0) return onToast('Sin cobros pendientes','warn');

    // Agrupar por cliente
    const porCliente = {};
    pendientes.forEach(v => {
      if (!porCliente[v.clienteId]) {
        const cli = clientes.find(c => c.id === v.clienteId);
        porCliente[v.clienteId] = {
          razonSocial: cli?.razonSocial || '(?)',
          rut: cli?.rut || '',
          contacto: cli?.contacto || '',
          telefono: cli?.telefonoContacto || cli?.telefono || '',
          ventas: [], total: 0
        };
      }
      porCliente[v.clienteId].ventas.push(v);
      porCliente[v.clienteId].total += v.totalBruto || 0;
    });

    const data = [];
    Object.values(porCliente).sort((a,b) => b.total - a.total).forEach(g => {
      g.ventas.sort((a,b) => (a.fechaCompromiso||'9999').localeCompare(b.fechaCompromiso||'9999'));
      g.ventas.forEach(v => {
        const est = getDeudaEstado(v.fechaCompromiso);
        const ven = VENDEDORES.find(vv => vv.id === v.vendedorId);
        data.push({
          'Cliente': g.razonSocial,
          'RUT': g.rut,
          'Contacto': g.contacto,
          'Teléfono': g.telefono,
          'Vendedor': ven?.name || '',
          'Fecha venta': isoToLocalDate(v.fecha || v.creadoEn),
          'Documento': v.tipoDoc === 'factura' ? 'Factura' : 'Boleta',
          'Monto': v.totalBruto,
          'Fecha compromiso': v.fechaCompromiso || '',
          'Estado': est.tipo === 'vencida' ? 'VENCIDA' : est.tipo === 'venceHoy' ? 'Vence HOY' : est.tipo === 'porVencer' ? `Vence en ${est.dias}d` : est.tipo === 'alDia' ? `En ${est.dias}d` : 'Sin fecha',
        });
      });
    });

    const totalDeuda = pendientes.reduce((s,v) => s + (v.totalBruto||0), 0);
    data.push({});
    data.push({
      'Cliente': 'TOTAL PENDIENTE',
      'Vendedor': `${pendientes.length} ventas`,
      'Monto': totalDeuda,
    });

    const ws = window.XLSX.utils.json_to_sheet(data);
    ws['!cols'] = [{wch:30},{wch:14},{wch:22},{wch:14},{wch:14},{wch:12},{wch:10},{wch:14},{wch:14},{wch:18}];
    const wb = window.XLSX.utils.book_new();
    window.XLSX.utils.book_append_sheet(wb, ws, 'Cobros pendientes');
    const filename = `cobros-pendientes-${todayStr()}.xlsx`;
    window.XLSX.writeFile(wb, filename);
    await fbLog(session.id, 'export', 'reportes', { tipo: 'cobros', archivo: filename });
    onToast(`Descargado: ${filename}`,'success');
  };

  // ============== PDF: Resumen del día ==============
  const exportarPDFResumen = async () => {
    if (!window.jspdf) return onToast('Error: librería no cargada','error');
    const { jsPDF } = window.jspdf;
    const ventasDia = ventasEnRango(fechaDia, fechaDia, vendedorFiltro);
    if (ventasDia.length === 0) return onToast('Sin ventas en esa fecha','warn');

    const doc = new jsPDF();
    const vendedorNombre = vendedorFiltro === 'todos' ? 'Todos los vendedores' : VENDEDORES.find(v => v.id === vendedorFiltro)?.name || '';

    doc.setFontSize(18);
    doc.setTextColor(232, 101, 30);
    doc.text('INTEGRAL SUR', 14, 18);
    doc.setFontSize(13);
    doc.setTextColor(50);
    doc.text('Resumen de Ventas', 14, 26);
    doc.setFontSize(10);
    doc.setTextColor(100);
    doc.text(`Fecha: ${fechaDia}`, 14, 33);
    doc.text(`Vendedor: ${vendedorNombre}`, 14, 38);
    doc.text(`Generado: ${new Date().toLocaleString('es-CL')}`, 14, 43);

    // Totales arriba
    let efectivo = 0, transferencia = 0, credito = 0, totalBruto = 0;
    let boletas = 0, facturas = 0, totalBol = 0, totalFac = 0;
    ventasDia.forEach(v => {
      totalBruto += v.totalBruto || 0;
      const d = desgloseVenta(v);
      efectivo += d.efectivo;
      transferencia += d.transferencia;
      credito += d.porCobrar;
      if (v.tipoDoc === 'factura') { facturas++; totalFac += v.totalBruto||0; }
      else { boletas++; totalBol += v.totalBruto||0; }
    });

    doc.setFontSize(11);
    doc.setTextColor(20);
    doc.text(`Total ventas: ${fmt$(totalBruto)} (${ventasDia.length} ${ventasDia.length===1?'venta':'ventas'})`, 14, 53);

    // Tabla de ventas
    const tableData = ventasDia.map(v => {
      const cli = clientes.find(c => c.id === v.clienteId);
      return [
        new Date(v.creadoEn).toLocaleTimeString('es-CL', { hour: '2-digit', minute: '2-digit' }),
        (cli?.razonSocial || '?').slice(0, 25),
        v.tipoDoc === 'factura' ? 'Fact.' : 'Bol.',
        v.formaPago === 'efectivo' ? 'Efectivo' : v.formaPago === 'transferencia' ? 'Transf.' : 'Pend.',
        fmt$(v.totalBruto),
      ];
    });

    doc.autoTable({
      startY: 58,
      head: [['Hora', 'Cliente', 'Doc', 'Pago', 'Total']],
      body: tableData,
      theme: 'striped',
      headStyles: { fillColor: [232, 101, 30] },
      styles: { fontSize: 9 },
      columnStyles: { 4: { halign: 'right' } }
    });

    let y = doc.lastAutoTable.finalY + 10;
    doc.setFontSize(10);
    doc.setTextColor(50);
    doc.text(`Boletas: ${boletas} (${fmt$(totalBol)})`, 14, y);
    doc.text(`Facturas: ${facturas} (${fmt$(totalFac)})`, 14, y + 5);
    y += 14;
    doc.setFontSize(11);
    doc.setTextColor(47, 125, 50);
    doc.text(`💵 Efectivo: ${fmt$(efectivo)}`, 14, y);
    doc.setTextColor(232, 101, 30);
    doc.text(`🏦 Transferencia: ${fmt$(transferencia)}`, 14, y + 6);
    doc.setTextColor(184, 116, 10);
    doc.text(`⏰ Pendiente: ${fmt$(credito)}`, 14, y + 12);

    const filename = `resumen-${fechaDia}.pdf`;
    doc.save(filename);
    await fbLog(session.id, 'export', 'reportes', { tipo: 'pdf-resumen', fecha: fechaDia, archivo: filename });
    onToast(`Descargado: ${filename}`,'success');
  };

  // ============== PDF: Estado de cuenta cliente ==============
  const exportarEstadoCuenta = async () => {
    if (!window.jspdf) return onToast('Error: librería no cargada','error');
    if (!clienteEstadoId) return onToast('Selecciona un cliente','error');
    const { jsPDF } = window.jspdf;
    const cli = clientes.find(c => c.id === clienteEstadoId);
    if (!cli) return onToast('Cliente no encontrado','error');

    const ventasCli = ventas.filter(v => v.clienteId === clienteEstadoId)
      .sort((a,b) => (b.creadoEn||'').localeCompare(a.creadoEn||''));
    if (ventasCli.length === 0) return onToast('Cliente sin ventas','warn');

    const pendientes = ventasCli.filter(v => v.cobroEstado === 'pendiente');
    const totalPendiente = pendientes.reduce((s,v) => s + (v.totalBruto||0), 0);
    const totalHistorico = ventasCli.reduce((s,v) => s + (v.totalBruto||0), 0);

    const doc = new jsPDF();
    doc.setFontSize(18);
    doc.setTextColor(232, 101, 30);
    doc.text('INTEGRAL SUR', 14, 18);
    doc.setFontSize(13);
    doc.setTextColor(50);
    doc.text('Estado de cuenta', 14, 26);

    doc.setFontSize(11);
    doc.setTextColor(20);
    doc.text(`Cliente: ${cli.razonSocial}`, 14, 36);
    doc.setFontSize(9);
    doc.setTextColor(100);
    doc.text(`RUT: ${cli.rut}`, 14, 42);
    doc.text(`Contacto: ${cli.contacto} · ${cli.telefonoContacto}`, 14, 47);
    if (cli.correo) doc.text(`Email: ${cli.correo}`, 14, 52);
    doc.text(`Dirección: ${cli.direccion}`, 14, cli.correo ? 57 : 52);
    doc.text(`Generado: ${new Date().toLocaleString('es-CL')}`, 14, cli.correo ? 62 : 57);

    // Resumen
    doc.setFontSize(11);
    doc.setTextColor(20);
    doc.text(`Total histórico: ${fmt$(totalHistorico)} (${ventasCli.length} compras)`, 14, 67);
    if (totalPendiente > 0) {
      doc.setTextColor(184, 60, 42);
      doc.setFont(undefined, 'bold');
      doc.text(`⚠️ Deuda actual: ${fmt$(totalPendiente)} (${pendientes.length} ventas)`, 14, 73);
      doc.setFont(undefined, 'normal');
    }

    // Tabla pendientes
    if (pendientes.length > 0) {
      doc.setFontSize(11);
      doc.setTextColor(20);
      doc.text('Ventas pendientes de cobro:', 14, 83);
      const pendData = pendientes.map(v => {
        const est = getDeudaEstado(v.fechaCompromiso);
        return [
          isoToLocalDate(v.fecha || v.creadoEn),
          v.tipoDoc === 'factura' ? 'Factura' : 'Boleta',
          v.fechaCompromiso || '-',
          est.tipo === 'vencida' ? 'VENCIDA' : est.tipo === 'venceHoy' ? 'Vence HOY' : 'Pendiente',
          fmt$(v.totalBruto),
        ];
      });
      doc.autoTable({
        startY: 87,
        head: [['Fecha', 'Doc', 'Compromiso', 'Estado', 'Monto']],
        body: pendData,
        theme: 'striped',
        headStyles: { fillColor: [184, 60, 42] },
        styles: { fontSize: 9 },
        columnStyles: { 4: { halign: 'right' } }
      });
    }

    // Histórico (últimas 20 ventas)
    const startY = pendientes.length > 0 ? doc.lastAutoTable.finalY + 10 : 83;
    doc.setFontSize(11);
    doc.setTextColor(20);
    doc.text('Historial de compras (últimas 20):', 14, startY);
    const histData = ventasCli.slice(0, 20).map(v => [
      isoToLocalDate(v.fecha || v.creadoEn),
      v.tipoDoc === 'factura' ? 'Fact.' : 'Bol.',
      v.formaPago,
      v.cobroEstado === 'cobrado' ? '✓' : '⏰',
      fmt$(v.totalBruto),
    ]);
    doc.autoTable({
      startY: startY + 4,
      head: [['Fecha', 'Doc', 'Pago', 'Estado', 'Monto']],
      body: histData,
      theme: 'striped',
      headStyles: { fillColor: [232, 101, 30] },
      styles: { fontSize: 9 },
      columnStyles: { 4: { halign: 'right' } }
    });

    const filename = `estado-cuenta-${cli.razonSocial.replace(/[^a-zA-Z0-9]/g,'-').toLowerCase()}-${todayStr()}.pdf`;
    doc.save(filename);
    await fbLog(session.id, 'export', 'reportes', { tipo: 'pdf-cuenta', cliente: clienteEstadoId, archivo: filename });
    onToast(`Descargado: ${filename}`,'success');
  };

  // ============== PDF: Cierre del día ==============
  const exportarPDFCierre = async () => {
    if (!window.jspdf) return onToast('Error: librería no cargada','error');
    const { jsPDF } = window.jspdf;
    const cierresDia = cierres.filter(c => isoToLocalDate(c.creadoEn) === fechaDia);

    doc.setTextColor(50);
    doc.text('Cierre del día', 14, 26);
    doc.setFontSize(10);
    doc.setTextColor(100);
    doc.text(`Fecha: ${fechaDia}`, 14, 33);
    doc.text(`Generado: ${new Date().toLocaleString('es-CL')}`, 14, 38);

      const data = [
        ['Ventas totales', `${r.cantidadVentas||0} · ${fmt$(r.totalVentas||0)}`],
        ['  Boletas', `${r.countBoletas||0} · ${fmt$(r.totalBoletas||0)}`],
        ['  Facturas', `${r.countFacturas||0} · ${fmt$(r.totalFacturas||0)}`],
        ['Neto', fmt$(r.totalNeto||0)],
        ['IVA 19%', fmt$(r.totalIva||0)],
        ['Efectivo esperado', fmt$(r.efectivoEsperado||0)],
        ['Efectivo declarado', fmt$(c.efectivoDeclarado||0)],
        ['Diferencia', fmt$(c.diferenciaEfectivo||0)],
        ['Transferencias', fmt$(r.transferenciaTotal||0)],
        ['Créditos pendientes', fmt$(r.creditoTotal||0)],
      ];
      if (r.totalMermas > 0) data.push(['Mermas', `${r.totalMermas}u · ${fmt$(r.descMermas)}`]);

      doc.autoTable({

        theme: 'plain',

      });
      y = doc.lastAutoTable.finalY + 10;

        doc.setFontSize(9);
        doc.setTextColor(100);
        doc.text(`Observaciones: ${c.observaciones}`, 14, y);
        y += 6;
      }
      y += 5;
    });

    const filename = `cierre-${fechaDia}.pdf`;

    await fbLog(session.id, 'export', 'reportes', { tipo: 'pdf-cierre', fecha: fechaDia, archivo: filename });
    onToast(`Descargado: ${filename}`,'success');
  };

  const Section = ({ title, sub, children }) => (
    <div className="card">

      {sub && <div style={{fontSize:11, color:'var(--ink-mute)', marginBottom:10}}>{sub}</div>}
      {children}

  return (
    <div className="pad">
      <h2 className="section-title">Reportes</h2>
      <div className="section-sub">Exportar Excel y PDF</div>

        <label className="fld">Vendedor</label>

          <button className="btn ghost sm" onClick={exportarPDFResumen} style={{flex:1}}>📄 PDF</button>
        </div>
      </Section>

      <Section title="📅 Reporte del mes" sub="Detalle completo de ventas del mes">

        <label className="fld">Vendedor</label>
        <select className="inp" value={vendedorFiltro} onChange={e=>setVendedorFiltro(e.target.value)} style={{marginBottom:10}}>

          {VENDEDORES.map(v => <option key={v.id} value={v.id}>{v.name}</option>)}
        </select>
        <button className="btn accent full sm" onClick={exportarVentasMes}>📊 Descargar Excel</button>
      </Section>

      <Section title="🏛️ Libro de Ventas SII" sub="Formato oficial para declaración mensual de impuestos (Chile)">
        <div className="alert-banner info" style={{fontSize:11, marginBottom:10}}>
          <span className="ico">ℹ️</span>
          <div>Incluye hoja "Resumen" + "Libro de Ventas" con columnas SII (Tipo doc 33/39, RUT, neto, IVA, total)</div>
        </div>
