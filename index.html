      .filter(v => isoToLocalDate(v.fecha || v.creadoEn) !== hoy) // Solo ventas de días anteriores
      .map(v => {
        let efectivo = 0, transferencia = 0;
        if (v.cobroFormaReal === 'efectivo') efectivo = v.montoCobradoEfectivo || v.totalBruto || 0;
        else if (v.cobroFormaReal === 'transferencia') transferencia = v.montoCobradoTransferencia || v.totalBruto || 0;
        else if (v.cobroFormaReal === 'mixto') {
          efectivo = v.montoCobradoEfectivo || 0;
          transferencia = v.montoCobradoTransferencia || 0;
        } else {
          // Sin cobroFormaReal (compatibilidad antigua): asumir efectivo
          efectivo = v.totalBruto || 0;
        }
        return { venta: v, efectivo, transferencia, total: v.totalBruto || 0 };
      });
  }, [yaCreado, ventas, session]);

  const totalCobrosAntiguosEf = cobrosAntiguosHoy.reduce((s,c) => s + c.efectivo, 0);
  const totalCobrosAntiguosTr = cobrosAntiguosHoy.reduce((s,c) => s + c.transferencia, 0);

  // Efectivo total a rendir = efectivo de ventas del día + efectivo cobrado de deudas anteriores
  const efectivoTotalEsperado = (resumen.efectivoEsperado || 0) + totalCobrosAntiguosEf;

  const [efectivoDeclarado, setEfectivoDeclarado] = useState(cierre?.efectivoDeclarado || 0);
  const [observaciones, setObservaciones] = useState(cierre?.observaciones || '');
  const [saving, setSaving] = useState(false);

  const diferenciaEfectivo = (parseFloat(efectivoDeclarado)||0) - efectivoTotalEsperado;

  const guardar = async () => {
    if (!resumen.retornoOk && !yaAprobando && !yaCreado) {
      return onToast(`Debes hacer y aprobar el retorno ${esSegVuelta ? 'de la 2ª vuelta' : 'del día'} antes de cerrar`,'error');
    }

    setSaving(true);
    try {
      if (!cierre) {
        await fbSet(`cierres/${uid()}`, {
          vendedorId: session.id,
          resumen,
          efectivoDeclarado: parseFloat(efectivoDeclarado)||0,
          diferenciaEfectivo,
          totalVentas: resumen.totalVentas,
          cantidadVentas: resumen.cantidadVentas,
          observaciones: observaciones.trim(),
          status: 'pendiente',
          segundaVuelta: esSegVuelta,
          fechaAnterior: esDiaAnterior ? fechaCierre : null,
          creadoPor: session.id,
          creadoEn: nowISO(),
        });
        await crearNotificacion(session, {
          tipo: 'cierre_pendiente',
          titulo: esSegVuelta ? '🔄 Cierre 2ª Vuelta por aprobar' : '📑 Cierre de caja por aprobar',
          mensaje: `${session.name || 'Vendedor'} envió ${esSegVuelta ? 'cierre 2ª vuelta' : 'cierre del día'} (${fmt$(resumen.totalVentas || 0)})`,
          link: 'cierres',
          prioridad: 'urgente',
        });
        onToast(`${esSegVuelta ? '2ª Vuelta' : 'Cierre'} enviado · pendiente de aprobación`,'success');
      } else if (yaAprobando) {
        await fbUpdate(`cierres/${cierre.id}`, {
          status: 'aprobado',
          aprobadoEn: nowISO(),
          aprobadoPor: session.id,
        });
        onToast(`${cierre.segundaVuelta ? '2ª Vuelta' : 'Cierre del día'} aprobado`,'success');
      }
      onClose();
    } catch(e) { console.error(e); onToast('Error al guardar','error'); setSaving(false); }
  };

  const rechazar = async () => {
    if (!confirm('¿Rechazar este cierre? El vendedor tendrá que rehacerlo.')) return;
    try {
      await fbUpdate(`cierres/${cierre.id}`, {
        status: 'rechazado',
        rechazadoEn: nowISO(),
        rechazadoPor: session.id,
      });
      onToast('Cierre rechazado','warn'); onClose();
    } catch(e) { onToast('Error','error'); }
  };

  const titulo = !cierre
    ? (esSegVuelta ? '🔄 Cierre 2ª Vuelta' : esDiaAnterior ? `📊 Cierre pendiente · ${fechaCierre}` : 'Cierre del día')
    : yaAprobando
      ? (cierre.segundaVuelta ? '✅ Revisar 2ª Vuelta' : '✅ Revisar cierre')
      : (cierre.segundaVuelta ? 'Detalle 2ª Vuelta' : 'Detalle del cierre');

  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <h3>{titulo}</h3>

        {!cierre && !resumen.retornoOk && (
          <div className="alert-banner" style={{fontSize:12, background:'var(--bad-bg)', color:'var(--bad)'}}>
            <span className="ico">🚨</span>
            <div>Debes hacer el retorno del día y esperar aprobación del admin antes de cerrar.</div>
          </div>
        )}

        {/* Resumen */}
        <div style={{padding:'12px', background:'var(--bg-2)', borderRadius:10, marginTop:10, fontSize:12, lineHeight:1.8, fontFamily:'JetBrains Mono, monospace'}}>
          <div style={{fontWeight:700, marginBottom:6, fontSize:11, textTransform:'uppercase', letterSpacing:1.2, color:'var(--ink-soft)', fontFamily:'Manrope, sans-serif'}}>Resumen del día</div>
          <div style={{display:'flex', justifyContent:'space-between'}}><span>Ventas totales:</span><strong>{resumen.cantidadVentas||0} · {fmt$(resumen.totalVentas||0)}</strong></div>
          <div style={{display:'flex', justifyContent:'space-between', fontSize:11, color:'var(--ink-mute)'}}><span>· Boletas:</span><span>{resumen.countBoletas||0} · {fmt$(resumen.totalBoletas||0)}</span></div>
          <div style={{display:'flex', justifyContent:'space-between', fontSize:11, color:'var(--ink-mute)'}}><span>· Facturas:</span><span>{resumen.countFacturas||0} · {fmt$(resumen.totalFacturas||0)}</span></div>
          <hr style={{border:'none', borderTop:'1px solid var(--line)', margin:'6px 0'}}/>
          <div style={{display:'flex', justifyContent:'space-between'}}><span>Neto:</span><span>{fmt$(resumen.totalNeto||0)}</span></div>
          <div style={{display:'flex', justifyContent:'space-between'}}><span>IVA 19%:</span><span>{fmt$(resumen.totalIva||0)}</span></div>
          <hr style={{border:'none', borderTop:'1px solid var(--line)', margin:'6px 0'}}/>

          {/* Desglose efectivo */}
          {totalCobrosAntiguosEf > 0 ? (
            <>
              <div style={{display:'flex', justifyContent:'space-between', color:'var(--good)', fontSize:11}}>
                <span>💵 Efectivo ventas del día:</span><span>{fmt$(resumen.efectivoEsperado||0)}</span>
              </div>
              <div style={{display:'flex', justifyContent:'space-between', color:'var(--good)', fontSize:11}}>
                <span>💵 Cobros anteriores en efectivo:</span><span>{fmt$(totalCobrosAntiguosEf)}</span>
              </div>
              <div style={{display:'flex', justifyContent:'space-between', color:'var(--good)', fontWeight:700, marginTop:2}}>
                <span>💵 Total efectivo a rendir:</span><strong>{fmt$(efectivoTotalEsperado)}</strong>
              </div>
            </>
          ) : (
            <div style={{display:'flex', justifyContent:'space-between', color:'var(--good)'}}><span>💵 Efectivo a rendir:</span><strong>{fmt$(efectivoTotalEsperado)}</strong></div>
          )}

          <div style={{display:'flex', justifyContent:'space-between', color:'var(--accent)'}}><span>🏦 Transferencias:</span><span>{fmt$((resumen.transferenciaTotal||0) + totalCobrosAntiguosTr)}</span></div>
          <div style={{display:'flex', justifyContent:'space-between', color:'var(--warn)'}}><span>⏰ Créditos pendientes:</span><span>{fmt$(resumen.creditoTotal||0)}</span></div>
          {resumen.totalMermas > 0 && (
            <>
              <hr style={{border:'none', borderTop:'1px solid var(--line)', margin:'6px 0'}}/>
              <div style={{display:'flex', justifyContent:'space-between', color:'var(--bad)'}}><span>⚠️ Mermas:</span><span>{fmtN(resumen.totalMermas)}u · -{fmt$(resumen.descuentoMermas)}</span></div>
            </>
          )}
          <hr style={{border:'none', borderTop:'1px solid var(--line)', margin:'6px 0'}}/>
          <div style={{display:'flex', justifyContent:'space-between', color: resumen.retornoOk ? 'var(--good)' : 'var(--bad)', fontWeight:700}}>
            <span>📦 Retorno del día:</span><span>{resumen.retornoOk ? '✓ aprobado' : '✕ pendiente'}</span>
          </div>
        </div>

        {/* CHEQUEO DE CONSISTENCIA — solo al cerrar día anterior */}
        {!yaCreado && esDiaAnterior && (resumen.transferenciaTotal > 0 || resumen.creditoTotal > 0) && (
          <div className="card" style={{borderLeft:'4px solid var(--warn)', marginTop:10}}>
            <div style={{fontWeight:700, fontSize:13, marginBottom:8, color:'var(--warn)'}}>
              🔍 Chequeo de movimientos del {fechaCierre}
            </div>

            {/* Transferencias sin confirmar */}
            {transfNoVerificadas.length > 0 && (
              <div style={{marginBottom:10}}>
                <div style={{fontSize:12, fontWeight:600, color:'var(--warn)', marginBottom:6}}>
                  ⚠️ {transfNoVerificadas.length} transferencia{transfNoVerificadas.length>1?'s':''} sin confirmar · {fmt$(totalTransfNoVerif)}
                </div>
                {transfNoVerificadas.map(t => {
                  const cli = clientes.find(c => c.id === t.clienteId);
                  return (
                    <div key={t.id} style={{background:'var(--warn-bg)', borderRadius:8, padding:'8px 10px', marginBottom:6, fontSize:12}}>
                      <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                        <div>
                          <strong>{cli?.razonSocial || '—'}</strong>
                          <div style={{fontSize:11, color:'var(--ink-soft)'}}>
                            {new Date(t.creadoEn).toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'})} · {fmt$(t.totalBruto)}
                          </div>
                        </div>
                        <div style={{display:'flex', gap:4}}>
                          <button className="btn sm" style={{fontSize:10, background:'var(--good)', color:'white', border:'none'}}
                            onClick={async ()=>{
                              await fbUpdate(`ventas/${t.id}`, {
                                transferenciaConfirmada: true,
                                transferenciaConfirmadaEn: nowISO(),
                                transferenciaConfirmadaPor: session.id,
                                cobroEstado: 'cobrado',
                                cobradoEn: nowISO(),
                                cobradoPor: session.id,
                                cobroFormaReal: 'transferencia',
                              });
                              onToast('✓ Transferencia marcada como recibida','success');
                            }}>
                            ✓ Recibida
                          </button>
                        </div>
                      </div>
                    </div>
                  );
                })}
                <div style={{fontSize:11, color:'var(--ink-soft)', fontStyle:'italic', marginTop:4}}>
                  Puedes cerrar igual — estas quedarán marcadas como pendientes en cobros.
                </div>
              </div>
            )}

            {/* Créditos pendientes */}
            {resumen.creditoTotal > 0 && (
              <div style={{marginBottom:6}}>
                <div style={{fontSize:12, fontWeight:600, color:'var(--warn)', marginBottom:4}}>
                  ⏰ Créditos pendientes del día · {fmt$(resumen.creditoTotal)}
                </div>
                <div style={{fontSize:11, color:'var(--ink-soft)'}}>
                  Estos cobros quedan en el módulo Cobros para ser gestionados.
                </div>
              </div>
            )}

            {/* Totales del cruce */}
            <div style={{background:'var(--bg-2)', borderRadius:8, padding:'8px 10px', fontSize:11,
              fontFamily:'JetBrains Mono, monospace', marginTop:6}}>
              <div style={{display:'flex', justifyContent:'space-between', marginBottom:2}}>
                <span>Ventas del día:</span>
                <strong>{resumen.cantidadVentas||0} · {fmt$(resumen.totalVentas||0)}</strong>
              </div>
              <div style={{display:'flex', justifyContent:'space-between', marginBottom:2, color:'var(--good)'}}>
                <span>💵 Efectivo:</span>
                <span>{fmt$(resumen.efectivoEsperado||0)}</span>
              </div>
              {resumen.transferenciaTotal > 0 && (
                <div style={{display:'flex', justifyContent:'space-between', marginBottom:2, color: transfNoVerificadas.length>0?'var(--warn)':'var(--good)'}}>
                  <span>🏦 Transferencias:</span>
                  <span>{fmt$(resumen.transferenciaTotal)} {transfNoVerificadas.length>0?'⚠️':''}</span>
                </div>
              )}
              {resumen.creditoTotal > 0 && (
                <div style={{display:'flex', justifyContent:'space-between', color:'var(--warn)'}}>
                  <span>⏰ Créditos:</span>
                  <span>{fmt$(resumen.creditoTotal)}</span>
                </div>
              )}
            </div>
          </div>
        )}

        {/* Resumen completo del día: transferencias + cobros de días anteriores */}
        {!yaCreado && (transferenciasDelDia.length > 0 || cobrosAntiguosHoy.length > 0) && (
          <div className="card" style={{marginTop:10}}>
            <strong style={{fontSize:13, marginBottom:8, display:'block'}}>🏦 Resumen del día</strong>

            {/* Transferencias verificadas del día */}
            {transfVerificadas.length > 0 && (
              <div style={{marginBottom:8, padding:'6px 10px', background:'var(--good-bg)', borderLeft:'3px solid var(--good)', borderRadius:6}}>
                <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', fontSize:12}}>
                  <span style={{color:'var(--good)', fontWeight:600}}>
                    ✓ {transfVerificadas.length} transf. recibidas
                  </span>
                  <strong style={{fontFamily:'JetBrains Mono, monospace', color:'var(--good)'}}>
                    {fmt$(totalTransfVerif)}
                  </strong>
                </div>
                <div style={{fontSize:10, color:'var(--ink-soft)', marginTop:4}}>
                  {transfVerificadas.filter(t => t.tieneComprobante).length} con foto · {transfVerificadas.filter(t => !t.tieneComprobante).length} sin foto
                </div>
              </div>
            )}

            {/* Transferencias pendientes del día */}
            {transfNoVerificadas.length > 0 && (
              <div style={{marginBottom:8, padding:'6px 10px', background:'var(--warn-bg)', borderLeft:'3px solid var(--warn)', borderRadius:6}}>
                <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', fontSize:12}}>
                  <span style={{color:'var(--warn)', fontWeight:600}}>
                    ⚠️ {transfNoVerificadas.length} transf. pendientes
                  </span>
                  <strong style={{fontFamily:'JetBrains Mono, monospace', color:'var(--warn)'}}>
                    {fmt$(totalTransfNoVerif)}
                  </strong>
                </div>
                <div style={{fontSize:10, color:'var(--ink-soft)', marginTop:4}}>
