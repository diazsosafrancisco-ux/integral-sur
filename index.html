            style={{background:'var(--bad)', color:'white', border:'none'}}>
            {recalculando ? '⏳ Calculando...' : '🔄 Previsualizar corrección de ventas'}
          </button>
        </div>
      )}

      {/* === REDONDEO: eliminado — precio se ingresa directo sin necesidad de redondeo === */}

      <div className="card">
        <label className="fld">Fecha</label>
        <input type="date" className="inp" value={fecha} onChange={e=>setFecha(e.target.value)} style={{marginBottom:0}}/>
      </div>
      <button className="btn ghost full" onClick={() => {
        const p = precios || {};
        const fechas = Object.keys(p).filter(f => f < fecha).sort();
        if (fechas.length === 0) return onToast('No hay precios anteriores','warn');
        const copia = JSON.parse(JSON.stringify(p[fechas[fechas.length-1]]));
        delete copia._aprobado; delete copia._aprobadoEn; delete copia._aprobadoPor;
        setDraft(copia);
        onToast('Copiado del último día · revisa y guarda','info');
      }} style={{marginBottom:12}}>📋 Copiar del último día</button>
      <div className="alert-banner info" style={{fontSize:12, marginBottom:10}}>
        <span className="ico">💡</span>
        <div>Ingresa el <strong>precio de venta</strong> y el <strong>costo de compra</strong> por unidad, ambos con IVA incluido. El desglose se calcula automáticamente.</div>
      </div>

      {CALIBRES.map(c => (
        <div key={c} className="card">
          <h3 style={{marginBottom:8}}>{c}</h3>
          {['caja','bandeja'].map(fmt => {
            const u = FORMATOS[fmt].unidades;
            const cfg = draft[c]?.[fmt] || { precioVenta: 0, costoBruto: 0 };
            const pvUnit  = cfg.precioVenta  || 0;
            const cbUnit  = cfg.costoBruto   || 0;

            // Precio venta
            const totalVentaBrutoBase = pvUnit * u;
            const totalVentaBruto     = pvUnit * u;   // directo sin redondeo
            const totalVentaNeto      = totalVentaBruto / (1 + IVA_RATE);
            const pvNeto              = pvUnit / (1 + IVA_RATE); // neto x unidad

            // Costo
            const cbNeto = cbUnit / (1 + IVA_RATE); // costo neto x unidad

            // Utilidad x huevo (neto)
            const utilidadUnit = pvNeto - cbNeto;
            const utilidadCaja = utilidadUnit * u;
            const margenPct    = cbNeto > 0 ? ((utilidadUnit / cbNeto) * 100) : 0;

            const setFld = (field, val) => setDraft(d => ({
              ...d,
              [c]: { ...d[c], [fmt]: { ...d[c]?.[fmt], [field]: parseFloat(val)||0 } }
            }));

            return (
              <div key={fmt} style={{padding:'12px 0', borderTop: fmt==='bandeja'?'1px solid var(--line)':'none'}}>
                {/* Encabezado formato */}
                    <div style={{fontSize:12, fontWeight:700, color:'var(--accent)', marginBottom:10}}>
                      {FORMATOS[fmt].label} · {u} unidades
                    </div>

                {/* Campos de entrada */}
                <div className="row" style={{gap:8, marginBottom:10}}>
                  <div style={{flex:1}}>
                    <label className="fld" style={{fontSize:10, color:'var(--accent)'}}>
                      💰 Precio venta x u (c/IVA)
                    </label>
                    <input
                      type="number" step="1" className="inp"
                      value={pvUnit || ''}
                      onChange={e => setFld('precioVenta', e.target.value)}
                      placeholder="Ej: 195"
                      style={{marginBottom:0, fontSize:15, fontWeight:700, color:'var(--accent)', padding:'9px 10px'}}
                    />
                  </div>
                  <div style={{flex:1}}>
                    <label className="fld" style={{fontSize:10, color:'var(--ink-soft)'}}>
                      🏷️ Costo compra x u (c/IVA)
                    </label>
                    <input
                      type="number" step="1" className="inp"
                      value={cbUnit || ''}
                      onChange={e => setFld('costoBruto', e.target.value)}
                      placeholder="Ej: 175"
                      style={{marginBottom:0, padding:'9px 10px'}}
                    />
                  </div>
                </div>

                {/* Desglose automático */}
                {pvUnit > 0 && (
                  <div style={{background:'var(--bg-2)', borderRadius:10, overflow:'hidden'}}>

                    {/* Precio de venta */}
                    <div style={{padding:'8px 12px', borderBottom:'1px solid var(--line)'}}>
                      <div style={{fontSize:10, fontWeight:700, color:'var(--ink-mute)', textTransform:'uppercase', letterSpacing:1, marginBottom:6}}>
                        Precio de venta
                      </div>
                      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'3px 8px', fontSize:11, fontFamily:'JetBrains Mono, monospace'}}>
                        <span style={{color:'var(--ink-soft)'}}>Bruto x u:</span>
                        <strong style={{textAlign:'right', color:'var(--accent)'}}>{fmt$(pvUnit)}</strong>

                        <span style={{color:'var(--ink-soft)'}}>Neto x u:</span>
                        <span style={{textAlign:'right'}}>{fmt$(pvNeto)}</span>

                        <span style={{color:'var(--ink-soft)'}}>Total {FORMATOS[fmt].label.toLowerCase()}:</span>
                        <strong style={{textAlign:'right', color:'var(--accent)', fontSize:13}}>{fmt$(totalVentaBruto)}</strong>

                        <span style={{color:'var(--ink-soft)'}}>Neto {FORMATOS[fmt].label.toLowerCase()}:</span>
                        <span style={{textAlign:'right'}}>{fmt$(totalVentaNeto)}</span>
                      </div>
                    </div>

                    {/* Costo + Utilidad */}
                    {cbUnit > 0 && (
                      <div style={{padding:'8px 12px'}}>
                        <div style={{fontSize:10, fontWeight:700, color:'var(--ink-mute)', textTransform:'uppercase', letterSpacing:1, marginBottom:6}}>
                          Costo y utilidad
                        </div>
                        <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'3px 8px', fontSize:11, fontFamily:'JetBrains Mono, monospace'}}>
                          <span style={{color:'var(--ink-soft)'}}>Costo bruto x u:</span>
                          <span style={{textAlign:'right'}}>{fmt$(cbUnit)}</span>

                          <span style={{color:'var(--ink-soft)'}}>Costo neto x u:</span>
                          <span style={{textAlign:'right'}}>{fmt$(cbNeto)}</span>

                          <span style={{color: utilidadUnit >= 0 ? 'var(--good)' : 'var(--bad)', fontWeight:700}}>
                            Utilidad x huevo:
                          </span>
                          <strong style={{textAlign:'right', color: utilidadUnit >= 0 ? 'var(--good)' : 'var(--bad)'}}>
                            {fmt$(utilidadUnit)}
                          </strong>

                          <span style={{color: utilidadUnit >= 0 ? 'var(--good)' : 'var(--bad)'}}>
                            Utilidad x {FORMATOS[fmt].label.toLowerCase()}:
                          </span>
                          <strong style={{textAlign:'right', color: utilidadUnit >= 0 ? 'var(--good)' : 'var(--bad)'}}>
                            {fmt$(utilidadCaja)}
                          </strong>

                          <span style={{color:'var(--ink-soft)'}}>Margen:</span>
                          <strong style={{textAlign:'right', color: margenPct >= 0 ? 'var(--good)' : 'var(--bad)'}}>
                            {margenPct.toFixed(1)}%
                          </strong>
                        </div>
                      </div>
                    )}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      ))}
      <button className="btn accent full" onClick={save} disabled={saving}>{saving?'Guardando...':'💾 Guardar precios'}</button>

      {/* === MODAL PREVISUALIZACIÓN RECÁLCULO === */}
      {modalRecalculo && (
        <ModalRecalculoPrecios
          data={modalRecalculo}
          session={session}
          onClose={() => setModalRecalculo(null)}
          onToast={onToast}
          onConfirm={async () => {
            try {
              const { resultados, fecha: fechaRec } = modalRecalculo;
              // Cargar clientes para WhatsApp
              const clientesRaw = await fbGet('clientes');
              const clientesMap = clientesRaw || {};

              for (const r of resultados) {
                // Actualizar venta en Firebase
                await fbUpdate(`ventas/${r.venta.id}`, {
                  totalNeto: r.nuevoTotalNeto,
                  totalIva: r.nuevoTotalIva,
                  totalBruto: r.nuevoTotalBruto,
                  items: r.itemsActualizados,
                  _precioCorregidoEn: nowISO(),
                  _precioCorregidoPor: session.id,
                  _totalBrutoOriginal: r.venta.totalBruto,
                });

                // Si tiene cierre aprobado → notificación de alerta
                if (r.tieneCierreAprobado) {
                  await fbSet(`notificaciones/${uid()}`, {
                    tipo: 'diferencia_precio',
                    titulo: '⚠️ Diferencia por corrección de precios',
                    mensaje: `Venta del ${fechaRec} corregida. Diferencia: ${r.diferencia > 0 ? '+' : ''}${fmt$(r.diferencia)}. El cierre ya estaba aprobado — verificar rendición.`,
                    link: 'cierres',
                    ventaId: r.venta.id,
                    prioridad: 'urgente',
                    destinatario: 'admin',
                    creadaPor: 'sistema',
                    creadaEn: nowISO(),
                    leida: false,
                  });
                }
              }

              await fbLog(session.id, 'recalculo_precios', 'ventas', {
                fecha: fechaRec,
                ventasAfectadas: resultados.length,
              });

              onToast(`✓ ${resultados.length} venta${resultados.length!==1?'s':''} corregida${resultados.length!==1?'s':''}`, 'success');
              setModalRecalculo(null);
            } catch(e) {
              console.error(e);
              onToast('Error al aplicar corrección','error');
            }
          }}
        />
      )}
    </div>
  );
}

// Modal de previsualización del recálculo
function ModalRecalculoPrecios({ data, session, onClose, onToast, onConfirm }) {
  const { resultados, fecha, totalVentas } = data;
  const [aplicando, setAplicando] = useState(false);
  const { list: clientes } = useFirebaseList('clientes');

  const totalDiferencia = resultados.reduce((s, r) => s + r.diferencia, 0);
  const conCierre = resultados.filter(r => r.tieneCierreAprobado);

  const enviarWhatsApp = (r) => {
    const cli = clientes.find(c => c.id === r.venta.clienteId);
    if (!cli) return onToast('Cliente sin datos','warn');
    const tel = cli.telefonoContacto || cli.telefono;
    if (!tel) return onToast('Cliente sin teléfono registrado','warn');
    const fechaStr = new Date(r.venta.creadoEn).toLocaleDateString('es-CL',{
      weekday:'long', day:'numeric', month:'long'
    });
    // Detalle de productos para contextualizar al cliente
    const detalleItems = (r.venta.items||[]).map(it => {
      const fmt = it.formato || (it.cajas > 0 ? 'caja' : 'bandeja');
      const cant = fmt === 'caja' ? it.cajas : it.bandejas;
      return `   • ${cant} ${fmt==='caja'?`caja${cant>1?'s':''}`:
        `bandeja${cant>1?'s':''}`} ${it.calibre}`;
    }).join('\n');
    const msg = `🥚 *INTEGRAL SUR · Distribuidora*\n\nHola ${cli.contacto||cli.razonSocial}, esperamos que se encuentre muy bien 😊\n\nNecesitamos informarle que hubo un error en el precio confirmado esta mañana, por lo que el total de su pedido del ${fechaStr} tuvo que ser corregido:\n\n📦 *Detalle del pedido:*\n${detalleItems}\n\n💰 *Monto anterior:* ${fmt$(r.venta.totalBruto)}\n✅ *Monto correcto:* ${fmt$(r.nuevoTotalBruto)}\n\nDisculpe las molestias ocasionadas. Estamos a su disposición para cualquier consulta 🙏\n\n¡Muchas gracias por su comprensión y confianza en nosotros! 🙏🥚`;
    abrirWhatsApp(tel, msg);
  };

  const handleConfirm = async () => {
    setAplicando(true);
    await onConfirm();
    setAplicando(false);
  };

  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <h3>🔄 Corrección de precios — {fecha}</h3>

        {/* Resumen */}
        <div className="card" style={{background: conCierre.length > 0 ? 'var(--bad-bg)' : 'var(--warn-bg)', marginBottom:10}}>
          <div style={{fontWeight:700, fontSize:13, marginBottom:4}}>
            {resultados.length} venta{resultados.length!==1?'s':''} afectadas de {totalVentas} del día
          </div>
          <div style={{fontSize:12, color:'var(--ink-soft)', lineHeight:1.7}}>
            Diferencia total: <strong style={{color: totalDiferencia > 0 ? 'var(--good)' : 'var(--bad)'}}>
              {totalDiferencia > 0 ? '+' : ''}{fmt$(totalDiferencia)}
            </strong>
          </div>
          {conCierre.length > 0 && (
            <div style={{fontSize:12, color:'var(--bad)', fontWeight:700, marginTop:6}}>
              ⚠️ {conCierre.length} venta{conCierre.length!==1?'s tienen':' tiene'} cierre ya aprobado — se generará alerta
            </div>
          )}
        </div>

        {/* Detalle por venta */}
        {resultados.map((r, idx) => {
          const cli = clientes.find(c => c.id === r.venta.clienteId);
          const tieneWA = !!(cli?.telefonoContacto || cli?.telefono);
          return (
            <div key={r.venta.id} className="card" style={{
              borderLeft: `4px solid ${r.tieneCierreAprobado ? 'var(--bad)' : 'var(--warn)'}`,
              marginBottom:8
            }}>
              <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:4}}>
                <div>
                  <strong style={{fontSize:13}}>{cli?.razonSocial || cli?.nombre || 'Cliente'}</strong>
                  {r.tieneCierreAprobado && (
                    <span style={{fontSize:10, color:'var(--bad)', fontWeight:700, marginLeft:6,
                      background:'var(--bad-bg)', padding:'1px 5px', borderRadius:4}}>
                      ⚠️ Cierre aprobado
                    </span>
                  )}
                </div>
                {tieneWA && (
                  <button className="btn sm" onClick={() => enviarWhatsApp(r)}
                    style={{background:'#25D366', color:'white', border:'none', fontSize:11}}>
                    📲 WA
                  </button>
                )}
              </div>
              <div style={{fontSize:11, fontFamily:'JetBrains Mono, monospace', lineHeight:1.8}}>
                <div style={{display:'flex', justifyContent:'space-between'}}>
                  <span style={{color:'var(--ink-soft)'}}>Precio anterior:</span>
                  <span style={{textDecoration:'line-through', color:'var(--ink-mute)'}}>{fmt$(r.venta.totalBruto)}</span>
                </div>
                <div style={{display:'flex', justifyContent:'space-between'}}>
                  <span style={{color:'var(--ink-soft)'}}>Precio corregido:</span>
                  <strong style={{color:'var(--accent)'}}>{fmt$(r.nuevoTotalBruto)}</strong>
                </div>
                <div style={{display:'flex', justifyContent:'space-between', borderTop:'1px solid var(--line)', marginTop:4, paddingTop:4}}>
                  <span style={{color:'var(--ink-soft)'}}>Diferencia:</span>
                  <strong style={{color: r.diferencia > 0 ? 'var(--good)' : 'var(--bad)'}}>
                    {r.diferencia > 0 ? '+' : ''}{fmt$(r.diferencia)}
                  </strong>
                </div>
              </div>
            </div>
          );
        })}

        {resultados.length === 0 && (
          <div className="empty">✓ Todas las ventas ya tienen el precio correcto</div>
        )}

        <div className="alert-banner" style={{fontSize:11, marginTop:8}}>
          <span className="ico">ℹ️</span>
          <div>Al confirmar, los montos se actualizan en todas las ventas. Luego puedes enviar WhatsApp a cada cliente con el monto corregido usando el botón 📲 de cada venta.</div>
        </div>

        <div className="actions" style={{marginTop:14}}>
          <button className="btn ghost" onClick={onClose} disabled={aplicando}>Cancelar</button>
          {resultados.length > 0 && (
            <button className="btn" onClick={handleConfirm} disabled={aplicando}
              style={{background:'var(--bad)', color:'white', border:'none'}}>
              {aplicando ? '⏳ Aplicando...' : `✓ Confirmar corrección (${resultados.length})`}
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

// =========================== STOCK ===========================
function Stock({ session, onToast }) {
  const isAdmin = session.role === 'admin';
  const [tab, setTab] = useState('bodega');
  const { data: bodega } = useFirebaseValue('stockBodega');
  const { data: vehiculos } = useFirebaseValue('stockVehiculo');
  const { list: reservas } = useFirebaseList('reservas');
  const [modalTraspaso, setModalTraspaso] = useState(false);

  const reservasActivas = useMemo(() =>
    reservas.filter(r => r.status === 'pendiente' || r.status === 'aprobada'),
    [reservas]);

  const reservadoEnBodegaPorCalibre = useMemo(() => {
    const map = {}; CALIBRES.forEach(c => map[c] = 0);
    reservasActivas.forEach(r => {
      const items = r.itemsAprobados || r.itemsPedidos || [];
      items.forEach(it => { const u = (it.cajas||0)*180+(it.bandejas||0)*30; map[it.calibre] = (map[it.calibre]||0)+u; });
    });
    return map;
  }, [reservasActivas]);

  const reservadoPorVendedor = useMemo(() => {
    const map = {};
    VENDEDORES.forEach(v => { map[v.id] = {}; CALIBRES.forEach(c => map[v.id][c] = 0); });
    reservasActivas.forEach(r => {
      if (!map[r.vendedorId]) return;
      const items = r.itemsAprobados || r.itemsPedidos || [];
      items.forEach(it => { const u = (it.cajas||0)*180+(it.bandejas||0)*30; map[r.vendedorId][it.calibre] = (map[r.vendedorId][it.calibre]||0)+u; });
    });
    return map;
  }, [reservasActivas]);

  return (
    <div className="pad">
      <h2 className="section-title">Stock</h2>
      <div className="section-sub">Sincronizado</div>

      <div className="tabs" style={{overflowX:'auto', whiteSpace:'nowrap'}}>
        <button className={`tab ${tab==='bodega'?'active':''}`} onClick={()=>setTab('bodega')}>📦 Bodega</button>
        <button className={`tab ${tab==='vehiculos'?'active':''}`} onClick={()=>setTab('vehiculos')}>🚐 Vehículos</button>
        <button className={`tab ${tab==='traspaso'?'active':''}`} onClick={()=>setTab('traspaso')}>🔄 Traspaso</button>
      </div>

      {tab === 'bodega' && (
        <div className="card">
          <h3>Stock de bodega</h3>
          <table className="t">
            <thead><tr><th>Calibre</th><th className="num">Cajas</th><th className="num">Bandejas</th><th className="num">Reservado</th></tr></thead>
            <tbody>
              {CALIBRES.map(c => {
                const u = bodega?.[c] || 0;
                const b = unitsBreakdown(u);
                const reservado = reservadoEnBodegaPorCalibre[c] || 0;
                const bReserv = unitsBreakdown(reservado);
                return <tr key={c}>
                  <td><strong>{c}</strong></td>
                  <td className="num">{fmtN(b.cajasInt)}</td>
                  <td className="num">{fmtN(b.bandejasInt)}</td>
                  <td className="num" style={{color: reservado > 0 ? 'var(--warn)' : 'var(--ink-mute)'}}>
                    {reservado > 0 ? `${bReserv.cajasInt>0?bReserv.cajasInt+'cj':''}${bReserv.cajasInt>0&&bReserv.bandejasInt>0?' ':''}${bReserv.bandejasInt>0?bReserv.bandejasInt+'bd':''}` : '—'}
                  </td>
                </tr>;
              })}
            </tbody>
          </table>
          {Object.values(reservadoEnBodegaPorCalibre).some(v => v > 0) && (
            <div style={{fontSize:11, color:'var(--ink-soft)', marginTop:8, fontStyle:'italic'}}>
              ⚠️ Las reservas aprobadas se restarán al ser retiradas.
            </div>
          )}
        </div>
      )}

      {tab === 'vehiculos' && (
        <>
          {VENDEDORES.map(v => {
            const veh = vehiculos?.[v.id] || {};
            const reservasVendedor = reservadoPorVendedor[v.id] || {};
            return (
              <div key={v.id} className="card">
                <h3>🚐 {v.name}</h3>
                <table className="t">
                  <thead><tr><th>Calibre</th><th className="num">Cajas</th><th className="num">Bandejas</th><th className="num">Reservado</th></tr></thead>
                  <tbody>
                    {CALIBRES.map(c => {
                      const u = veh[c]||0;
                      const b = unitsBreakdown(u);
                      const reservado = reservasVendedor[c] || 0;
                      const bReserv = unitsBreakdown(reservado);
                      return <tr key={c}>
                        <td><strong>{c}</strong></td>
                        <td className="num">{fmtN(b.cajasInt)}</td>
                        <td className="num">{fmtN(b.bandejasInt)}</td>
                        <td className="num" style={{color: reservado > 0 ? 'var(--warn)' : 'var(--ink-mute)'}}>
                          {reservado > 0 ? `${bReserv.cajasInt>0?bReserv.cajasInt+'cj':''}${bReserv.cajasInt>0&&bReserv.bandejasInt>0?' ':''}${bReserv.bandejasInt>0?bReserv.bandejasInt+'bd':''}` : '—'}
                        </td>
                      </tr>;
                    })}
                  </tbody>
                </table>
              </div>
            );
          })}
        </>
      )}

      {tab === 'traspaso' && (
        <div>
          <div className="alert-banner info" style={{fontSize:12, marginBottom:12}}>
            <span className="ico">🔄</span>
            <div>El vendedor que <strong>cede</strong> mercadería inicia el traspaso. El receptor debe <strong>aceptar</strong> para que el stock se mueva.</div>
          </div>

          {/* Traspasos pendientes de aceptar */}
          <TraspasosPendientes session={session} vehiculos={vehiculos} onToast={onToast}/>

          <button className="btn accent full" onClick={()=>setModalTraspaso(true)} style={{marginTop:10}}>
            🔄 Iniciar traspaso de mercadería
          </button>
        </div>
      )}

      {modalTraspaso && (
        <ModalTraspaso
          session={session}
          vehiculos={vehiculos}
          onClose={()=>setModalTraspaso(false)}
          onToast={onToast}
        />
      )}
    </div>
  );
}

function TraspasosPendientes({ session, vehiculos, onToast }) {
  const isAdmin = session.role === 'admin';
  const { list: traspasos } = useFirebaseList('traspasos');

  // Admin: ve traspasos pendientes de su aprobación
  const pendientesAdmin = traspasos.filter(t => t.status === 'pendiente_admin');
  // Vendedor receptor: ve traspasos aprobados por admin esperando su aceptación
  const pendientesReceptor = traspasos.filter(t =>
    t.receptorId === session.id && t.status === 'aprobado_admin'
  );

  if (!isAdmin && pendientesReceptor.length === 0) return null;
  if (isAdmin && pendientesAdmin.length === 0) return null;

  const lista = isAdmin ? pendientesAdmin : pendientesReceptor;

  return (
    <div>
      {lista.map(t => {
        const cedente  = VENDEDORES.find(v => v.id === t.cedenteId);
        const receptor = VENDEDORES.find(v => v.id === t.receptorId);
        return (
          <div key={t.id} className="card" style={{borderLeft:'4px solid var(--accent)', marginBottom:8}}>
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:4}}>
              <strong style={{fontSize:14}}>
                {isAdmin ? `📦 ${cedente?.name} → ${receptor?.name}` : `📦 Traspaso de ${cedente?.name}`}
              </strong>
              <span style={{fontSize:11, color:'var(--ink-mute)'}}>
                {new Date(t.creadoEn).toLocaleString('es-CL',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})}
              </span>
            </div>
            <div style={{background:'var(--bg-2)', borderRadius:8, padding:'8px 10px', fontSize:12, fontFamily:'JetBrains Mono, monospace', marginBottom:8}}>
              {(t.items||[]).map((it,i) => (
                <div key={i}>{it.cajas>0?`${it.cajas} caja${it.cajas>1?'s':''}`:`${it.bandejas} bandeja${it.bandejas>1?'s':''}`} {it.calibre}</div>
              ))}
              <div style={{marginTop:4, color:'var(--ink-soft)'}}>Total: {fmtN(t.totalUnidades)}u</div>
            </div>
            {t.observaciones && <div style={{fontSize:11, color:'var(--ink-soft)', marginBottom:8, fontStyle:'italic'}}>"{t.observaciones}"</div>}
            {isAdmin ? (
              // Admin: aprobar o rechazar
              <div className="actions">
                <button className="btn danger sm" onClick={async () => {
                  if (!confirm('¿Rechazar este traspaso?')) return;
                  await fbUpdate(`traspasos/${t.id}`, { status: 'rechazado', rechazadoEn: nowISO(), rechazadoPor: session.id });
                  onToast('Traspaso rechazado','warn');
                }}>✗ Rechazar</button>
                <button className="btn accent" onClick={async () => {
                  await fbUpdate(`traspasos/${t.id}`, { status: 'aprobado_admin', aprobadoAdminEn: nowISO(), aprobadoAdminPor: session.id });
                  // Notificar al receptor
                  await crearNotificacion(session, {
                    tipo: 'traspaso_aprobado',
                    titulo: '🔄 Traspaso aprobado — confirma recepción',
                    mensaje: `Admin aprobó el traspaso de ${cedente?.name}. Ve a Stock → Traspaso para confirmar recepción.`,
                    link: 'stock',
                    destinatarioId: t.receptorId,
                    prioridad: 'urgente',
                  });
                  onToast('✓ Traspaso aprobado · el receptor debe confirmar','success');
                }}>✓ Aprobar</button>
              </div>
            ) : (
              // Receptor: confirmar recepción física
              <div className="actions">
                <button className="btn danger sm" onClick={async () => {
                  if (!confirm('¿Rechazar este traspaso?')) return;
                  await fbUpdate(`traspasos/${t.id}`, { status: 'rechazado', rechazadoEn: nowISO(), rechazadoPor: session.id });
                  onToast('Traspaso rechazado','warn');
                }}>✗ Rechazar</button>
                <button className="btn accent" onClick={async () => {
                  try {
                    const vehCedente  = await fbGet(`stockVehiculo/${t.cedenteId}`)  || {};
                    const vehReceptor = await fbGet(`stockVehiculo/${t.receptorId}`) || {};
                    const newCedente  = {...vehCedente};
                    const newReceptor = {...vehReceptor};
                    for (const it of (t.items||[])) {
                      const u = (it.cajas||0)*180 + (it.bandejas||0)*30;
                      if ((newCedente[it.calibre]||0) < u) {
                        return onToast(`Stock insuficiente: ${it.calibre} en vehículo de ${cedente?.name}`,'error');
                      }
                      newCedente[it.calibre]  = (newCedente[it.calibre]||0)  - u;
                      newReceptor[it.calibre] = (newReceptor[it.calibre]||0) + u;
                    }
                    await fbSet(`stockVehiculo/${t.cedenteId}`,  newCedente);
                    await fbSet(`stockVehiculo/${t.receptorId}`, newReceptor);
                    await fbUpdate(`traspasos/${t.id}`, { status: 'aceptado', aceptadoEn: nowISO(), aceptadoPor: session.id });
                    await fbLog(session.id, 'aceptar', 'traspasos', { traspasoId: t.id });
                    onToast('✓ Recepción confirmada · stock actualizado','success');
                  } catch(e) { console.error(e); onToast('Error al confirmar','error'); }
                }}>✓ Confirmar recepción</button>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// Modal para iniciar un traspaso de mercadería entre vehículos
function ModalTraspaso({ session, vehiculos, onClose, onToast }) {
  const otrosVendedores = VENDEDORES.filter(v => v.id !== session.id);
  const [receptorId, setReceptorId] = useState(otrosVendedores[0]?.id || '');
  const [items, setItems] = useState(() => {
    const base = {}; CALIBRES.forEach(c => base[c] = { cajas: 0, bandejas: 0 });
    return base;
  });
  const [observaciones, setObservaciones] = useState('');
  const [saving, setSaving] = useState(false);

  const miVehiculo = vehiculos?.[session.id] || {};
  const setVal = (cal, field, val) => {
    const v = parseInt(val)||0;
    setItems(prev => ({ ...prev, [cal]: { ...prev[cal], [field]: v < 0 ? 0 : v } }));
  };

  const totalUnidades = Object.values(items).reduce((s,i) => s + i.cajas*180 + i.bandejas*30, 0);
  const itemsArr = CALIBRES.map(c => ({ calibre: c, cajas: items[c].cajas, bandejas: items[c].bandejas })).filter(i => i.cajas > 0 || i.bandejas > 0);

  const guardar = async () => {
    if (!receptorId) return onToast('Selecciona al compañero receptor','error');
    if (itemsArr.length === 0) return onToast('Ingresa al menos un producto','error');
    // Validar stock disponible
    for (const it of itemsArr) {
      const u = it.cajas*180 + it.bandejas*30;
      if ((miVehiculo[it.calibre]||0) < u) return onToast(`Stock insuficiente: ${it.calibre} (tienes ${fmtN(miVehiculo[it.calibre]||0)}u)`,'error');
    }
    setSaving(true);
    try {
      const newId = uid();
      await fbSet(`traspasos/${newId}`, {
        cedenteId: session.id,
        receptorId,
        items: itemsArr,
        observaciones: observaciones.trim(),
        totalUnidades,
        status: 'pendiente_admin',  // Primero aprueba el admin
        creadoPor: session.id,
        creadoEn: nowISO(),
      });
      // Notificar al ADMIN para que apruebe primero
      await crearNotificacion(session, {
        tipo: 'traspaso_pendiente_admin',
        titulo: '🔄 Traspaso requiere aprobación',
        mensaje: `${session.name || 'Vendedor'} solicita traspasar ${totalUnidades}u a ${VENDEDORES.find(v=>v.id===receptorId)?.name}. Ve a Stock → Traspaso para aprobar.`,
        link: 'stock',
        prioridad: 'urgente',
      });
      await fbLog(session.id, 'create', 'traspasos', { id: newId, receptor: receptorId, total: totalUnidades });
      onToast('✓ Traspaso enviado · pendiente de aprobación del administrador','success');
      onClose();
    } catch(e) { console.error(e); onToast('Error al enviar traspaso','error'); setSaving(false); }
  };

  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <h3>🔄 Traspaso de mercadería</h3>

        <div className="alert-banner info" style={{fontSize:11, marginBottom:12}}>
          <span className="ico">ℹ️</span>
          <div>El compañero debe <strong>aceptar</strong> el traspaso para que el stock se mueva. Hasta entonces, el stock sigue en tu vehículo.</div>
        </div>

        <label className="fld">Entregar a *</label>
        <select className="inp" value={receptorId} onChange={e=>setReceptorId(e.target.value)}>
          {otrosVendedores.map(v => <option key={v.id} value={v.id}>{v.name}</option>)}
        </select>

        <label className="fld" style={{marginTop:8}}>Mercadería a traspasar</label>
        {CALIBRES.map(c => {
          const dispCajas = Math.floor((miVehiculo[c]||0) / 180);
          const dispBandejas = Math.floor(((miVehiculo[c]||0) % 180) / 30);
          if (dispCajas === 0 && dispBandejas === 0) return null;
          return (
            <div key={c} style={{background:'var(--bg-2)', borderRadius:8, padding:'10px 12px', marginBottom:8}}>
              <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:6}}>
                <strong style={{fontSize:13}}>{c}</strong>
                <span style={{fontSize:11, color:'var(--ink-soft)'}}>
                  Disponible: {dispCajas > 0 ? `${dispCajas}cj` : ''}{dispCajas>0&&dispBandejas>0?' ':''}
                  {dispBandejas > 0 ? `${dispBandejas}bd` : ''}
                </span>
              </div>
              <div className="row">
                <div>
                  <label className="fld" style={{fontSize:10}}>Cajas</label>
                  <input type="number" className="inp" value={items[c].cajas||''} min="0" max={dispCajas}
                    onChange={e=>setVal(c,'cajas',e.target.value)}
                    style={{marginBottom:0, padding:'8px 10px'}}/>
                </div>
                <div>
                  <label className="fld" style={{fontSize:10}}>Bandejas</label>
                  <input type="number" className="inp" value={items[c].bandejas||''} min="0" max={dispBandejas}
                    onChange={e=>setVal(c,'bandejas',e.target.value)}
                    style={{marginBottom:0, padding:'8px 10px'}}/>
                </div>
              </div>
            </div>
          );
        })}

        {totalUnidades > 0 && (
          <div style={{padding:'8px 12px', background:'var(--accent-soft)', borderRadius:8, fontSize:13, fontFamily:'JetBrains Mono, monospace', marginBottom:8, display:'flex', justifyContent:'space-between'}}>
            <span>Total a traspasar:</span>
            <strong>{fmtN(totalUnidades)}u</strong>
          </div>
        )}

        <label className="fld">Observaciones (opcional)</label>
        <input type="text" className="inp" value={observaciones} onChange={e=>setObservaciones(e.target.value)} placeholder="Ej: sobrante de la ruta"/>

        <div className="actions" style={{marginTop:14}}>
          <button className="btn ghost" onClick={onClose}>Cancelar</button>
          <button className="btn accent" onClick={guardar} disabled={saving || totalUnidades === 0}>
            {saving ? '...' : '🔄 Enviar traspaso'}
          </button>
        </div>
      </div>
    </div>
  );
}

// =========================== COMPRAS ===========================
function Compras({ session, onToast }) {
  const { list: compras, loading } = useFirebaseList('compras');
  const { list: proveedores } = useFirebaseList('proveedores');
  const [modal, setModal] = useState(false);
  const [modalEditar, setModalEditar] = useState(null); // compra a editar
  const [modalFactura, setModalFactura] = useState(null);
  const comprasSorted = useMemo(() => [...compras].sort((a,b) => (b.fecha||'').localeCompare(a.fecha||'')), [compras]);

  // Compras sin factura adjunta — para resumen de alerta
  const sinFactura = comprasSorted.filter(c => !c.facturaAdjunta);

  if (loading) return <div className="pad"><div className="empty">Cargando...</div></div>;
  return (
    <div className="pad">
      <h2 className="section-title">Compras</h2>
      <div className="section-sub">{compras.length} registros · ingreso a bodega</div>

      {sinFactura.length > 0 && (
        <div className="alert-banner" style={{fontSize:12, background:'var(--warn-bg)', marginBottom:10}}>
          <span className="ico">📎</span>
          <div><strong>{sinFactura.length} compra{sinFactura.length>1?'s':''} sin factura adjunta</strong> · Adjunta la factura del proveedor en los primeros 3 días.</div>
        </div>
      )}

      <button className="btn accent full" onClick={()=>setModal(true)} style={{marginBottom:14}} disabled={proveedores.length===0}>➕ Registrar compra</button>
      {proveedores.length === 0 && <div className="alert-banner" style={{fontSize:12}}><span className="ico">⚠️</span><div>Primero crea un proveedor.</div></div>}
      {comprasSorted.length === 0 ? <div className="empty">Sin compras</div> :
        comprasSorted.map(c => {
          const prov = proveedores.find(p => p.id === c.proveedorId);
          const diasDesde = Math.floor((new Date() - new Date(c.creadoEn || c.fecha)) / 86400000);
          const sinFact = !c.facturaAdjunta;
          const alertaFact = sinFact && diasDesde >= 3;
          return (
            <div key={c.id} className="card" style={{borderLeft: alertaFact ? '4px solid var(--warn)' : sinFact ? '4px solid var(--line)' : '4px solid var(--good)'}}>
              <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', gap:8}}>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700, fontSize:14}}>{new Date(c.fecha).toLocaleDateString('es-CL', {day:'numeric', month:'long'})} · {prov?.razonSocial || '?'}</div>

                  {/* Detalle por calibre con costo x unidad */}
                  <div style={{marginTop:6}}>
                    {(c.items||[]).map((it, idx) => {
                      const unidades = it.cajas * 180;
                      const costoUnit = it.costoUnit || 0;
                      const costoUnitNeto = costoUnit / (1 + IVA_RATE);
                      return (
                        <div key={idx} style={{
                          padding:'5px 8px',
                          background:'var(--bg-2)',
                          borderRadius:6,
                          marginBottom:4,
                          fontSize:11,
                          fontFamily:'JetBrains Mono, monospace',
                        }}>
                          <div style={{display:'flex', justifyContent:'space-between', alignItems:'baseline'}}>
                            <strong style={{fontSize:12}}>{it.calibre}</strong>
                            <span style={{color:'var(--ink-soft)'}}>{it.cajas} caj · {fmtN(unidades)}u</span>
                          </div>
                          {costoUnit > 0 && (
                            <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'1px 8px', marginTop:3, color:'var(--ink-soft)'}}>
                              <span>Costo x u (c/IVA):</span>
                              <strong style={{textAlign:'right', color:'var(--ink)'}}>{fmt$(costoUnit)}</strong>
                              <span>Costo x u (neto):</span>
                              <span style={{textAlign:'right'}}>{fmt$(costoUnitNeto)}</span>
                              <span>Subtotal:</span>
                              <strong style={{textAlign:'right'}}>{fmt$(costoUnit * unidades)}</strong>
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>

                  <div style={{fontSize:12, color:'var(--ink-soft)', marginTop:4, fontFamily:'JetBrains Mono, monospace'}}>
                    Total: {fmtN(c.totalUnidades)}u · <strong>{fmt$(c.totalBruto)}</strong>
                  </div>
                  {/* Estado factura proveedor */}
                  <div style={{marginTop:6, display:'flex', gap:6, alignItems:'center', flexWrap:'wrap'}}>
                    {c.facturaAdjunta
                      ? <span className="badge good">📎 Factura adjunta · N°{c.numeroFacturaProv || '—'}</span>
                      : alertaFact
                        ? <span className="badge warn">⚠️ Sin factura · {diasDesde}d</span>
                        : <span className="badge" style={{background:'var(--bg-2)', color:'var(--ink-soft)'}}>📎 Sin factura aún</span>
                    }
                  </div>
                  {!c.facturaAdjunta && (
                    <button className="btn ghost sm" style={{marginTop:6, fontSize:11}}
                      onClick={() => setModalFactura(c)}>
                      📎 Adjuntar factura proveedor
                    </button>
                  )}
                  {c.facturaAdjunta && c.facturaProvPdf && (
                    <button className="btn ghost sm" style={{marginTop:6, fontSize:11}}
                      onClick={() => window.open(c.facturaProvPdf, '_blank')}>
                      👁️ Ver factura adjunta
                    </button>
                  )}
                </div>
                <div style={{display:'flex', flexDirection:'column', gap:4}}>
                  <button className="btn ghost sm" style={{fontSize:11}}
                    onClick={() => setModalEditar(c)}>✏️ Editar</button>
                  <button className="btn danger sm" onClick={async ()=>{
                  if (!confirm(`¿Eliminar compra? El stock se revertirá.`)) return;
                  try {
                    const bod = await fbGet('stockBodega') || {};
                    const newBod = { ...bod };
                    (c.items||[]).forEach(i => {
                      const u = i.cajas * 180;
                      newBod[i.calibre] = (newBod[i.calibre]||0) - u;
                      if (newBod[i.calibre] < 0) throw new Error('Stock insuficiente para revertir');
                    });
                    await fbSet('stockBodega', newBod);
                    await fbRemove(`compras/${c.id}`);
                    onToast('Eliminada · stock revertido','warn');
                  } catch(e) { onToast(e.message || 'Error','error'); }
                }}>×</button>
                </div>
              </div>
            </div>
          );
        })
      }
      {modal && <ModalCompra session={session} proveedores={proveedores} onClose={()=>setModal(false)} onToast={onToast}/>}
      {modalEditar && (
        <ModalCompra
          session={session}
          proveedores={proveedores}
          compraEditar={modalEditar}
          onClose={()=>setModalEditar(null)}
          onToast={onToast}
        />
      )}
      {modalFactura && (
        <ModalAdjuntarFacturaProv
          compra={modalFactura}
          proveedor={proveedores.find(p=>p.id===modalFactura.proveedorId)}
          session={session}
          onClose={()=>setModalFactura(null)}
          onToast={onToast}
        />
      )}
    </div>
  );
}

// Modal para adjuntar factura del proveedor a una compra
function ModalAdjuntarFacturaProv({ compra, proveedor, session, onClose, onToast }) {
  const [numeroFactura, setNumeroFactura] = useState('');
  const [fechaFactura, setFechaFactura] = useState(todayStr());
  const [pdfFile, setPdfFile] = useState(null);
  const [saving, setSaving] = useState(false);
  const fileInputRef = React.useRef(null);

  const procesarArchivo = (file) => {
    if (!file) return;
    if (file.size > 8 * 1024 * 1024) return onToast('Archivo muy grande (máx 8MB)','error');
    const reader = new FileReader();
    reader.onload = e => setPdfFile(e.target.result);
    reader.readAsDataURL(file);
  };

  const guardar = async () => {
    if (!numeroFactura.trim()) return onToast('Ingresa el N° de factura del proveedor','error');
    setSaving(true);
    try {
      const updates = {
        facturaAdjunta: true,
        numeroFacturaProv: numeroFactura.trim(),
        fechaFacturaProv: fechaFactura,
        facturaAdjuntadaEn: nowISO(),
        facturaAdjuntadaPor: session.id,
      };
      if (pdfFile) updates.facturaProvPdf = pdfFile;
      await fbUpdate(`compras/${compra.id}`, updates);
      await fbLog(session.id, 'adjuntar_factura_prov', 'compras', {
        compraId: compra.id,
        numero: numeroFactura,
        proveedor: proveedor?.razonSocial,
      });
      onToast('✓ Factura del proveedor adjuntada','success');
      onClose();
    } catch(e) { console.error(e); onToast('Error al guardar','error'); }
    setSaving(false);
  };

  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <h3>📎 Adjuntar factura proveedor</h3>

        <div className="card" style={{background:'var(--bg-2)', marginBottom:12}}>
          <strong>{proveedor?.razonSocial || 'Proveedor'}</strong>
          <div style={{fontSize:12, color:'var(--ink-soft)', marginTop:4}}>
            Compra del {new Date(compra.fecha).toLocaleDateString('es-CL',{day:'numeric',month:'long',year:'numeric'})}
            · {fmt$(compra.totalBruto)}
          </div>
          <div style={{fontSize:11, color:'var(--ink-soft)', marginTop:2}}>
            {(compra.items||[]).map(i=>`${i.cajas}cj ${i.calibre}`).join(' · ')}
          </div>
        </div>

        <label className="fld">N° de factura del proveedor *</label>
        <input type="text" className="inp" value={numeroFactura}
          onChange={e=>setNumeroFactura(e.target.value)} placeholder="Ej: 001234"/>

        <label className="fld">Fecha de la factura</label>
        <input type="date" className="inp" value={fechaFactura}
          onChange={e=>setFechaFactura(e.target.value)}/>

        <label className="fld">📎 Adjuntar PDF o imagen (opcional)</label>
        <button className="btn ghost full" onClick={()=>fileInputRef.current?.click()}>
          {pdfFile ? '✓ Archivo adjunto · Cambiar' : '📂 Seleccionar archivo'}
        </button>
        <input ref={fileInputRef} type="file" accept=".pdf,image/*"
          onChange={e=>procesarArchivo(e.target.files[0])} style={{display:'none'}}/>
        {pdfFile && <div style={{fontSize:11, color:'var(--good)', marginTop:4}}>✓ Listo para adjuntar</div>}

        <div className="actions" style={{marginTop:14}}>
          <button className="btn ghost" onClick={onClose}>Cancelar</button>
          <button className="btn accent" onClick={guardar} disabled={saving || !numeroFactura.trim()}>
            {saving ? '...' : '💾 Guardar factura'}
          </button>
        </div>
      </div>
    </div>
  );
}

function ModalCompra({ session, proveedores, compraEditar, onClose, onToast }) {
  const editando = !!compraEditar;
  const [proveedorId, setProveedorId] = useState(compraEditar?.proveedorId || proveedores[0]?.id || '');
  const [fecha, setFecha] = useState(
    compraEditar ? isoToLocalDate(compraEditar.fecha) : todayStr()
  );
  const [items, setItems] = useState(
    compraEditar?.items ? compraEditar.items.map(i => ({...i})) : []
  );
  const [calibre, setCalibre] = useState('Primera');
  const [cajas, setCajas] = useState('');
  const [costoUnit, setCostoUnit] = useState('');
  const [saving, setSaving] = useState(false);

  const addItem = () => {
    const cj = parseInt(cajas)||0;
    const cu = parseFloat(costoUnit)||0;
    if (cj <= 0) return onToast('Ingresa cantidad de cajas','error');
    if (cu <= 0) return onToast('Ingresa costo unitario','error');
    // Si ya existe ese calibre, reemplazar
    const existe = items.findIndex(i => i.calibre === calibre);
    if (existe >= 0) {
      const nuevos = [...items];
      nuevos[existe] = { calibre, cajas: cj, costoUnit: cu };
      setItems(nuevos);
      onToast(`${calibre} actualizado`,'info');
    } else {
      setItems([...items, { calibre, cajas: cj, costoUnit: cu }]);
    }
    setCajas(''); setCostoUnit('');
  };

  const totales = useMemo(() => {
    let tu = 0, tb = 0;
    items.forEach(i => { tu += i.cajas * 180; tb += i.cajas * 180 * i.costoUnit; });
    return { totalU: tu, totalBruto: tb, totalNeto: tb/(1+IVA_RATE), totalIva: tb - tb/(1+IVA_RATE) };
  }, [items]);

  const guardar = async () => {
    if (!proveedorId) return onToast('Selecciona un proveedor','error');
    if (items.length === 0) return onToast('Agrega al menos un ítem','error');
    setSaving(true);
    try {
      if (editando) {
        // EDITAR: ajustar stock según diferencia entre items anteriores y nuevos
        const bod = await fbGet('stockBodega') || {};
        const newBod = { ...bod };
        CALIBRES.forEach(c => { if (newBod[c] === undefined) newBod[c] = 0; });

        // Revertir stock anterior
        (compraEditar.items || []).forEach(i => {
          newBod[i.calibre] = (newBod[i.calibre]||0) - (i.cajas * 180);
        });
        // Aplicar stock nuevo
        items.forEach(i => {
          newBod[i.calibre] = (newBod[i.calibre]||0) + (i.cajas * 180);
        });

        // Validar que ningún calibre quede negativo
        for (const cal of CALIBRES) {
          if (newBod[cal] < 0) {
            onToast(`Stock insuficiente en ${cal} al revertir la compra original`, 'error');
            setSaving(false);
            return;
          }
        }

        await fbUpdate(`compras/${compraEditar.id}`, {
          proveedorId,
          fecha: fecha + 'T' + (compraEditar.fecha?.slice(11) || new Date().toISOString().slice(11)),
          items,
          totalUnidades: totales.totalU,
          totalNeto: totales.totalNeto,
          totalIva: totales.totalIva,
          totalBruto: totales.totalBruto,
          editadoEn: nowISO(),
          editadoPor: session.id,
        });
        await fbSet('stockBodega', newBod);
        await fbLog(session.id, 'edit', 'compras', { compraId: compraEditar.id, totalBruto: totales.totalBruto });
        onToast('✓ Compra actualizada · stock ajustado','success');
      } else {
        // NUEVA compra
        const compra = {
          proveedorId,
          fecha: fecha + 'T' + new Date().toISOString().slice(11),
          items,
          totalUnidades: totales.totalU,
          totalNeto: totales.totalNeto,
          totalIva: totales.totalIva,
          totalBruto: totales.totalBruto,
          creadoPor: session.id,
          creadoEn: nowISO(),
        };
        const bod = await fbGet('stockBodega') || {};
        const newBod = { ...bod };
        CALIBRES.forEach(c => { if (newBod[c] === undefined) newBod[c] = 0; });
        items.forEach(i => { newBod[i.calibre] = (newBod[i.calibre]||0) + (i.cajas * 180); });
        await fbSet(`compras/${uid()}`, compra);
        await fbSet('stockBodega', newBod);
        onToast(`✓ Compra registrada · +${fmtN(totales.totalU)}u en bodega`,'success');
      }
      onClose();
    } catch(e) { console.error(e); onToast('Error al guardar','error'); setSaving(false); }
  };

  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <h3>{editando ? '✏️ Editar compra' : '➕ Nueva compra'}</h3>

        {editando && (
          <div className="alert-banner info" style={{fontSize:11, marginBottom:10}}>
            <span className="ico">ℹ️</span>
            <div>Al guardar, el stock en bodega se ajustará automáticamente según la diferencia entre los valores originales y los nuevos.</div>
          </div>
        )}

        <label className="fld">Proveedor *</label>
        <select className="inp" value={proveedorId} onChange={e=>setProveedorId(e.target.value)}>
          {proveedores.map(p => <option key={p.id} value={p.id}>{p.razonSocial}</option>)}
        </select>

        <label className="fld">Fecha</label>
        <input type="date" className="inp" value={fecha} onChange={e=>setFecha(e.target.value)}/>

        <hr className="div"/>
        <div style={{fontSize:12, fontWeight:700, marginBottom:8, color:'var(--ink-soft)'}}>AGREGAR / EDITAR ÍTEM</div>
        <div className="row">
          <div>
            <label className="fld">Calibre</label>
            <select className="inp" value={calibre} onChange={e=>setCalibre(e.target.value)}>
              {CALIBRES.map(c => <option key={c}>{c}</option>)}
            </select>
          </div>
          <div>
            <label className="fld">Cajas (180u)</label>
            <input type="number" className="inp" value={cajas} onChange={e=>setCajas(e.target.value)} placeholder="0"/>
          </div>
        </div>
        <label className="fld">Costo unitario c/IVA</label>
        <input type="number" step="0.01" className="inp" value={costoUnit}
          onChange={e=>setCostoUnit(e.target.value)} placeholder="$0"/>
        <button className="btn ghost full" onClick={addItem} style={{marginTop:8}}>
          ➕ {items.find(i=>i.calibre===calibre) ? `Actualizar ${calibre}` : `Agregar ${calibre}`}
        </button>

        {items.length > 0 && (
          <>
            <hr className="div"/>
            <div style={{fontSize:12, fontWeight:700, marginBottom:6, color:'var(--ink-soft)'}}>ÍTEMS</div>
            {items.map((i, idx) => (
              <div key={idx} style={{background:'var(--bg-2)', borderRadius:10, padding:'8px 12px', marginBottom:6, display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                <div>
                  <strong>{i.cajas} cj {i.calibre}</strong>
                  <div style={{fontSize:11, color:'var(--ink-soft)'}}>{fmtN(i.cajas*180)}u × {fmt$(i.costoUnit)}</div>
                </div>
                <div style={{display:'flex', alignItems:'center', gap:8}}>
                  <strong style={{fontFamily:'JetBrains Mono, monospace'}}>{fmt$(i.cajas*180*i.costoUnit)}</strong>
                  <button
                    onClick={() => {
                      // Al tocar ítem lo carga en el formulario para editar
                      setCalibre(i.calibre);
                      setCajas(String(i.cajas));
                      setCostoUnit(String(i.costoUnit));
                    }}
                    style={{background:'var(--accent-soft)', border:'none', color:'var(--accent)', borderRadius:6, padding:'2px 8px', fontSize:11}}>
                    ✏️
                  </button>
                  <button
                    onClick={() => setItems(items.filter((_,j) => j !== idx))}
                    style={{background:'transparent', border:'none', color:'var(--bad)', fontSize:18}}>
                    ×
                  </button>
                </div>
              </div>
            ))}
            <div style={{padding:'10px 12px', background:'var(--accent-soft)', borderRadius:8, fontSize:12, fontFamily:'JetBrains Mono, monospace', marginTop:4}}>
              <div style={{display:'flex', justifyContent:'space-between', marginBottom:3}}>
                <span style={{color:'var(--ink-soft)'}}>Total unidades:</span>
                <strong>{fmtN(totales.totalU)} u</strong>
              </div>
              <div style={{display:'flex', justifyContent:'space-between', marginBottom:3}}>
                <span style={{color:'var(--ink-soft)'}}>Neto:</span>
                <span>{fmt$(totales.totalNeto)}</span>
              </div>
              <div style={{display:'flex', justifyContent:'space-between', marginBottom:3}}>
                <span style={{color:'var(--ink-soft)'}}>IVA 19%:</span>
                <span>{fmt$(totales.totalIva)}</span>
              </div>
              <div style={{display:'flex', justifyContent:'space-between', borderTop:'1px solid var(--line)', paddingTop:6, marginTop:4}}>
                <strong style={{fontSize:14}}>TOTAL:</strong>
                <strong style={{fontSize:16, color:'var(--accent)'}}>{fmt$(totales.totalBruto)}</strong>
              </div>
            </div>
          </>
        )}

        <div className="actions" style={{marginTop:14}}>
          <button className="btn ghost" onClick={onClose}>Cancelar</button>
          <button className="btn accent" onClick={guardar} disabled={saving || items.length===0}>
            {saving ? '...' : editando ? '💾 Guardar cambios' : '✓ Registrar compra'}
          </button>
        </div>
      </div>
    </div>
  );
}

// =========================== RESERVAS ===========================
// Vendedor crea una reserva: pide N cajas/bandejas de cada calibre
// Estados: pendiente -> aprobada -> retirada (o rechazada)
// Al ser aprobada, queda con "cantidades aprobadas" que pueden diferir de las pedidas
// Cuando vendedor retira, stock pasa de bodega a su vehículo

function Reservas({ session, onToast }) {
  const { list: reservasAll, loading } = useFirebaseList('reservas');
  const [modal, setModal] = useState(null);
  const [tab, setTab] = useState('pendientes');
  const [filtroVendedor, setFiltroVendedor] = useState('todos');
  const [filtroFecha, setFiltroFecha] = useState('');
  const isAdmin = session.role === 'admin';

  const reservas = useMemo(() =>
    isAdmin ? reservasAll : reservasAll.filter(r => r.vendedorId === session.id),
    [reservasAll, session, isAdmin]);

  const sortedDesc = useMemo(() =>
    [...reservas].sort((a,b) => (b.creadoEn||'').localeCompare(a.creadoEn||'')), [reservas]);

  const pendientes = sortedDesc.filter(r => r.status === 'pendiente');
  const aprobadas = sortedDesc.filter(r => r.status === 'aprobada');
  const rechazadas = sortedDesc.filter(r => r.status === 'rechazada');
  const historico = sortedDesc.filter(r => r.status === 'retirada');

  // Filtros aplicados solo en histórico
  const historicoFiltrado = useMemo(() => {
    let arr = historico;
    if (isAdmin && filtroVendedor !== 'todos') arr = arr.filter(r => r.vendedorId === filtroVendedor);
    if (filtroFecha) arr = arr.filter(r => isoToLocalDate(r.creadoEn) === filtroFecha);
    return arr;
  }, [historico, filtroVendedor, filtroFecha, isAdmin]);

  if (loading) return <div className="pad"><div className="empty">Cargando...</div></div>;

  const grupos = tab === 'pendientes' ? pendientes :
                 tab === 'aprobadas' ? aprobadas :
                 tab === 'rechazadas' ? rechazadas :
                 historicoFiltrado;

  return (
    <div className="pad">
      <h2 className="section-title">Reservas</h2>
      <div className="section-sub">
        {isAdmin ? 'Gestión y aprobación' : 'Pedidos de mercadería'}
      </div>

      {!isAdmin && (
        <button className="btn accent full" onClick={()=>setModal({})} style={{marginBottom:14}}>
          ➕ Nueva reserva
        </button>
      )}

      <div className="tabs">
        <button className={`tab ${tab==='pendientes'?'active':''}`} onClick={()=>setTab('pendientes')}>
          ⏳ Pendientes {pendientes.length>0 && `(${pendientes.length})`}
        </button>
        <button className={`tab ${tab==='aprobadas'?'active':''}`} onClick={()=>setTab('aprobadas')}>
          ✅ Aprobadas {aprobadas.length>0 && `(${aprobadas.length})`}
        </button>
        <button className={`tab ${tab==='rechazadas'?'active':''}`} onClick={()=>setTab('rechazadas')}>
          ✕ Rechazadas {rechazadas.length>0 && `(${rechazadas.length})`}
        </button>
        <button className={`tab ${tab==='historico'?'active':''}`} onClick={()=>setTab('historico')}>
          📚 Histórico
        </button>
      </div>

      {tab === 'historico' && (
        <div className="card">
          {isAdmin && (
            <>
              <label className="fld">Vendedor</label>
              <div style={{display:'flex', gap:4, marginBottom:8}}>
                <button onClick={()=>setFiltroVendedor('todos')} className="btn sm" style={{flex:1, background: filtroVendedor==='todos'?'var(--ink)':'transparent', color: filtroVendedor==='todos'?'var(--ink-on)':'var(--ink-soft)', border:'1.5px solid var(--line)'}}>Todos</button>
                {VENDEDORES.map(v => (
                  <button key={v.id} onClick={()=>setFiltroVendedor(v.id)} className="btn sm" style={{flex:1, background: filtroVendedor===v.id?'var(--ink)':'transparent', color: filtroVendedor===v.id?'var(--ink-on)':'var(--ink-soft)', border:'1.5px solid var(--line)'}}>{v.name}</button>
                ))}
              </div>
            </>
          )}
          <label className="fld">Fecha</label>
          <div style={{display:'flex', gap:6, alignItems:'center'}}>
            <input type="date" className="inp" value={filtroFecha} onChange={e=>setFiltroFecha(e.target.value)} style={{marginBottom:0, flex:1}}/>
            {filtroFecha && (
              <button className="btn ghost sm" onClick={()=>setFiltroFecha('')}>Limpiar</button>
            )}
          </div>
          {!filtroFecha && (
            <div style={{fontSize:11, color:'var(--ink-mute)', marginTop:6, fontStyle:'italic'}}>Mostrando todo el histórico</div>
          )}
        </div>
      )}

      {grupos.length === 0 ? <div className="empty">Sin reservas en esta sección</div> :
        grupos.map(r => <ReservaCard key={r.id} reserva={r} session={session} onOpen={()=>setModal(r)} onToast={onToast}/>)
      }

      {modal && <ModalReserva session={session} reserva={modal.id?modal:null} onClose={()=>setModal(null)} onToast={onToast}/>}
    </div>
  );
}

function ClienteRutaCard({ cli, estado, venta, visita, fueraRuta, onSeleccionar, onAccion }) {
  const colorBorde = estado === 'vendido' ? 'var(--good)' : estado === 'cerrado' ? 'var(--warn)' : estado === 'stock' ? '#0a84ff' : fueraRuta ? 'var(--accent)' : 'var(--line)';
  return (
    <div style={{
      padding:'9px 10px', background:'var(--bg-2)', borderRadius:8,
      marginBottom:5, borderLeft:`3px solid ${colorBorde}`,
      display:'flex', alignItems:'flex-start', gap:8,
    }}>
      <div style={{flex:1, minWidth:0}}>
        <div style={{fontWeight:700, fontSize:13, marginBottom:1}}>
          {estado === 'vendido' && <span style={{color:'var(--good)', marginRight:4}}>✓</span>}
          {estado === 'cerrado' && <span style={{marginRight:4}}>🔒</span>}
          {estado === 'stock'   && <span style={{marginRight:4}}>📦</span>}
          {cli.razonSocial || cli.nombre}
        </div>
        <div style={{display:'flex', gap:4, flexWrap:'wrap', marginTop:2}}>
          {(cli.diasVisita||[]).length === 0 && (
            <span style={{fontSize:10, color:'var(--accent)', background:'var(--accent-soft)', padding:'1px 5px', borderRadius:3}}>todos los días</span>
          )}
          {fueraRuta && (
            <span style={{fontSize:10, color:'var(--warn)', background:'var(--warn-bg)', padding:'1px 5px', borderRadius:3}}>fuera de ruta</span>
          )}
        </div>
        {cli.direccion && <div style={{fontSize:11, color:'var(--ink-mute)', marginTop:2}}>📍 {cli.direccion}</div>}
        {venta && (
          <div style={{fontSize:12, color:'var(--good)', fontFamily:'JetBrains Mono, monospace', marginTop:2}}>
            {fmt$(venta.totalBruto)} · {fmtVentaCajas(venta)}
            {' · '}
            {venta.formaPago === 'efectivo' ? '💵' :
             venta.formaPago === 'transferencia' ? '🏦' :
             venta.formaPago === 'mixto' ? '🔀' :
             venta.formaPago === 'pendiente' ? '⏰' : ''}
          </div>
        )}
        {visita?.observaciones && <div style={{fontSize:11, color:'var(--ink-soft)', fontStyle:'italic', marginTop:2}}>"{visita.observaciones}"</div>}
      </div>
      {/* Acciones — disponibles en estado pendiente, cerrado y stock (para cambiar o vender) */}
      {(estado === 'pendiente' || estado === 'cerrado' || estado === 'stock') && (
        <div style={{display:'flex', flexDirection:'column', gap:3}}>
          <button className="btn sm" onClick={()=>onSeleccionar(cli.id)}
            style={{fontSize:10, background:'var(--accent)', color:'var(--accent-on)', border:'none', padding:'4px 8px'}}>
            💵 Vender
          </button>
          {estado === 'pendiente' && (
            <>
              <button className="btn sm" onClick={()=>onAccion({tipo:'local_cerrado', cliente:cli})}
                style={{fontSize:10, background:'var(--warn-bg)', color:'var(--warn)', border:'1px solid var(--warn)', padding:'4px 8px'}}>
                🔒 Cerrado
              </button>
              <button className="btn sm" onClick={()=>onAccion({tipo:'tiene_stock', cliente:cli})}
                style={{fontSize:10, background:'var(--accent-soft)', color:'var(--accent)', border:'1px solid var(--accent)', padding:'4px 8px'}}>
                📦 Stock
              </button>
            </>
          )}
          {(estado === 'cerrado' || estado === 'stock') && (
            <button className="btn sm" onClick={()=>onAccion({tipo: estado === 'cerrado' ? 'tiene_stock' : 'local_cerrado', cliente:cli})}
              style={{fontSize:10, background:'var(--bg-2)', color:'var(--ink-soft)', border:'1px solid var(--line)', padding:'4px 8px'}}>
              {estado === 'cerrado' ? '📦 Cambiar' : '🔒 Cambiar'}
            </button>
          )}
        </div>
      )}
    </div>
  );
}

function ReservaCard({ reserva, session, onOpen, onToast }) {
  const isAdmin = session.role === 'admin';
  const totalPedido = (reserva.itemsPedidos||[]).reduce((s,i) => s + (i.cajas*180 + i.bandejas*30), 0);
  const totalAprobado = (reserva.itemsAprobados||[]).reduce((s,i) => s + (i.cajas*180 + i.bandejas*30), 0);
  // Total expresado en cajas equivalentes (1 caja = 180u = 6 bandejas)
  const pedidoCajas = (reserva.itemsPedidos||[]).reduce((s,i) => s + i.cajas + (i.bandejas/6), 0);
  const aprobadoCajas = (reserva.itemsAprobados||[]).reduce((s,i) => s + i.cajas + (i.bandejas/6), 0);
  // Formato bonito: si es entero, sin decimales; si no, 1 decimal
  const fmtCajas = (n) => n % 1 === 0 ? `${n}cj` : `${n.toFixed(1)}cj`;
  const vendedor = VENDEDORES.find(v => v.id === reserva.vendedorId);
  const statusColor = reserva.status==='pendiente'?'warn':reserva.status==='aprobada'?'good':reserva.status==='rechazada'?'bad':'accent';
  const statusLabel = reserva.status==='pendiente'?'⏳ pendiente':reserva.status==='aprobada'?'✅ aprobada':reserva.status==='rechazada'?'✕ rechazada':'📦 retirada';

  // Para admin: verificar si una reserva pendiente excede stock disponible
  const { data: bodega } = useFirebaseValue('stockBodega', isAdmin && reserva.status === 'pendiente');
  const { list: todasReservas } = useFirebaseList('reservas', isAdmin && reserva.status === 'pendiente');

  const excedeStock = useMemo(() => {
    if (!isAdmin || reserva.status !== 'pendiente' || !bodega) return false;
    // Calcular comprometido excluyendo esta reserva
    const comp = {};
    CALIBRES.forEach(c => comp[c] = 0);
    todasReservas.forEach(r => {
      if (r.id === reserva.id) return;
      if (r.status === 'pendiente') {
        (r.itemsPedidos||[]).forEach(it => { comp[it.calibre] = (comp[it.calibre]||0) + (it.cajas*180 + it.bandejas*30); });
      } else if (r.status === 'aprobada') {
        (r.itemsAprobados||[]).forEach(it => { comp[it.calibre] = (comp[it.calibre]||0) + (it.cajas*180 + it.bandejas*30); });
      }
    });
    return (reserva.itemsPedidos||[]).some(it => {
      const u = it.cajas*180 + it.bandejas*30;
      const disp = (bodega[it.calibre]||0) - (comp[it.calibre]||0);
      return u > disp;
    });
  }, [bodega, todasReservas, reserva, isAdmin]);

  const retirar = async () => {
    if (!confirm('¿Confirmar retiro? El stock pasará de bodega a tu vehículo.')) return;
    try {
      const bod = await fbGet('stockBodega') || {};
      const veh = await fbGet(`stockVehiculo/${session.id}`) || {};
      const newBod = {...bod};
      const newVeh = {...veh};
      for (const it of (reserva.itemsAprobados||[])) {
        const u = it.cajas*180 + it.bandejas*30;
        if ((newBod[it.calibre]||0) < u) throw new Error(`Stock insuficiente en bodega para ${it.calibre}`);
        newBod[it.calibre] = (newBod[it.calibre]||0) - u;
        newVeh[it.calibre] = (newVeh[it.calibre]||0) + u;
      }
      await fbSet('stockBodega', newBod);
      await fbSet(`stockVehiculo/${session.id}`, newVeh);
      await fbUpdate(`reservas/${reserva.id}`, { status: 'retirada', retiradoEn: nowISO() });
      onToast('Retiro confirmado · stock movido','success');
    } catch(e) { onToast(e.message || 'Error al retirar','error'); }
  };

  return (
    <div className="card" style={{borderLeft: `4px solid var(--${statusColor})`}}>
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', gap:8}}>
        <div style={{flex:1, minWidth:0}}>
          <div style={{display:'flex', alignItems:'center', gap:8, flexWrap:'wrap'}}>
            <strong style={{fontSize:14}}>{new Date(reserva.creadoEn).toLocaleDateString('es-CL', {day:'numeric', month:'short'})}</strong>
            <span className={`badge ${statusColor}`}>{statusLabel}</span>
            {reserva.tipo === 'recarga' && <span className="badge accent">🔁 recarga</span>}
            {excedeStock && <span className="badge bad">⚠️ excede stock</span>}
          </div>
          {isAdmin && <div style={{fontSize:12, color:'var(--ink-soft)', marginTop:4}}>👤 {vendedor?.name}</div>}
          <div style={{fontSize:12, color:'var(--ink-soft)', marginTop:6, lineHeight:1.6}}>
            <strong>Pedido:</strong> {fmtCajas(pedidoCajas)}<br/>
            <span style={{color:'var(--ink-mute)', fontSize:11}}>
              {reserva.itemsPedidos.map((i, idx) => (
                <span key={idx}>{i.cajas>0&&`${i.cajas}cj `}{i.bandejas>0&&`${i.bandejas}bd `}{i.calibre}{idx<reserva.itemsPedidos.length-1?' · ':''}</span>
              ))}
            </span>
            {reserva.itemsAprobados && (
              <>
                <br/><strong>Aprobado:</strong> {fmtCajas(aprobadoCajas)}
                {totalAprobado !== totalPedido && <span className="badge warn" style={{marginLeft:6}}>diferencia</span>}
                <br/>
                <span style={{color:'var(--ink-mute)', fontSize:11}}>
                  {reserva.itemsAprobados.map((i, idx) => (
                    <span key={idx}>{i.cajas>0&&`${i.cajas}cj `}{i.bandejas>0&&`${i.bandejas}bd `}{i.calibre}{idx<reserva.itemsAprobados.length-1?' · ':''}</span>
                  ))}
                </span>
              </>
            )}
          </div>
        </div>
        <div style={{display:'flex', flexDirection:'column', gap:4}}>
          {reserva.status === 'pendiente' && isAdmin && (
            <button className="btn accent sm" onClick={onOpen}>✅ Revisar</button>
          )}
          {reserva.status === 'aprobada' && !isAdmin && reserva.vendedorId === session.id && (
            <button className="btn success sm" onClick={retirar}>📦 Retirar</button>
          )}
          {reserva.status === 'pendiente' && !isAdmin && reserva.vendedorId === session.id && (
            <button className="btn ghost sm" onClick={onOpen}>Editar</button>
          )}
        </div>
      </div>
    </div>
  );
}

function ModalReserva({ session, reserva, onClose, onToast }) {
  const isAdmin = session.role === 'admin';
  const yaAprobando = reserva && reserva.status === 'pendiente' && isAdmin;
  const editando = reserva && reserva.status === 'pendiente' && !isAdmin && reserva.vendedorId === session.id;

  // Inicializar items
  const initItems = () => {
    const base = {};
    CALIBRES.forEach(c => base[c] = { cajas: 0, bandejas: 0 });
    if (reserva) {
      const src = yaAprobando ? reserva.itemsPedidos : (editando ? reserva.itemsPedidos : reserva.itemsAprobados || reserva.itemsPedidos);
      (src||[]).forEach(it => {
        base[it.calibre] = { cajas: it.cajas || 0, bandejas: it.bandejas || 0 };
      });
    }
    return base;
  };

  const [items, setItems] = useState(initItems());
  const [tipo, setTipo] = useState(reserva?.tipo || 'reserva');
  const [saving, setSaving] = useState(false);

  // Stock bodega + todas las reservas para calcular comprometido
  const { data: bodega } = useFirebaseValue('stockBodega');
  const { list: todasReservas } = useFirebaseList('reservas');

  // Calcular comprometido por calibre (pendientes + aprobadas, EXCLUYENDO la reserva actual)
  const comprometidoPorCalibre = useMemo(() => {
    const comp = {};
    CALIBRES.forEach(c => comp[c] = 0);
    todasReservas.forEach(r => {
      // Excluir la reserva actual si está editándola o aprobándola
      if (reserva && r.id === reserva.id) return;
      if (r.status === 'pendiente') {
        (r.itemsPedidos||[]).forEach(it => {
          comp[it.calibre] = (comp[it.calibre]||0) + (it.cajas*180 + it.bandejas*30);
        });
      } else if (r.status === 'aprobada') {
        (r.itemsAprobados||[]).forEach(it => {
          comp[it.calibre] = (comp[it.calibre]||0) + (it.cajas*180 + it.bandejas*30);
        });
      }
    });
    return comp;
  }, [todasReservas, reserva]);

  const setVal = (cal, field, val) => {
    const v = parseInt(val)||0;
    setItems(prev => ({...prev, [cal]: { ...prev[cal], [field]: v < 0 ? 0 : v }}));
  };

  const totalUnidades = useMemo(() =>
    Object.values(items).reduce((s,i) => s + i.cajas*180 + i.bandejas*30, 0), [items]);

  const itemsArr = () => CALIBRES
    .filter(c => items[c].cajas > 0 || items[c].bandejas > 0)
    .map(c => ({ calibre: c, cajas: items[c].cajas, bandejas: items[c].bandejas }));

  // Validar exceso (lo pedido vs disponible)
  const excesoPorCalibre = useMemo(() => {
    const ex = {};
    CALIBRES.forEach(c => {
      const total = bodega?.[c] || 0;
      const comp = comprometidoPorCalibre[c] || 0;
      const disp = total - comp;
      const pedido = items[c].cajas*180 + items[c].bandejas*30;
      ex[c] = pedido > disp ? pedido - disp : 0;
    });
    return ex;
  }, [items, bodega, comprometidoPorCalibre]);

  const tieneExceso = Object.values(excesoPorCalibre).some(v => v > 0);

  const guardar = async () => {
    const arr = itemsArr();
    if (arr.length === 0) return onToast('Agrega al menos un calibre','error');

    // Validación: vendedor o admin no pueden pedir/aprobar más de lo disponible
    if (tieneExceso) {
      const calibresExceso = CALIBRES.filter(c => excesoPorCalibre[c] > 0);
      return onToast(`Sin stock disponible: ${calibresExceso.join(', ')}`,'error');
    }

    setSaving(true);
    try {
      if (!reserva) {
        await fbSet(`reservas/${uid()}`, {
          vendedorId: session.id, tipo,
          itemsPedidos: arr, status: 'pendiente',
          creadoPor: session.id, creadoEn: nowISO(),
        });
        const totalU = arr.reduce((s,i) => s + (i.cajas||0)*180 + (i.bandejas||0)*30, 0);
        await crearNotificacion(session, {
          tipo: 'reserva_pendiente',
          titulo: '📋 Reserva por aprobar',
          mensaje: `${session.name || 'Vendedor'} solicitó reserva de ${fmtN(totalU)}u`,
          link: 'reservas',
          prioridad: 'normal',
        });
        onToast('Reserva enviada · pendiente de aprobación','success');
      } else if (editando) {
        await fbUpdate(`reservas/${reserva.id}`, { itemsPedidos: arr, tipo });
        onToast('Reserva actualizada','success');
      } else if (yaAprobando) {
        await fbUpdate(`reservas/${reserva.id}`, {
          itemsAprobados: arr, status: 'aprobada',
          aprobadoEn: nowISO(), aprobadoPor: session.id,
        });
        onToast('Reserva aprobada','success');
      }
      onClose();
    } catch(e) { onToast(e.message || 'Error','error'); setSaving(false); }
  };

  const rechazar = async () => {
    if (!confirm('¿Rechazar esta reserva?')) return;
    try {
      await fbUpdate(`reservas/${reserva.id}`, {
        status: 'rechazada', rechazadoEn: nowISO(), rechazadoPor: session.id,
      });
      onToast('Reserva rechazada','warn'); onClose();
    } catch(e) { onToast('Error','error'); }
  };

  const eliminar = async () => {
    if (!confirm('¿Eliminar esta reserva?')) return;
    try { await fbRemove(`reservas/${reserva.id}`); onToast('Eliminada','warn'); onClose(); }
    catch(e) { onToast('Error','error'); }
  };

  const titulo = !reserva ? 'Nueva reserva' : yaAprobando ? '✅ Revisar y aprobar' : editando ? 'Editar reserva' : 'Detalle';

  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <h3>{titulo}</h3>

        {yaAprobando && (
          <div className="alert-banner info" style={{fontSize:12}}>
            <span className="ico">ℹ️</span>
            <div>Ajusta cantidades si es necesario. Las líneas en rojo indican stock insuficiente.</div>
          </div>
        )}

        {tieneExceso && !yaAprobando && (
          <div className="alert-banner" style={{fontSize:12, background:'var(--bad-bg)', color:'var(--bad)'}}>
            <span className="ico">⚠️</span>
            <div>No hay stock suficiente. Reduce las cantidades en rojo o pide menos.</div>
          </div>
        )}

        {!reserva && (
          <>
            <label className="fld">Tipo</label>
            <div style={{display:'flex', gap:6, marginBottom:8}}>
              <button className="btn sm" onClick={()=>setTipo('reserva')} style={{flex:1, background: tipo==='reserva'?'var(--ink)':'transparent', color: tipo==='reserva'?'var(--ink-on)':'var(--ink-soft)', border: '1.5px solid var(--line)'}}>📋 Reserva normal</button>
              <button className="btn sm" onClick={()=>setTipo('recarga')} style={{flex:1, background: tipo==='recarga'?'var(--ink)':'transparent', color: tipo==='recarga'?'var(--ink-on)':'var(--ink-soft)', border: '1.5px solid var(--line)'}}>🔁 Recarga en ruta</button>
            </div>
          </>
        )}

        {CALIBRES.map(c => {
          const stockBod = bodega?.[c] || 0;
          const comp = comprometidoPorCalibre[c] || 0;
          const disp = stockBod - comp;
          const dispBd = unitsBreakdown(disp > 0 ? disp : 0);
          const stockBodBd = unitsBreakdown(stockBod);
          const compBd = unitsBreakdown(comp);
          const pedido = items[c].cajas*180 + items[c].bandejas*30;
          const exceso = excesoPorCalibre[c] || 0;
          const tieneStockCero = disp <= 0 && pedido === 0;

          return (
            <div key={c} style={{
              padding:'10px 10px',
              marginTop: 8,
              borderRadius: 8,
              background: exceso > 0 ? 'var(--bad-bg)' : (tieneStockCero ? 'var(--bg-2)' : 'transparent'),
              border: exceso > 0 ? '1.5px solid var(--bad)' : '1px solid var(--line)',
              opacity: tieneStockCero && !exceso ? 0.55 : 1
            }}>
              <div style={{display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:6}}>
                <strong style={{fontSize:14}}>{c}</strong>
                <span style={{fontSize:10, color: disp <= 0 ? 'var(--bad)' : 'var(--ink-mute)', textAlign:'right', lineHeight:1.5, fontFamily:'JetBrains Mono, monospace'}}>
                  Bodega: {stockBodBd.cajasInt > 0 ? `${stockBodBd.cajasInt}cj` : ''}{stockBodBd.cajasInt > 0 && stockBodBd.bandejasInt > 0 ? ' · ' : ''}{stockBodBd.bandejasInt > 0 ? `${stockBodBd.bandejasInt}bd` : ''}{stockBodBd.cajasInt === 0 && stockBodBd.bandejasInt === 0 ? '0cj' : ''}<br/>
                  {comp > 0 && <>Reservado: {compBd.cajasInt}cj · {fmtN(comp)}u<br/></>}
                  <strong style={{color: disp <= 0 ? 'var(--bad)' : 'var(--good)'}}>
                    Disponible: {dispBd.cajasInt > 0 ? `${dispBd.cajasInt}cj` : ''}{dispBd.cajasInt > 0 && dispBd.bandejasInt > 0 ? ' · ' : ''}{dispBd.bandejasInt > 0 ? `${dispBd.bandejasInt}bd` : ''}{dispBd.cajasInt === 0 && dispBd.bandejasInt === 0 ? '0cj' : ''}
                  </strong>
                </span>
              </div>
              <div className="row">
                <div>
                  <label className="fld" style={{fontSize:10}}>Cajas (180u)</label>
                  <input type="number" min="0" className="inp" value={items[c].cajas || ''} onChange={e=>setVal(c, 'cajas', e.target.value)} style={{padding:'8px 10px', marginBottom:0}} disabled={tieneStockCero && !exceso}/>
                </div>
                <div>
                  <label className="fld" style={{fontSize:10}}>Bandejas (30u)</label>
                  <input type="number" min="0" className="inp" value={items[c].bandejas || ''} onChange={e=>setVal(c, 'bandejas', e.target.value)} style={{padding:'8px 10px', marginBottom:0}} disabled={tieneStockCero && !exceso}/>
                </div>
              </div>
              {pedido > 0 && (
                <div style={{fontSize:11, marginTop:4, textAlign:'right', fontFamily:'JetBrains Mono, monospace', color: exceso > 0 ? 'var(--bad)' : 'var(--ink-mute)'}}>
