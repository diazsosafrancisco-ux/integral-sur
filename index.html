                  = {fmtN(pedido)}u
                  {exceso > 0 && <strong> · Excede en {fmtN(exceso)}u</strong>}
                </div>
              )}
            </div>
          );
        })}

        <div style={{padding:'10px', background:'var(--bg-2)', borderRadius:8, marginTop:10, display:'flex', justifyContent:'space-between', alignItems:'center'}}>
          <strong>Total</strong>
          <strong style={{fontFamily:'JetBrains Mono, monospace', color: tieneExceso ? 'var(--bad)' : 'var(--accent)'}}>{fmtN(totalUnidades)}u</strong>
        </div>

        <div className="actions">
          <button className="btn ghost" onClick={onClose}>Cancelar</button>
          {yaAprobando && <button className="btn danger" onClick={rechazar}>Rechazar</button>}
          {editando && <button className="btn danger" onClick={eliminar}>Eliminar</button>}
          {(yaAprobando || editando || !reserva) && (
            <button className="btn accent" onClick={guardar} disabled={saving || totalUnidades === 0 || tieneExceso}>
              {saving ? '...' : yaAprobando ? 'Aprobar' : 'Guardar'}
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

// =========================== VISTA CLIENTES DEL DÍA (VENDEDOR) ===========================
// Muestra los clientes asignados al día seleccionado con su estado:
// - Sin atender (arriba, pendiente)
// - Vendido (✓ con monto)
// - Local cerrado (🔒)
// - Cliente tiene stock (📦)
// Permite cerrar todos los pendientes con un motivo

function VistaClientesDelDia({ session, ventas, clientes, cierres, onSeleccionar, onAgregarCliente }) {
  const hoyDate = new Date();
  const diaHoy = (hoyDate.getDay() + 6) % 7; // Lun=0, Sáb=5
  const [diaSel, setDiaSel] = useState(diaHoy);
  const [busq, setBusq] = useState('');
  const [modalAccion, setModalAccion] = useState(null);
  const { list: visitas } = useFirebaseList('visitas');
  const { list: traspasos } = useFirebaseList('traspasos');
  const hoy = todayStr();

  const nombresDias = ['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];

  // ¿Tiene carga hoy? Propia o por traspaso aceptado
  const { list: cargas } = useFirebaseList('cargas');
  const tieneCargaHoy = useMemo(() => {
    const cargaPropia = cargas.some(c =>
      c.vendedorId === session.id &&
      isoToLocalDate(c.creadoEn) === hoy &&
      c.status === 'aprobada'
    );
    const cargaTraspasada = traspasos.some(t =>
      t.receptorId === session.id &&
      isoToLocalDate(t.creadoEn) === hoy &&
      t.status === 'aceptado'
    );
    return cargaPropia || cargaTraspasada;
  }, [cargas, traspasos, session, hoy]);

  // Clientes del vendedor
  const misClientes = useMemo(() =>
    // Incluir clientes pendientes creados por este vendedor — puede venderles antes de aprobación
    clientes.filter(c => c.vendedorId === session.id && (c.status === 'aprobado' || (c.status === 'pendiente' && c.creadoPor === session.id))),
    [clientes, session]);

  // Clientes para el día seleccionado
  const clientesDelDia = useMemo(() => {
    let arr;
    if (diaSel === -1) {
      // "Todos" → todos los clientes del vendedor
      arr = misClientes;
    } else {
      // Día específico → los del día + los sin día fijo (diasVisita vacío)
      arr = misClientes.filter(c => {
        const dias = c.diasVisita || [];
        return dias.includes(diaSel) || dias.length === 0;
      });
    }
    if (busq.trim()) {
      const q = busq.toLowerCase().trim();
      arr = arr.filter(c =>
        (c.razonSocial||'').toLowerCase().includes(q) ||
        (c.contacto||'').toLowerCase().includes(q) ||
        (c.direccion||'').toLowerCase().includes(q)
      );
    }
    return arr;
  }, [misClientes, diaSel, busq]);

  const ventasHoy = useMemo(() => ventas.filter(v => v.vendedorId === session.id && isoToLocalDate(v.fecha || v.creadoEn) === hoy), [ventas, session, hoy]);
  const visitasHoy = useMemo(() => visitas.filter(v => v.vendedorId === session.id && isoToLocalDate(v.creadoEn) === hoy), [visitas, session, hoy]);

  // "Fuera de ruta" = vendedor selecciona un cliente que NO es de hoy
  // Siempre puede hacerlo — solo se marca visualmente
  const esFueraRuta = false; // ya no restringe — siempre puede vender a cualquiera

  const obtenerEstado = (cli) => {
    if (diaSel !== diaHoy && diaSel !== -1) return { estado: 'futuro' };
    const venta = ventasHoy.find(v => v.clienteId === cli.id);
    if (venta) return { estado: 'vendido', venta };
    const visita = visitasHoy.find(v => v.clienteId === cli.id);
    if (visita) {
      if (visita.tipo === 'local_cerrado') return { estado: 'cerrado', visita };
      if (visita.tipo === 'tiene_stock') return { estado: 'stock', visita };
    }
    // Marcar como "fuera de ruta" si el cliente no tiene este día asignado
    const dias = cli.diasVisita || [];
    if (dias.length > 0 && !dias.includes(diaHoy) && diaSel === diaHoy) return { estado: 'pendiente', fueraRuta: true };
    return { estado: 'pendiente' };
  };

  const conEstado = clientesDelDia.map(c => ({ cli: c, ...obtenerEstado(c) }));
  const pendientes = conEstado.filter(c => c.estado === 'pendiente').sort((a,b) => (a.cli.razonSocial||'').localeCompare(b.cli.razonSocial||''));
  const atendidos  = conEstado.filter(c => c.estado === 'vendido' || c.estado === 'cerrado' || c.estado === 'stock').sort((a,b) => (a.cli.razonSocial||'').localeCompare(b.cli.razonSocial||''));
  const futuros    = conEstado.filter(c => c.estado === 'futuro').sort((a,b) => (a.cli.razonSocial||'').localeCompare(b.cli.razonSocial||''));

  const total = clientesDelDia.length;
  // Progreso solo aplica en el día de hoy con ruta asignada, no en "Todos"
  const mostrarProgreso = diaSel === diaHoy && diaSel !== -1;
  const pctCompletado = total > 0 ? Math.round((atendidos.length / total) * 100) : 0;

  return (
    <div className="card" style={{marginBottom:14, padding:12, borderTop:'3px solid var(--accent)'}}>
      <div style={{display:'flex', alignItems:'center', gap:8, marginBottom:8}}>
        <span style={{color:'var(--accent)'}}><IconoCalendario size={26}/></span>
        <div style={{flex:1}}>
          <strong style={{fontSize:14, display:'block'}}>Ruta del día</strong>
          <span style={{fontSize:11, color:'var(--ink-soft)'}}>
            Clientes asignados · selecciona cualquier día para vender fuera de ruta
          </span>
        </div>
      </div>

      {/* Selector de días: Lun-Sáb + Todos */}
      <div style={{display:'flex', gap:3, marginBottom:10, flexWrap:'wrap'}}>
        {[
          {id:0,lbl:'Lun'},{id:1,lbl:'Mar'},{id:2,lbl:'Mié'},
          {id:3,lbl:'Jue'},{id:4,lbl:'Vie'},{id:5,lbl:'Sáb'},
          {id:-1,lbl:'Todos'},
        ].map(opt => {
          const esHoy = opt.id === diaHoy;
          const countD = opt.id === -1
            ? misClientes.length   // total cartera sin repetir
            : misClientes.filter(c => {
                const d = c.diasVisita || [];
                return d.includes(opt.id) || d.length === 0;
              }).length;
          const seleccionado = diaSel === opt.id;
          return (
            <button key={opt.id} onClick={()=>setDiaSel(opt.id)} className="btn sm"
              style={{
                flex:'1 1 40px', padding:'6px 4px', fontSize:11,
                background: seleccionado ? 'var(--accent)' : 'var(--bg-2)',
                color: seleccionado ? 'var(--accent-on)' : (esHoy ? 'var(--accent)' : 'var(--ink)'),
                border:'1.5px solid '+(esHoy&&!seleccionado?'var(--accent)':seleccionado?'var(--accent)':'var(--line)'),
                fontWeight: esHoy||seleccionado ? 700 : 500,
              }}>
              {esHoy && opt.id !== -1 && '⭐'}{opt.lbl}
              {countD > 0 && <span style={{display:'block', fontSize:9, opacity:0.85}}>({countD})</span>}
            </button>
          );
        })}
      </div>

      {/* Header */}
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:6}}>
        <strong style={{fontSize:13}}>
          {diaSel === -1 ? `Toda la cartera · ${total} clientes` : `${['Lun','Mar','Mié','Jue','Vie','Sáb'][diaSel]} · ${total} cliente${total!==1?'s':''}`}
        </strong>
        {mostrarProgreso && total > 0 && (
          <span style={{fontSize:11, color: pctCompletado===100?'var(--good)':'var(--warn)', fontWeight:600}}>
            {atendidos.length}/{total} atendidos
          </span>
        )}
      </div>

      {/* Barra de progreso — solo día de hoy con ruta */}
      {mostrarProgreso && total > 0 && (
        <div style={{height:6, background:'var(--line)', borderRadius:3, overflow:'hidden', marginBottom:8}}>
          <div style={{height:'100%', width:pctCompletado+'%', background:pctCompletado===100?'var(--good)':'var(--accent)', transition:'width 0.3s'}}/>
        </div>
      )}

      {/* Buscador — siempre visible si hay clientes en la cartera */}
      {misClientes.length > 0 && (
        <div style={{position:'relative', marginBottom:8}}>
          <input type="search" className="inp" placeholder="🔍 Buscar cliente..."
            value={busq} onChange={e=>setBusq(e.target.value)}
            style={{marginBottom:0, padding:'6px 10px', fontSize:12, paddingRight: busq ? 36 : 10}}/>
          {busq && (
            <button onClick={()=>setBusq('')}
              style={{position:'absolute', right:8, top:'50%', transform:'translateY(-50%)',
                background:'none', border:'none', fontSize:18, color:'var(--ink-soft)',
                cursor:'pointer', padding:'0 4px', lineHeight:1}}>
              ×
            </button>
          )}
        </div>
      )}

      {total === 0 ? (
        <div style={{padding:12, textAlign:'center', color:'var(--ink-mute)', fontSize:12}}>
          {busq ? (
            <div>
              <div style={{marginBottom:8}}>No se encontraron clientes para "{busq}"</div>
              <button className="btn ghost sm" onClick={()=>setBusq('')}
                style={{fontSize:12}}>✕ Limpiar búsqueda</button>
            </div>
          ) : diaSel === diaHoy
            ? <span>No tienes clientes asignados hoy.<br/>Selecciona "Todos" para ver tu cartera completa.</span>
            : 'No tienes clientes en este día'
          }
        </div>
      ) : (
        <div style={{maxHeight:380, overflowY:'auto'}}>
          {pendientes.length > 0 && (
            <div style={{marginBottom: atendidos.length > 0 ? 10 : 0}}>
              {(diaSel === diaHoy || diaSel === -1) && (
                <div style={{fontSize:10, color:'var(--warn)', fontWeight:700, marginBottom:4, textTransform:'uppercase', letterSpacing:0.5}}>
                  ⏳ Por visitar ({pendientes.length})
                </div>
              )}
              {pendientes.map(({cli, fueraRuta}) => (
                <ClienteRutaCard key={cli.id} cli={cli} estado="pendiente" fueraRuta={fueraRuta}
                  onSeleccionar={onSeleccionar} onAccion={setModalAccion}/>
              ))}
            </div>
          )}
          {atendidos.length > 0 && (
            <div style={{marginBottom: futuros.length > 0 ? 10 : 0}}>
              <div style={{fontSize:10, color:'var(--good)', fontWeight:700, marginBottom:4, textTransform:'uppercase', letterSpacing:0.5}}>
                ✅ Atendidos ({atendidos.length})
              </div>
              {atendidos.map(({cli, estado, venta, visita}) => (
                <ClienteRutaCard key={cli.id} cli={cli} estado={estado} venta={venta} visita={visita}
                  onSeleccionar={onSeleccionar} onAccion={setModalAccion}/>
              ))}
            </div>
          )}
          {futuros.length > 0 && (
            <div>
              <div style={{fontSize:10, color:'var(--ink-mute)', fontWeight:700, marginBottom:4, textTransform:'uppercase', letterSpacing:0.5}}>
                📅 Otros días ({futuros.length})
              </div>
              {futuros.map(({cli}) => (
                <ClienteRutaCard key={cli.id} cli={cli} estado="futuro"
                  onSeleccionar={onSeleccionar} onAccion={setModalAccion}/>
              ))}
            </div>
          )}
        </div>
      )}

      {/* Modales de acción */}
      {modalAccion?.tipo === 'local_cerrado' && (
        <ModalVisitaCerrada cliente={modalAccion.cliente} session={session} onClose={()=>setModalAccion(null)} onToast={()=>{}}/>
      )}
      {modalAccion?.tipo === 'tiene_stock' && (
        <ModalClienteConStock cliente={modalAccion.cliente} session={session} onClose={()=>setModalAccion(null)} onToast={()=>{}}/>
      )}

      {/* Botón crear cliente directo */}
      {onAgregarCliente && (
        <div style={{marginTop:10, borderTop:'1px solid var(--line)', paddingTop:10}}>
          <button className="btn ghost full" onClick={onAgregarCliente}
            style={{fontSize:12, color:'var(--accent)', borderColor:'var(--accent)'}}>
            ➕ Crear nuevo cliente
          </button>
        </div>
      )}
    </div>
  );
}


// =========================== VENTAS ===========================
// Una venta = un cliente + varios items (calibre × formato × cantidad × mermas) + forma de pago
// Stock se descuenta del vehículo del vendedor (incluye mermas, ya que rotas no vuelven)
// Si forma pago = pendiente, queda como cobro pendiente

function HistorialVentasVendedor({ busqueda, setBusqueda, filtroFecha, setFiltroFecha, filtroEstado, setFiltroEstado }) {
  const [abierto, setAbierto] = useState(false);
  return (
    <div style={{marginBottom:10}}>
      <button onClick={()=>setAbierto(v=>!v)} style={{
        width:'100%', padding:'10px 14px', background:'var(--card)',
        borderRadius:10, border:'1px solid var(--line)', cursor:'pointer',
        fontSize:13, fontWeight:600, display:'flex',
        justifyContent:'space-between', alignItems:'center', color:'var(--ink)',
      }}>
        <span>📋 Historial de mis ventas</span>
        <span style={{fontSize:16, display:'inline-block', transition:'transform 0.2s',
          transform: abierto ? 'rotate(180deg)' : 'rotate(0deg)'}}>▾</span>
      </button>
      {abierto && (
        <div style={{padding:'10px 4px'}}>
          <label className="fld">🔍 Buscar</label>
          <input type="search" className="inp" placeholder="Nombre, RUT, contacto..."
            value={busqueda} onChange={e=>setBusqueda(e.target.value)} style={{marginBottom:8}}/>
          <label className="fld">Fecha</label>
          <input type="date" className="inp" value={filtroFecha}
            onChange={e=>setFiltroFecha(e.target.value)} style={{marginBottom:8}}/>
          <label className="fld">Estado</label>
          <div style={{display:'flex', gap:4, flexWrap:'wrap'}}>
            {[
              {id:'todos', lbl:'Todas'},
              {id:'cobrado', lbl:'✓ Cobradas'},
              {id:'pendiente', lbl:'⏰ Por cobrar'},
              {id:'transf_pendiente', lbl:'🏦 Transf. pend.'},
              {id:'transf_recibida', lbl:'✓ Transf. OK'},
            ].map(opt => (
              <button key={opt.id} onClick={()=>setFiltroEstado(opt.id)} className="btn sm"
                style={{flex:'1 1 80px', background: filtroEstado===opt.id?'var(--ink)':'transparent',
                  color: filtroEstado===opt.id?'var(--ink-on)':'var(--ink-soft)',
                  border:'1.5px solid var(--line)', fontSize:11, padding:'4px 6px'}}>
                {opt.lbl}
              </button>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

function Ventas({ session, onToast, filtroInicial, onNavigate }) {
  const isAdmin = session.role === 'admin';
  const { list: ventas, loading } = useFirebaseList('ventas');
  const { list: clientes } = useFirebaseList('clientes');
  const { list: cierres } = useFirebaseList('cierres');
  const [modal, setModal] = useState(null);
  const [modalNuevoCliente, setModalNuevoCliente] = useState(false);
  const [filtroVendedor, setFiltroVendedor] = useState(isAdmin ? 'todos' : session.id);
  // Si viene del banner de sin comprobante, limpiar filtro de fecha y filtrar por estado
  const [filtroFecha, setFiltroFecha] = useState(
    filtroInicial === 'sinComprobante' ? '' : todayStr()
  );
  const [filtroEstado, setFiltroEstado] = useState(
    filtroInicial === 'sinComprobante' ? 'transf_pendiente' :
    filtroInicial === 'efectivo_hoy' ? 'efectivo' :
    filtroInicial === 'transf_hoy' ? 'transf_recibida' :
    filtroInicial === 'pendiente_hoy' ? 'pendiente' :
    'todos'
  );
  const [bannerFiltroActivo, setBannerFiltroActivo] = useState(
    ['sinComprobante','efectivo_hoy','transf_hoy','pendiente_hoy'].includes(filtroInicial)
  );
  const bannerFiltroMsg =
    filtroInicial === 'efectivo_hoy' ? '💵 Ventas cobradas en efectivo hoy' :
    filtroInicial === 'transf_hoy' ? '🏦 Ventas con transferencia hoy' :
    filtroInicial === 'pendiente_hoy' ? '⏰ Créditos y transferencias pendientes de hoy' :
    '📸 Filtrando transferencias sin comprobante';
  const [busqueda, setBusqueda] = useState('');
  const [modalTransf, setModalTransf] = useState(null);
  const [modalAdjuntarComprob, setModalAdjuntarComprob] = useState(null);
  const [clientePreseleccionado, setClientePreseleccionado] = useState(null);

  // Días cerrados por vendedor (fecha → set de vendedorIds con cierre aprobado)
  const diasCerrados = useMemo(() => {
    const map = {};
    cierres.filter(c => c.status === 'aprobado').forEach(c => {
      const f = isoToLocalDate(c.creadoEn || c.fecha);
      if (!f) return;
      if (!map[f]) map[f] = new Set();
      map[f].add(c.vendedorId);
    });
    return map;
  }, [cierres]);

  // Función helper: ¿esta venta está en un día cerrado para su vendedor?
  const ventaEnDiaCerrado = (v) => {
    const f = isoToLocalDate(v.fecha || v.creadoEn);
    return f && diasCerrados[f] && diasCerrados[f].has(v.vendedorId);
  };

  const ventasVisibles = useMemo(() => {
    let arr = ventas.filter(v => {
      if (filtroVendedor !== 'todos' && v.vendedorId !== filtroVendedor) return false;
      if (filtroFecha && isoToLocalDate(v.fecha || v.creadoEn) !== filtroFecha) return false;
      if (filtroEstado === 'todos') return true;
      if (filtroEstado === 'cobrado') {
        if (v.cobroEstado !== 'cobrado') return false;
        if (transferenciaPendienteConfirmar(v)) return false;
        return true;
      }
      if (filtroEstado === 'pendiente') {
        return v.formaPago === 'pendiente' && v.cobroEstado === 'pendiente';
      }
      if (filtroEstado === 'efectivo') {
        // Ventas pagadas total o parcialmente en efectivo
        if (v.formaPago === 'efectivo') return true;
        if (v.formaPago === 'mixto' && v.montosMixto && (v.montosMixto.efectivo||0) > 0) return true;
        if (v.formaPago === 'pendiente' && v.cobroEstado === 'cobrado' && (v.cobroFormaReal === 'efectivo' || (v.cobroFormaReal === 'mixto' && (v.montoCobradoEfectivo||0) > 0))) return true;
        return false;
      }
      if (filtroEstado === 'pendiente_hoy') {
        // Créditos pendientes del día + transferencias sin confirmar del día
        const esCreditoPendiente = v.formaPago === 'pendiente' && v.cobroEstado === 'pendiente';
        const esTransfPendiente = transferenciaPendienteConfirmar(v);
        return esCreditoPendiente || esTransfPendiente;
      }
      if (filtroEstado === 'transf_pendiente') {
        return transferenciaPendienteConfirmar(v);
      }
      if (filtroEstado === 'transf_recibida') {
        const esTransf = v.formaPago === 'transferencia' ||
          (v.formaPago === 'mixto' && v.montosMixto && (v.montosMixto.transferencia||0) > 0) ||
          (v.formaPago === 'pendiente' && (v.cobroFormaReal === 'transferencia' || (v.cobroFormaReal === 'mixto' && (v.montoCobradoTransferencia||0) > 0)));
        if (!esTransf) return false;
        return v.transferenciaConfirmada === true || !!v.transferenciaComprobante;
      }
      return true;
    });
    // Filtro de búsqueda por cliente (nombre, RUT, contacto, dirección, comuna)
    if (busqueda.trim()) {
      const q = busqueda.toLowerCase().trim();
      arr = arr.filter(v => {
        const cli = clientes.find(c => c.id === v.clienteId);
        if (!cli) return false;
        return (cli.razonSocial||'').toLowerCase().includes(q) ||
               (cli.rut||'').toLowerCase().includes(q) ||
               (cli.contacto||'').toLowerCase().includes(q) ||
               (cli.direccion||'').toLowerCase().includes(q) ||
               (cli.comuna||'').toLowerCase().includes(q) ||
               (cli.telefono||'').includes(q) ||
               (cli.telefonoContacto||'').includes(q);
      });
    }
    return arr.sort((a,b) => (b.creadoEn||'').localeCompare(a.creadoEn||''));
  }, [ventas, clientes, filtroVendedor, filtroFecha, filtroEstado, busqueda]);

  const totales = useMemo(() => {
    let neto = 0, bruto = 0, brutoCobrado = 0, brutoPendiente = 0, brutoTransfPend = 0, brutoTransfOk = 0;
    ventasVisibles.forEach(v => {
      neto += v.totalNeto||0; bruto += v.totalBruto||0;
      if (transferenciaPendienteConfirmar(v)) brutoTransfPend += v.totalBruto||0;
      else if (v.cobroEstado === 'cobrado') brutoCobrado += v.totalBruto||0;
      if (v.cobroEstado === 'pendiente' && v.formaPago === 'pendiente') brutoPendiente += v.totalBruto||0;
      // Transferencia verificada (con foto o marca explícita)
      const esTransfOk = (v.transferenciaConfirmada === true || !!v.transferenciaComprobante) &&
        (v.formaPago === 'transferencia' || (v.formaPago === 'mixto' && v.montosMixto && (v.montosMixto.transferencia||0) > 0));
      if (esTransfOk) brutoTransfOk += v.totalBruto||0;
    });
    return { neto, bruto, brutoCobrado, brutoPendiente, brutoTransfPend, brutoTransfOk, count: ventasVisibles.length };
  }, [ventasVisibles]);

  const eliminarVenta = async (v) => {
    const msg = `⚠️ ELIMINAR VENTA\n\nCliente: ${clientes.find(c=>c.id===v.clienteId)?.razonSocial || '?'}\nTotal: ${fmt$(v.totalBruto)}\n\nEsto revertirá el stock al vehículo del vendedor. ¿Confirmas?`;
    if (!confirm(msg)) return;
    if (!confirm('⚠️ Última confirmación: ¿ELIMINAR esta venta?')) return;

    try {
      // Revertir stock al vehículo
      const veh = await fbGet(`stockVehiculo/${v.vendedorId}`) || {};
      const newVeh = { ...veh };
      (v.items || []).forEach(it => {
        newVeh[it.calibre] = (newVeh[it.calibre] || 0) + (it.unidadesTotal || 0);
      });
      await fbSet(`stockVehiculo/${v.vendedorId}`, newVeh);
      await fbRemove(`ventas/${v.id}`);
      await fbLog(session.id, 'delete', 'ventas', {
        id: v.id, cliente: v.clienteId, total: v.totalBruto, vendedor: v.vendedorId
      });
      onToast(`Venta eliminada · ${fmt$(v.totalBruto)} revertido a vehículo`,'warn');
    } catch(e) { console.error(e); onToast('Error al eliminar','error'); }
  };

  if (loading) return <div className="pad"><div className="empty">Cargando...</div></div>;

  return (
    <div className="pad">
      <h2 className="section-title">Ventas</h2>
      <div className="section-sub">{isAdmin ? 'Todas las ventas' : 'Mis ventas'} · cobradas y por cobrar</div>

      {/* Banner contextual cuando viene del banner de sin comprobante */}
      {bannerFiltroActivo && (
        <div className="card" style={{background:'var(--warn-bg)', borderLeft:'4px solid var(--warn)', marginBottom:10}}>
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
            <div>
              <strong style={{fontSize:13, color:'var(--warn)'}}>{bannerFiltroMsg}</strong>
              <div style={{fontSize:11, color:'var(--ink-soft)', marginTop:2}}>
                Mostrando todas las fechas · adjunta el comprobante en cada venta
              </div>
            </div>
            <button className="btn ghost sm" style={{fontSize:11}}
              onClick={() => {
                setBannerFiltroActivo(false);
                setFiltroEstado('todos');
                setFiltroFecha(todayStr());
              }}>
              ✕ Quitar filtro
            </button>
          </div>
        </div>
      )}

      {/* Ruta del día (solo vendedor) — desde aquí se inician las ventas */}
      {!isAdmin && <VistaClientesDelDia
        session={session}
        ventas={ventas}
        clientes={clientes}
        cierres={cierres}
        onSeleccionar={(cliId)=>{
          setClientePreseleccionado(cliId);
          setModal(true);
        }}
        onAgregarCliente={() => setModalNuevoCliente(true)}
      />}
      {modalNuevoCliente && (
        <ModalCliente
          session={session}
          cliente={null}
          onClose={()=>setModalNuevoCliente(false)}
          onToast={onToast}
        />
      )}

      {/* Panel de filtros — para vendedor se colapsa por defecto */}
      {isAdmin ? (
        <div className="card">
          <label className="fld">🔍 Buscar cliente</label>
          <input type="search" className="inp"
            placeholder="Nombre, RUT, contacto, dirección, comuna..."
            value={busqueda} onChange={e=>setBusqueda(e.target.value)} style={{marginBottom:10}}/>
          <label className="fld">Vendedor</label>
          <select className="inp" value={filtroVendedor} onChange={e=>setFiltroVendedor(e.target.value)} style={{marginBottom:8}}>
            <option value="todos">Todos</option>
            {VENDEDORES.map(v => <option key={v.id} value={v.id}>{v.name}</option>)}
          </select>
          <label className="fld">Fecha</label>
          <input type="date" className="inp" value={filtroFecha} onChange={e=>setFiltroFecha(e.target.value)} style={{marginBottom:8}}/>
          <label className="fld">Estado</label>
          <div style={{display:'flex', gap:4, flexWrap:'wrap'}}>
            {[
              {id:'todos', lbl:'Todas'},
              {id:'cobrado', lbl:'✓ Cobradas'},
              {id:'pendiente', lbl:'⏰ Por cobrar'},
              {id:'transf_pendiente', lbl:'🏦 Transf. pend.'},
              {id:'transf_recibida', lbl:'✓ Transf. OK'},
            ].map(opt => (
              <button key={opt.id} onClick={()=>setFiltroEstado(opt.id)} className="btn sm"
                style={{flex:'1 1 80px', background: filtroEstado===opt.id?'var(--ink)':'transparent',
                  color: filtroEstado===opt.id?'var(--ink-on)':'var(--ink-soft)',
                  border:'1.5px solid var(--line)', fontSize:11, padding:'4px 6px'}}>
                {opt.lbl}
              </button>
            ))}
          </div>
        </div>
      ) : (
        <HistorialVentasVendedor
          busqueda={busqueda} setBusqueda={setBusqueda}
          filtroFecha={filtroFecha} setFiltroFecha={setFiltroFecha}
          filtroEstado={filtroEstado} setFiltroEstado={setFiltroEstado}
        />
      )}

      <div className="card" style={{background:'var(--bg-2)'}}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', fontSize:13}}>
          <span>{totales.count} {totales.count===1?'venta':'ventas'}</span>
          <strong style={{fontSize:16, color:'var(--accent)'}}>{fmt$(totales.bruto)}</strong>
        </div>
        {(totales.brutoCobrado > 0 || totales.brutoPendiente > 0 || totales.brutoTransfPend > 0 || totales.brutoTransfOk > 0) && (
          <div style={{display:'flex', flexWrap:'wrap', gap:8, fontSize:11, marginTop:6, fontFamily:'JetBrains Mono, monospace'}}>
            {totales.brutoCobrado > 0 && <span style={{color:'var(--good)'}}>✓ Cobrado: {fmt$(totales.brutoCobrado)}</span>}
            {totales.brutoTransfOk > 0 && <span style={{color:'var(--good)'}}>✓ Transf: {fmt$(totales.brutoTransfOk)}</span>}
            {totales.brutoTransfPend > 0 && <span style={{color:'#0a84ff'}}>🏦 Transf. pend: {fmt$(totales.brutoTransfPend)}</span>}
            {totales.brutoPendiente > 0 && <span style={{color:'var(--warn)'}}>⏰ Por cobrar: {fmt$(totales.brutoPendiente)}</span>}
          </div>
        )}
      </div>

      {ventasVisibles.length === 0 ? <div className="empty">Sin ventas en este filtro</div> :
        ventasVisibles.map(v => {
          const cli = clientes.find(c => c.id === v.clienteId);
          const vendedor = VENDEDORES.find(vv => vv.id === v.vendedorId);
          const est = v.cobroEstado === 'pendiente' ? getDeudaEstado(v.fechaCompromiso) : null;
          const borderColor = v.cobroEstado === 'cobrado' ? 'var(--good)' : est?.color || 'var(--warn)';
          const diaCerrado = ventaEnDiaCerrado(v);
          // Admin siempre puede; vendedor solo si es su venta Y el día no está cerrado
          const puedeEditar = isAdmin || (v.vendedorId === session.id && !diaCerrado);
          return (
            <div key={v.id} className="card" style={{borderLeft: `4px solid ${borderColor}`}}>
              <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', gap:8}}>
                <div style={{flex:1, minWidth:0}}>
                  <div style={{display:'flex', alignItems:'center', gap:6, flexWrap:'wrap'}}>
                    <strong style={{fontSize:14}}>{cli?.razonSocial || '(cliente eliminado)'}</strong>
                    <span className={`badge ${v.tipoDoc==='factura'?'accent':'good'}`}>{v.tipoDoc==='factura'?'📄 Factura':'🧾 Boleta'}</span>
                    {v.editadoEn && <span className="badge warn">✏️ editada</span>}
                  </div>
                  <div style={{display:'flex', gap:4, marginTop:4, flexWrap:'wrap'}}>
                    <span className={`badge ${v.formaPago==='efectivo'?'good':v.formaPago==='transferencia'?'accent':v.formaPago==='mixto'?'accent':'warn'}`}>
                      {v.formaPago==='efectivo'?'💵':v.formaPago==='transferencia'?'🏦':v.formaPago==='mixto'?'🔀':'⏰'} {v.formaPago}
                    </span>
                    {v.cobroEstado === 'cobrado' && <span className="badge good">✓ cobrado</span>}
                    {v.cobroEstado === 'pendiente' && est && (
                      <span className="badge" style={{background: est.bgColor, color: est.color}}>
                        {est.tipo === 'vencida' ? '🚨 vencida' :
                         est.tipo === 'venceHoy' ? '⏰ vence HOY' :
                         est.tipo === 'porVencer' ? `⏰ vence en ${est.dias}d` :
                         est.tipo === 'alDia' ? `📅 en ${est.dias}d` : '📅 sin fecha'}
                      </span>
                    )}
                  </div>
                  <div style={{fontSize:12, color:'var(--ink-soft)', marginTop:4, lineHeight:1.6}}>
                    {isAdmin && <>👤 {vendedor?.name} · </>}
                    {new Date(v.creadoEn).toLocaleString('es-CL', {day:'numeric', month:'short', hour:'2-digit', minute:'2-digit'})}<br/>
                    {(v.items||[]).map(i => `${i.cajas>0?i.cajas+'cj ':''}${i.bandejas>0?i.bandejas+'bd ':''}${i.calibre}${i.mermas>0?` (-${i.mermas}r)`:''}`).join(' · ')}
                  </div>

                  {/* Desglose de pago mixto */}
                  {v.formaPago === 'mixto' && v.montosMixto && (
                    <div style={{
                      marginTop:6, padding:'6px 10px', borderRadius:6,
                      background:'var(--bg-2)', border:'1px solid var(--line)',
                      fontSize:11, fontFamily:'JetBrains Mono, monospace',
                    }}>
                      <div style={{fontWeight:700, color:'var(--ink)', marginBottom:4}}>
                        🔀 Desglose de la venta · Total {fmt$(v.totalBruto)}
                      </div>
                      <div style={{display:'flex', flexWrap:'wrap', gap:10}}>
                        {(v.montosMixto.efectivo||0) > 0 && (
                          <span style={{color:'var(--good)'}}>💵 Efectivo: {fmt$(v.montosMixto.efectivo)}</span>
                        )}
                        {(v.montosMixto.transferencia||0) > 0 && (
                          <span style={{color: v.transferenciaConfirmada ? 'var(--good)' : 'var(--accent)'}}>
                            🏦 Transf: {fmt$(v.montosMixto.transferencia)} {v.transferenciaConfirmada ? '✓' : '(pend.)'}
                          </span>
                        )}
                        {(v.montosMixto.pendiente||0) > 0 && (
                          <span style={{color:'var(--warn)', fontWeight:700}}>
                            ⏰ Por cobrar: {fmt$(v.montosMixto.pendiente)}
                          </span>
                        )}
                      </div>
                    </div>
                  )}
                  {v.cobroEstado === 'pendiente' && est && (
                    <div style={{
                      marginTop:6, padding:'5px 8px', borderRadius:6,
                      background: est.bgColor, color: est.color,
                      fontSize:11, fontWeight: est.tipo === 'vencida' || est.tipo === 'venceHoy' ? 700 : 500
                    }}>
                      {est.mensaje}
                    </div>
                  )}
                  {v.totalMermas > 0 && (
                    <div style={{fontSize:11, color:'var(--bad)', marginTop:4}}>
                      ⚠️ Mermas: {fmtN(v.totalMermas)}u · Descuento: {fmt$(v.descuentoMermas)}
                    </div>
                  )}

                  {/* Estado transferencia: pendiente de confirmación */}
                  {transferenciaPendienteConfirmar(v) && (
                    <div style={{
                      marginTop:8, padding:'8px 10px', borderRadius:6,
                      background:'var(--warn-bg)', border:'1px solid var(--warn)',
                    }}>
                      <div style={{fontSize:11, fontWeight:700, marginBottom:4, color:'var(--warn)'}}>
                        🏦 Transferencia pendiente de confirmación
                      </div>
                      {/* Desglose si hay abonos */}
                      {(v.totalAbonado||0) > 0 ? (
                        <div style={{fontFamily:'JetBrains Mono, monospace', fontSize:11, marginBottom:6,
                          background:'rgba(0,0,0,0.06)', borderRadius:6, padding:'6px 8px'}}>
                          <div style={{display:'flex', justifyContent:'space-between', color:'var(--ink-soft)'}}>
                            <span>Deuda original:</span><span>{fmt$(v.totalBruto)}</span>
                          </div>
                          <div style={{display:'flex', justifyContent:'space-between', color:'var(--good)'}}>
                            <span>✓ Abonado:</span><span>-{fmt$(v.totalAbonado)}</span>
                          </div>
                          <div style={{display:'flex', justifyContent:'space-between', fontWeight:700,
                            color:'var(--warn)', borderTop:'1px solid var(--line)', paddingTop:4, marginTop:4}}>
                            <span>Saldo pendiente:</span><span>{fmt$(saldoVenta(v))}</span>
                          </div>
                          {v.abonos && v.abonos.length > 0 && (
                            <div style={{fontSize:10, color:'var(--ink-mute)', marginTop:4}}>
                              {v.abonos.map((ab,i) => (
                                <div key={i}>
                                  {new Date(ab.fecha).toLocaleDateString('es-CL',{day:'numeric',month:'short'})} · {ab.forma==='efectivo'?'💵':ab.forma==='transferencia'?'🏦':'🔀'} {fmt$(ab.monto)}
                                </div>
                              ))}
                            </div>
                          )}
                        </div>
                      ) : v.formaPago === 'mixto' && v.montosMixto ? (
                        <div style={{fontSize:11, color:'var(--warn)', marginBottom:6}}>
                          Parte transferencia: {fmt$(v.montosMixto.transferencia||0)}
                        </div>
                      ) : null}
                      <div style={{display:'flex', gap:4, flexWrap:'wrap'}}>
                        <button className="btn sm"
                          style={{flex:'1 1 80px', fontSize:10, padding:'4px 8px', background:'var(--good)', color:'var(--good-on)', border:'none'}}
                          onClick={(e) => { e.stopPropagation(); setModalTransf({venta: v, cliente: cli}); }}>
                          ✓ Recibida
                        </button>
                        {cli && (cli.telefonoContacto || cli.telefono) && (
                          <button
                            className="btn sm"
                            style={{flex:'1 1 80px', fontSize:10, padding:'4px 8px', background:'#25D366', color:'white', border:'none'}}
                            onClick={(e) => {
                              e.stopPropagation();
                              const tel = cli.telefonoContacto || cli.telefono;
                              const monto = v.formaPago === 'mixto' && v.montosMixto ? (v.montosMixto.transferencia || 0) : v.totalBruto;
                              const fechaVenta = new Date(v.creadoEn);
                              const hoyDate = new Date();
                              const diff = Math.floor((hoyDate.setHours(0,0,0,0) - fechaVenta.setHours(0,0,0,0)) / 86400000);
                              let mensaje;
                              if (diff === 0) {
                                // Venta de hoy
                                mensaje = `🥚 *INTEGRAL SUR*\n\nHola ${cli.contacto || cli.razonSocial}, te recordamos que quedó pendiente la transferencia de tu compra de hoy:\n\n💰 *Monto: ${fmt$(monto)}*\n\nAgradecemos enviar el comprobante para confirmar el pago. 🙌`;
                              } else {
                                // Venta anterior
                                const fechaTxt = new Date(v.creadoEn).toLocaleDateString('es-CL', {day:'numeric', month:'long'});
                                mensaje = `🥚 *INTEGRAL SUR · Distribuidora*\n\nHola ${cli.contacto || cli.razonSocial}, esperamos que se encuentre muy bien 😊\n\nLe escribimos porque nos falta el *comprobante* de su transferencia del ${fechaTxt} (hace ${diff} ${diff===1?'día':'días'}):\n\n💰 *Monto: ${fmt$(monto)}*\n\n📎 Le pedimos amablemente que nos envíe la foto o screenshot del comprobante para regularizar su pago.\n\n¡Muchas gracias por su comprensión y apoyo! 🙏🥚`;
                              }
                              abrirWhatsApp(tel, mensaje);
                              fbLog(session.id, 'whatsapp', 'ventas', { ventaId: v.id, momento: 'recordatorio_transferencia' });
                            }}>
                            📲 Recordar
                          </button>
                        )}
                      </div>
                    </div>
                  )}

                  {/* Si transferencia confirmada, mostrar verde */}
                  {v.transferenciaConfirmada && v.cobroEstado === 'cobrado' && (v.formaPago === 'transferencia' || (v.formaPago === 'mixto' && v.montosMixto?.transferencia > 0)) && (
                    <div style={{marginTop:8, padding:'6px 10px', borderRadius:6, background:'var(--good-bg)', border:'1px solid var(--good)', fontSize:11, color:'var(--good)', fontWeight:600}}>
                      ✅ Transferencia recibida
                      {v.transferenciaConfirmadaEn && (
                        <span style={{fontWeight:400, marginLeft:6, color:'var(--ink-soft)'}}>
                          · {new Date(v.transferenciaConfirmadaEn).toLocaleString('es-CL', {day:'numeric', month:'short', hour:'2-digit', minute:'2-digit'})}
                        </span>
                      )}
                      {v.transferenciaComprobante && (
                        <button
                          className="btn ghost sm"
                          style={{marginLeft:8, fontSize:10, padding:'2px 6px'}}
                          onClick={(e) => {
                            e.stopPropagation();
                            const win = window.open();
                            if (win) win.document.write(`<img src="${v.transferenciaComprobante}" style="max-width:100%"/>`);
                          }}>
                          👁️ Ver
                        </button>
                      )}
                    </div>
                  )}

                  {/* Aprobación de descuento negociado */}
                  {v.requiereAprobacion && v.aprobacionEstado === 'pendiente' && (
                    <div style={{
                      marginTop:8, padding:'8px 10px', borderRadius:6,
                      background:'var(--warn-bg)', border:'2px solid var(--warn)',
                    }}>
                      <div style={{fontSize:11, fontWeight:700, marginBottom:6, color:'var(--warn)'}}>
                        🏷️ Descuento pendiente de aprobación
                        <span style={{fontWeight:400, marginLeft:6}}>· -{fmt$(v.descuentoNegociadoTotal || 0)}</span>
                      </div>
                      <div style={{fontSize:11, color:'var(--ink-soft)', marginBottom:6}}>
                        {Object.entries(v.descuentosPorCalibre || {}).filter(([_, val]) => val > 0).map(([cal, val]) => (
                          <span key={cal} style={{marginRight:10}}>{cal}: <strong>-${val}/u</strong></span>
                        ))}
                      </div>
                      {isAdmin ? (
                        <div style={{display:'flex', gap:4}}>
                          <button
                            className="btn sm"
                            style={{flex:1, fontSize:10, padding:'4px 8px', background:'var(--good)', color:'var(--good-on)', border:'none'}}
                            onClick={async (e) => {
                              e.stopPropagation();
                              if (!confirm(`¿Aprobar descuento de ${fmt$(v.descuentoNegociadoTotal || 0)}?`)) return;
                              try {
                                // Descontar stock del vehículo del vendedor (no se había descontado al crear)
                                const veh = await fbGet(`stockVehiculo/${v.vendedorId}`) || {};
                                const newVeh = { ...veh };
                                (v.items || []).forEach(it => {
                                  newVeh[it.calibre] = (newVeh[it.calibre] || 0) - (it.unidadesTotal || 0);
                                });
                                await fbSet(`stockVehiculo/${v.vendedorId}`, newVeh);

                                await fbUpdate(`ventas/${v.id}`, {
                                  aprobacionEstado: 'aprobada',
                                  aprobadaPor: session.id,
                                  aprobadaEn: nowISO(),
                                });
                                await fbLog(session.id, 'aprobacion_descuento', 'ventas', { ventaId: v.id, descuento: v.descuentoNegociadoTotal });

                                // Notificar al vendedor
                                await crearNotificacion(session, {
                                  tipo: 'descuento_aprobado',
                                  titulo: '✅ Descuento aprobado',
                                  mensaje: `Tu descuento de ${fmt$(v.descuentoNegociadoTotal || 0)} fue aprobado · puedes confirmar la venta`,
                                  link: 'ventas',
                                  ventaId: v.id,
                                  destinatarioId: v.vendedorId,
                                  prioridad: 'urgente',
                                });

                                onToast('Descuento aprobado','success');
                              } catch(e) { console.error(e); onToast('Error','error'); }
                            }}>
                            ✅ Aprobar
                          </button>
                          <button
                            className="btn sm"
                            style={{flex:1, fontSize:10, padding:'4px 8px', background:'var(--bad)', color:'var(--bad-on)', border:'none'}}
                            onClick={async (e) => {
                              e.stopPropagation();
                              if (!confirm('¿Rechazar el descuento?')) return;
                              try {
                                await fbUpdate(`ventas/${v.id}`, {
                                  aprobacionEstado: 'rechazada',
                                  aprobadaPor: session.id,
                                  aprobadaEn: nowISO(),
                                });
                                await fbLog(session.id, 'rechazo_descuento', 'ventas', { ventaId: v.id });
                                await crearNotificacion(session, {
                                  tipo: 'descuento_rechazado',
                                  titulo: '❌ Descuento rechazado',
                                  mensaje: `Tu solicitud de descuento de ${fmt$(v.descuentoNegociadoTotal || 0)} fue rechazada`,
                                  link: 'ventas',
                                  ventaId: v.id,
                                  destinatarioId: v.vendedorId,
                                  prioridad: 'urgente',
                                });
                                onToast('Descuento rechazado','warn');
                              } catch(e) { console.error(e); onToast('Error','error'); }
                            }}>
                            ❌ Rechazar
                          </button>
                        </div>
                      ) : (
                        <div style={{fontSize:11, color:'var(--ink-mute)', fontStyle:'italic'}}>
                          Esperando aprobación del administrador...
                        </div>
                      )}
                    </div>
                  )}

                  {v.requiereAprobacion && v.aprobacionEstado === 'aprobada' && (
                    <div style={{marginTop:8, padding:'8px 10px', borderRadius:6, background:'var(--good-bg)', border:'1px solid var(--good)'}}>
                      <div style={{fontSize:11, color:'var(--good)', fontWeight:600, marginBottom:6}}>
                        ✅ Descuento aprobado · -{fmt$(v.descuentoNegociadoTotal || 0)}
                      </div>
                      {cli && (cli.telefonoContacto || cli.telefono) && !v.whatsappComprobanteEnviado && (
                        <button
                          className="btn sm"
                          style={{width:'100%', fontSize:10, padding:'5px 8px', background:'#25D366', color:'white', border:'none'}}
                          onClick={async (e) => {
                            e.stopPropagation();
                            const tel = cli.telefonoContacto || cli.telefono;
                            const mensaje = generarMensajeCompra(v, cli);
                            const ok = abrirWhatsApp(tel, mensaje);
                            if (ok) {
                              try {
                                await fbUpdate(`ventas/${v.id}`, { whatsappComprobanteEnviado: true, whatsappComprobanteEnviadoEn: nowISO() });
                                fbLog(session.id, 'whatsapp', 'ventas', { ventaId: v.id, momento: 'comprobante_compra' });
                              } catch(_) {}
                            }
                          }}>
                          📲 Enviar comprobante por WhatsApp al cliente
                        </button>
                      )}
                      {v.whatsappComprobanteEnviado && (
                        <div style={{fontSize:10, color:'var(--good)', fontStyle:'italic'}}>📲 Comprobante enviado al cliente</div>
                      )}
                    </div>
                  )}

                  {v.requiereAprobacion && v.aprobacionEstado === 'rechazada' && (
                    <div style={{marginTop:8, padding:'6px 10px', borderRadius:6, background:'var(--bad-bg)', border:'1px solid var(--bad)', fontSize:11, color:'var(--bad)', fontWeight:600}}>
                      ❌ Descuento rechazado
                    </div>
                  )}

                  {/* Compromiso de pago — solo mostrar fecha, sin confirmación por WA */}
                  {v.formaPago === 'pendiente' && v.cobroEstado === 'pendiente' && v.fechaCompromiso && (
                    <div style={{marginTop:6, padding:'6px 10px', borderRadius:6, background:'var(--bg-2)', fontSize:11, color:'var(--warn)', fontWeight:600}}>
                      📅 Compromiso: {new Date(v.fechaCompromiso+'T12:00:00').toLocaleDateString('es-CL',{day:'numeric',month:'short',year:'numeric'})}
                    </div>
                  )}
                </div>
                <div style={{textAlign:'right', display:'flex', flexDirection:'column', alignItems:'flex-end', gap:6}}>
                  <strong style={{fontSize:15, color:'var(--accent)', fontFamily:'JetBrains Mono, monospace'}}>{fmt$(v.totalBruto)}</strong>
                  <div style={{display:'flex', flexDirection:'column', gap:4}}>
                    <button className="btn sm" style={{fontSize:11, padding:'4px 8px', background:'var(--ink)', color:'var(--ink-on)', border:'none'}}
                      onClick={() => {
                        imprimirComprobante(v, cli);
                        fbLog(session.id, 'print', 'ventas', { ventaId: v.id });
                      }}>
                      🖨️ Imprimir
                    </button>
                    {cli && (cli.telefonoContacto || cli.telefono) && (
                      <button className="btn sm" style={{fontSize:11, padding:'4px 8px', background:'#25D366', color:'white', border:'none'}}
                        onClick={() => {
                          const tel = cli.telefonoContacto || cli.telefono;
                          const ok = abrirWhatsApp(tel, mensajeVentaWA(v, cli));
                          if (!ok) onToast('Cliente sin teléfono válido','warn');
                          else fbLog(session.id, 'whatsapp', 'ventas', { ventaId: v.id, cliente: v.clienteId });
                        }}>
                        📲 WhatsApp
                      </button>
                    )}
                    {puedeEditar && (
                      <button className="btn ghost sm" onClick={()=>setModal(v)} style={{fontSize:11, padding:'4px 8px'}}>✏️ Editar</button>
                    )}
                    {isAdmin && (
                      <button className="btn danger sm" onClick={()=>eliminarVenta(v)} style={{fontSize:11, padding:'4px 8px'}}>🗑️</button>
                    )}
                  </div>
                </div>
              </div>
            </div>
          );
        })
      }

      {modal && <ModalVenta session={session} venta={modal === true ? null : modal} clientePreseleccionado={clientePreseleccionado} onClose={()=>{setModal(null); setClientePreseleccionado(null);}} onToast={onToast}/>}
      {modalTransf && <ModalConfirmarTransferencia venta={modalTransf.venta} cliente={modalTransf.cliente} session={session} onClose={()=>setModalTransf(null)} onToast={onToast}/>}
      {modalAdjuntarComprob && <ModalAdjuntarComprobante venta={modalAdjuntarComprob.venta} cliente={modalAdjuntarComprob.cliente} session={session} onClose={()=>setModalAdjuntarComprob(null)} onToast={onToast}/>}
    </div>
  );
}

// =========================== MODAL VENTA EXITOSA ===========================
// Pantalla de éxito después de registrar venta, con botón directo de WhatsApp

function ModalVentaExitosa({ ventaCompleta, cliente, deudasPrevias = [], session, onClose, onToast }) {
  const tel = cliente && (cliente.telefonoContacto || cliente.telefono);
  const tienePendiente = ventaCompleta.formaPago === 'pendiente';
  const requiereFotoTransf = ventaCompleta.formaPago === 'transferencia' ||
    (ventaCompleta.formaPago === 'mixto' && ventaCompleta.montosMixto && (ventaCompleta.montosMixto.transferencia||0) > 0);
  const [enviado, setEnviado] = useState(false);
  const [foto, setFoto] = useState(null);
  const [previewUrl, setPreviewUrl] = useState(null);
  const [saving, setSaving] = useState(false);
  const fileInputRef = React.useRef(null);

  const enviarWA = () => {
    if (!tel) return onToast('Cliente sin teléfono','warn');
    const mensaje = mensajeVentaWA(ventaCompleta, cliente, deudasPrevias);
    const ok = abrirWhatsApp(tel, mensaje);
    if (ok) {
      setEnviado(true);
      fbLog(session.id, 'whatsapp', 'ventas', { ventaId: ventaCompleta.id, cliente: cliente.id, momento: 'post-venta' });
    } else {
      onToast('No se pudo abrir WhatsApp','error');
    }
  };

  const procesarArchivo = (file) => {
    if (!file) return;
    if (!file.type.startsWith('image/')) return onToast('Solo se permiten imágenes','error');
    if (file.size > 5 * 1024 * 1024) return onToast('Imagen muy grande (máx 5 MB)','error');
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const maxDim = 1200;
        let w = img.width, h = img.height;
        if (w > maxDim || h > maxDim) {
          if (w > h) { h = h * maxDim / w; w = maxDim; }
          else { w = w * maxDim / h; h = maxDim; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        const dataUrl = canvas.toDataURL('image/jpeg', 0.75);
        setFoto(dataUrl);
        setPreviewUrl(dataUrl);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  };

  const confirmarTransferencia = async () => {
    if (!foto) return onToast('📸 Adjunta el comprobante para confirmar','error');
    setSaving(true);
    try {
      await fbUpdate(`ventas/${ventaCompleta.id}`, {
        cobroEstado: 'cobrado',
        transferenciaConfirmada: true,
        transferenciaConfirmadaEn: nowISO(),
        transferenciaConfirmadaPor: session.id,
        cobradoEn: nowISO(),
        transferenciaComprobante: foto,
      });
      await fbLog(session.id, 'transferencia_confirmada', 'ventas', { ventaId: ventaCompleta.id, monto: ventaCompleta.totalBruto, conComprobante: true });
      await crearNotificacion(session, {
        tipo: 'transferencia_recibida',
        titulo: '🏦 Transferencia confirmada',
        mensaje: `${cliente?.razonSocial || 'Cliente'} pagó ${fmt$(ventaCompleta.totalBruto)} por transferencia`,
        link: 'ventas',
        ventaId: ventaCompleta.id,
        clienteId: cliente?.id,
        prioridad: 'normal',
      });
      onToast('✓ Comprobante adjuntado','success');
      onClose();
    } catch(e) {
      console.error(e);
      onToast('Error al confirmar','error');
    }
    setSaving(false);
  };

  const fechaCompromiso = ventaCompleta.fechaCompromiso ?
    new Date(ventaCompleta.fechaCompromiso + 'T12:00:00').toLocaleDateString('es-CL', {day:'numeric', month:'long', year:'numeric'}) :
    null;

  const formaPagoLabel = ventaCompleta.formaPago === 'efectivo' ? '💵 Efectivo' :
                         ventaCompleta.formaPago === 'transferencia' ? '🏦 Transferencia' :
                         ventaCompleta.formaPago === 'mixto' ? '🔀 Mixto' :
                         '⏰ Pendiente';

  return (
    <>
      <div style={{textAlign:'center', padding:'20px 12px 10px'}}>
        <div style={{fontSize:54, marginBottom:8}}>✅</div>
        <h3 style={{color:'var(--good)', margin:'0 0 6px', fontSize:22}}>¡Venta registrada!</h3>
        <div style={{fontSize:13, color:'var(--ink-soft)'}}>
          {cliente.razonSocial || cliente.contacto}
        </div>
      </div>

      <div className="card" style={{background:'var(--bg-2)', padding:14}}>
        <div style={{display:'flex', justifyContent:'space-between', marginBottom:6}}>
          <span style={{fontSize:13}}>Total:</span>
          <strong style={{fontSize:18, fontFamily:'JetBrains Mono, monospace', color:'var(--accent)'}}>{fmt$(ventaCompleta.totalBruto)}</strong>
        </div>
        <div style={{display:'flex', justifyContent:'space-between', marginBottom:6, fontSize:12}}>
          <span>Documento:</span>
          <strong>{ventaCompleta.tipoDoc === 'factura' ? 'Factura' : 'Boleta'}</strong>
        </div>
        <div style={{display:'flex', justifyContent:'space-between', fontSize:12}}>
          <span>Forma de pago:</span>
          <strong>{formaPagoLabel}</strong>
        </div>
        {tienePendiente && fechaCompromiso && (
          <div style={{marginTop:8, padding:'8px 10px', background:'var(--warn-bg)', borderRadius:6}}>
            <div style={{fontSize:11, color:'var(--warn)', marginBottom:2}}>📅 Compromiso de pago</div>
            <strong style={{color:'var(--warn)'}}>{fechaCompromiso}</strong>
          </div>
        )}
      </div>

      {/* Si tiene transferencia, pedir foto del comprobante */}
      {requiereFotoTransf && (
        <div className="card" style={{background:'var(--warn-bg)', border:'2px solid var(--warn)', marginTop:10}}>
          <strong style={{color:'var(--warn)', fontSize:13}}>📸 Comprobante de transferencia</strong>
          <div style={{fontSize:11, color:'var(--ink-soft)', marginTop:4, marginBottom:8}}>
            Si ya recibiste el comprobante por WhatsApp, adjúntalo ahora. Si no, podrás hacerlo después desde Ventas → 🏦 Transferencia.
          </div>
          <div style={{display:'flex', gap:8, marginBottom:8}}>
            <button
              className="btn ghost"
              style={{flex:1, padding:'8px', fontSize:12}}
              onClick={() => {
                if (fileInputRef.current) {
                  fileInputRef.current.removeAttribute('capture');
                  fileInputRef.current.click();
                }
              }}>
              📂 Galería
            </button>
            <button
              className="btn ghost"
              style={{flex:1, padding:'8px', fontSize:12}}
              onClick={() => {
                if (fileInputRef.current) {
                  fileInputRef.current.setAttribute('capture', 'environment');
                  fileInputRef.current.click();
                }
              }}>
              📸 Cámara
            </button>
          </div>
          <input
            ref={fileInputRef}
            type="file"
            accept="image/*"
            onChange={e => procesarArchivo(e.target.files[0])}
            style={{display:'none'}}
          />
          {previewUrl && (
            <div style={{marginTop:6, padding:6, background:'var(--bg)', borderRadius:6, textAlign:'center'}}>
              <img src={previewUrl} alt="Comprobante" style={{maxWidth:'100%', maxHeight:150, borderRadius:4}}/>
              <button
                className="btn ghost sm"
                onClick={() => { setFoto(null); setPreviewUrl(null); }}
                style={{marginTop:6, fontSize:11}}>
                🗑️ Quitar foto
              </button>
            </div>
          )}
          {foto && (
            <button
              className="btn accent full"
              onClick={confirmarTransferencia}
              disabled={saving}
              style={{marginTop:8, fontSize:13}}>
              {saving ? '...' : '✓ Confirmar transferencia con comprobante'}
            </button>
          )}
        </div>
      )}

      {tienePendiente && (
        <div className="alert-banner info" style={{fontSize:11, marginTop:10}}>
          <span className="ico">ℹ️</span>
          <div>El mensaje de WhatsApp incluirá una solicitud para que el cliente acepte o rechace el compromiso de pago. Luego podrás marcar su respuesta en la venta.</div>
        </div>
      )}

      <div style={{display:'grid', gap:8, marginTop:14}}>
        {tel ? (
          <button
            className="btn full"
            onClick={enviarWA}
            style={{background:'#25D366', color:'white', border:'none', fontSize:14, padding:'12px'}}
          >
            {enviado ? '✓ Enviado por WhatsApp · enviar otra vez' : '📲 Enviar comprobante por WhatsApp'}
          </button>
        ) : (
          <div style={{fontSize:11, color:'var(--ink-mute)', textAlign:'center', padding:8}}>
            Cliente sin teléfono registrado
          </div>
        )}
        <button
          className="btn ghost full"
          onClick={() => {
            imprimirComprobante(ventaCompleta, cliente);
            fbLog(session.id, 'print', 'ventas', { ventaId: ventaCompleta.id, momento: 'post-venta' });
          }}
        >
          🖨️ Imprimir comprobante (PDF)
        </button>
        <button
          className="btn accent full"
          onClick={onClose}
        >
          {enviado ? '✓ Listo' : 'Cerrar'}
        </button>
      </div>
    </>
  );
}

// =========================== MODAL VENTA ===========================
function ModalVenta({ session, venta, clientePreseleccionado, onClose, onToast }) {
  const editando = !!venta;
  const isAdmin = session.role === 'admin';
  const { list: clientes } = useFirebaseList('clientes');
  const { list: ventas } = useFirebaseList('ventas');
  const { list: cierres } = useFirebaseList('cierres');
  const { data: vehiculo } = useFirebaseValue(`stockVehiculo/${editando ? venta.vendedorId : session.id}`);
  const { data: precios } = useFirebaseValue('precios');
  const { data: configRedondeo } = useFirebaseValue('config/redondeo');

  // Sincronizar modo de redondeo global al abrir el modal de venta
  // Garantiza que computePrice use el redondeo correcto incluso si no se abrió Precios
  useEffect(() => {
    if (configRedondeo?.modo) {
      setModoRedondeoGlobal(configRedondeo.modo);
    }
  }, [configRedondeo]);

  // Día cerrado: si está editando una venta cuya fecha ya está cerrada con cierre aprobado
  const ventaEnDiaCerrado = useMemo(() => {
    if (!editando) return false;
    const fechaVenta = isoToLocalDate(venta.fecha || venta.creadoEn);
    return cierres.some(c => c.status === 'aprobado' && c.vendedorId === venta.vendedorId && isoToLocalDate(c.creadoEn || c.fecha) === fechaVenta);
  }, [editando, venta, cierres]);

  // Verificar precios del día (bloquea venta si no están APROBADOS)
  const infoPrecios = useMemo(() => verificarPreciosDia(precios, todayStr()), [precios]);
  // sinPreciosHoy: bloquea venta. Requiere precios APROBADOS de hoy.
  const sinPreciosHoy = !infoPrecios.cargando && !infoPrecios.preciosAprobadosHoy;
  const cargandoPrecios = infoPrecios.cargando;

  const misClientes = useMemo(() => {
    // Vendedor puede vender a sus propios clientes INCLUSO pendientes (los creó él)
    // Admin solo ve aprobados (debe aprobarlos primero)
    let arr;
    if (editando) {
      if (isAdmin) arr = clientes.filter(c => c.status !== 'pendiente');
      else arr = clientes.filter(c => c.vendedorId === venta.vendedorId);
    } else if (isAdmin) {
      arr = clientes.filter(c => c.status !== 'pendiente');
    } else {
      arr = clientes.filter(c => c.vendedorId === session.id);
    }
    // Ordenar alfabéticamente
    return [...arr].sort((a,b) => (a.razonSocial||'').localeCompare(b.razonSocial||'', 'es', {sensitivity:'base'}));
  }, [clientes, session, venta, editando, isAdmin]);

  const [clienteId, setClienteId] = useState(venta?.clienteId || clientePreseleccionado || '');
  const [busquedaCliente, setBusquedaCliente] = useState('');
  // Filtro de día (-1 = todos, 0=Lun, 6=Dom). Por defecto el día actual.
  const [tipoDoc, setTipoDoc] = useState(venta?.tipoDoc || 'boleta');
  const [formaPago, setFormaPago] = useState(venta?.formaPago || 'efectivo');
  const [fechaCompromiso, setFechaCompromiso] = useState(() => {
    if (venta?.fechaCompromiso) return venta.fechaCompromiso;
    const d = new Date(); d.setDate(d.getDate() + 7);
    return d.toISOString().slice(0, 10);
  });
  const [modoPrueba, setModoPrueba] = useState(false);
  // Pago mixto: montos por forma
  const [montosMixto, setMontosMixto] = useState(venta?.montosMixto || {
    efectivo: 0,
    transferencia: 0,
    pendiente: 0,
  });
  // Descuentos por calibre (en pesos por unidad)
  const [descuentos, setDescuentos] = useState(() => {
    const base = {};
    CALIBRES.forEach(c => base[c] = 0);
    if (venta?.descuentosPorCalibre) {
      Object.assign(base, venta.descuentosPorCalibre);
    }
    return base;
  });
  const [mostrarDescuentos, setMostrarDescuentos] = useState(!!(venta?.descuentosPorCalibre && Object.values(venta.descuentosPorCalibre).some(v => v > 0)));

  // Items: si edita, reconstruir desde venta.items
  const [items, setItems] = useState(() => {
    const base = {};
    CALIBRES.forEach(c => base[c] = { caja: { cantidad: 0, mermas: 0 }, bandeja: { cantidad: 0, mermas: 0 } });
    if (venta?.items) {
      venta.items.forEach(it => {
        // Las mermas estaban combinadas, las repartimos a "caja" si hay cajas, sino a bandeja
        const mermasACaja = it.cajas > 0 ? it.mermas || 0 : 0;
        const mermasABd = it.cajas > 0 ? 0 : it.mermas || 0;
        base[it.calibre] = {
          caja: { cantidad: it.cajas || 0, mermas: mermasACaja },
          bandeja: { cantidad: it.bandejas || 0, mermas: mermasABd }
        };
      });
    }
    return base;
  });
  const [saving, setSaving] = useState(false);
  const [ventaExitosa, setVentaExitosa] = useState(null); // { ventaCompleta, cliente }

  const cliente = clientes.find(c => c.id === clienteId);

  // Cobros pendientes del cliente (excluyendo la venta actual si está editando)
  const deudaCliente = useMemo(() => {
    if (!clienteId) return { ventas: [], total: 0, masAntigua: null };
    const pend = ventas.filter(v => v.clienteId === clienteId && v.cobroEstado === 'pendiente' && (!editando || v.id !== venta.id));
    const total = pend.reduce((s,v) => s + (v.totalBruto||0), 0);
    const masAntigua = pend.length === 0 ? null :
      pend.reduce((min, v) => (v.creadoEn < (min?.creadoEn||'9999')) ? v : min, null);
    return { ventas: pend, total, masAntigua };
  }, [ventas, clienteId, editando, venta]);

  const estadoDeuda = useMemo(() => {
    if (deudaCliente.total === 0) return { tipo: 'sinDeuda' };
    const prioridad = { vencida: 4, venceHoy: 3, porVencer: 2, alDia: 1, sinFecha: 0 };
    let peor = null;
    deudaCliente.ventas.forEach(v => {
      const est = getDeudaEstado(v.fechaCompromiso);
      if (!peor || prioridad[est.tipo] > prioridad[peor.tipo]) peor = est;
    });
    return peor || { tipo: 'sinFecha' };
  }, [deudaCliente]);

  const formasDisponibles = useMemo(() => {
    if (!cliente) return ['efectivo', 'transferencia'];
    const fp = cliente.formasPago || {};
    const arr = [];
    if (fp.efectivo) arr.push('efectivo');
    if (fp.transferencia) arr.push('transferencia');
    if (fp.pendiente) arr.push('pendiente');
    // Pago mixto disponible si tiene 2+ formas habilitadas
    if (arr.length >= 2) arr.push('mixto');
    return arr.length > 0 ? arr : ['efectivo'];
  }, [cliente]);

  useEffect(() => {
    if (!formasDisponibles.includes(formaPago) && formasDisponibles.length > 0) {
      setFormaPago(formasDisponibles[0]);
    }
  }, [formasDisponibles]);

  const setVal = (cal, fmt, field, val) => {
    const v = parseInt(val) || 0;
    setItems(prev => ({
      ...prev,
      [cal]: { ...prev[cal], [fmt]: { ...prev[cal][fmt], [field]: v < 0 ? 0 : v } }
    }));
  };

  const calcLinea = (cal, fmt) => {
    const cfg = items[cal][fmt];
    if (cfg.cantidad === 0) return null;
    const unidadesPorFmt = FORMATOS[fmt].unidades;
    const unidadesTotal = cfg.cantidad * unidadesPorFmt;
    const mermas = Math.min(cfg.mermas, unidadesTotal);
    const unidadesEfectivas = unidadesTotal - mermas;
    const pricing = computePrice(precios, todayStr(), cal, fmt, tipoDoc);
    if (!pricing) return null;

    // pricing.total = total por 1 caja (ya redondeado a múltiplo de 5)
    // pricing.neto  = total neto por 1 caja
    // Para evitar decimales: calcular precio exacto por unidad desde el total redondeado
    const precioBrutoUnit = pricing.total / unidadesPorFmt;   // exacto: $35.100/180 = $195
    const precioNetoUnit  = pricing.neto  / unidadesPorFmt;

    // Descuento negociado por unidad (bruto)
    const descUnit = descuentos[cal] || 0;
    const descNetoUnit = descUnit / (1 + IVA_RATE);

    // Total = unidades efectivas × precio por unidad (redondeado al entero)
    const totalBruto = Math.round((precioBrutoUnit - descUnit) * unidadesEfectivas);
    const totalNeto  = Math.round((precioNetoUnit  - descNetoUnit) * unidadesEfectivas);

    // Para compatibilidad con el resto del código
    const subtotalBrutoSinMerma = Math.round(precioBrutoUnit * unidadesTotal);
    const subtotalNetoSinMerma  = Math.round(precioNetoUnit  * unidadesTotal);
    const descuentoBruto = Math.round(precioBrutoUnit * mermas);
    const descuentoNeto  = Math.round(precioNetoUnit  * mermas);
    const descuentoNegociadoBruto = Math.round(descUnit    * unidadesEfectivas);
    const descuentoNegociadoNeto  = Math.round(descNetoUnit * unidadesEfectivas);

    return {
      unidadesTotal, mermas,
      subtotalBrutoSinMerma, subtotalNetoSinMerma,
      descuentoBruto, descuentoNeto,
      descuentoNegociadoBruto, descuentoNegociadoNeto,
      totalBruto, totalNeto,
      precioUnit: pricing.displayPrice,
    };
  };

  const totales = useMemo(() => {
    let neto = 0, bruto = 0, mermas = 0, descMerma = 0, descNegBruto = 0, itemsResumen = [];
    CALIBRES.forEach(c => {
      ['caja','bandeja'].forEach(fmt => {
        const l = calcLinea(c, fmt);
        if (l) {
          neto += l.totalNeto;
          bruto += l.totalBruto;
          mermas += l.mermas;
          descMerma += l.descuentoBruto;
          descNegBruto += l.descuentoNegociadoBruto || 0;
          itemsResumen.push({ calibre: c, formato: fmt, ...l });
        }
      });
    });
    return {
      neto: Math.round(neto),
      bruto: Math.round(bruto),
      mermas, descMerma, descNegBruto, itemsResumen,
      iva: Math.round(bruto) - Math.round(neto)
    };
  }, [items, precios, tipoDoc, descuentos]);

  // Calcular stock disponible considerando que si edita, primero "devuelve" lo que tenía
  const stockDisponiblePorCalibre = useMemo(() => {
    const disp = {};
    CALIBRES.forEach(c => {
      let stock = vehiculo?.[c] || 0;
      // Si edita: sumar de vuelta lo que la venta original consumía
      if (editando) {
        const itemOriginal = (venta.items||[]).find(i => i.calibre === c);
        if (itemOriginal) stock += itemOriginal.unidadesTotal || 0;
      }
      disp[c] = stock;
    });
    return disp;
  }, [vehiculo, editando, venta]);

  const validarStock = () => {
    const requerido = {};
    CALIBRES.forEach(c => requerido[c] = 0);
    CALIBRES.forEach(c => {
      ['caja','bandeja'].forEach(fmt => {
        requerido[c] += items[c][fmt].cantidad * FORMATOS[fmt].unidades;
      });
    });
    for (const c of CALIBRES) {
      if (requerido[c] > (stockDisponiblePorCalibre[c]||0)) {
        return `Stock insuficiente: ${c} (requieres ${requerido[c]}u, tienes ${stockDisponiblePorCalibre[c]||0}u)`;
      }
    }
    return null;
  };

  const tieneDeuda = deudaCliente.total > 0;

  const guardar = async () => {
    // Bloquear si el día está cerrado y no es admin
    if (ventaEnDiaCerrado && !isAdmin) {
      return onToast('🔒 Esta venta es de un día ya cerrado · solo el admin puede modificar','error');
    }
    if (!clienteId) return onToast('Selecciona cliente','error');
    if (totales.itemsResumen.length === 0) return onToast('Agrega al menos un item','error');
    const err = validarStock();
    if (err) return onToast(err, 'error');

    // Validar fecha de compromiso si aplica
    const tienePartePendiente = formaPago === 'pendiente' || (formaPago === 'mixto' && (montosMixto.pendiente||0) > 0);
    if (tienePartePendiente && !fechaCompromiso) return onToast('Indica fecha de compromiso','error');

    // Validar pago mixto: la suma debe cuadrar
    if (formaPago === 'mixto') {
      const sumaMixto = (montosMixto.efectivo||0) + (montosMixto.transferencia||0) + (montosMixto.pendiente||0);
      if (Math.abs(totales.bruto - sumaMixto) >= 1) {
        return onToast(`Los montos no cuadran. Suma: ${fmt$(sumaMixto)} · Total: ${fmt$(totales.bruto)}`,'error');
      }
      // Al menos 2 formas deben tener monto > 0 para ser realmente "mixto"
      const formasConMonto = [montosMixto.efectivo>0, montosMixto.transferencia>0, montosMixto.pendiente>0].filter(Boolean).length;
      if (formasConMonto < 2) {
        return onToast('En pago mixto, completa al menos 2 formas con monto','error');
      }
    }

    if (tieneDeuda && !editando) {
      const msg = estadoDeuda.tipo === 'vencida'
        ? `🚨 Cliente con deuda VENCIDA por ${fmt$(deudaCliente.total)}.\n\n¿Confirmas la venta?`
        : estadoDeuda.tipo === 'venceHoy'
          ? `⏰ Cliente tiene deuda por ${fmt$(deudaCliente.total)} que VENCE HOY.\n\n¿Confirmas?`
          : `Cliente tiene deuda pendiente por ${fmt$(deudaCliente.total)}.\n\n¿Confirmas?`;
      if (!confirm(msg)) return;
    }

    setSaving(true);
    try {
      const itemsArr = [];
      CALIBRES.forEach(c => {
        const cajas = items[c].caja.cantidad;
        const bandejas = items[c].bandeja.cantidad;
        const mermasCaja = items[c].caja.mermas;
        const mermasBd = items[c].bandeja.mermas;
        if (cajas > 0 || bandejas > 0) {
          itemsArr.push({
            calibre: c,
            cajas, bandejas,
            mermas: mermasCaja + mermasBd,
            unidadesTotal: cajas * 180 + bandejas * 30,
          });
        }
      });

      // STOCK: si edita, primero revertir lo viejo y aplicar lo nuevo
      // Si la venta requiere aprobación de descuento (vendedor con descuento), NO descontar stock todavía.
      // Se descuenta solo cuando el admin aprueba.
      const requiereAprobacionDesc = !isAdmin && Object.values(descuentos).some(v => v > 0);
      const targetVendedorId = editando ? venta.vendedorId : session.id;

      if (!requiereAprobacionDesc) {
        const veh = await fbGet(`stockVehiculo/${targetVendedorId}`) || {};
        const newVeh = { ...veh };

        if (editando) {
          // Si se está editando una venta que estaba aprobada, revertir lo viejo
          if (ventaActiva(venta)) {
            (venta.items || []).forEach(it => {
              newVeh[it.calibre] = (newVeh[it.calibre] || 0) + (it.unidadesTotal || 0);
            });
          }
        }
        itemsArr.forEach(it => {
          newVeh[it.calibre] = (newVeh[it.calibre] || 0) - it.unidadesTotal;
        });
        await fbSet(`stockVehiculo/${targetVendedorId}`, newVeh);
      }

      const ventaData = {
        clienteId,
        vendedorId: editando ? venta.vendedorId : session.id,
        tipoDoc,
        formaPago,
        items: itemsArr,
        totalUnidades: itemsArr.reduce((s,i) => s + i.unidadesTotal, 0),
        totalMermas: totales.mermas,
        descuentoMermas: totales.descMerma,
        totalNeto: totales.neto,
        totalIva: totales.iva,
        totalBruto: totales.bruto,
        // Estados de cobro:
        // 'cobrado' = ya recibido (efectivo)
        // 'pendiente_transferencia' = transferencia esperando confirmación
        // 'pendiente' = crédito sin pagar
        cobroEstado: tienePartePendiente ? 'pendiente' :
                     formaPago === 'transferencia' ? 'pendiente_transferencia' :
                     formaPago === 'mixto' && (montosMixto.transferencia||0) > 0 ? 'pendiente_transferencia' :
                     'cobrado',
        fecha: editando ? venta.fecha : nowISO(),
        creadoEn: editando ? venta.creadoEn : nowISO(),
      };

      // Guardar desglose si es mixto
      if (formaPago === 'mixto') {
        ventaData.montosMixto = {
          efectivo: montosMixto.efectivo || 0,
          transferencia: montosMixto.transferencia || 0,
          pendiente: montosMixto.pendiente || 0,
        };
      }

      // Guardar descuentos negociados si hay
      const hayDescuento = Object.values(descuentos).some(v => v > 0);
      if (hayDescuento) {
        ventaData.descuentosPorCalibre = {...descuentos};
        ventaData.descuentoNegociadoTotal = totales.descNegBruto;
        // Si vendedor crea venta con descuento, requiere aprobación admin
        if (!isAdmin) {
          ventaData.requiereAprobacion = true;
          ventaData.aprobacionEstado = 'pendiente'; // pendiente | aprobada | rechazada
        }
      }

      if (tienePartePendiente) {
        ventaData.fechaCompromiso = fechaCompromiso;
        ventaData.cobradoEn = null;
        if (formaPago === 'mixto') {
          ventaData.montoPendiente = montosMixto.pendiente || 0;
          ventaData.montoCobrado = (montosMixto.efectivo||0) + (montosMixto.transferencia||0);
        }
      } else if (formaPago === 'transferencia' || (formaPago === 'mixto' && (montosMixto.transferencia||0) > 0)) {
        // Transferencia: queda pendiente de confirmación (no cobradoEn aún)
        ventaData.cobradoEn = null;
        ventaData.fechaCompromiso = null;
        ventaData.transferenciaConfirmada = false;
      } else {
        ventaData.cobradoEn = nowISO();
        ventaData.fechaCompromiso = null;
      }

      if (editando) {
        ventaData.editadoEn = nowISO();
        ventaData.editadoPor = session.id;
        await fbUpdate(`ventas/${venta.id}`, ventaData);
        await fbLog(session.id, 'update', 'ventas', {
          id: venta.id,
          cliente: clienteId,
          totalAnterior: venta.totalBruto,
          totalNuevo: totales.bruto,
        });
        onToast(`Venta actualizada: ${fmt$(totales.bruto)}`,'success');
      } else {
        const ventaId = uid();
        ventaData.creadoPor = session.id;
        if (tienePartePendiente) {
          ventaData.compromisoEstado = 'sin_confirmar';
        }
        await fbSet(`ventas/${ventaId}`, ventaData);
        await fbLog(session.id, 'create', 'ventas', { id: ventaId, cliente: clienteId, total: totales.bruto, formaPago });

        // Notificar al admin si requiere aprobación de descuento
        if (ventaData.requiereAprobacion && !isAdmin) {
          await crearNotificacion(session, {
            tipo: 'descuento_pendiente',
            titulo: '🏷️ Descuento por aprobar',
            mensaje: `${session.name || 'Vendedor'} solicita descuento de ${fmt$(ventaData.descuentoNegociadoTotal||0)} para ${cliente?.razonSocial || 'cliente'}`,
            link: 'ventas',
            ventaId,
            clienteId,
            prioridad: 'urgente',
          });
        }

        if (ventaData.requiereAprobacion) {
          // Venta pendiente de aprobación: NO enviar WhatsApp ni mostrar resumen
          // hasta que admin apruebe. Mostrar mensaje y cerrar.
          onToast(`📤 Solicitud de descuento enviada al administrador. La venta se confirmará cuando sea aprobada.`,'info');
          onClose();
          setSaving(false);
          return;
        }

        onToast(`Venta registrada: ${fmt$(totales.bruto)}`,'success');

        if (cliente) {
          const ventaCompleta = { ...ventaData, id: ventaId };
          setVentaExitosa({ ventaCompleta, cliente });
          setSaving(false);
          return;
        }
      }
      onClose();
    } catch(e) { console.error(e); onToast('Error al guardar','error'); setSaving(false); }
  };

  return (
    <div className="modal-bg" onClick={ventaExitosa ? undefined : onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>

        {ventaExitosa ? (
          <ModalVentaExitosa
            ventaCompleta={ventaExitosa.ventaCompleta}
            cliente={ventaExitosa.cliente}
            deudasPrevias={deudaCliente.ventas}
            session={session}
            onClose={() => { setVentaExitosa(null); onClose(); }}
            onToast={onToast}
          />
        ) : (
          <>
        <h3>{editando ? '✏️ Editar venta' : 'Nueva venta'}</h3>
        {ventaEnDiaCerrado && !isAdmin && (
          <div className="alert-banner" style={{fontSize:11, background:'var(--bad-bg)', color:'var(--bad)'}}>
            <span className="ico">🔒</span>
