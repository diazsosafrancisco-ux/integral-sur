                                <strong style={{fontFamily:'JetBrains Mono, monospace', fontSize:14, color:'var(--warn)'}}>{fmt$(montoPendiente)}</strong>
                                <div style={{fontSize:10, color:'var(--ink-mute)', marginTop:2}}>de {fmt$(v.totalBruto)}</div>
                              </>
                            ) : (
                              <strong style={{fontFamily:'JetBrains Mono, monospace', fontSize:13}}>{fmt$(v.totalBruto)}</strong>
                            )}
                            {/* Badge reprogramado */}
                            {v.reprogramado && (
                              <div style={{fontSize:9, fontWeight:700, color:'var(--warn)',
                                background:'var(--warn-bg)', padding:'1px 5px', borderRadius:3, marginTop:3, textAlign:'center'}}>
                                🔄 {v.reprogramaciones>=2?`${v.reprogramaciones}ª op.`:'2ª op.'}
                              </div>
                            )}
                            <div><button className="btn success sm" onClick={()=>setModalCobro({venta: v, cliente: cli})} style={{marginTop:4, padding:'4px 8px', fontSize:11}}>✓ Cobrar</button></div>
                          </div>
                        </div>
                        {/* Historial de abonos */}
                        {v.abonos && v.abonos.length > 0 && (
                          <div style={{marginTop:6, padding:'6px 8px', background:'var(--good-bg)', borderRadius:6, fontSize:10}}>
                            <strong style={{color:'var(--good)'}}>✅ Abonos ({v.abonos.length}):</strong>
                            {v.abonos.map((ab,i) => (
                              <div key={i} style={{color:'var(--good)', marginTop:2, fontFamily:'JetBrains Mono, monospace'}}>
                                {fmt$(ab.monto)} · {ab.forma==='efectivo'?'💵':ab.forma==='transferencia'?'🏦':'🔀'} · {new Date(ab.fecha).toLocaleDateString('es-CL',{day:'numeric',month:'short'})}
                              </div>
                            ))}
                          </div>
                        )}
                        {/* Desglose mixto — muestra qué se pagó y qué queda pendiente */}
                        {esMixto && v.montosMixto && (
                          <div style={{marginTop:6, padding:'8px 10px', background:'var(--bg-2)', borderRadius:8, fontSize:11, fontFamily:'JetBrains Mono, monospace'}}>
                            <div style={{fontWeight:700, color:'var(--ink)', marginBottom:5}}>🔀 Pago mixto · desglose:</div>
                            <div style={{display:'grid', gridTemplateColumns:'auto 1fr auto', gap:'3px 8px', alignItems:'center'}}>
                              {(v.montosMixto.efectivo||0) > 0 && <>
                                <span>💵</span><span style={{color:'var(--good)'}}>Efectivo (pagado)</span>
                                <strong style={{textAlign:'right', color:'var(--good)'}}>{fmt$(v.montosMixto.efectivo)}</strong>
                              </>}
                              {(v.montosMixto.transferencia||0) > 0 && <>
                                <span>🏦</span>
                                <span style={{color: v.transferenciaConfirmada?'var(--good)':'var(--accent)'}}>
                                  Transferencia {v.transferenciaConfirmada?'(confirmada)':'(pendiente OK)'}
                                </span>
                                <strong style={{textAlign:'right', color: v.transferenciaConfirmada?'var(--good)':'var(--accent)'}}>{fmt$(v.montosMixto.transferencia)}</strong>
                              </>}
                              {(v.montosMixto.pendiente||0) > 0 && <>
                                <span>⏰</span><span style={{color:'var(--warn)', fontWeight:700}}>Pendiente (debe)</span>
                                <strong style={{textAlign:'right', color:'var(--bad)', fontSize:13}}>{fmt$(v.montosMixto.pendiente)}</strong>
                              </>}
                            </div>
                            <div style={{borderTop:'1px solid var(--line)', marginTop:6, paddingTop:5, display:'flex', justifyContent:'space-between'}}>
                              <span style={{color:'var(--ink-soft)'}}>Total venta:</span>
                              <strong>{fmt$(v.totalBruto)}</strong>
                            </div>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              );
            })
          }
        </>
      ) : tab === 'transf_antiguas' ? (
        <>
          <div className="card" style={{background:'var(--bad-bg)', color:'var(--bad)'}}>
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
              <strong>🚨 {transferenciasAntiguas.length} {transferenciasAntiguas.length===1?'transferencia atrasada':'transferencias atrasadas'}</strong>
              <strong style={{fontSize:18, fontFamily:'JetBrains Mono, monospace'}}>
                {fmt$(transferenciasAntiguas.reduce((s,v) => s + saldoVenta(v), 0))}
              </strong>
            </div>
            <div style={{fontSize:11, marginTop:4, opacity:0.85}}>
              Transferencias de días anteriores que aún no se han confirmado · Pago era para el día de la venta
            </div>
          </div>

          {transferenciasAntiguas.length === 0 ? (
            <div className="empty">✓ No hay transferencias atrasadas</div>
          ) : (
            transferenciasAntiguas.map(v => {
              const cli = clientes.find(c => c.id === v.clienteId);
              const ven = VENDEDORES.find(vv => vv.id === v.vendedorId);
              const montoOriginal = v.formaPago === 'mixto' && v.montosMixto ? (v.montosMixto.transferencia||0) : (v.totalBruto||0);
              const saldo = saldoVenta(v);
              const tieneAbono = (v.totalAbonado||0) > 0;
              const fechaV = new Date(v.creadoEn);
              const hoyD = new Date();
              fechaV.setHours(0,0,0,0); hoyD.setHours(0,0,0,0);
              const diasAtraso = Math.floor((hoyD - fechaV) / 86400000);
              return (
                <div key={v.id} className="card" style={{borderLeft:`4px solid ${tieneAbono?'var(--warn)':'var(--bad)'}`}}>
                  <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:6}}>
                    <strong style={{fontSize:14, flex:1}}>{cli?.razonSocial || '(cliente eliminado)'}</strong>
                    <div style={{textAlign:'right', minWidth:90}}>
                      {tieneAbono ? (
                        <>
                          <div style={{fontSize:10, color:'var(--ink-soft)'}}>Saldo pendiente:</div>
                          <strong style={{color:'var(--warn)', fontFamily:'JetBrains Mono, monospace', fontSize:15}}>{fmt$(saldo)}</strong>
                        </>
                      ) : (
                        <strong style={{color:'var(--bad)', fontFamily:'JetBrains Mono, monospace'}}>{fmt$(montoOriginal)}</strong>
                      )}
                    </div>
                  </div>

                  {/* Desglose de abono */}
                  {tieneAbono && (
                    <div style={{
                      background:'rgba(0,0,0,0.06)', borderRadius:6,
                      padding:'6px 8px', marginBottom:6,
                      fontSize:11, fontFamily:'JetBrains Mono, monospace',
                    }}>
                      <div style={{display:'flex', justifyContent:'space-between', color:'var(--ink-soft)'}}>
                        <span>Deuda original:</span><span>{fmt$(montoOriginal)}</span>
                      </div>
                      <div style={{display:'flex', justifyContent:'space-between', color:'var(--good)'}}>
                        <span>✓ Abonado:</span><span>-{fmt$(v.totalAbonado)}</span>
                      </div>
                      <div style={{display:'flex', justifyContent:'space-between', fontWeight:700,
                        color:'var(--warn)', borderTop:'1px solid var(--line)', paddingTop:4, marginTop:4}}>
                        <span>Saldo pendiente:</span><span>{fmt$(saldo)}</span>
                      </div>
                      {v.abonos?.map((ab,i) => (
                        <div key={i} style={{fontSize:10, color:'var(--ink-mute)', marginTop:3}}>
                          {new Date(ab.fecha).toLocaleDateString('es-CL',{day:'numeric',month:'short'})} · {ab.forma==='efectivo'?'💵':ab.forma==='transferencia'?'🏦':'🔀'} {fmt$(ab.monto)}
                        </div>
                      ))}
                    </div>
                  )}

                  <div style={{display:'flex', gap:6, marginBottom:6, flexWrap:'wrap', alignItems:'center'}}>
                    <span style={{padding:'2px 8px', borderRadius:10,
                      background: tieneAbono ? 'var(--warn-bg)' : 'var(--bad-bg)',
                      color: tieneAbono ? 'var(--warn)' : 'var(--bad)',
                      fontSize:10, fontWeight:700}}>
                      {tieneAbono ? '💸 Con abono · ' : '🚨 '}{diasAtraso} {diasAtraso===1?'día':'días'} de atraso
                    </span>
                    {v.formaPago === 'mixto' && <span style={{fontSize:10, color:'var(--accent)', fontWeight:700}}>🔀 MIXTO</span>}
                  </div>
                  {cli && <div style={{fontSize:11, color:'var(--ink-soft)', marginBottom:6}}>👤 {cli.contacto} · 📞 {cli.telefonoContacto}</div>}
                  <div style={{fontSize:11, color:'var(--ink-mute)', marginBottom:8}}>
                    {isAdmin && <>👤 {ven?.name} · </>}
                    {fmtVentaCajas(v)} · {v.tipoDoc==='factura'?'Factura':'Boleta'} · Venta {new Date(v.creadoEn).toLocaleDateString('es-CL', {day:'numeric', month:'short'})}
                  </div>
                  <div style={{display:'flex', gap:6, flexWrap:'wrap'}}>
                    <button
                      className="btn sm"
                      style={{flex:'1 1 80px', background:'var(--good)', color:'var(--good-on)', border:'none', fontSize:11, padding:'6px 10px'}}
                      onClick={() => setModalTransf({venta: v, cliente: cli})}>
                      ✓ Recibida
                    </button>
                    {cli && (cli.telefonoContacto || cli.telefono) && (
                      <button
                        className="btn sm"
                        style={{flex:'1 1 80px', background:'#25D366', color:'white', border:'none', fontSize:11, padding:'6px 10px'}}
                        onClick={() => {
                          const tel = cli.telefonoContacto || cli.telefono;
                          const fechaTxt = new Date(v.creadoEn).toLocaleDateString('es-CL', {day:'numeric', month:'long'});
                          const mensaje = `🥚 *INTEGRAL SUR · Distribuidora*\n\nHola ${cli.contacto || cli.razonSocial}, esperamos que se encuentre muy bien 😊\n\nLe escribimos porque la transferencia de su compra del *${fechaTxt}* (hace ${diasAtraso} ${diasAtraso===1?'día':'días'}) aún no la hemos recibido:\n\n💰 *Monto: ${fmt$(monto)}*\n\n📎 Le pedimos amablemente que nos envíe el comprobante o que nos coordine el pago a la brevedad.\n\n¡Muchas gracias por su comprensión y confianza! 🙏🥚`;
                          abrirWhatsApp(tel, mensaje);
                          fbLog(session.id, 'whatsapp', 'cobros', { ventaId: v.id, momento: 'transf_atrasada' });
                        }}>
                        📲 Recordar
                      </button>
                    )}
                  </div>
                </div>
              );
            })
          )}
        </>
      ) : (
        <>
          <div className="card" style={{background:'var(--good-bg)', color:'var(--good)'}}>
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
              <strong>{historico.length} {historico.length===1?'crédito cobrado':'créditos cobrados'}</strong>
              <strong style={{fontSize:18, fontFamily:'JetBrains Mono, monospace'}}>{fmt$(totalHistorico)}</strong>
            </div>
            <div style={{fontSize:11, marginTop:4, opacity:0.85}}>
              Ventas a crédito que ya fueron cobradas
            </div>
          </div>

          {historico.length === 0 ? <div className="empty">Aún sin créditos cobrados</div> :
            historico.map(v => {
              const cli = clientes.find(c => c.id === v.clienteId);
              const ven = VENDEDORES.find(vv => vv.id === v.vendedorId);

              // Forma de pago del cobro realizado
              const formaCobro = () => {
                if (v.cobroFormaReal === 'efectivo') return '💵 Efectivo';
                if (v.cobroFormaReal === 'transferencia') return '🏦 Transferencia';
                if (v.cobroFormaReal === 'mixto') {
                  const ef = v.montoCobradoEfectivo || 0;
                  const tr = v.montoCobradoTransferencia || 0;
                  return `🔀 Mixto: 💵 ${fmt$(ef)} + 🏦 ${fmt$(tr)}`;
                }
                // Si no hay cobroFormaReal, usar formaPago original
                if (v.formaPago === 'transferencia') return '🏦 Transferencia';
                if (v.formaPago === 'efectivo') return '💵 Efectivo';
                return '—';
              };

              const verificado = !!v.verificadoPor;

              return (
                <div key={v.id} className="card" style={{
                  borderLeft: `4px solid ${verificado ? 'var(--good)' : 'var(--accent)'}`,
                }}>
                  <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', gap:8}}>
                    <div style={{flex:1, minWidth:0}}>
                      <div style={{display:'flex', alignItems:'center', gap:6, marginBottom:2}}>
                        <strong style={{fontSize:14}}>{cli?.razonSocial || '(cliente eliminado)'}</strong>
                        {verificado && (
                          <span style={{fontSize:10, fontWeight:700, color:'var(--good)',
                            background:'var(--good-bg)', padding:'1px 6px', borderRadius:4}}>
                            ✓ Verificado
                          </span>
                        )}
                      </div>
                      <div style={{fontSize:12, color:'var(--ink-soft)', marginTop:3}}>
                        {isAdmin && <>👤 {ven?.name} · </>}
                        {fmtVentaCajas(v)} · {v.tipoDoc==='factura'?'Factura':'Boleta'}
                      </div>

                      {/* Fechas */}
                      <div style={{fontSize:11, color:'var(--ink-mute)', marginTop:3, lineHeight:1.7}}>
                        📅 Venta: {new Date(v.creadoEn).toLocaleDateString('es-CL', {day:'numeric', month:'short', year:'numeric'})}
                        {v.fechaCompromiso && (
                          <> · 🤝 Compromiso: {new Date(v.fechaCompromiso + 'T12:00:00').toLocaleDateString('es-CL', {day:'numeric', month:'short'})}</>
                        )}
                        <br/>
                        ✅ Cobrado: {v.cobradoEn
                          ? new Date(v.cobradoEn).toLocaleDateString('es-CL', {day:'numeric', month:'short', year:'numeric'})
                          : '—'}
                      </div>

                      {/* Forma de pago del cobro */}
                      <div style={{
                        marginTop:6, padding:'5px 8px',
                        background:'var(--bg-2)', borderRadius:6,
                        fontSize:12, fontWeight:600, color:'var(--ink)'
                      }}>
                        💳 Pagó con: {formaCobro()}
                      </div>

                      {/* Verificado por */}
                      {verificado && (
                        <div style={{fontSize:10, color:'var(--good)', marginTop:4}}>
                          ✓ Verificado por {v.verificadoPor === session.id ? 'ti' : 'admin'}
                          {v.verificadoEn && <> el {new Date(v.verificadoEn).toLocaleDateString('es-CL', {day:'numeric', month:'short'})}</>}
                        </div>
                      )}
                    </div>

                    <div style={{textAlign:'right', minWidth:90}}>
                      {/* Mostrar desglose si fue mixto o tuvo abonos */}
                      {v.formaPago === 'mixto' && v.montosMixto ? (
                        <div>
                          <div style={{fontSize:10, color:'var(--ink-soft)'}}>Total venta:</div>
                          <strong style={{fontSize:14, color:'var(--good)', fontFamily:'JetBrains Mono, monospace'}}>
                            {fmt$(v.totalBruto)}
                          </strong>
                          <div style={{fontSize:10, marginTop:4, fontFamily:'JetBrains Mono, monospace', lineHeight:1.7}}>
                            {(v.montosMixto.efectivo||0)>0 && <div style={{color:'var(--good)'}}>💵 {fmt$(v.montosMixto.efectivo)}</div>}
                            {(v.montosMixto.transferencia||0)>0 && <div style={{color:'var(--accent)'}}>🏦 {fmt$(v.montosMixto.transferencia)}</div>}
                            {(v.montosMixto.pendiente||0)>0 && <div style={{color:'var(--good)'}}>⏰→💰 {fmt$(v.montosMixto.pendiente)}</div>}
                          </div>
                        </div>
                      ) : v.totalAbonado > 0 ? (
                        <div>
                          <div style={{fontSize:10, color:'var(--ink-soft)'}}>Total cobrado:</div>
                          <strong style={{fontSize:14, color:'var(--good)', fontFamily:'JetBrains Mono, monospace'}}>
                            {fmt$(v.totalBruto)}
                          </strong>
                          <div style={{fontSize:10, color:'var(--ink-mute)', marginTop:2}}>
                            con {v.abonos?.length||0} abono{(v.abonos?.length||0)>1?'s':''}
                          </div>
                        </div>
                      ) : (
                        <strong style={{fontSize:14, color:'var(--good)', fontFamily:'JetBrains Mono, monospace'}}>
                          {fmt$(v.totalBruto)}
                        </strong>
                      )}
                      {/* Botón verificar — solo admin, solo si no está verificado */}
                      {isAdmin && !verificado && (
                        <div>
                          <button
                            className="btn sm"
                            onClick={async () => {
                              try {
                                await fbUpdate(`ventas/${v.id}`, {
                                  verificadoPor: session.id,
                                  verificadoEn: nowISO(),
                                });
                                await fbLog(session.id, 'verificar', 'cobros', { ventaId: v.id });
                                onToast('✓ Cobro verificado','success');
                              } catch(e) { onToast('Error','error'); }
                            }}
                            style={{marginTop:4, padding:'4px 8px', fontSize:10,
                              background:'var(--accent)', color:'var(--accent-on)', border:'none'}}>
                            ✓ Verificar
                          </button>
                        </div>
                      )}
                      {/* Revertir — solo admin */}
                      {isAdmin && (
                        <div>
                          <button
                            className="btn ghost sm"
                            onClick={()=>revertirCobro(v)}
                            style={{marginTop:4, padding:'3px 7px', fontSize:10}}>
                            ↩ Revertir
                          </button>
                        </div>
                      )}
                    </div>
                  </div>
                </div>
              );
            })
          }
        </>
      )}
      {modalCobro && (
        <ModalCobroPendiente
          venta={modalCobro.venta}
          cliente={modalCobro.cliente}
          session={session}
          onClose={()=>setModalCobro(null)}
          onToast={onToast}
        />
      )}
      {modalTransf && (
        <ModalConfirmarTransferencia
          venta={modalTransf.venta}
          cliente={modalTransf.cliente}
          session={session}
          onClose={()=>setModalTransf(null)}
          onToast={onToast}
        />
      )}
    </div>
  );
}

// =========================== CARGAS INICIALES ===========================
// Vendedor solicita la carga inicial del día (cuánto llevará al vehículo)
// Admin aprueba → stock pasa de bodega a vehículo
// 1 carga por día, admin puede crear "carga adicional" si se necesita

function Cargas({ session, onToast }) {
  const isAdmin = session.role === 'admin';
  const { list: cargasAll, loading } = useFirebaseList('cargas');
  const [modal, setModal] = useState(null);
  const [tab, setTab] = useState('pendientes');

  const cargas = useMemo(() =>
    isAdmin ? cargasAll : cargasAll.filter(c => c.vendedorId === session.id),
    [cargasAll, session, isAdmin]);

  const sortedDesc = useMemo(() =>
    [...cargas].sort((a,b) => (b.creadoEn||'').localeCompare(a.creadoEn||'')), [cargas]);

  const pendientes = sortedDesc.filter(c => c.status === 'pendiente');
  const aprobadas = sortedDesc.filter(c => c.status === 'aprobada');
  const rechazadas = sortedDesc.filter(c => c.status === 'rechazada');

  // Verifica si vendedor ya tiene una carga normal del día
  const tieneCargaHoy = useMemo(() => {
    if (isAdmin) return false;
    return cargas.some(c => c.vendedorId === session.id && isoToLocalDate(c.creadoEn) === todayStr() && (c.status === 'pendiente' || c.status === 'aprobada') && !c.adicional && !c.segundaVuelta);
  }, [cargas, session, isAdmin]);

  // Detecta si el vendedor tiene cierre aprobado de 1ª vuelta hoy (habilita 2ª vuelta)
  const { list: cierresAll } = useFirebaseList('cierres');

  // ¿Tiene cierre pendiente de UN DÍA ANTERIOR? → bloquear nueva carga
  const cierrePendienteAyer = useMemo(() => {
    if (isAdmin) return null;
    const hoy = todayStr();
    // Buscar cierres de días anteriores que aún no están aprobados
    const pendienteAnterior = cierresAll.find(c =>
      c.vendedorId === session.id &&
      isoToLocalDate(c.creadoEn) < hoy &&
      c.status === 'pendiente' &&
      !c.segundaVuelta
    );
    if (pendienteAnterior) return pendienteAnterior;
    // También verificar si tiene carga de día anterior sin cierre
    // (carga aprobada de ayer pero sin ningún cierre de ese día)
    const cargaAnterior = cargasAll.find(c =>
      c.vendedorId === session.id &&
      isoToLocalDate(c.creadoEn) < hoy &&
      c.status === 'aprobada' &&
      !c.segundaVuelta
    );
    if (!cargaAnterior) return null;
    // ¿Tiene cierre de ese día?
    const fechaCarga = isoToLocalDate(cargaAnterior.creadoEn);
    const tieneCierreEseDia = cierresAll.some(c =>
      c.vendedorId === session.id &&
      isoToLocalDate(c.creadoEn) === fechaCarga &&
      !c.segundaVuelta
    );
    return tieneCierreEseDia ? null : { _sinCierre: true, fecha: fechaCarga, carga: cargaAnterior };
  }, [cierresAll, cargasAll, session, isAdmin]);

  const cierreAprobadoHoy = useMemo(() => {
    if (isAdmin) return false;
    const hoy = todayStr();
    // Solo cuenta como "cierre del día" si hay una carga aprobada DE HOY
    // Esto evita confundir cierres de días anteriores rendidos con retraso
    const tieneCargaDeHoy = cargasAll.some(c =>
      c.vendedorId === session.id &&
      isoToLocalDate(c.creadoEn) === hoy &&
      c.status === 'aprobada' &&
      !c.segundaVuelta
    );
    if (!tieneCargaDeHoy) return false;
    return cierresAll.some(c =>
      c.vendedorId === session.id &&
      isoToLocalDate(c.creadoEn) === hoy &&
      c.status === 'aprobado' &&
      !c.segundaVuelta &&
      !c.fechaAnterior
    );
  }, [cierresAll, cargasAll, session, isAdmin]);

  // ¿Ya tiene carga de 2ª vuelta hoy?
  const tieneSegundaVueltaHoy = useMemo(() => {
    if (isAdmin) return false;
    return cargas.some(c => c.vendedorId === session.id && isoToLocalDate(c.creadoEn) === todayStr() && (c.status === 'pendiente' || c.status === 'aprobada') && c.segundaVuelta);
  }, [cargas, session, isAdmin]);

  if (loading) return <div className="pad"><div className="empty">Cargando...</div></div>;

  const grupos = tab === 'pendientes' ? pendientes : tab === 'aprobadas' ? aprobadas : rechazadas;

  return (
    <div className="pad">
      <h2 className="section-title">Cargas del vehículo</h2>
      <div className="section-sub">
        {isAdmin ? 'Despachos a vendedores' : 'Tu mercadería del día'}
      </div>

      {/* Bloqueo por cierre pendiente de día anterior */}
      {!isAdmin && cierrePendienteAyer && (
        <div className="card" style={{borderLeft:'4px solid var(--bad)', marginBottom:14}}>
          <div style={{display:'flex', alignItems:'center', gap:10, marginBottom:10}}>
            <span style={{fontSize:28}}>🔒</span>
            <div>
              <strong style={{fontSize:15, color:'var(--bad)'}}>Carga bloqueada</strong>
              <div style={{fontSize:12, color:'var(--ink-soft)', marginTop:2}}>
                Tienes el cierre de caja del {cierrePendienteAyer.fecha || 'día anterior'} pendiente.
              </div>
            </div>
          </div>
          <div style={{background:'var(--bad-bg)', borderRadius:8, padding:'10px 12px', fontSize:12, color:'var(--bad)', fontWeight:600}}>
            ⚠️ Debes cerrar la caja del día anterior antes de solicitar una nueva carga.
          </div>
          <div style={{marginTop:8, fontSize:12, color:'var(--ink-soft)', padding:'8px 10px', background:'var(--bg-2)', borderRadius:8}}>
            Ve a <strong>Más → Cerrar caja</strong> para ver el detalle del día anterior y cerrarlo.
          </div>
        </div>
      )}

      {!isAdmin && !cierrePendienteAyer && !tieneCargaHoy && !cierreAprobadoHoy && (
        <button className="btn accent full" onClick={()=>setModal({})} style={{marginBottom:14}}>
          🚚 Solicitar carga del día
        </button>
      )}
      {!isAdmin && tieneCargaHoy && !cierreAprobadoHoy && (
        <div className="alert-banner" style={{fontSize:12, background:'var(--good-bg)', color:'var(--good)'}}>
          <span className="ico">✅</span><div>Ya tienes carga inicial del día. Si necesitas más, pide al admin una "carga adicional".</div>
        </div>
      )}
      {/* Botón 2ª vuelta: visible si ya cerró la 1ª vuelta y no tiene 2ª activa */}
      {!isAdmin && cierreAprobadoHoy && !tieneSegundaVueltaHoy && (
        <div style={{marginBottom:14}}>
          <div className="alert-banner" style={{fontSize:12, background:'var(--good-bg)', color:'var(--good)', marginBottom:8}}>
            <span className="ico">✅</span><div>Primera vuelta cerrada y aprobada.</div>
          </div>
          <button className="btn accent full" onClick={()=>setModal({ segundaVuelta: true })} style={{background:'var(--warn)'}}>
            🔄 Solicitar 2ª Vuelta (entrega adicional)
          </button>
        </div>
      )}
      {!isAdmin && tieneSegundaVueltaHoy && (
        <div className="alert-banner" style={{fontSize:12, background:'var(--warn-bg)', color:'var(--warn)'}}>
          <span className="ico">🔄</span><div>2ª Vuelta en curso. Descarga cuando regreses.</div>
        </div>
      )}
      {isAdmin && (
        <button className="btn accent full" onClick={()=>setModal({ adicional: true })} style={{marginBottom:14}}>
          ➕ Crear carga adicional (vendedor específico)
        </button>
      )}

      <div className="tabs">
        <button className={`tab ${tab==='pendientes'?'active':''}`} onClick={()=>setTab('pendientes')}>
          ⏳ Pendientes {pendientes.length>0 && `(${pendientes.length})`}
        </button>
        <button className={`tab ${tab==='aprobadas'?'active':''}`} onClick={()=>setTab('aprobadas')}>
          ✅ Aprobadas {aprobadas.length>0 && `(${aprobadas.length})`}
        </button>
        <button className={`tab ${tab==='rechazadas'?'active':''}`} onClick={()=>setTab('rechazadas')}>
          ✕ Rechazadas
        </button>
      </div>

      {grupos.length === 0 ? <div className="empty">Sin cargas en esta sección</div> :
        grupos.map(c => <CargaCard key={c.id} carga={c} session={session} onOpen={()=>setModal(c)}/>)
      }

      {modal && <ModalCarga session={session} carga={modal.id?modal:null} esAdicional={modal.adicional} esSegundaVuelta={modal.segundaVuelta} onClose={()=>setModal(null)} onToast={onToast}/>}
    </div>
  );
}

function CargaCard({ carga, session, onOpen }) {
  const isAdmin = session.role === 'admin';
  const vendedor = VENDEDORES.find(v => v.id === carga.vendedorId);
  const total = (carga.items||[]).reduce((s,i) => s + (i.cajas*180 + i.bandejas*30), 0);
  const cajas = (carga.items||[]).reduce((s,i) => s + i.cajas + (i.bandejas/6), 0);
  const fmtCj = (n) => n % 1 === 0 ? `${n}cj` : `${n.toFixed(1)}cj`;
  const statusColor = carga.status==='pendiente'?'warn':carga.status==='aprobada'?'good':'bad';
  const statusLabel = carga.status==='pendiente'?'⏳ pendiente':carga.status==='aprobada'?'✅ aprobada':'✕ rechazada';

  return (
    <div className="card" style={{borderLeft: `4px solid var(--${statusColor})`}}>
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', gap:8}}>
        <div style={{flex:1, minWidth:0}}>
          <div style={{display:'flex', alignItems:'center', gap:8, flexWrap:'wrap'}}>
            <strong style={{fontSize:14}}>{new Date(carga.creadoEn).toLocaleDateString('es-CL', {day:'numeric', month:'short'})}</strong>
            <span className={`badge ${statusColor}`}>{statusLabel}</span>
            {carga.adicional && <span className="badge accent">+ adicional</span>}
          </div>
          {isAdmin && <div style={{fontSize:12, color:'var(--ink-soft)', marginTop:4}}>👤 {vendedor?.name}</div>}
          <div style={{fontSize:12, color:'var(--ink-soft)', marginTop:6, lineHeight:1.6}}>
            <strong>Total: {fmtCj(cajas)}</strong> ({fmtN(total)}u)<br/>
            <span style={{color:'var(--ink-mute)', fontSize:11}}>
              {(carga.items||[]).filter(i => i.cajas>0 || i.bandejas>0).map((i, idx, arr) => (
                <span key={idx}>{i.cajas>0&&`${i.cajas}cj `}{i.bandejas>0&&`${i.bandejas}bd `}{i.calibre}{idx<arr.length-1?' · ':''}</span>
              ))}
            </span>
            {carga.observaciones && <><br/><em>"{carga.observaciones}"</em></>}
          </div>
        </div>
        {carga.status === 'pendiente' && (
          <button className="btn accent sm" onClick={onOpen}>{isAdmin ? '✅ Revisar' : 'Ver'}</button>
        )}
      </div>
    </div>
  );
}

function ModalCarga({ session, carga, esAdicional, esSegundaVuelta, onClose, onToast }) {
  const isAdmin = session.role === 'admin';
  const yaAprobando = carga && carga.status === 'pendiente' && isAdmin;
  const yaCreado = !!carga;
  const { data: bodega } = useFirebaseValue('stockBodega');
  const [vendedorId, setVendedorId] = useState(carga?.vendedorId || (isAdmin && esAdicional ? '' : session.id));

  // Items: inicializar con 0 cajas/bandejas por calibre
  const [items, setItems] = useState(() => {
    const base = {};
    CALIBRES.forEach(c => base[c] = { cajas: 0, bandejas: 0 });
    if (carga?.items) {
      carga.items.forEach(it => {
        base[it.calibre] = { cajas: it.cajas || 0, bandejas: it.bandejas || 0 };
      });
    }
    return base;
  });
  const [observaciones, setObservaciones] = useState(carga?.observaciones || '');
  const [saving, setSaving] = useState(false);

  const setVal = (cal, field, val) => {
    const v = parseInt(val)||0;
    setItems(prev => ({...prev, [cal]: { ...prev[cal], [field]: v < 0 ? 0 : v }}));
  };

  const totalUnidades = useMemo(() =>
    Object.values(items).reduce((s,i) => s + i.cajas*180 + i.bandejas*30, 0), [items]);

  const itemsArr = () => CALIBRES.map(c => ({
    calibre: c,
    cajas: items[c].cajas,
    bandejas: items[c].bandejas,
  })).filter(i => i.cajas > 0 || i.bandejas > 0);

  const validarStock = () => {
    if (!bodega) return null;
    for (const c of CALIBRES) {
      const requerido = items[c].cajas*180 + items[c].bandejas*30;
      if (requerido > (bodega[c]||0)) {
        return `Stock insuficiente en bodega: ${c} (necesitas ${requerido}u, hay ${bodega[c]||0}u)`;
      }
    }
    return null;
  };

  const guardar = async () => {
    if (totalUnidades === 0) return onToast('Ingresa al menos 1 producto','error');
    if (isAdmin && esAdicional && !vendedorId) return onToast('Selecciona vendedor','error');

    setSaving(true);
    try {
      if (!carga) {
        // Crear carga
        const err = validarStock();
        if (err) { setSaving(false); return onToast(err,'error'); }

        const datos = {
          vendedorId: vendedorId || session.id,
          items: itemsArr(),
          observaciones: observaciones.trim(),
          status: esAdicional && isAdmin ? 'aprobada' : 'pendiente',
          adicional: !!esAdicional,
          segundaVuelta: !!esSegundaVuelta,
          creadoPor: session.id,
          creadoEn: nowISO(),
        };
        const newId = uid();

        // Si admin crea adicional, va aprobada y mueve stock de una vez
        if (datos.status === 'aprobada') {
          const bod = await fbGet('stockBodega') || {};
          const veh = await fbGet(`stockVehiculo/${datos.vendedorId}`) || {};
          const newBod = {...bod};
          const newVeh = {...veh};
          itemsArr().forEach(it => {
            const u = it.cajas*180 + it.bandejas*30;
            newBod[it.calibre] = (newBod[it.calibre]||0) - u;
            newVeh[it.calibre] = (newVeh[it.calibre]||0) + u;
          });
          await fbSet('stockBodega', newBod);
          await fbSet(`stockVehiculo/${datos.vendedorId}`, newVeh);
          datos.aprobadoEn = nowISO();
          datos.aprobadoPor = session.id;
        }

        await fbSet(`cargas/${newId}`, datos);
        await fbLog(session.id, 'create', 'cargas', { id: newId, vendedor: datos.vendedorId, total: totalUnidades, segundaVuelta: !!esSegundaVuelta });
        // Notificar al admin si vendedor solicita carga
        if (datos.status === 'pendiente') {
          await crearNotificacion(session, {
            tipo: 'carga_pendiente',
            titulo: esSegundaVuelta ? '🔄 2ª Vuelta por aprobar' : '🚚 Carga por aprobar',
            mensaje: `${session.name || 'Vendedor'} solicita ${esSegundaVuelta ? '2ª vuelta' : 'carga'} de ${totalUnidades}u`,
            link: 'cargas',
            prioridad: 'urgente',
          });
        }
        onToast(datos.status === 'aprobada' ? 'Carga creada y aprobada' : 'Carga enviada · pendiente','success');
      } else if (yaAprobando) {
        // Admin aprueba: mover stock de bodega a vehículo
        const err = validarStock();
        if (err) { setSaving(false); return onToast(err,'error'); }

        const bod = await fbGet('stockBodega') || {};
        const veh = await fbGet(`stockVehiculo/${carga.vendedorId}`) || {};
        const newBod = {...bod};
        const newVeh = {...veh};
        itemsArr().forEach(it => {
          const u = it.cajas*180 + it.bandejas*30;
          newBod[it.calibre] = (newBod[it.calibre]||0) - u;
          newVeh[it.calibre] = (newVeh[it.calibre]||0) + u;
        });
        await fbSet('stockBodega', newBod);
        await fbSet(`stockVehiculo/${carga.vendedorId}`, newVeh);

        await fbUpdate(`cargas/${carga.id}`, {
          status: 'aprobada',
          itemsAprobados: itemsArr(),
          aprobadoEn: nowISO(),
          aprobadoPor: session.id,
        });
        await fbLog(session.id, 'approve', 'cargas', { id: carga.id });
        onToast('Carga aprobada · stock movido a vehículo','success');
      }
      onClose();
    } catch(e) { console.error(e); onToast(e.message || 'Error','error'); setSaving(false); }
  };

  const rechazar = async () => {
    if (!confirm('¿Rechazar esta carga?')) return;
    try {
      await fbUpdate(`cargas/${carga.id}`, {
        status: 'rechazada',
        rechazadoEn: nowISO(),
        rechazadoPor: session.id,
      });
      await fbLog(session.id, 'reject', 'cargas', { id: carga.id });
      onToast('Carga rechazada','warn');
      onClose();
    } catch(e) { onToast('Error','error'); }
  };

  const titulo = !carga ? (esSegundaVuelta ? '🔄 Solicitar 2ª Vuelta' : esAdicional ? '➕ Carga adicional' : '🚚 Carga del día') : yaAprobando ? '✅ Revisar carga' : 'Detalle de carga';

  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <h3>{titulo}</h3>

        {!carga && !esAdicional && (
          <div className="alert-banner info" style={{fontSize:12}}>
            <span className="ico">ℹ️</span>
            <div>Indica cuántas cajas/bandejas de cada calibre llevarás hoy en tu vehículo.</div>
          </div>
        )}

        {esAdicional && isAdmin && (
          <>
            <label className="fld">Vendedor *</label>
            <select className="inp" value={vendedorId} onChange={e=>setVendedorId(e.target.value)} disabled={yaCreado}>
              <option value="">-- Selecciona --</option>
              {VENDEDORES.map(v => <option key={v.id} value={v.id}>{v.name}</option>)}
            </select>
          </>
        )}

        {CALIBRES.map(c => {
          const stockBod = bodega?.[c] || 0;
          const reqUnidades = items[c].cajas*180 + items[c].bandejas*30;
          const insuficiente = reqUnidades > stockBod;
          return (
            <div key={c} style={{padding:'10px', marginTop:8, borderRadius:8, border:'1px solid var(--line)', background: insuficiente ? 'var(--bad-bg)' : 'transparent'}}>
              <div style={{display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:6}}>
                <strong style={{fontSize:14}}>{c}</strong>
                <span style={{fontSize:10, color: insuficiente ? 'var(--bad)' : 'var(--ink-mute)', fontFamily:'JetBrains Mono, monospace'}}>
                  {(() => {
                    const bd = unitsBreakdown(stockBod);
                    const partes = [];
                    if (bd.cajasInt > 0) partes.push(`${bd.cajasInt}cj`);
                    if (bd.bandejasInt > 0) partes.push(`${bd.bandejasInt}bd`);
                    return `Bodega: ${partes.length > 0 ? partes.join(' · ') : '0cj'}`;
                  })()}
                </span>
              </div>
              <div className="row">
                <div>
                  <label className="fld" style={{fontSize:10}}>Cajas</label>
                  <input type="number" min="0" className="inp" value={items[c].cajas || ''} onChange={e=>setVal(c, 'cajas', e.target.value)} style={{padding:'8px 10px', marginBottom:0}} disabled={!!carga && !yaAprobando}/>
                </div>
                <div>
                  <label className="fld" style={{fontSize:10}}>Bandejas</label>
                  <input type="number" min="0" className="inp" value={items[c].bandejas || ''} onChange={e=>setVal(c, 'bandejas', e.target.value)} style={{padding:'8px 10px', marginBottom:0}} disabled={!!carga && !yaAprobando}/>
                </div>
              </div>
              {insuficiente && (
                <div style={{fontSize:11, color:'var(--bad)', marginTop:4, fontWeight:600}}>
                  ⚠️ Excede stock bodega
                </div>
              )}
            </div>
          );
        })}

        <label className="fld">Observaciones</label>
        <textarea
          className="inp" rows="2"
          value={observaciones}
          onChange={e=>setObservaciones(e.target.value)}
          placeholder="Notas..."
          disabled={!!carga && !yaAprobando}
          style={{resize:'none', fontFamily:'inherit'}}
        />

        <div style={{padding:'10px', background:'var(--bg-2)', borderRadius:8, marginTop:10, fontFamily:'JetBrains Mono, monospace', fontSize:12}}>
          <div style={{display:'flex', justifyContent:'space-between'}}>
            <span>Total a cargar:</span>
            <strong style={{color:'var(--accent)'}}>{fmtN(totalUnidades)}u</strong>
          </div>
        </div>

        <div className="actions">
          <button className="btn ghost" onClick={onClose}>Cerrar</button>
          {yaAprobando && <button className="btn danger" onClick={rechazar}>Rechazar</button>}
          {(yaAprobando || !carga) && (
            <button className="btn accent" onClick={guardar} disabled={saving}>
              {saving ? '...' : yaAprobando ? 'Aprobar' : esAdicional && isAdmin ? 'Crear y aprobar' : 'Enviar a admin'}
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

// =========================== RETORNOS ===========================
// Al final del día el vendedor declara qué stock trae de vuelta
// Sistema calcula lo "esperado" basado en lo cargado - lo vendido
// Estados: pendiente -> aprobado (stock vuelve a bodega) | rechazado

function Retornos({ session, onToast }) {
  const isAdmin = session.role === 'admin';
  const { list: retornosAll, loading } = useFirebaseList('retornos');
  const [modal, setModal] = useState(null);
  const [tab, setTab] = useState('pendientes');

  const retornos = useMemo(() =>
    isAdmin ? retornosAll : retornosAll.filter(r => r.vendedorId === session.id),
    [retornosAll, session, isAdmin]);

  const sortedDesc = useMemo(() =>
    [...retornos].sort((a,b) => (b.creadoEn||'').localeCompare(a.creadoEn||'')), [retornos]);

  const pendientes = sortedDesc.filter(r => r.status === 'pendiente');
  const aprobados = sortedDesc.filter(r => r.status === 'aprobado');
  const rechazados = sortedDesc.filter(r => r.status === 'rechazado');

  // Verifica si vendedor tiene retorno pendiente de 1ª vuelta hoy
  const tieneRetornoHoy = useMemo(() => {
    if (isAdmin) return false;
    return retornos.some(r =>
      r.vendedorId === session.id &&
      isoToLocalDate(r.creadoEn) === todayStr() &&
      r.status === 'pendiente' &&
      !r.segundaVuelta
    );
  }, [retornos, session, isAdmin]);

  // ¿Tiene carga de 2ª vuelta aprobada y aún no tiene retorno de 2ª vuelta?
  const { list: cargasAll2 } = useFirebaseList('cargas');
  const { list: cierresAll2 } = useFirebaseList('cierres');
  const necesitaRetornoSegundaVuelta = useMemo(() => {
    if (isAdmin) return false;
    const hoy = todayStr();
    const tieneCargarSegVuelta = cargasAll2.some(c =>
      c.vendedorId === session.id &&
      isoToLocalDate(c.creadoEn) === hoy &&
      c.status === 'aprobada' &&
      c.segundaVuelta
    );
    if (!tieneCargarSegVuelta) return false;
    const yaRetornoSegVuelta = retornos.some(r =>
      r.vendedorId === session.id &&
      isoToLocalDate(r.creadoEn) === hoy &&
      (r.status === 'pendiente' || r.status === 'aprobado') &&
      r.segundaVuelta
    );
    return !yaRetornoSegVuelta;
  }, [retornos, cargasAll2, session, isAdmin]);

  const { list: cargasHoy } = useFirebaseList('cargas');
  const { list: traspasosHoy } = useFirebaseList('traspasos');

  // ¿Ya tiene retorno APROBADO hoy? → descarga completada
  // Pero se desbloquea si hay una carga nueva O traspaso aceptado POSTERIOR al último retorno aprobado
  const tieneRetornoAprobadoHoy = useMemo(() => {
    if (isAdmin) return false;
    const hoy = todayStr();
    // Buscar el último retorno aprobado de hoy (sin segunda vuelta)
    const retornosAprobadosHoy = retornos.filter(r =>
      r.vendedorId === session.id &&
      isoToLocalDate(r.creadoEn) === hoy &&
      r.status === 'aprobado' &&
      !r.segundaVuelta
    );
    if (retornosAprobadosHoy.length === 0) return false;

    // Fecha del último retorno aprobado
    const ultimoRetorno = retornosAprobadosHoy.reduce((a,b) =>
      (a.creadoEn||'') > (b.creadoEn||'') ? a : b
    );
    const fechaUltimoRetorno = ultimoRetorno.creadoEn || '';

    // ¿Hay una carga aprobada POSTERIOR al último retorno? → desbloquear
    const nuevaCarga = cargasHoy.some(c =>
      c.vendedorId === session.id &&
      isoToLocalDate(c.creadoEn) === hoy &&
      c.status === 'aprobada' &&
      (c.creadoEn||'') > fechaUltimoRetorno
    );
    if (nuevaCarga) return false;

    // ¿Hay un traspaso aceptado POSTERIOR al último retorno? → desbloquear
    const nuevoTraspaso = traspasosHoy.some(t =>
      t.receptorId === session.id &&
      isoToLocalDate(t.creadoEn) === hoy &&
      t.status === 'aceptado' &&
      (t.aceptadoEn||t.creadoEn||'') > fechaUltimoRetorno
    );
    if (nuevoTraspaso) return false;

    return true;
  }, [retornos, cargasHoy, traspasosHoy, session, isAdmin]);

  if (loading) return <div className="pad"><div className="empty">Cargando...</div></div>;

  const grupos = tab === 'pendientes' ? pendientes : tab === 'aprobados' ? aprobados : rechazados;

  return (
    <div className="pad">
      <h2 className="section-title">Descarga del vehículo</h2>
      <div className="section-sub">
        {isAdmin ? '1ª aprobación · Mercadería de vuelta a bodega' : 'Lo que traigo de vuelta al final del día'}
      </div>

      {/* Paso 1 completado → ir al Paso 2 */}
      {!isAdmin && tieneRetornoAprobadoHoy && (
        <div className="card" style={{borderLeft:'4px solid var(--good)', marginBottom:14}}>
          <div style={{display:'flex', alignItems:'center', gap:10, marginBottom:10}}>
            <span style={{fontSize:28}}>✅</span>
            <div>
              <strong style={{fontSize:15, color:'var(--good)'}}>Paso 1 completado · Descarga aprobada</strong>
              <div style={{fontSize:12, color:'var(--ink-soft)', marginTop:2}}>La descarga de mercadería del día ya fue realizada y aprobada.</div>
            </div>
          </div>
          <div style={{background:'var(--accent-soft)', borderRadius:10, padding:'12px 14px', textAlign:'center'}}>
            <div style={{fontSize:13, fontWeight:700, color:'var(--accent)', marginBottom:6}}>
              📊 Paso 2: Cerrar caja
            </div>
            <div style={{fontSize:12, color:'var(--ink-soft)', marginBottom:10}}>
              Ve a <strong>Más → Cerrar caja</strong> para realizar el cierre del día y rendir el efectivo.
            </div>
            <div style={{fontSize:11, color:'var(--ink-mute)'}}>
              Este módulo se desbloqueará si inicias una nueva carga o recibes un traspaso.
            </div>
          </div>
        </div>
      )}

      {/* Botones de descarga — solo si NO hay retorno aprobado hoy */}
      {!isAdmin && !tieneRetornoAprobadoHoy && !tieneRetornoHoy && !necesitaRetornoSegundaVuelta && (
        <button className="btn accent full" onClick={()=>setModal({})} style={{marginBottom:14}}>
          📦 Iniciar descarga del vehículo
        </button>
      )}
      {!isAdmin && !tieneRetornoAprobadoHoy && tieneRetornoHoy && (
        <div className="alert-banner" style={{fontSize:12, background:'var(--warn-bg)', color:'var(--warn)'}}>
          <span className="ico">⏳</span><div>Retorno enviado · esperando aprobación del administrador.</div>
        </div>
      )}
      {/* Botón de descarga de 2ª vuelta */}
      {!isAdmin && necesitaRetornoSegundaVuelta && (
        <button className="btn accent full" onClick={()=>setModal({ segundaVuelta: true })} style={{marginBottom:14, background:'var(--warn)'}}>
          🔄 Iniciar descarga 2ª Vuelta
        </button>
      )}

      <div className="tabs">
        <button className={`tab ${tab==='pendientes'?'active':''}`} onClick={()=>setTab('pendientes')}>
          ⏳ Pendientes {pendientes.length>0 && `(${pendientes.length})`}
        </button>
        <button className={`tab ${tab==='aprobados'?'active':''}`} onClick={()=>setTab('aprobados')}>
          ✅ Aprobados {aprobados.length>0 && `(${aprobados.length})`}
        </button>
        <button className={`tab ${tab==='rechazados'?'active':''}`} onClick={()=>setTab('rechazados')}>
          ✕ Rechazados {rechazados.length>0 && `(${rechazados.length})`}
        </button>
      </div>

      {grupos.length === 0 ? <div className="empty">Sin retornos en esta sección</div> :
        grupos.map(r => <RetornoCard key={r.id} retorno={r} session={session} onOpen={()=>setModal(r)} onToast={onToast}/>)
      }

      {modal && <ModalRetorno session={session} retorno={modal.id?modal:null} esSegundaVuelta={modal.segundaVuelta} onClose={()=>setModal(null)} onToast={onToast}/>}
    </div>
  );
}

function RetornoCard({ retorno, session, onOpen }) {
  const isAdmin = session.role === 'admin';
  const vendedor = VENDEDORES.find(v => v.id === retorno.vendedorId);
  const totalDeclarado = (retorno.itemsDeclarados||[]).reduce((s,i) => s + (i.cajas*180 + i.bandejas*30), 0);
  const totalEsperado = (retorno.itemsEsperados||[]).reduce((s,i) => s + (i.cajas*180 + i.bandejas*30), 0);
  const diferencia = totalEsperado - totalDeclarado;
  const cajasDeclaradas = (retorno.itemsDeclarados||[]).reduce((s,i) => s + i.cajas + (i.bandejas/6), 0);
  const fmtCj = (n) => n % 1 === 0 ? `${n}cj` : `${n.toFixed(1)}cj`;
  const statusColor = retorno.status==='pendiente'?'warn':retorno.status==='aprobado'?'good':'bad';
  const statusLabel = retorno.status==='pendiente'?'⏳ pendiente':retorno.status==='aprobado'?'✅ aprobado':'✕ rechazado';

  return (
    <div className="card" style={{borderLeft: `4px solid var(--${statusColor})`}}>
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', gap:8}}>
        <div style={{flex:1, minWidth:0}}>
          <div style={{display:'flex', alignItems:'center', gap:8, flexWrap:'wrap'}}>
            <strong style={{fontSize:14}}>{new Date(retorno.creadoEn).toLocaleDateString('es-CL', {day:'numeric', month:'short'})}</strong>
            <span className={`badge ${statusColor}`}>{statusLabel}</span>
            {diferencia > 0 && <span className="badge bad">⚠️ falta {fmtN(diferencia)}u</span>}
          </div>
          {isAdmin && <div style={{fontSize:12, color:'var(--ink-soft)', marginTop:4}}>👤 {vendedor?.name}</div>}
          <div style={{fontSize:12, color:'var(--ink-soft)', marginTop:6, lineHeight:1.6}}>
            <strong>Declarado:</strong> {fmtCj(cajasDeclaradas)} ({fmtN(totalDeclarado)}u)<br/>
            <span style={{color:'var(--ink-mute)', fontSize:11}}>
              {(retorno.itemsDeclarados||[]).filter(i => i.cajas>0 || i.bandejas>0).map((i, idx, arr) => (
                <span key={idx}>{i.cajas>0&&`${i.cajas}cj `}{i.bandejas>0&&`${i.bandejas}bd `}{i.calibre}{idx<arr.length-1?' · ':''}</span>
              ))}
            </span>
            {retorno.observaciones && <><br/><em>"{retorno.observaciones}"</em></>}
          </div>
        </div>
        {retorno.status === 'pendiente' && (
          <button className="btn accent sm" onClick={onOpen}>{isAdmin ? '✅ Revisar' : 'Ver'}</button>
        )}
      </div>
    </div>
  );
}

function ModalRetorno({ session, retorno, esSegundaVuelta, onClose, onToast }) {
  const isAdmin = session.role === 'admin';
  const yaAprobando = retorno && retorno.status === 'pendiente' && isAdmin;
  const yaCreado = !!retorno;
  const esSegVuelta = esSegundaVuelta || retorno?.segundaVuelta || false;

  // Stock actual del vehículo (lo "esperado" que debería traer de vuelta)
  const { data: vehiculo } = useFirebaseValue(`stockVehiculo/${session.id || retorno?.vendedorId}`, !yaCreado || !retorno?.itemsEsperados);

  // Para retornos ya creados, usar lo que se guardó como esperado
  const itemsEsperados = useMemo(() => {
    if (yaCreado && retorno.itemsEsperados) return retorno.itemsEsperados;
    if (!vehiculo) return CALIBRES.map(c => ({ calibre: c, cajas: 0, bandejas: 0 }));
    return CALIBRES.map(c => {
      const u = vehiculo[c] || 0;
      const cajas = Math.floor(u / 180);
      const resto = u % 180;
      const bandejas = Math.floor(resto / 30);
      // unidades sueltas se cuentan también como parte del 'esperado' agregándolas a bandejas si son >= 30
      return { calibre: c, cajas, bandejas: Math.floor((u % 180) / 30), sueltas: u % 30 };
    });
  }, [vehiculo, retorno, yaCreado]);

  // Inicializar items declarados (si no existe retorno, default = esperado; si existe, lo guardado)
  const initItems = () => {
    const base = {};
    CALIBRES.forEach(c => base[c] = { cajas: 0, bandejas: 0 });
    if (retorno?.itemsDeclarados) {
      retorno.itemsDeclarados.forEach(it => {
        base[it.calibre] = { cajas: it.cajas || 0, bandejas: it.bandejas || 0 };
      });
    } else {
      itemsEsperados.forEach(it => {
        base[it.calibre] = { cajas: it.cajas || 0, bandejas: it.bandejas || 0 };
      });
    }
    return base;
  };

  const [items, setItems] = useState(initItems());
  const [observaciones, setObservaciones] = useState(retorno?.observaciones || '');
  const [saving, setSaving] = useState(false);

  useEffect(() => {
    if (!yaCreado && itemsEsperados.length > 0) {
      setItems(initItems());
    }
  }, [vehiculo]);

  const setVal = (cal, field, val) => {
    const v = parseInt(val)||0;
    setItems(prev => ({...prev, [cal]: { ...prev[cal], [field]: v < 0 ? 0 : v }}));
  };

  const totalUnidades = useMemo(() =>
    Object.values(items).reduce((s,i) => s + i.cajas*180 + i.bandejas*30, 0), [items]);
  const totalEsperado = itemsEsperados.reduce((s,i) => s + (i.cajas*180 + i.bandejas*30 + (i.sueltas||0)), 0);
  const diferencia = totalEsperado - totalUnidades;

  const itemsArr = () => CALIBRES.map(c => ({
    calibre: c,
    cajas: items[c].cajas,
    bandejas: items[c].bandejas,
  })).filter(i => i.cajas > 0 || i.bandejas > 0);

  const guardar = async () => {
    if (totalUnidades === 0 && !confirm('¿Vienes con vehículo vacío? Confirmar retorno con 0 unidades.')) return;

    setSaving(true);
    try {
      if (!retorno) {
        // Vendedor crea retorno
        const itemsEsperadosArr = itemsEsperados.map(i => ({
          calibre: i.calibre,
          cajas: i.cajas,
          bandejas: i.bandejas,
        }));
        await fbSet(`retornos/${uid()}`, {
          vendedorId: session.id,
          itemsEsperados: itemsEsperadosArr,
          itemsDeclarados: itemsArr(),
          observaciones: observaciones.trim(),
          status: 'pendiente',
          segundaVuelta: esSegVuelta,
          creadoPor: session.id,
          creadoEn: nowISO(),
        });
        await crearNotificacion(session, {
          tipo: 'retorno_pendiente',
          titulo: esSegVuelta ? '🔄 Retorno 2ª Vuelta por aprobar' : '🔄 Retorno por aprobar',
          mensaje: `${session.name || 'Vendedor'} envió ${esSegVuelta ? 'retorno 2ª vuelta' : 'retorno de descarga'} (${totalUnidades}u)`,
          link: 'retornos',
          prioridad: 'urgente',
        });
        onToast('Retorno enviado · pendiente de aprobación','success');
      } else if (yaAprobando) {
        // Admin aprueba: stock del vehículo del vendedor pasa a bodega
        const vendedorId = retorno.vendedorId;
        const bod = await fbGet('stockBodega') || {};
        const veh = await fbGet(`stockVehiculo/${vendedorId}`) || {};
        const newBod = {...bod};

        // Lo declarado vuelve a bodega
        for (const it of itemsArr()) {
          const u = it.cajas*180 + it.bandejas*30;
          newBod[it.calibre] = (newBod[it.calibre]||0) + u;
        }
        await fbSet('stockBodega', newBod);
        // Vehículo queda en 0 (toda mercadería se contabilizó: vendida, merma, retorno)
        await fbSet(`stockVehiculo/${vendedorId}`, {});

        await fbUpdate(`retornos/${retorno.id}`, {
          status: 'aprobado',
          aprobadoEn: nowISO(),
          aprobadoPor: session.id,
        });
        onToast('Retorno aprobado · stock movido a bodega','success');
      }
      onClose();
    } catch(e) { console.error(e); onToast(e.message || 'Error','error'); setSaving(false); }
  };

  const rechazar = async () => {
    if (!confirm('¿Rechazar este retorno? El vendedor tendrá que rehacerlo.')) return;
    try {
      await fbUpdate(`retornos/${retorno.id}`, {
        status: 'rechazado',
        rechazadoEn: nowISO(),
        rechazadoPor: session.id,
      });
      onToast('Retorno rechazado','warn');
      onClose();
    } catch(e) { onToast('Error','error'); }
  };

  const titulo = !retorno ? '📦 Nueva descarga' : yaAprobando ? '✅ Revisar descarga' : 'Detalle de la descarga';

  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <h3>{titulo}</h3>

        {!retorno && (
          <div className="alert-banner info" style={{fontSize:12}}>
            <span className="ico">ℹ️</span>
            <div>El sistema muestra lo que tu vehículo debería tener. Ajusta a lo que realmente traes.</div>
          </div>
        )}

        {yaAprobando && (
          <div className="alert-banner info" style={{fontSize:12}}>
            <span className="ico">ℹ️</span>
            <div>Si apruebas: el stock declarado vuelve a bodega, vehículo queda en 0.</div>
          </div>
        )}

        {CALIBRES.map(c => {
          const esp = itemsEsperados.find(i => i.calibre === c) || { cajas: 0, bandejas: 0, sueltas: 0 };
          const espUnidades = esp.cajas*180 + esp.bandejas*30 + (esp.sueltas||0);
          const decUnidades = items[c].cajas*180 + items[c].bandejas*30;
          const diff = espUnidades - decUnidades;

          return (
            <div key={c} style={{padding:'10px', marginTop:8, borderRadius:8, border:'1px solid var(--line)', background: diff !== 0 && espUnidades > 0 ? 'var(--warn-bg)' : 'transparent'}}>
              <div style={{display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:6}}>
                <strong style={{fontSize:14}}>{c}</strong>
                <span style={{fontSize:10, color:'var(--ink-mute)', textAlign:'right', fontFamily:'JetBrains Mono, monospace', lineHeight:1.5}}>
                  Esperado: {esp.cajas}cj {esp.bandejas>0?`+${esp.bandejas}bd `:''}{esp.sueltas>0?`+${esp.sueltas}u `:''}<br/>
                  <strong>= {fmtN(espUnidades)}u</strong>
                </span>
              </div>
              <div className="row">
                <div>
                  <label className="fld" style={{fontSize:10}}>Cajas que traes</label>
                  <input type="number" min="0" className="inp" value={items[c].cajas || ''} onChange={e=>setVal(c, 'cajas', e.target.value)} style={{padding:'8px 10px', marginBottom:0}} disabled={!!retorno && !yaAprobando}/>
                </div>
                <div>
                  <label className="fld" style={{fontSize:10}}>Bandejas que traes</label>
                  <input type="number" min="0" className="inp" value={items[c].bandejas || ''} onChange={e=>setVal(c, 'bandejas', e.target.value)} style={{padding:'8px 10px', marginBottom:0}} disabled={!!retorno && !yaAprobando}/>
                </div>
              </div>
              {diff !== 0 && espUnidades > 0 && (
                <div style={{fontSize:11, color:'var(--warn)', marginTop:4, textAlign:'right', fontWeight:600}}>
                  {diff > 0 ? `⚠️ Faltan ${fmtN(diff)}u` : `⚠️ Sobran ${fmtN(-diff)}u`}
                </div>
              )}
            </div>
          );
        })}

        <label className="fld">Observaciones</label>
        <textarea
          className="inp"
          rows="2"
          value={observaciones}
          onChange={e=>setObservaciones(e.target.value)}
          placeholder="Diferencias, motivos, mermas adicionales..."
          disabled={!!retorno && !yaAprobando}
          style={{resize:'none', fontFamily:'inherit'}}
        />

        <div style={{padding:'10px', background:'var(--bg-2)', borderRadius:8, marginTop:10, fontFamily:'JetBrains Mono, monospace', fontSize:12, lineHeight:1.8}}>
          <div style={{display:'flex', justifyContent:'space-between'}}><span>Esperado total:</span><span>{fmtN(totalEsperado)}u</span></div>
          <div style={{display:'flex', justifyContent:'space-between'}}><span>Declarado total:</span><strong style={{color:'var(--accent)'}}>{fmtN(totalUnidades)}u</strong></div>
          {diferencia !== 0 && (
            <div style={{display:'flex', justifyContent:'space-between', borderTop:'1px solid var(--line)', marginTop:4, paddingTop:4, color: diferencia > 0 ? 'var(--bad)' : 'var(--warn)', fontWeight:700}}>
              <span>{diferencia > 0 ? '⚠️ Faltan:' : '⚠️ Sobran:'}</span><span>{fmtN(Math.abs(diferencia))}u</span>
            </div>
          )}
        </div>

        <div className="actions">
          <button className="btn ghost" onClick={onClose}>Cerrar</button>
          {yaAprobando && <button className="btn danger" onClick={rechazar}>Rechazar</button>}
          {(yaAprobando || !retorno) && (
            <button className="btn accent" onClick={guardar} disabled={saving}>
              {saving ? '...' : yaAprobando ? 'Aprobar' : 'Enviar a admin'}
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

// =========================== CIERRES DEL DÍA ===========================
// Cierre = resumen completo del día del vendedor
// Requiere retorno aprobado previamente
// Estados: pendiente -> aprobado | rechazado

function Cierres({ session, onToast, fechaAnteriorInicial }) {
  const isAdmin = session.role === 'admin';
  const { list: cierresAll, loading } = useFirebaseList('cierres');
  // Si viene con fecha anterior, abrir modal automáticamente
  const [modal, setModal] = useState(fechaAnteriorInicial ? { fechaAnterior: fechaAnteriorInicial } : null);
  const [tab, setTab] = useState('pendientes');

  const cierres = useMemo(() =>
    isAdmin ? cierresAll : cierresAll.filter(c => c.vendedorId === session.id),
    [cierresAll, session, isAdmin]);

  const sortedDesc = useMemo(() =>
    [...cierres].sort((a,b) => (b.creadoEn||'').localeCompare(a.creadoEn||'')), [cierres]);

  const pendientes = sortedDesc.filter(c => c.status === 'pendiente');
  const aprobados = sortedDesc.filter(c => c.status === 'aprobado');
  const rechazados = sortedDesc.filter(c => c.status === 'rechazado');

  // Hooks de listas — deben declararse ANTES de los useMemo que los usan
  const { list: retornosTodos } = useFirebaseList('retornos');
  const { list: cargasTodos } = useFirebaseList('cargas');
  const { list: traspasosTodos } = useFirebaseList('traspasos');

  // Verifica si vendedor tiene cierre aprobado de 1ª vuelta hoy (sin segundaVuelta flag)
  // ¿Tiene 2ª vuelta cerrada o pendiente?
  const tieneCierreSegundaVuelta = useMemo(() => {
    if (isAdmin) return false;
    return (cierres||[]).some(c =>
      c.vendedorId === session.id &&
      isoToLocalDate(c.creadoEn) === todayStr() &&
      (c.status === 'pendiente' || c.status === 'aprobado') &&
      c.segundaVuelta
    );
  }, [cierres, session, isAdmin]);

  // Cierre pendiente de días anteriores — permite cerrarlo aunque ya sea otro día
  const cierrePendienteDiaAnterior = useMemo(() => {
    if (isAdmin) return null;
    const hoy = todayStr();
    // ¿Tiene carga aprobada de un día anterior sin cierre?
    const cargaAnterior = cargasTodos
      .filter(c =>
        c.vendedorId === session.id &&
        isoToLocalDate(c.creadoEn) < hoy &&
        c.status === 'aprobada' &&
        !c.segundaVuelta
      )
      .sort((a,b) => (b.creadoEn||'').localeCompare(a.creadoEn||''))
      [0]; // la más reciente

    if (!cargaAnterior) return null;
    const fechaCarga = isoToLocalDate(cargaAnterior.creadoEn);

    // ¿Ya tiene cierre de ese día?
    const yaHayCierre = cierres.some(c =>
      c.vendedorId === session.id &&
      isoToLocalDate(c.creadoEn) === fechaCarga &&
      !c.segundaVuelta
    );
    if (yaHayCierre) return null;

    // ¿Tiene retorno aprobado de ese día?
    const retornoAprobado = retornosTodos.some(r =>
      r.vendedorId === session.id &&
      isoToLocalDate(r.creadoEn) === fechaCarga &&
      r.status === 'aprobado' &&
      !r.segundaVuelta
    );

    return { fecha: fechaCarga, retornoAprobado, cargaId: cargaAnterior.id };
  }, [cierres, cargasTodos, retornosTodos, session, isAdmin]);

  // Carga aprobada de HOY (no segunda vuelta) — marca el inicio del ciclo actual
  const cargaInicialHoy = useMemo(() => {
    const hoy = todayStr();
    return (cargasTodos||[])
      .filter(c =>
        c.vendedorId === session.id &&
        isoToLocalDate(c.creadoEn) === hoy &&
        c.status === 'aprobada' &&
        !c.segundaVuelta
      )
      .sort((a,b) => (a.creadoEn||'').localeCompare(b.creadoEn||''))
      [0] || null; // la más antigua del día (primera carga)
  }, [cargasTodos, session]);

  // Un cierre "pertenece al ciclo de hoy" si fue creado DESPUÉS de la carga inicial de hoy
  const cierreEsDelCicloActual = (c) => {
    if (!cargaInicialHoy) return false;
    return (c.creadoEn||'') >= (cargaInicialHoy.creadoEn||'');
  };

  const cierreAprobadoHoy = useMemo(() => {
    if (isAdmin) return false;
    if (!cargaInicialHoy) return false;
    return (cierres||[]).some(c =>
      c.vendedorId === session.id &&
      c.status === 'aprobado' &&
      !c.segundaVuelta &&
      cierreEsDelCicloActual(c)
    );
  }, [cierres, cargaInicialHoy, session, isAdmin]);

  const tieneCierreHoy = useMemo(() => {
    if (isAdmin) return false;
    if (!cargaInicialHoy) return false;
    return (cierres||[]).some(c =>
      c.vendedorId === session.id &&
      (c.status === 'pendiente' || c.status === 'aprobado') &&
      !c.segundaVuelta &&
      cierreEsDelCicloActual(c)
    );
  }, [cierres, cargaInicialHoy, session, isAdmin]);

  const nuevoCicloDisponible = useMemo(() => {
    if (!cierreAprobadoHoy || !cargaInicialHoy) return false;
    // Fecha del cierre aprobado del ciclo actual
    const cierreActual = (cierres||[])
      .filter(c => c.vendedorId===session.id && c.status==='aprobado' && !c.segundaVuelta && cierreEsDelCicloActual(c))
      .sort((a,b) => (b.creadoEn||'').localeCompare(a.creadoEn||''))[0];
    if (!cierreActual) return false;
    const fechaCierre = cierreActual.creadoEn || '';
    const hoy = todayStr();
    // ¿Hay carga NUEVA posterior al cierre?
    const tieneCargaNueva = (cargasTodos||[]).some(c =>
      c.vendedorId === session.id &&
      isoToLocalDate(c.creadoEn) === hoy &&
      c.status === 'aprobada' &&
      (c.creadoEn||'') > fechaCierre
    );
    const tieneTraspaso = (traspasosTodos||[]).some(t =>
      t.receptorId === session.id &&
      isoToLocalDate(t.creadoEn) === hoy &&
      t.status === 'aceptado' &&
      (t.aceptadoEn||t.creadoEn||'') > fechaCierre
    );
    return tieneCargaNueva || tieneTraspaso;
  }, [cierreAprobadoHoy, cargaInicialHoy, cierres, cargasTodos, traspasosTodos, session]);

  if (loading) return <div className="pad"><div className="empty">Cargando...</div></div>;

  const grupos = tab === 'pendientes' ? pendientes : tab === 'aprobados' ? aprobados : rechazados;

  return (
    <div className="pad">
      <h2 className="section-title">Cierre de caja</h2>
      <div className="section-sub">
        {isAdmin ? '2ª aprobación · Verificación final de caja' : 'Resumen y entrega de dinero al final del día'}
      </div>

      {/* Cierre pendiente de día anterior */}
      {!isAdmin && cierrePendienteDiaAnterior && (
        <div className="card" style={{borderLeft:'4px solid var(--bad)', marginBottom:14}}>
          <div style={{display:'flex', alignItems:'center', gap:10, marginBottom:10}}>
            <span style={{fontSize:28}}>⚠️</span>
            <div>
              <strong style={{fontSize:15, color:'var(--bad)'}}>Cierre pendiente del {cierrePendienteDiaAnterior.fecha}</strong>
              <div style={{fontSize:12, color:'var(--ink-soft)', marginTop:2}}>
                No cerraste la caja del día anterior. Debes hacerlo para poder solicitar una nueva carga.
              </div>
            </div>
          </div>
          {!cierrePendienteDiaAnterior.retornoAprobado ? (
            <div style={{background:'var(--warn-bg)', borderRadius:8, padding:'10px 12px', fontSize:12, color:'var(--warn)', fontWeight:600}}>
              🔒 Primero debes completar la descarga del vehículo del día {cierrePendienteDiaAnterior.fecha} en <strong>Más → Descarga</strong>.
            </div>
          ) : (
            <button className="btn full" onClick={()=>setModal({ fechaAnterior: cierrePendienteDiaAnterior.fecha })}
              style={{background:'var(--bad)', color:'white', border:'none', padding:'12px', fontWeight:700, fontSize:13}}>
              📊 Cerrar caja del {cierrePendienteDiaAnterior.fecha}
            </button>
          )}
        </div>
      )}

      {/* Cierre aprobado y sin nuevo ciclo → bloqueado */}
      {!isAdmin && cierreAprobadoHoy && !nuevoCicloDisponible && !cierrePendienteDiaAnterior && (
        <div className="card" style={{borderLeft:'4px solid var(--good)', marginBottom:14}}>
          <div style={{display:'flex', alignItems:'center', gap:10, marginBottom:8}}>
            <span style={{fontSize:28}}>✅</span>
            <div>
              <strong style={{fontSize:15, color:'var(--good)'}}>Cierre del día completado</strong>
              <div style={{fontSize:12, color:'var(--ink-soft)', marginTop:2}}>El cierre fue aprobado por el administrador.</div>
            </div>
          </div>
          <div style={{background:'var(--bg-2)', borderRadius:8, padding:'10px 12px', fontSize:12, color:'var(--ink-soft)'}}>
            🔒 Este módulo se desbloqueará cuando inicies una nueva carga o recibas un traspaso de mercadería.
          </div>
        </div>
      )}

      {!isAdmin && !tieneCierreHoy && !cierreAprobadoHoy && (
        <button className="btn accent full" onClick={()=>setModal({})} style={{marginBottom:14}}>
          📊 Iniciar cierre de caja
        </button>
      )}
      {/* Con nuevo ciclo disponible: permitir nuevo cierre */}
      {!isAdmin && cierreAprobadoHoy && nuevoCicloDisponible && (
        <button className="btn accent full" onClick={()=>setModal({ segundaVuelta: true })} style={{marginBottom:14, background:'var(--warn)'}}>
          🔄 Cerrar 2ª Vuelta (entrega adicional)
        </button>
      )}

      <div className="tabs">
        <button className={`tab ${tab==='pendientes'?'active':''}`} onClick={()=>setTab('pendientes')}>
          ⏳ Pendientes {pendientes.length>0 && `(${pendientes.length})`}
        </button>
        <button className={`tab ${tab==='aprobados'?'active':''}`} onClick={()=>setTab('aprobados')}>
          ✅ Aprobados {aprobados.length>0 && `(${aprobados.length})`}
        </button>
        <button className={`tab ${tab==='rechazados'?'active':''}`} onClick={()=>setTab('rechazados')}>
          ✕ Rechazados {rechazados.length>0 && `(${rechazados.length})`}
        </button>
      </div>

      {grupos.length === 0 ? <div className="empty">Sin cierres en esta sección</div> :
        grupos.map(c => <CierreCard key={c.id} cierre={c} session={session} onOpen={()=>setModal(c)}/>)
      }

      {modal && <ModalCierre session={session} cierre={modal.id?modal:null} esSegundaVuelta={modal.segundaVuelta} fechaAnterior={modal.fechaAnterior} onClose={()=>setModal(null)} onToast={onToast}/>}
    </div>
  );
}

function CierreCard({ cierre, session, onOpen }) {
  const isAdmin = session.role === 'admin';
  const vendedor = VENDEDORES.find(v => v.id === cierre.vendedorId);
  const statusColor = cierre.status==='pendiente'?'warn':cierre.status==='aprobado'?'good':'bad';
  const statusLabel = cierre.status==='pendiente'?'⏳ pendiente':cierre.status==='aprobado'?'✅ aprobado':'✕ rechazado';

  // Detectar cierre con retraso: creado en día distinto al que corresponde
  const fechaCreacion = isoToLocalDate(cierre.creadoEn);
  const fechaCorresponde = cierre.fechaAnterior || cierre.resumen?.fecha || fechaCreacion;
  const conRetraso = fechaCreacion !== fechaCorresponde;
  const horaEnvio = new Date(cierre.creadoEn).toLocaleTimeString('es-CL', {hour:'2-digit', minute:'2-digit'});

  return (
    <div className="card" style={{borderLeft: `4px solid var(--${statusColor})`}}>
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', gap:8}}>
        <div style={{flex:1, minWidth:0}}>
          <div style={{display:'flex', alignItems:'center', gap:8, flexWrap:'wrap'}}>
            <strong style={{fontSize:14}}>
              {conRetraso
                ? `${fechaCorresponde} →`
                : new Date(cierre.creadoEn).toLocaleDateString('es-CL', {day:'numeric', month:'short'})
              }
            </strong>
            <span className={`badge ${statusColor}`}>{statusLabel}</span>
            {cierre.segundaVuelta && <span className="badge warn">🔄 2ª Vuelta</span>}
            {conRetraso && (
              <span style={{
                fontSize:10, fontWeight:700, color:'var(--warn)',
                background:'var(--warn-bg)', padding:'2px 6px', borderRadius:4
              }}>
                ⏰ Con retraso
              </span>
            )}
          </div>
          {conRetraso && (
            <div style={{fontSize:11, color:'var(--warn)', marginTop:3}}>
              Rendido el {fechaCreacion} a las {horaEnvio} · corresponde al {fechaCorresponde}
            </div>
          )}
          {isAdmin && <div style={{fontSize:12, color:'var(--ink-soft)', marginTop:4}}>👤 {vendedor?.name}</div>}
          <div style={{fontSize:12, color:'var(--ink-soft)', marginTop:6, lineHeight:1.6, fontFamily:'JetBrains Mono, monospace'}}>
            Ventas: <strong>{fmt$(cierre.totalVentas||0)}</strong> · {cierre.cantidadVentas||0} ventas<br/>
            Efectivo declarado: <strong style={{color:'var(--accent)'}}>{fmt$(cierre.efectivoDeclarado||0)}</strong>
            {cierre.diferenciaEfectivo !== 0 && (
              <span style={{color: cierre.diferenciaEfectivo > 0 ? 'var(--good)' : 'var(--bad)', marginLeft:6}}>
                ({cierre.diferenciaEfectivo > 0 ? '+' : ''}{fmt$(cierre.diferenciaEfectivo)})
              </span>
            )}
          </div>
        </div>
        <button className="btn ghost sm" onClick={onOpen}>{cierre.status === 'pendiente' && isAdmin ? '✅ Revisar' : 'Ver'}</button>
      </div>
    </div>
  );
}

function ModalCierre({ session, cierre, esSegundaVuelta, fechaAnterior, onClose, onToast }) {
  const isAdmin = session.role === 'admin';
  const yaAprobando = cierre && cierre.status === 'pendiente' && isAdmin;
  const yaCreado = !!cierre;
  const esSegVuelta = esSegundaVuelta || cierre?.segundaVuelta || false;
  // Si viene con fechaAnterior, el cierre es de un día previo
  const fechaCierre = fechaAnterior || todayStr();
  const esDiaAnterior = !!fechaAnterior && fechaAnterior !== todayStr();

  // Cargar datos del día para vendedor que crea cierre
  const { list: ventas } = useFirebaseList('ventas', !yaCreado);
  const { list: retornos } = useFirebaseList('retornos', !yaCreado);
  const { list: cierresAll } = useFirebaseList('cierres', !yaCreado);
  const { list: clientes } = useFirebaseList('clientes', !yaCreado);

  // Resumen del día (si se está creando)
  const resumen = useMemo(() => {
    if (yaCreado) return cierre.resumen || {};

    // Para 2ª vuelta: obtener la hora del cierre de 1ª vuelta para filtrar solo ventas posteriores
    let desdeFecha = null;
    if (esSegVuelta) {
      const cierreBase = cierresAll.find(c =>
        c.vendedorId === session.id &&
        isoToLocalDate(c.creadoEn) === fechaCierre &&
        c.status === 'aprobado' &&
        !c.segundaVuelta
      );
      if (cierreBase) desdeFecha = cierreBase.aprobadoEn || cierreBase.creadoEn;
    }

    // Filtrar ventas del día (hoy o día anterior)
    const ventasHoy = ventas.filter(v => {
      if (v.vendedorId !== session.id) return false;
      if (isoToLocalDate(v.fecha || v.creadoEn) !== fechaCierre) return false;
      if (desdeFecha && (v.creadoEn || '') < desdeFecha) return false;
      return true;
    });

    // Retorno correspondiente: si 2ª vuelta busca retorno con segundaVuelta=true
    const retornoHoy = retornos.find(r =>
      r.vendedorId === session.id &&
      isoToLocalDate(r.creadoEn) === fechaCierre &&
      r.status === 'aprobado' &&
      (esSegVuelta ? !!r.segundaVuelta : !r.segundaVuelta)
    );

    let totalVentas = 0, totalNeto = 0, totalIva = 0;
    let efectivoEsperado = 0, transferenciaTotal = 0, creditoTotal = 0;
    let totalBoletas = 0, totalFacturas = 0, countBoletas = 0, countFacturas = 0;
    let totalMermas = 0, descuentoMermas = 0;
    ventasHoy.forEach(v => {
      totalVentas += v.totalBruto || 0;
      totalNeto += v.totalNeto || 0;
      totalIva += v.totalIva || 0;
      totalMermas += v.totalMermas || 0;
      descuentoMermas += v.descuentoMermas || 0;
      if (v.tipoDoc === 'factura') { totalFacturas += v.totalBruto||0; countFacturas++; }
      else { totalBoletas += v.totalBruto||0; countBoletas++; }
      const d = desgloseVenta(v);
      efectivoEsperado += d.efectivo;
      transferenciaTotal += d.transferencia;
      creditoTotal += d.porCobrar;
    });
    return {
      cantidadVentas: ventasHoy.length,
      totalVentas, totalNeto, totalIva,
      efectivoEsperado, transferenciaTotal, creditoTotal,
      totalBoletas, totalFacturas, countBoletas, countFacturas,
      totalMermas, descuentoMermas,
      retornoOk: !!retornoHoy,
      retornoId: retornoHoy?.id,
      esSegundaVuelta: esSegVuelta,
    };
  }, [yaCreado, cierre, ventas, retornos, cierresAll, session, esSegVuelta, fechaCierre]);

  // Lista de transferencias del día (para sección de resumen visual)
  const transferenciasDelDia = useMemo(() => {
    if (yaCreado) return [];
    return ventas
      .filter(v => v.vendedorId === session.id && isoToLocalDate(v.fecha || v.creadoEn) === fechaCierre)
      .filter(v => {
        // Venta con forma transferencia
        if (v.formaPago === 'transferencia') return true;
        // Mixto con parte transferencia
        if (v.formaPago === 'mixto' && v.montosMixto && (v.montosMixto.transferencia||0) > 0) return true;
        // Pendiente que fue cobrado con transferencia
        if (v.formaPago === 'pendiente' && v.cobroFormaReal && (v.cobroFormaReal === 'transferencia' || (v.cobroFormaReal === 'mixto' && (v.montoCobradoTransferencia||0) > 0))) return true;
        return false;
      })
      .map(v => {
        let monto = 0;
        if (v.formaPago === 'transferencia') monto = v.totalBruto || 0;
        else if (v.formaPago === 'mixto') monto = v.montosMixto?.transferencia || 0;
        else if (v.formaPago === 'pendiente') monto = v.montoCobradoTransferencia || 0;
        const verificada = !!v.transferenciaConfirmada || !!v.transferenciaComprobante;
        return {
          venta: v,
          monto,
          tieneComprobante: !!v.transferenciaComprobante,
          verificada,
        };
      })
      .sort((a,b) => (a.verificada?1:0) - (b.verificada?1:0)); // No verificadas primero
  }, [yaCreado, ventas, session]);

  const transfNoVerificadas = transferenciasDelDia.filter(t => !t.verificada);
  const transfVerificadas = transferenciasDelDia.filter(t => t.verificada);
  const totalTransfVerif = transfVerificadas.reduce((s,t) => s + t.monto, 0);
  const totalTransfNoVerif = transfNoVerificadas.reduce((s,t) => s + t.monto, 0);

  // Cobros recibidos HOY de ventas de días anteriores
  const cobrosAntiguosHoy = useMemo(() => {
    if (yaCreado) return [];
    const hoy = todayStr();
    return ventas
      .filter(v => v.vendedorId === session.id)
      .filter(v => v.formaPago === 'pendiente' && v.cobroEstado === 'cobrado')
      .filter(v => v.cobradoEn && isoToLocalDate(v.cobradoEn) === hoy)
