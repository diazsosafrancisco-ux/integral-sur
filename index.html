// =========================== CONFIGURACIÓN ===========================
// Pantalla solo admin para editar nombres de usuarios
// Carga los nombres desde Firebase y permite modificarlos

function Configuracion({ session, onToast }) {
  const { data: configUsuarios } = useFirebaseValue('config/usuarios');
  const [editando, setEditando] = useState(null);
  const [nombreTemp, setNombreTemp] = useState('');
  const [saving, setSaving] = useState(false);

  // Cargar nombres custom desde Firebase al montar
  useEffect(() => {
    if (configUsuarios) {
      try {
        if (configUsuarios.admin && configUsuarios.admin.nombre) {
          USER_MAP['admin@integral-sur.cl'].name = configUsuarios.admin.nombre;
        }
        if (configUsuarios.v1 && configUsuarios.v1.nombre) {
          USER_MAP['v1@integral-sur.cl'].name = configUsuarios.v1.nombre;
          VENDEDORES[0].name = configUsuarios.v1.nombre;
        }
        if (configUsuarios.v2 && configUsuarios.v2.nombre) {
          USER_MAP['v2@integral-sur.cl'].name = configUsuarios.v2.nombre;
          VENDEDORES[1].name = configUsuarios.v2.nombre;
        }
      } catch(e) { console.error(e); }
    }
  }, [configUsuarios]);

  const getNombreActual = (id) => {
    const email = id === 'admin' ? 'admin@integral-sur.cl' : id === 'v1' ? 'v1@integral-sur.cl' : 'v2@integral-sur.cl';
    return (configUsuarios && configUsuarios[id] && configUsuarios[id].nombre) || USER_MAP[email].name;
  };

  const iniciarEdicion = (id) => {
    setEditando(id);
    setNombreTemp(getNombreActual(id));
  };

  const guardar = async () => {
    if (!nombreTemp.trim()) return onToast('Nombre no puede estar vacío', 'error');
    setSaving(true);
    try {
      await fbSet(`config/usuarios/${editando}/nombre`, nombreTemp.trim());
      // Actualizar también en memoria
      const email = editando === 'admin' ? 'admin@integral-sur.cl' : editando === 'v1' ? 'v1@integral-sur.cl' : 'v2@integral-sur.cl';
      USER_MAP[email].name = nombreTemp.trim();
      if (editando === 'v1') VENDEDORES[0].name = nombreTemp.trim();
      if (editando === 'v2') VENDEDORES[1].name = nombreTemp.trim();
      await fbLog(session.id, 'update', 'configuracion', { usuario: editando, nuevoNombre: nombreTemp.trim() });
      onToast('Nombre actualizado · recarga para verlo en topbar','success');
      setEditando(null);
    } catch(e) { console.error(e); onToast('Error al guardar','error'); }
    setSaving(false);
  };

  const cancelar = () => { setEditando(null); setNombreTemp(''); };

  const usuariosArr = [
    { id: 'admin', email: 'admin@integral-sur.cl', rol: 'Administrador', icono: '👑' },
    { id: 'v1', email: 'v1@integral-sur.cl', rol: 'Vendedor 1', icono: '🚚' },
    { id: 'v2', email: 'v2@integral-sur.cl', rol: 'Vendedor 2', icono: '🚚' },
  ];

  return (
    <div className="pad">
      <h2 className="section-title">Configuración</h2>
      <div className="section-sub">Personalización del sistema</div>

      <div className="card" style={{textAlign:'center', padding:'18px'}}>
        <img src={LOGO_B64} alt="Integral Sur" style={{width:100, height:100, borderRadius:'50%', objectFit:'cover', marginBottom:10}}/>
        <h3 style={{margin:'4px 0', fontSize:18}}>Distribuidora Integral Sur</h3>
        <div style={{fontSize:11, color:'var(--ink-mute)'}}>Sistema de gestión</div>
      </div>

      <div style={{fontSize:11, fontWeight:700, color:'var(--ink-soft)', textTransform:'uppercase', letterSpacing:1.4, margin:'14px 0 8px 4px'}}>👥 Usuarios del sistema</div>

      {usuariosArr.map(u => (
        <div key={u.id} className="card">
          <div style={{display:'flex', alignItems:'center', gap:12}}>
            <span style={{fontSize:28}}>{u.icono}</span>
            <div style={{flex:1, minWidth:0}}>
              {editando === u.id ? (
                <>
                  <input
                    type="text"
                    className="inp"
                    value={nombreTemp}
                    onChange={e=>setNombreTemp(e.target.value)}
                    placeholder="Nombre de la persona"
                    style={{marginBottom:6}}
                    autoFocus
                  />
                  <div style={{display:'flex', gap:6}}>
                    <button className="btn ghost sm" onClick={cancelar} style={{flex:1}}>Cancelar</button>
                    <button className="btn accent sm" onClick={guardar} disabled={saving} style={{flex:1}}>
                      {saving ? '...' : '✓ Guardar'}
                    </button>
                  </div>
                </>
              ) : (
                <>
                  <strong style={{fontSize:15}}>{getNombreActual(u.id)}</strong>
                  <div style={{fontSize:11, color:'var(--ink-mute)'}}>{u.rol} · {u.email}</div>
                </>
              )}
            </div>
            {editando !== u.id && (
              <button className="btn ghost sm" onClick={()=>iniciarEdicion(u.id)}>✏️ Editar</button>
            )}
          </div>
        </div>
      ))}

      <div className="alert-banner info" style={{fontSize:11, marginTop:14}}>
        <span className="ico">ℹ️</span>
        <div>Los nombres editados se aplican en saludo, listas, reportes y auditoría. Tras editar, cierra y vuelve a abrir la sesión para que se actualice el topbar.</div>
      </div>

    </div>
  );
}

// =========================== CAMPANA DE NOTIFICACIONES ===========================
// Bell icon con badge de no leídas, panel desplegable y sonido al recibir nuevas

function NotificacionesBell({ session, onNavigate }) {
  const isAdmin = session.role === 'admin';
  const { list: notifs } = useFirebaseList('notificaciones');
  const [abierto, setAbierto] = useState(false);
  const [yaAvisadas, setYaAvisadas] = useState(() => {
    // IDs ya conocidos al cargar (no avisarlas otra vez)
    try {
      const guardadas = localStorage.getItem('notifsConocidas_' + session.id);
      return new Set(guardadas ? JSON.parse(guardadas) : []);
    } catch(e) { return new Set(); }
  });

  // Filtrar las que aplican a este usuario
  const misNotifs = useMemo(() => {
    // El admin recibe todas las dirigidas a 'admin'
    // Los vendedores reciben las dirigidas a ellos específicamente
    let arr = notifs.filter(n => {
      if (n.destinatario === 'admin') return isAdmin;
      return n.destinatario === session.id;
    });
    return arr.sort((a,b) => (b.creadaEn||'').localeCompare(a.creadaEn||''));
  }, [notifs, isAdmin, session.id]);

  const noLeidas = useMemo(() => misNotifs.filter(n => !n.leida), [misNotifs]);

  // Detectar notificaciones nuevas (no conocidas) y avisar
  useEffect(() => {
    if (noLeidas.length === 0) return;
    const nuevas = noLeidas.filter(n => !yaAvisadas.has(n.id));
    if (nuevas.length === 0) return;

    // Marcar como ya conocidas
    const nuevoSet = new Set(yaAvisadas);
    nuevas.forEach(n => nuevoSet.add(n.id));
    setYaAvisadas(nuevoSet);
    try {
      localStorage.setItem('notifsConocidas_' + session.id, JSON.stringify([...nuevoSet]));
    } catch(e) {}

    // Tocar sonido y mostrar notif nativa para la más reciente
    const prioridadMax = nuevas.some(n => n.prioridad === 'urgente') ? 'urgente' : 'normal';
    reproducirSonidoNotif(prioridadMax);
    const masReciente = nuevas[0];
    mostrarNotifNativa(masReciente.titulo, masReciente.mensaje, { prioridad: prioridadMax, tag: masReciente.id });
  }, [noLeidas, yaAvisadas, session.id]);

  const marcarLeida = async (id) => {
    try {
      await fbUpdate(`notificaciones/${id}`, { leida: true, leidaEn: nowISO() });
    } catch(e) {}
  };

  const marcarTodasLeidas = async () => {
    try {
      for (const n of noLeidas) {
        await fbUpdate(`notificaciones/${n.id}`, { leida: true, leidaEn: nowISO() });
      }
    } catch(e) {}
  };

  const eliminarVieja = async (id) => {
    try { await fbRemove(`notificaciones/${id}`); } catch(e) {}
  };

  const limpiarLeidas = async () => {
    if (!confirm('¿Eliminar todas las notificaciones leídas?')) return;
    try {
      for (const n of misNotifs.filter(x => x.leida)) {
        await fbRemove(`notificaciones/${n.id}`);
      }
    } catch(e) {}
  };

  const onClick = async (n) => {
    if (!n.leida) await marcarLeida(n.id);
    if (n.link && onNavigate) {
      onNavigate(n.link);
      setAbierto(false);
    }
  };

  const fechaCorta = (iso) => {
    if (!iso) return '';
    const d = new Date(iso);
    const hoy = new Date();
    const diffMin = Math.floor((hoy - d) / 60000);
    if (diffMin < 1) return 'ahora';
    if (diffMin < 60) return `hace ${diffMin}m`;
    if (diffMin < 1440) return `hace ${Math.floor(diffMin/60)}h`;
    return d.toLocaleDateString('es-CL', { day: 'numeric', month: 'short' });
  };

  const iconoPorTipo = (tipo) => {
    if (tipo === 'transferencia_recibida') return '🏦';
    if (tipo === 'cliente_pendiente') return '👤';
    if (tipo === 'descuento_pendiente') return '🏷️';
    if (tipo === 'cobro_recibido') return '💰';
    if (tipo === 'carga_pendiente') return '🚚';
    if (tipo === 'reserva_pendiente') return '📋';
    if (tipo === 'cierre_pendiente') return '📑';
    if (tipo === 'venta_pendiente_aprobacion') return '⏳';
    return '🔔';
  };

  return (
    <>
      <button
        onClick={() => setAbierto(true)}
        style={{
          position:'relative',
          background:'transparent', border:'none',
          fontSize:20, cursor:'pointer', padding:'4px 8px',
        }}
        title={noLeidas.length > 0 ? `${noLeidas.length} sin leer` : 'Notificaciones'}>
        🔔
        {noLeidas.length > 0 && (
          <span style={{
            position:'absolute', top:0, right:0,
            background:'var(--bad)', color:'var(--bad-on)',
            borderRadius:'50%', fontSize:9, fontWeight:700,
            minWidth:16, height:16, padding:'0 4px',
            display:'flex', alignItems:'center', justifyContent:'center',
            lineHeight:1,
          }}>
            {noLeidas.length > 9 ? '9+' : noLeidas.length}
          </span>
        )}
      </button>

      {abierto && (
        <div
          onClick={() => setAbierto(false)}
          style={{
            position:'fixed', top:0, left:0, right:0, bottom:0,
            background:'rgba(0,0,0,0.45)', zIndex:9000,
          }}>
          <div
            onClick={e => e.stopPropagation()}
            style={{
              position:'absolute', top:10, right:10, left:10,
              maxWidth:420, maxHeight:'85vh', margin:'0 auto',
              background:'var(--bg)', borderRadius:12,
              boxShadow:'0 10px 30px rgba(0,0,0,0.3)',
              overflow:'hidden', display:'flex', flexDirection:'column',
            }}>
            <div style={{padding:'12px 14px', borderBottom:'1px solid var(--line)', display:'flex', justifyContent:'space-between', alignItems:'center'}}>
              <strong style={{fontSize:14}}>🔔 Notificaciones</strong>
              <button onClick={()=>setAbierto(false)} style={{background:'transparent', border:'none', fontSize:18, cursor:'pointer', color:'var(--ink-soft)'}}>✕</button>
            </div>

            {noLeidas.length > 0 && (
              <div style={{padding:'6px 14px', background:'var(--bg-2)', display:'flex', justifyContent:'space-between', alignItems:'center', fontSize:11}}>
                <span style={{color:'var(--ink-soft)'}}>{noLeidas.length} sin leer</span>
                <button onClick={marcarTodasLeidas} style={{background:'transparent', border:'none', color:'var(--accent)', fontSize:11, cursor:'pointer'}}>Marcar todas leídas</button>
              </div>
            )}

            <div style={{overflowY:'auto', flex:1}}>
              {misNotifs.length === 0 ? (
                <div style={{padding:30, textAlign:'center', color:'var(--ink-mute)', fontSize:13}}>
                  Sin notificaciones
                </div>
              ) : (
                misNotifs.slice(0, 50).map(n => (
                  <div
                    key={n.id}
                    onClick={() => onClick(n)}
                    style={{
                      padding:'10px 14px',
                      borderBottom:'1px solid var(--line)',
                      cursor: n.link ? 'pointer' : 'default',
                      background: n.leida ? 'transparent' : 'var(--accent-soft)',
                      borderLeft: n.leida ? 'none' : '3px solid var(--accent)',
                      position:'relative',
                    }}>
                    <div style={{display:'flex', gap:8}}>
                      <span style={{fontSize:18}}>{iconoPorTipo(n.tipo)}</span>
                      <div style={{flex:1, minWidth:0}}>
                        <div style={{fontSize:13, fontWeight: n.leida ? 400 : 700, marginBottom:2}}>{n.titulo}</div>
                        <div style={{fontSize:12, color:'var(--ink-soft)', lineHeight:1.4}}>{n.mensaje}</div>
                        <div style={{fontSize:10, color:'var(--ink-mute)', marginTop:4}}>{fechaCorta(n.creadaEn)}</div>
                      </div>
                      <button
                        onClick={(e) => { e.stopPropagation(); eliminarVieja(n.id); }}
                        style={{background:'transparent', border:'none', color:'var(--ink-mute)', fontSize:14, cursor:'pointer', padding:0}}>
                        ✕
                      </button>
                    </div>
                  </div>
                ))
              )}
            </div>

            {misNotifs.filter(n => n.leida).length > 0 && (
              <div style={{padding:'8px 14px', borderTop:'1px solid var(--line)'}}>
                <button
                  onClick={limpiarLeidas}
                  className="btn ghost sm"
                  style={{width:'100%', fontSize:11}}>
                  🗑️ Limpiar leídas
                </button>
              </div>
            )}
          </div>
        </div>
      )}
    </>
  );
}

// =========================== PWA UPDATE BANNER ===========================
// Banner superior que aparece cuando hay nueva versión disponible

function PWAUpdateBanner() {
  const [nuevaVersion, setNuevaVersion] = useState(null);

  useEffect(() => {
    const handler = (e) => {
      console.log('🔄 Nueva versión PWA detectada');
      setNuevaVersion(e.detail || true);
    };
    window.addEventListener('pwa-update-available', handler);
    return () => window.removeEventListener('pwa-update-available', handler);
  }, []);

  const actualizar = () => {
    if (nuevaVersion && nuevaVersion.postMessage) {
      // Decirle al SW que se active inmediatamente
      nuevaVersion.postMessage({ type: 'SKIP_WAITING' });
      // El evento controllerchange recargará la página automáticamente
    } else {
      // Fallback: recargar manualmente
      window.location.reload();
    }
  };

  if (!nuevaVersion) return null;

  return (
    <div style={{
      position:'sticky', top:0, zIndex:9999,
      background:'var(--accent)', color:'var(--accent-on)',
      padding:'10px 14px', display:'flex', alignItems:'center', gap:10,
      boxShadow:'0 2px 8px rgba(0,0,0,0.2)',
    }}>
      <span style={{fontSize:20}}>🔄</span>
      <div style={{flex:1, fontSize:13}}>
        <strong>Nueva versión disponible</strong>
        <div style={{fontSize:11, opacity:0.9}}>Toca actualizar para usar la última versión</div>
      </div>
      <button
        onClick={actualizar}
        style={{
          background:'white', color:'var(--accent)', border:'none',
          padding:'8px 14px', borderRadius:8, fontWeight:700, fontSize:12,
          cursor:'pointer',
        }}>
        Actualizar
      </button>
    </div>
  );
}

// =========================== PWA INSTALL ===========================
// Tarjeta que aparece cuando la app se puede instalar como PWA

function PWAInstallCard({ onToast }) {
  const [puedeInstalar, setPuedeInstalar] = useState(!!window.deferredInstallPrompt);
  const [yaInstalada, setYaInstalada] = useState(false);
  const [instalando, setInstalando] = useState(false);

  useEffect(() => {
    // Detectar si ya está instalada (modo standalone)
    if (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) {
      setYaInstalada(true);
      return;
    }
    if (window.navigator.standalone === true) {
      setYaInstalada(true);
      return;
    }

    const onAvailable = () => setPuedeInstalar(true);
    const onInstalled = () => { setPuedeInstalar(false); setYaInstalada(true); setInstalando(false); };
    window.addEventListener('pwa-install-available', onAvailable);
    window.addEventListener('pwa-installed', onInstalled);

    return () => {
      window.removeEventListener('pwa-install-available', onAvailable);
      window.removeEventListener('pwa-installed', onInstalled);
    };
  }, []);

  const instalar = async () => {
    const prompt = window.deferredInstallPrompt;
    if (!prompt) {
      onToast('Instalación no disponible · usa el menú de Chrome (⋮ → Agregar a pantalla)','warn');
      return;
    }
    setInstalando(true);
    try {
      await prompt.prompt();
      const result = await prompt.userChoice;
      window.deferredInstallPrompt = null;
      if (result && result.outcome === 'accepted') {
        onToast('¡App instalada!','success');
        setPuedeInstalar(false);
        setYaInstalada(true);
      } else {
        onToast('Instalación cancelada','warn');
        setPuedeInstalar(false);
      }
    } catch(e) {
      console.error('Error PWA install:', e);
      onToast('Error al instalar · usa menú Chrome','error');
    }
    setInstalando(false);
  };

  if (yaInstalada) {
    return (
      <div className="card" style={{background:'var(--good-bg)', borderLeft:'4px solid var(--good)'}}>
        <div style={{display:'flex', alignItems:'center', gap:10}}>
          <span style={{fontSize:24}}>✅</span>
          <div style={{flex:1}}>
            <strong style={{color:'var(--good)'}}>App instalada</strong>
            <div style={{fontSize:11, color:'var(--ink-soft)'}}>Estás usando la versión app</div>
          </div>
        </div>
      </div>
    );
  }

  if (puedeInstalar) {
    return (
      <div className="card" style={{background:'var(--accent-soft)', borderLeft:'4px solid var(--accent)', cursor:'pointer'}} onClick={instalar}>
        <div style={{display:'flex', alignItems:'center', gap:10}}>
          <span style={{fontSize:30}}>📱</span>
          <div style={{flex:1}}>
            <strong style={{color:'var(--accent)'}}>{instalando ? 'Instalando...' : 'Instalar como app'}</strong>
            <div style={{fontSize:11, color:'var(--ink-soft)'}}>Toca aquí para instalar · Pantalla completa · Icono propio</div>
          </div>
          <span style={{color:'var(--accent)', fontSize:18}}>{instalando ? '⏳' : '→'}</span>
        </div>
      </div>
    );
  }

  // Si no se puede instalar automáticamente, mostrar instrucciones manuales
  return (
    <div className="card" style={{background:'var(--bg-2)'}}>
      <div style={{display:'flex', alignItems:'center', gap:10, marginBottom:8}}>
        <span style={{fontSize:24}}>📱</span>
        <div style={{flex:1}}>
          <strong>Instalar como app</strong>
          <div style={{fontSize:11, color:'var(--ink-soft)'}}>Acceso directo desde tu pantalla de inicio</div>
        </div>
      </div>
      <div style={{fontSize:11, color:'var(--ink-soft)', lineHeight:1.7, paddingLeft:34}}>
        <strong>Android Chrome:</strong><br/>
        1. Toca menú ⋮ (arriba derecha)<br/>
        2. Selecciona "Instalar app" o "Agregar a pantalla de inicio"<br/>
        <br/>
        <strong>iPhone Safari:</strong><br/>
        1. Toca botón Compartir<br/>
        2. "Agregar a pantalla de inicio"
      </div>
    </div>
  );
}

// Componente separado que detecta cierre pendiente — solo se monta con usuario activo
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(error) { return { error }; }
  render() {
    if (this.state.error) {
      return (
        <div style={{padding:20, color:'red', background:'#fff', position:'fixed', top:0, left:0, right:0, bottom:0, overflow:'auto', zIndex:99999, fontFamily:'monospace', fontSize:12}}>
          <h2>Error detectado:</h2>
          <pre style={{whiteSpace:'pre-wrap', wordBreak:'break-all'}}>{this.state.error?.message}</pre>
          <pre style={{whiteSpace:'pre-wrap', wordBreak:'break-all', fontSize:10, color:'#666'}}>{this.state.error?.stack}</pre>
          <button onClick={()=>this.setState({error:null})} style={{marginTop:10, padding:'8px 16px'}}>Reintentar</button>
        </div>
      );
    }
    return this.props.children;
  }
}

// Precarga silenciosa de datos críticos — se ejecuta apenas el usuario se autentica
// Llena el caché global antes de que los componentes los pidan


function BloqueoGuard({ user, view, setView, setNavParams }) {
  const { list: todasCargas } = useFirebaseList('cargas');
  const { list: todosCierres } = useFirebaseList('cierres');
  const { list: todosRetornos } = useFirebaseList('retornos');

  const bloqueado = useMemo(() => {
    if (!user || user.role === 'admin') return null;
    const hoy = todayStr();

    // Función: ¿tiene cierre para una fecha dada?
    // El cierre puede haberse creado en cualquier día, pero corresponde a fechaRetorno
    // Verificamos: cierre creado en fechaRetorno O cierre con fechaAnterior = fechaRetorno
    const tieneCierreParaFecha = (fecha) => {
      return (todosCierres||[]).some(c => {
        if (c.vendedorId !== user.id) return false;
        if (c.segundaVuelta) return false;
        if (c.status !== 'pendiente' && c.status !== 'aprobado') return false;
        // 1. Cierre creado el mismo día
        if (isoToLocalDate(c.creadoEn) === fecha) return true;
        // 2. Cierre con campo fechaAnterior explícito
        if (c.fechaAnterior === fecha) return true;
        // 3. Fecha guardada en el resumen
        if (c.resumen?.fecha === fecha) return true;
        // 4. Cierre creado hoy (día posterior) → asumimos que corresponde
        //    al último día anterior sin cierre (caso de Francisco)
        //    Solo si el cierre fue creado DESPUÉS del retorno de esa fecha
        if (isoToLocalDate(c.creadoEn) > fecha) return true;
        return false;
      });
    };

    // Buscar retorno APROBADO de un día anterior sin cierre
    const retornosAnteriores = (todosRetornos||[]).filter(r =>
      r.vendedorId === user.id &&
      isoToLocalDate(r.creadoEn) < hoy &&
      r.status === 'aprobado' &&
      !r.segundaVuelta
    ).sort((a,b) => (b.creadoEn||'').localeCompare(a.creadoEn||''));

    for (const retorno of retornosAnteriores) {
      const fechaRetorno = isoToLocalDate(retorno.creadoEn);
      if (!tieneCierreParaFecha(fechaRetorno)) return { fecha: fechaRetorno };
    }

    // También verificar por cargas aprobadas sin cierre
    const cargasAnteriores = (todasCargas||[]).filter(c =>
      c.vendedorId === user.id &&
      isoToLocalDate(c.creadoEn) < hoy &&
      c.status === 'aprobada' &&
      !c.segundaVuelta
    ).sort((a,b) => (b.creadoEn||'').localeCompare(a.creadoEn||''));

    for (const carga of cargasAnteriores) {
      const fechaCarga = isoToLocalDate(carga.creadoEn);
      if (!tieneCierreParaFecha(fechaCarga)) return { fecha: fechaCarga };
    }

    return null;
  }, [user, todasCargas, todosCierres, todosRetornos]);

  if (!bloqueado || view === 'cierres' || view === 'mas') return null;

  return (
    <div style={{
      position:'fixed', top:0, left:0, right:0, bottom:0,
      background:'rgba(0,0,0,0.85)', zIndex:9999,
      display:'flex', flexDirection:'column',
      alignItems:'center', justifyContent:'center',
      padding:20,
    }} onClick={e=>e.stopPropagation()}>
      <div style={{
        background:'var(--card)', borderRadius:16, padding:'24px 20px',
        maxWidth:400, width:'100%', textAlign:'center',
        border:'3px solid var(--bad)', boxShadow:'0 8px 32px rgba(0,0,0,0.5)',
      }}>
        <div style={{fontSize:52, marginBottom:10}}>🔒</div>
        <strong style={{fontSize:19, color:'var(--bad)', display:'block', marginBottom:10}}>
          Día anterior sin cerrar
        </strong>
        <div style={{
          background:'var(--bad-bg)', borderRadius:10,
          padding:'12px 14px', marginBottom:16,
          fontSize:13, color:'var(--bad)', fontWeight:600,
        }}>
          ⚠️ No cerraste la caja del <strong>{bloqueado.fecha}</strong>
        </div>
        <div style={{fontSize:13, color:'var(--ink-soft)', marginBottom:20, lineHeight:1.7}}>
          No puedes hacer ventas, cargas ni ningún movimiento hasta rendir el día anterior.
          Cierra la caja pendiente primero.
        </div>
        <button onClick={()=>{ navegarA('cierres', { fechaAnterior: bloqueado.fecha }); }}
          style={{
            width:'100%', background:'var(--bad)', color:'white', border:'none',
            padding:'16px', fontSize:15, fontWeight:700, borderRadius:12,
            cursor:'pointer', letterSpacing:0.5,
          }}>
          📊 Cerrar caja del {bloqueado.fecha}
        </button>
        <div style={{fontSize:11, color:'var(--ink-mute)', marginTop:12}}>
          Acceso restringido hasta completar el cierre
        </div>
      </div>
    </div>
  );
}

function Ganancias({ session }) {
  const isAdmin = session.role === 'admin';
  const { list: ventas } = useFirebaseList('ventas');
  const { data: precios } = useFirebaseValue('precios');
  const [periodo, setPeriodo] = useState('dia'); // dia | semana | mes
  const [fechaRef, setFechaRef] = useState(todayStr());

  // Calcular ganancia de una venta usando precios históricos
  const calcGananciaVenta = (v) => {
    if (!precios || !v.items || v.items.length === 0) return 0;
    let ganancia = 0;
    const fechaVenta = isoToLocalDate(v.fecha || v.creadoEn);
    v.items.forEach(item => {
      // Los items tienen item.cajas y item.bandejas como campos separados
      // NO usar item.cantidad ni item.formato para iterar

      // Ganancia de cajas
      if ((item.cajas || 0) > 0) {
        const pricing = computePrice(precios, fechaVenta, item.calibre, 'caja');
        if (pricing) {
          const ventaNeto = pricing.ventaNetoUnit || 0;
          const costoNeto = pricing.costoNetoUnit || 0;
          const ganUnit = ventaNeto - costoNeto;
          // mermas están en unidades, no en cajas
          const unidadesBruto = item.cajas * 180;
          const mermas = item.mermas || 0;
          const unidadesNetas = Math.max(0, unidadesBruto - mermas);
          ganancia += ganUnit * unidadesNetas;
        }
      }

      // Ganancia de bandejas
      if ((item.bandejas || 0) > 0) {
        const pricing = computePrice(precios, fechaVenta, item.calibre, 'bandeja');
        if (pricing) {
          const ventaNeto = pricing.ventaNetoUnit || 0;
          const costoNeto = pricing.costoNetoUnit || 0;
          const ganUnit = ventaNeto - costoNeto;
          const unidadesBruto = item.bandejas * 30;
          ganancia += ganUnit * unidadesBruto;
        }
      }
    });
    return Math.round(ganancia);
  };

  // Rango de fechas según período
  const rango = useMemo(() => {
    const ref = new Date(fechaRef + 'T12:00:00');
    if (periodo === 'dia') {
      return { desde: fechaRef, hasta: fechaRef, label: `${ref.toLocaleDateString('es-CL', {weekday:'long', day:'numeric', month:'long'})}` };
    }
    if (periodo === 'semana') {
      const dow = ref.getDay(); // 0=dom
      const lunes = new Date(ref); lunes.setDate(ref.getDate() - ((dow + 6) % 7));
      const sabado = new Date(lunes); sabado.setDate(lunes.getDate() + 5);
      const desde = lunes.toISOString().slice(0,10);
      const hasta = sabado.toISOString().slice(0,10);
      return { desde, hasta, label: `${lunes.toLocaleDateString('es-CL',{day:'numeric',month:'short'})} – ${sabado.toLocaleDateString('es-CL',{day:'numeric',month:'short',year:'numeric'})}` };
    }
    // mes
    const y = ref.getFullYear(), m = ref.getMonth();
    const desde = `${y}-${String(m+1).padStart(2,'0')}-01`;
    const hasta = new Date(y, m+1, 0).toISOString().slice(0,10);
    return { desde, hasta, label: ref.toLocaleDateString('es-CL',{month:'long', year:'numeric'}) };
  }, [periodo, fechaRef]);

  // Ventas en el rango
  const ventasRango = useMemo(() => {
    return ventas.filter(v => {
      if (!isAdmin && v.vendedorId !== session.id) return false;
      const f = isoToLocalDate(v.fecha || v.creadoEn);
      return f >= rango.desde && f <= rango.hasta;
    });
  }, [ventas, rango, isAdmin, session]);

  // Calcular totales
  const totales = useMemo(() => {
    let gananciaTotal = 0, ventasBruto = 0, cantVentas = 0;
    const porDia = {};
    const porCalibre = {};

    ventasRango.forEach(v => {
      const gan = calcGananciaVenta(v);
      gananciaTotal += gan;
      ventasBruto += v.totalBruto || 0;
      cantVentas++;

      const f = isoToLocalDate(v.fecha || v.creadoEn);
      porDia[f] = (porDia[f] || 0) + gan;

      // Por calibre
      (v.items || []).forEach(item => {
        // Cajas
        if ((item.cajas||0) > 0) {
          const pricing = computePrice(precios, f, item.calibre, 'caja');
          if (pricing) {
            const ganUnit = (pricing.ventaNetoUnit||0) - (pricing.costoNetoUnit||0);
            const unidades = Math.max(0, item.cajas * 180 - (item.mermas||0));
            porCalibre[item.calibre] = (porCalibre[item.calibre]||0) + Math.round(ganUnit * unidades);
          }
        }
        // Bandejas
        if ((item.bandejas||0) > 0) {
          const pricing = computePrice(precios, f, item.calibre, 'bandeja');
          if (pricing) {
            const ganUnit = (pricing.ventaNetoUnit||0) - (pricing.costoNetoUnit||0);
            const unidades = item.bandejas * 30;
            porCalibre[item.calibre] = (porCalibre[item.calibre]||0) + Math.round(ganUnit * unidades);
          }
        }
      });
    });

    return { gananciaTotal, ventasBruto, cantVentas, porDia, porCalibre };
  }, [ventasRango, precios]);

  // Navegar período
  const navegar = (dir) => {
    const d = new Date(fechaRef + 'T12:00:00');
    if (periodo === 'dia') d.setDate(d.getDate() + dir);
    else if (periodo === 'semana') d.setDate(d.getDate() + dir * 7);
    else d.setMonth(d.getMonth() + dir);
    setFechaRef(d.toISOString().slice(0,10));
  };

  const pct = totales.ventasBruto > 0 ? ((totales.gananciaTotal / totales.ventasBruto) * 100).toFixed(1) : '0.0';

  return (
    <div className="pad">
      <h2 className="section-title">📈 Ganancias</h2>
      <div className="section-sub">Utilidad neta por período · basado en precios configurados</div>

      {/* Selector de período */}
      <div style={{display:'flex', gap:4, marginBottom:12}}>
        {[{id:'dia',lbl:'📅 Diario'},{id:'semana',lbl:'📆 Semanal'},{id:'mes',lbl:'🗓️ Mensual'}].map(p=>(
          <button key={p.id} onClick={()=>setPeriodo(p.id)} className="btn sm"
            style={{flex:1, background:periodo===p.id?'var(--ink)':'transparent',
              color:periodo===p.id?'var(--ink-on)':'var(--ink-soft)',
              border:'1.5px solid var(--line)', fontSize:12, padding:'8px 4px'}}>
            {p.lbl}
          </button>
        ))}
      </div>

      {/* Navegación de fechas */}
      <div style={{display:'flex', alignItems:'center', gap:8, marginBottom:14, background:'var(--card)', borderRadius:10, padding:'8px 12px'}}>
        <button onClick={()=>navegar(-1)} style={{background:'none', border:'none', fontSize:20, cursor:'pointer', color:'var(--ink)', padding:'0 4px'}}>‹</button>
        <div style={{flex:1, textAlign:'center', fontSize:13, fontWeight:600, color:'var(--ink)'}}>{rango.label}</div>
        <button onClick={()=>navegar(1)} style={{background:'none', border:'none', fontSize:20, cursor:'pointer', color:'var(--ink)', padding:'0 4px'}}>›</button>
      </div>

      {/* KPIs principales */}
      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, marginBottom:14}}>
        <div className="card" style={{textAlign:'center', borderLeft:'4px solid var(--good)'}}>
          <div style={{fontSize:11, color:'var(--ink-soft)', marginBottom:4}}>💰 Ganancia neta</div>
          <div style={{fontSize:22, fontWeight:800, color:'var(--good)', fontFamily:'JetBrains Mono, monospace'}}>{fmt$(totales.gananciaTotal)}</div>
          <div style={{fontSize:11, color:'var(--ink-mute)', marginTop:2}}>margen {pct}%</div>
        </div>
        <div className="card" style={{textAlign:'center', borderLeft:'4px solid var(--accent)'}}>
          <div style={{fontSize:11, color:'var(--ink-soft)', marginBottom:4}}>🛒 Venta bruta</div>
          <div style={{fontSize:22, fontWeight:800, color:'var(--accent)', fontFamily:'JetBrains Mono, monospace'}}>{fmt$(totales.ventasBruto)}</div>
          <div style={{fontSize:11, color:'var(--ink-mute)', marginTop:2}}>{totales.cantVentas} venta{totales.cantVentas!==1?'s':''}</div>
        </div>
      </div>

      {/* Sin datos */}
      {totales.cantVentas === 0 && (
        <div className="empty">Sin ventas en este período</div>
      )}

      {/* Por calibre */}
      {Object.keys(totales.porCalibre).length > 0 && (
        <div className="card" style={{marginBottom:12}}>
          <div style={{fontWeight:700, fontSize:13, marginBottom:10, color:'var(--ink)'}}>📦 Ganancia por calibre</div>
          {CALIBRES.filter(c => totales.porCalibre[c]).map(cal => {
            const g = totales.porCalibre[cal] || 0;
            const pctCal = totales.gananciaTotal > 0 ? (g / totales.gananciaTotal * 100) : 0;
            return (
              <div key={cal} style={{marginBottom:8}}>
                <div style={{display:'flex', justifyContent:'space-between', fontSize:12, marginBottom:3}}>
                  <span style={{fontWeight:600}}>{cal}</span>
                  <span style={{fontFamily:'JetBrains Mono, monospace', color:'var(--good)', fontWeight:700}}>{fmt$(g)}</span>
                </div>
                <div style={{background:'var(--bg-2)', borderRadius:4, height:6, overflow:'hidden'}}>
                  <div style={{background:'var(--good)', height:'100%', width:`${Math.min(100,pctCal)}%`, borderRadius:4, transition:'width 0.3s'}}/>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* Por día (solo semana/mes) */}
      {periodo !== 'dia' && Object.keys(totales.porDia).length > 0 && (
        <div className="card">
          <div style={{fontWeight:700, fontSize:13, marginBottom:10, color:'var(--ink)'}}>
            {periodo === 'semana' ? '📅 Por día' : '📅 Por día del mes'}
          </div>
          {Object.entries(totales.porDia).sort(([a],[b])=>a.localeCompare(b)).map(([fecha, gan]) => {
            const d = new Date(fecha+'T12:00:00');
            const pctD = totales.gananciaTotal > 0 ? (gan / totales.gananciaTotal * 100) : 0;
            return (
              <div key={fecha} style={{marginBottom:8}}>
                <div style={{display:'flex', justifyContent:'space-between', fontSize:12, marginBottom:3}}>
                  <span style={{color:'var(--ink-soft)'}}>
                    {d.toLocaleDateString('es-CL',{weekday:'short',day:'numeric',month:'short'})}
                  </span>
                  <span style={{fontFamily:'JetBrains Mono, monospace', color: gan >= 0 ? 'var(--good)' : 'var(--bad)', fontWeight:600}}>
                    {fmt$(gan)}
                  </span>
                </div>
                <div style={{background:'var(--bg-2)', borderRadius:4, height:5, overflow:'hidden'}}>
                  <div style={{background: gan >= 0 ? 'var(--good)' : 'var(--bad)', height:'100%', width:`${Math.min(100,Math.abs(pctD))}%`, borderRadius:4}}/>
                </div>
              </div>
            );
          })}
          <div style={{display:'flex', justifyContent:'space-between', borderTop:'1px solid var(--line)', paddingTop:8, marginTop:4, fontSize:12, fontWeight:700}}>
            <span>Total</span>
            <span style={{fontFamily:'JetBrains Mono, monospace', color:'var(--good)'}}>{fmt$(totales.gananciaTotal)}</span>
          </div>
        </div>
      )}

      {/* Nota */}
      <div style={{fontSize:11, color:'var(--ink-mute)', marginTop:12, textAlign:'center', lineHeight:1.5}}>
        ℹ️ Ganancia = precio venta neto − costo neto por unidad<br/>
        Incluye descuento de mermas. No incluye gastos operacionales.
      </div>
    </div>
  );
}

function App() {
  const { toast, ToastArea } = useToasts();
  const [user, setUser] = useState(null);
  const [fbReady, setFbReady] = useState(window.firebaseReady || false);
  const [view, setView] = useState('hoy');
  const [navParams, setNavParams] = useState({});

  // Scroll al top al cambiar de vista
  const navegarA = (nuevaVista, params) => {
    setNavParams(params || {});
    setView(nuevaVista);
    window.scrollTo({ top: 0, behavior: 'instant' });
    document.querySelector('.main-content')?.scrollTo({ top: 0, behavior: 'instant' });
  };
  const [darkMode, setDarkMode] = useState(() => {
    try { return localStorage.getItem('darkMode') === 'true'; } catch(e) { return false; }
  });

  // Precargar datos críticos en background apenas el usuario se autentica
  usePrecarga(user);

  // HOOKS DE BLOQUEO movidos a BloqueoGuard (componente hijo) para evitar
  // ejecutar hooks antes de autenticación

  useEffect(() => {
    if (darkMode) document.body.classList.add('dark');
    else document.body.classList.remove('dark');
    try { localStorage.setItem('darkMode', darkMode); } catch(e) {}
  }, [darkMode]);
  // Solicitar permiso de notificaciones cuando el usuario inicia sesión
  useEffect(() => {
    if (!user) return;
    // Activar audio context al primer click/touch (requerido en móviles)
    const activarAudio = () => {
      activarAudioNotif();
      document.removeEventListener('click', activarAudio);
      document.removeEventListener('touchstart', activarAudio);
    };
    document.addEventListener('click', activarAudio);
    document.addEventListener('touchstart', activarAudio);

    // Esperar un par de segundos para no abrumar al usuario al login
    const t = setTimeout(() => {
      if ('Notification' in window && Notification.permission === 'default') {
        solicitarPermisoNotif();
      }
    }, 3000);
    return () => {
      clearTimeout(t);
      document.removeEventListener('click', activarAudio);
      document.removeEventListener('touchstart', activarAudio);
    };
  }, [user]);
  // ============================================================
  // BOTÓN ATRÁS ANDROID — interceptar para navegar dentro de la app
  // Solo cierra la app si ya estás en 'hoy' y presionas 2 veces
  // ============================================================
  const ultimoAtras = React.useRef(0);
  useEffect(() => {
    if (!user) return;

    // Agregar entrada al historial para interceptar el botón atrás
    window.history.pushState({ inApp: true }, '');

    const handlePopState = (e) => {
      // Si ya estamos en 'hoy', preguntar si quiere salir
      if (view === 'hoy') {
        const ahora = Date.now();
        if (ahora - ultimoAtras.current < 2000) {
          // Segundo toque en menos de 2s → permitir salir
          return;
        }
        ultimoAtras.current = ahora;
        toast('Presiona atrás de nuevo para salir', 'info');
        // Volver a agregar la entrada para seguir interceptando
        window.history.pushState({ inApp: true }, '');
      } else {
        // Estamos en otra pantalla → volver a 'hoy'
        setView('hoy');
        setNavParams({});
        window.history.pushState({ inApp: true }, '');
      }
    };

    window.addEventListener('popstate', handlePopState);
    return () => window.removeEventListener('popstate', handlePopState);
  }, [user, view]);

  useEffect(() => {
    if (fbReady) return;
    const h = () => setFbReady(true);
    window.addEventListener('firebase-ready', h);
    return () => window.removeEventListener('firebase-ready', h);
  }, [fbReady]);

  // Cargar modo de redondeo desde Firebase al iniciar — aplica a TODOS los usuarios
  // para que computePrice use el redondeo correcto desde el primer momento
  useEffect(() => {
    if (!fbReady) return;
    fbGet('config/redondeo').then(cfg => {
      if (cfg && cfg.modo) {
        setModoRedondeoGlobal(cfg.modo);
      }
    }).catch(() => {});
  }, [fbReady]);
  // ============================================================
  // ALERTAS AUTOMÁTICAS DEL SISTEMA
  // Se verifican al iniciar sesión como admin:
  // 1. Días 19 y 20 de cada mes: recordatorio contador/impuestos
  // 2. Compras con factura proveedor pendiente hace +3 días
  // ============================================================
  useEffect(() => {
    if (!user || user.role !== 'admin') return;
    const verificarAlertas = async () => {
      try {
        const hoy = new Date();
        const dia = hoy.getDate();
        const mes = hoy.getMonth() + 1;
        const anio = hoy.getFullYear();
        const claveHoy = `${anio}-${String(mes).padStart(2,'0')}-${String(dia).padStart(2,'0')}`;

        // --- Alerta días 19 y 20: contador e impuestos ---
        if (dia === 19 || dia === 20) {
          const claveAlerta = `alerta_tributaria_${claveHoy}`;
          const yaEnviada = await fbGet(`alertasSistema/${claveAlerta}`).catch(()=>null);
          if (!yaEnviada) {
            await fbSet(`notificaciones/${uid()}`, {
              tipo: 'tributaria',
              titulo: dia === 19
                ? '📊 Recordatorio Contador — Día 19'
                : '⚠️ Último día impuestos — Día 20',
              mensaje: dia === 19
                ? 'Hoy es día 19. Recuerda coordinar con el contador los pagos tributarios del mes. Mañana vence el plazo.'
                : 'Hoy es día 20. Es el último día para el pago de impuestos y obligaciones tributarias mensuales.',
              link: 'gastos',
              prioridad: 'urgente',
              destinatario: 'admin',
              creadaPor: 'sistema',
              creadaEn: nowISO(),
              leida: false,
            });
            // Marcar que ya se envió hoy para no repetir
            await fbSet(`alertasSistema/${claveAlerta}`, { enviada: true, en: nowISO() });
          }
        }

        // --- Alerta facturas proveedor pendientes +3 días ---
        const compras = await fbGet('compras').catch(()=>null);
        if (compras) {
          const listaCompras = Object.entries(compras).map(([id,v]) => ({...v, id}));
          for (const compra of listaCompras) {
            if (compra.facturaAdjunta) continue; // ya tiene factura
            const creadoEn = compra.creadoEn || compra.fecha;
            if (!creadoEn) continue;
            const diasDesde = Math.floor((hoy - new Date(creadoEn)) / 86400000);
            if (diasDesde < 3) continue;
            const claveAlerta = `alerta_factura_proveedor_${compra.id}_${claveHoy}`;
            const yaEnviada = await fbGet(`alertasSistema/${claveAlerta}`).catch(()=>null);
            if (!yaEnviada) {
              await fbSet(`notificaciones/${uid()}`, {
                tipo: 'factura_proveedor',
                titulo: '📎 Factura proveedor pendiente',
                mensaje: `La compra a ${compra.proveedor || 'proveedor'} del ${new Date(creadoEn).toLocaleDateString('es-CL',{day:'numeric',month:'long'})} lleva ${diasDesde} días sin factura adjunta.`,
                link: 'compras',
                compraId: compra.id,
                prioridad: diasDesde >= 7 ? 'urgente' : 'normal',
                destinatario: 'admin',
                creadaPor: 'sistema',
                creadaEn: nowISO(),
                leida: false,
              });
              await fbSet(`alertasSistema/${claveAlerta}`, { enviada: true, en: nowISO() });
            }
          }
        }
      } catch(e) { console.error('Error alertas automáticas:', e); }
    };

    // Verificar 5 segundos después del login para no saturar
    const t = setTimeout(verificarAlertas, 5000);
    return () => clearTimeout(t);
  }, [user]);

  useEffect(() => {
    if (!fbReady) return;
    // Cargar nombres personalizados desde Firebase al iniciar

<!-- Service Worker con auto-actualización -->
<script>
(function() {
  if (!('serviceWorker' in navigator)) return;

  // Versión del cache (cambiar al actualizar HTML para forzar refresh)
  const APP_VERSION = '36.0';

  // Service Worker inline
  // Estrategia: network-first para HTML (siempre fresco), cache para assets externos
  const swCode = `
    const VERSION = '${APP_VERSION}';
    const CACHE_NAME = 'integral-sur-' + VERSION;

    self.addEventListener('install', e => {
      self.skipWaiting(); // Activar de inmediato sin esperar
    });

    self.addEventListener('activate', e => {
      e.waitUntil(
        caches.keys().then(keys => Promise.all(
          keys.filter(k => k !== CACHE_NAME).map(k => caches.delete(k))
        )).then(() => self.clients.claim())
      );
    });

    self.addEventListener('fetch', e => {
      const req = e.request;
      const url = req.url;

      // Firebase y APIs: siempre red directa
      if (url.includes('firebaseio') || url.includes('googleapis') || url.includes('firebase')) {
        return;
      }

      // HTML (la app principal): NETWORK FIRST (siempre intentar red primero)
      // Si red falla, usar cache
      const isHTML = req.mode === 'navigate' ||
                     (req.method === 'GET' && req.headers.get('accept') && req.headers.get('accept').includes('text/html'));

      if (isHTML) {
        e.respondWith(
          fetch(req).then(res => {
            if (res && res.status === 200) {
              const clone = res.clone();
              caches.open(CACHE_NAME).then(c => c.put(req, clone)).catch(()=>{});
            }
            return res;
          }).catch(() => caches.match(req).then(r => r || caches.match('/')))
        );
        return;
      }

      // Assets externos (fuentes, CDN): cache first
      e.respondWith(
        caches.match(req).then(cached => {
          if (cached) return cached;
          return fetch(req).then(res => {
            if (res && res.status === 200 && req.method === 'GET') {
              const clone = res.clone();
              caches.open(CACHE_NAME).then(c => c.put(req, clone)).catch(()=>{});
            }
            return res;
          });
        })
      );
    });

    // Permitir que la app pida skipWaiting al SW para activar inmediatamente
    self.addEventListener('message', e => {
      if (e.data && e.data.type === 'SKIP_WAITING') {
        self.skipWaiting();
      }
      // Mostrar notificación nativa que funcione aunque la app esté en background
      if (e.data && e.data.type === 'SHOW_NOTIFICATION') {
        const { title, body, tag, prioridad } = e.data;
        self.registration.showNotification(title, {
          body,
          tag: tag || 'integral-sur',
          icon: '/favicon.ico',
          badge: '/favicon.ico',
          vibrate: prioridad === 'urgente' ? [300, 100, 300, 100, 300] : [200, 100, 200],
          requireInteraction: prioridad === 'urgente',
          renotify: true,
          silent: false,
        }).catch(()=>{});
      }
    });

    // Cuando el usuario toca la notif, abrir/enfocar la app
    self.addEventListener('notificationclick', e => {
      e.notification.close();
      e.waitUntil(
        clients.matchAll({ type: 'window', includeUncontrolled: true }).then(list => {
          for (const c of list) {
            if ('focus' in c) return c.focus();
          }
          if (clients.openWindow) return clients.openWindow('/');
        })
      );
    });
  `;

  const blob = new Blob([swCode], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(blob);

  navigator.serviceWorker.register(swUrl, { scope: './' })
    .then(reg => {
      console.log('✅ Service Worker registrado · versión', APP_VERSION);

      // Detectar actualización disponible
      reg.addEventListener('updatefound', () => {
        const newWorker = reg.installing;
        if (!newWorker) return;
        newWorker.addEventListener('statechange', () => {
          if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            // Hay una nueva versión esperando
            console.log('🔄 Nueva versión disponible');
            window.dispatchEvent(new CustomEvent('pwa-update-available', { detail: newWorker }));
          }
        });
      });

      // Comprobar actualizaciones cada 30 minutos
      setInterval(() => reg.update().catch(()=>{}), 30 * 60 * 1000);
    })
    .catch(err => console.log('⚠️ SW no registrado:', err.message));

  // Recargar cuando el SW nuevo toma control
  let refreshing = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (refreshing) return;
    refreshing = true;
    window.location.reload();
  });

  // Capturar evento de instalación PWA
  window.deferredInstallPrompt = null;
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    window.deferredInstallPrompt = e;
    window.dispatchEvent(new Event('pwa-install-available'));
  });

  window.addEventListener('appinstalled', () => {
    window.deferredInstallPrompt = null;
    window.dispatchEvent(new Event('pwa-installed'));
  });
})();
</script>
