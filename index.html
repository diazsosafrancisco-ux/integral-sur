<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fbf7f0; --bg-2: #f3ede0; --card: #ffffff; --line: #e8dfd0;
    --ink: #1a1815; --ink-soft: #595048; --ink-mute: #8a8175;
    --ink-on: #ffffff; /* texto sobre fondo --ink */
    --accent: #e8651e; --accent-soft: #fde4d3; --accent-on: #ffffff;
    --good: #2f7d32; --good-bg: #e3f5e4; --good-on: #ffffff;
    --warn: #b8740a; --warn-bg: #fbf0d6; --warn-on: #ffffff;
    --bad: #b13c2a; --bad-bg: #fbe3df; --bad-on: #ffffff;
  }
  body.dark {
    --bg: #1a1815; --bg-2: #25221e; --card: #2a2724; --line: #3a3530;
    --ink: #f3ede0; --ink-soft: #c0b7aa; --ink-mute: #8a8175;
    --ink-on: #1a1815; /* texto sobre fondo --ink (claro en dark mode) */
    --accent: #ff8642; --accent-soft: #4a2d1a; --accent-on: #1a1815;
    --good: #5fb863; --good-bg: #1f3a20; --good-on: #0d1f0e;
    --warn: #e29435; --warn-bg: #3a2e15; --warn-on: #1a1305;
    --bad: #e2655a; --bad-bg: #3a1f1a; --bad-on: #1a0a08;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin:0; padding:0; background: var(--bg); color: var(--ink); font-family: 'Manrope', sans-serif; font-size:15px; line-height:1.5; }
  #root { max-width: 720px; margin: 0 auto; min-height: 100vh; padding: 0 0 80px; }
  h1, h2, h3 { font-family: 'Fraunces', serif; margin: 0; }
  h2 { font-size: 24px; font-weight: 600; letter-spacing: -0.5px; }
  h3 { font-size: 17px; font-weight: 600; margin-bottom: 8px; }
  .login-wrap { min-height: 100vh; display:flex; flex-direction:column; justify-content:center; padding: 28px 24px; max-width:420px; margin:0 auto; }
  .brand { text-align:center; margin-bottom: 40px; }
  .brand-name { font-family: 'Fraunces', serif; font-size: 38px; font-weight: 700; letter-spacing: -1.2px; }
  .brand-name em { font-style: italic; color: var(--accent); }
  .brand-tag { font-size: 13px; color: var(--ink-mute); margin-top: 4px; text-transform: uppercase; letter-spacing: 2px; }
  .fld { display:block; font-size:11px; font-weight:700; color:var(--ink-soft); text-transform:uppercase; letter-spacing:1.2px; margin-bottom:5px; margin-top: 10px; }
  .inp { width:100%; padding: 12px 14px; border:1.5px solid var(--line); border-radius: 11px; background: var(--card); font-family: inherit; font-size: 15px; color: var(--ink); }
  .inp:focus { outline: none; border-color: var(--accent); }
  .btn { display:inline-flex; align-items:center; justify-content:center; gap:6px; padding: 12px 16px; border-radius:11px; border:none; background: var(--ink); color: var(--ink-on); font-family:inherit; font-weight: 600; font-size: 14px; cursor:pointer; }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn.full { width: 100%; }
  .btn.accent { background: var(--accent); color: var(--accent-on); }
  .btn.ghost { background: transparent; color: var(--ink); border: 1.5px solid var(--line); }
  .btn.sm { padding: 7px 11px; font-size: 12px; border-radius: 8px; }
  .btn.danger { background: var(--bad); color: var(--bad-on); }
  .btn.success { background: var(--good); color: var(--good-on); }
  .topbar { display:flex; justify-content:space-between; align-items:center; padding: 18px 18px 14px; background: var(--bg); position: sticky; top:0; z-index: 10; border-bottom: 1px solid var(--line); }
  .topbar .who { font-size: 13px; font-weight: 600; }
  .topbar .who .role { font-size: 10px; font-weight: 600; color: var(--accent); display:block; text-transform: uppercase; letter-spacing: 1px; }
  .pad { padding: 16px 18px; }
  .section-title { font-family: 'Fraunces', serif; font-size: 26px; font-weight: 600; letter-spacing: -0.5px; margin: 8px 0 4px; }
  .section-sub { font-size: 12px; color: var(--ink-mute); text-transform: uppercase; letter-spacing: 1.4px; margin-bottom: 16px; }
  .card { background: var(--card); border-radius: 14px; padding: 14px; margin-bottom: 12px; border: 1px solid var(--line); }
  .card h3 { margin-bottom: 6px; }
  .cloud-status { display:flex; align-items:center; gap:8px; padding: 8px 12px; border-radius: 10px; font-size: 12px; }
  .cloud-status.ok { background: var(--good-bg); color: var(--good); }
  .cloud-status.loading { background: var(--warn-bg); color: var(--warn); }
  .cloud-dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; animation: pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  /* Switch toggle */
  .switch { position: relative; display: inline-block; width: 48px; height: 26px; flex-shrink: 0; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .switch .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--bg-2); border: 1px solid var(--line); border-radius: 26px; transition: .3s; }
  .switch .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; border-radius: 50%; transition: .3s; }
  .switch input:checked + .slider { background-color: var(--accent); border-color: var(--accent); }
  .switch input:checked + .slider:before { transform: translateX(22px); }
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.45); display:flex; align-items:flex-end; justify-content:center; z-index:50; }
  .modal { background: var(--card); border-radius: 18px 18px 0 0; padding: 22px 20px 30px; width: 100%; max-width: 540px; max-height: 90vh; overflow-y:auto; }
  .actions { display:flex; gap: 8px; margin-top: 16px; }
  .actions .btn { flex: 1; }
  .empty { text-align: center; color: var(--ink-mute); padding: 30px 20px; font-size: 14px; }
  .toast-area { position: fixed; top: 20px; right: 16px; left: 16px; z-index: 100; pointer-events: none; }
  .toast { background: var(--ink); color: var(--card); padding: 11px 16px; border-radius: 11px; font-size: 13px; margin-bottom: 8px; }
  .toast.success { background: var(--good); }
  .toast.error { background: var(--bad); }
  .toast.warn { background: var(--warn); }
  .toast.info { background: var(--ink-soft); }
  .badge { display:inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; }
  .badge.accent { background: var(--accent-soft); color: var(--accent); }
  .badge.warn { background: var(--warn-bg); color: var(--warn); }
  .badge.good { background: var(--good-bg); color: var(--good); }
  .badge.bad { background: var(--bad-bg); color: var(--bad); }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .alert-banner { display:flex; gap: 10px; padding: 10px 14px; background: var(--warn-bg); color: var(--warn); border-radius: 10px; margin-bottom: 14px; font-size: 13px; align-items: flex-start; }
  .alert-banner.info { background: var(--accent-soft); color: var(--accent); }
  .alert-banner .ico { flex-shrink: 0; font-size: 16px; }
  hr.div { border: none; border-top: 1px solid var(--line); margin: 12px 0; }
  table.t { width: 100%; border-collapse: collapse; font-size: 13px; }
  table.t th, table.t td { padding: 8px 6px; text-align: left; border-bottom: 1px solid var(--line); }
  table.t th { font-size: 11px; font-weight: 700; color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.8px; }
  table.t td.num, table.t th.num { text-align: right; font-family: 'JetBrains Mono', monospace; }
  .tabs { display:flex; gap: 4px; padding: 0; margin-bottom: 12px; overflow-x: auto; }
  .tab { padding: 9px 13px; background: var(--card); border: 1.5px solid var(--line); border-radius: 9px; font-family: inherit; font-weight: 600; font-size: 12px; color: var(--ink-soft); white-space: nowrap; cursor:pointer; }
  .tab.active { background: var(--ink); color: var(--ink-on); border-color: var(--ink); }
  .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 720px; background: var(--card); border-top: 1px solid var(--line); padding: 8px 4px; display:flex; justify-content:space-around; z-index: 20; }
  .nav-item { background: transparent; border: none; padding: 6px 4px; display:flex; flex-direction: column; align-items: center; gap: 2px; font-family: inherit; color: var(--ink-mute); flex: 1; cursor:pointer; }
  .nav-item.active { color: var(--accent); }
  .nav-item .ico { font-size: 18px; }
  .nav-item .lbl { font-size: 9px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; }
</style>

const fmt$ = (n) => '$' + (Math.round(n||0)).toLocaleString('es-CL');
const fmtN = (n) => (n||0).toLocaleString('es-CL');

// Ícono de calendario que muestra el número del día actual
// Visualmente parece un calendario con el día de hoy en grande
function IconoCalendario({ size = 18, dia = null }) {
  const d = dia != null ? dia : new Date().getDate();
  const headerH = Math.max(3, Math.round(size * 0.22));
  return (
    <span style={{
      display:'inline-flex',
      flexDirection:'column',
      width: size,
      height: size,
      border: '1.5px solid currentColor',
      borderRadius: 3,
      overflow:'hidden',
      verticalAlign: 'middle',
      fontFamily: 'system-ui, -apple-system, sans-serif',
      flexShrink: 0,
    }}>
      <span style={{height: headerH, background: 'currentColor', flexShrink:0}}/>
      <span style={{
        flex:1, display:'flex', alignItems:'center', justifyContent:'center',
        fontSize: size * 0.52, lineHeight:1, fontWeight:700,
      }}>{d}</span>
    </span>
  );
}

// Formatea los items de una venta como "X cj · Y bd" o "X u" como fallback
function fmtVentaCajas(venta) {
  if (!venta || !venta.items) return fmtN(venta?.totalUnidades || 0) + 'u';
  let cajas = 0, bandejas = 0;
  venta.items.forEach(i => {
    cajas += i.cajas || 0;
    bandejas += i.bandejas || 0;
  });
  const partes = [];
  if (cajas > 0) partes.push(cajas + (cajas === 1 ? ' caja' : ' cajas'));
  if (bandejas > 0) partes.push(bandejas + (bandejas === 1 ? ' bandeja' : ' bandejas'));
  if (partes.length === 0) return fmtN(venta.totalUnidades || 0) + 'u';
  return partes.join(' · ');
}

// =========================== WHATSAPP HELPERS ===========================
// Limpia un teléfono al formato wa.me: solo dígitos, con código país
function cleanPhoneForWA(phone) {
  if (!phone) return '';
  // Remueve todo lo que no sea dígito
  let p = phone.replace(/[^0-9]/g, '');
  // Si empieza con 569 está bien (Chile)
  if (p.startsWith('569')) return p;
  // Si empieza con 9 (sin código país), agregar 56
  if (p.startsWith('9') && p.length === 9) return '56' + p;
  // Si tiene 8 dígitos (sin el 9), agregar 569
  if (p.length === 8) return '569' + p;
  return p;
}

// Construye el mensaje de confirmación de venta para WhatsApp
// deudasPrevias: array de ventas pendientes ANTERIORES a esta venta (ya filtradas)
function mensajeVentaWA(venta, cliente, deudasPrevias = []) {
  const descPorCal = venta.descuentosPorCalibre || {};
  const tieneDesc = Object.values(descPorCal).some(v => v > 0);

  let totalAhorrado = 0;
  const items = (venta.items || []).map(i => {
    const partes = [];
    if (i.cajas > 0) partes.push(`${i.cajas} ${i.cajas===1?'caja':'cajas'} ${i.calibre}`);
    if (i.bandejas > 0) partes.push(`${i.bandejas} ${i.bandejas===1?'bandeja':'bandejas'} ${i.calibre}`);
    if (i.mermas > 0) partes.push(`(${i.mermas} roto${i.mermas===1?'':'s'})`);
    let linea = '• ' + partes.join(' ');
    const desc = descPorCal[i.calibre] || 0;
    if (desc > 0) {
      const ahorroItem = desc * (i.unidadesTotal || 0);
      totalAhorrado += ahorroItem;
      linea += `\n   💰 Descuento: $${desc}/u · Ahorro: ${fmt$(ahorroItem)}`;
    }
    return linea;
  }).join('\n');

  let formaPago;
  if (venta.formaPago === 'mixto' && venta.montosMixto) {
    const partes = [];
    if (venta.montosMixto.efectivo > 0) partes.push(`💵 Efectivo: ${fmt$(venta.montosMixto.efectivo)}`);
    if (venta.montosMixto.transferencia > 0) partes.push(`🏦 Transferencia: ${fmt$(venta.montosMixto.transferencia)}`);
    if (venta.montosMixto.pendiente > 0) partes.push(`⏰ Pendiente: ${fmt$(venta.montosMixto.pendiente)}`);
    formaPago = '🔀 *PAGO MIXTO*\n' + partes.join('\n');
  } else {
    formaPago = venta.formaPago === 'efectivo' ? '💵 Pagado en EFECTIVO' :
                venta.formaPago === 'transferencia' ? '🏦 Pagado por TRANSFERENCIA' :
                '⏰ Pago PENDIENTE';
  }
  const docTipo = venta.tipoDoc === 'factura' ? '📄 Factura' : '🧾 Boleta';
  const fechaCompra = new Date(venta.creadoEn || venta.fecha).toLocaleDateString('es-CL', { day:'numeric', month:'long', year:'numeric' });

  let mensaje = `🥚 *INTEGRAL SUR · Distribuidora*\n\nHola ${cliente.contacto || cliente.razonSocial}, esperamos que se encuentre muy bien 😊\n\nLe confirmamos su pedido del ${fechaCompra}:\n\n📋 *Detalle de hoy:*\n${items}\n`;

  if (tieneDesc) {
    mensaje += `\n🎁 *Total ahorrado: ${fmt$(totalAhorrado)}*\n`;
  }

  mensaje += `\n💰 *Total pedido de hoy: ${fmt$(venta.totalBruto)}*\n${docTipo}\n${formaPago}`;

  // Compromiso de pago — sin bloque de confirmación por mensaje
  const tienePartePendiente = venta.formaPago === 'pendiente' ||
    (venta.formaPago === 'mixto' && venta.montosMixto && venta.montosMixto.pendiente > 0);
  const montoPendiente = venta.formaPago === 'mixto'
    ? (venta.montosMixto?.pendiente || 0) : venta.totalBruto;

  if (tienePartePendiente && venta.fechaCompromiso) {
    const fc = new Date(venta.fechaCompromiso + 'T12:00:00').toLocaleDateString('es-CL', { day:'numeric', month:'long', year:'numeric' });
    mensaje += `\n\n📅 *COMPROMISO DE PAGO*\nMonto pendiente hoy: ${fmt$(montoPendiente)}\nFecha acordada: ${fc}\n\nEstamos para ayudarle en lo que necesite 🤝`;
  }

  // Deudas previas pendientes (solo las no regularizadas)
  const deudasActivas = (deudasPrevias || []).filter(d =>
    d.cobroEstado === 'pendiente' && d.id !== venta.id
  );

  if (deudasActivas.length > 0) {
    const totalDeudaAnterior = deudasActivas.reduce((s,d) => s + saldoVenta(d), 0);
    const montoPendienteHoy = tienePartePendiente ? montoPendiente : 0;
    const totalConsolidado = totalDeudaAnterior + montoPendienteHoy;

    mensaje += `\n\n─────────────────────\n📊 *RESUMEN DE CUENTA*\n\n`;

    // Desglose de deudas anteriores
    mensaje += `*Deudas anteriores:*\n`;
    deudasActivas.forEach(d => {
      const fechaD = new Date(d.creadoEn || d.fecha).toLocaleDateString('es-CL', { day:'numeric', month:'long' });
      const montoD = saldoVenta(d);
      // Descripción de productos de esa venta anterior
      const detD = (d.items||[]).map(it => {
        const cj = it.cajas > 0 ? `${it.cajas}cj` : '';
        const bd = it.bandejas > 0 ? `${it.bandejas}bd` : '';
        return [cj,bd].filter(Boolean).join('+') + ` ${it.calibre}`;
      }).join(', ');
      const compD = d.fechaCompromiso
        ? ` · vence ${new Date(d.fechaCompromiso+'T12:00:00').toLocaleDateString('es-CL',{day:'numeric',month:'short'})}`
        : '';
      mensaje += `• ${fechaD}: ${fmt$(montoD)} (${detD}${compD})\n`;
    });

    mensaje += `\n*Saldo pendiente anterior:* ${fmt$(totalDeudaAnterior)}\n`;

    if (montoPendienteHoy > 0) {
      mensaje += `*Pendiente pedido de hoy:* ${fmt$(montoPendienteHoy)}\n`;
      mensaje += `\n💳 *Total consolidado: ${fmt$(totalConsolidado)}*`;
    } else {
      mensaje += `\n💳 *Total deuda pendiente: ${fmt$(totalDeudaAnterior)}*`;
    }
  }

  mensaje += `\n\nFue un gusto atenderle. Ante cualquier consulta, estamos siempre disponibles para usted. 📲\n\n¡Gracias por preferirnos! 🙏🥚`;
  return mensaje;
}

// Mensaje de estado de cuenta para WhatsApp
function mensajeEstadoCuentaWA(cliente, ventasPendientes) {
  const total = ventasPendientes.reduce((s,v) => s + saldoVenta(v), 0);
  const hayVencidas = ventasPendientes.some(v => getDeudaEstado(v.fechaCompromiso).tipo === 'vencida');
  const venceHoy = ventasPendientes.some(v => getDeudaEstado(v.fechaCompromiso).tipo === 'venceHoy');

  let intro;
  if (hayVencidas) {
    intro = `Hola ${cliente.contacto || cliente.razonSocial}, esperamos que se encuentre muy bien 😊\n\nNos ponemos en contacto porque tenemos un pago pendiente que necesitamos regularizar juntos. Le compartimos el detalle:\n\n💰 *Deuda total: ${fmt$(total)}*\n${ventasPendientes.length} ${ventasPendientes.length===1?'pago pendiente':'pagos pendientes'}`;
  } else if (venceHoy) {
    intro = `Hola ${cliente.contacto || cliente.razonSocial}, le escribimos con mucho respeto para recordarle que hoy vence su compromiso de pago 🤝\n\nLe compartimos el detalle:\n\n💰 *Total a regularizar hoy: ${fmt$(total)}*\n${ventasPendientes.length} ${ventasPendientes.length===1?'pago pendiente':'pagos pendientes'}`;
  } else {
    intro = `Hola ${cliente.contacto || cliente.razonSocial}, esperamos que todo vaya muy bien 😊\n\nLe compartimos su estado de cuenta para que lo tenga presente:\n\n💰 *Deuda actual: ${fmt$(total)}*\n${ventasPendientes.length} ${ventasPendientes.length===1?'pago pendiente':'pagos pendientes'}`;
  }

  let mensaje = `🥚 *INTEGRAL SUR · Distribuidora*\n\n${intro}\n\n`;

  ventasPendientes.sort((a,b) => (a.fechaCompromiso||'').localeCompare(b.fechaCompromiso||'')).forEach((v, i) => {
    const fechaV = new Date(v.creadoEn).toLocaleDateString('es-CL', { day:'numeric', month:'short' });
    const fechaC = v.fechaCompromiso ? new Date(v.fechaCompromiso + 'T12:00:00').toLocaleDateString('es-CL', { day:'numeric', month:'short' }) : 'sin fecha';
    const est = getDeudaEstado(v.fechaCompromiso);
    const icono = est.tipo === 'vencida' ? '🚨' : est.tipo === 'venceHoy' ? '⏰' : '📅';
    const estTxt = est.tipo === 'vencida' ? ` (VENCIDA hace ${Math.abs(est.dias)}d)` :
                   est.tipo === 'venceHoy' ? ` (vence HOY)` :
                   est.tipo === 'porVencer' ? ` (vence en ${est.dias}d)` : '';
    mensaje += `${icono} Venta ${fechaV} · ${v.tipoDoc==='factura'?'Factura':'Boleta'}${estTxt}\nMonto: *${fmt$(v.totalBruto)}*\nCompromiso: ${fechaC}\n\n`;
  });

  if (hayVencidas || venceHoy) {
    mensaje += `🙏 Le pedimos regularizar su pago a la brevedad. Si necesita coordinar, con gusto conversamos.\n\n¡Muchas gracias por su confianza y preferencia! Valoramos mucho su apoyo 🙏🥚`;
  } else {
    mensaje += `Quedamos atentos ante cualquier consulta.\n\n¡Gracias por su preferencia y confianza en nosotros! 🙏🥚`;
  }
  return mensaje;
}

// Abre WhatsApp con mensaje listo
function abrirWhatsApp(telefono, mensaje) {
  const tel = cleanPhoneForWA(telefono);
  if (!tel) return false;
  const url = `https://wa.me/${tel}?text=${encodeURIComponent(mensaje)}`;
  window.open(url, '_blank');
  return true;
}

// Genera PDF tipo ticket (80mm) o A5 para imprimir o compartir
// Compatible con impresoras térmicas Bluetooth o láser/inkjet

function imprimirComprobante(venta, cliente, opciones) {
  opciones = opciones || {};
  if (!window.jspdf || !window.jspdf.jsPDF) {
    alert('Librería de PDF no cargada todavía. Intenta de nuevo en unos segundos.');
    return false;
  }
  try {
    const { jsPDF } = window.jspdf;
    // Tamaño: 80mm de ancho (ticket térmico) por largo dinámico
    // Aproximadamente 80mm x 200mm para ticket promedio
    const anchoMM = 80;
    const altoMM = 200;
    const doc = new jsPDF({
      orientation: 'portrait',
      unit: 'mm',
      format: [anchoMM, altoMM],
    });

    const ancho = anchoMM;
    const margen = 4;
    let y = 6;

    // Función helper
    const center = (text, fontSize, bold) => {
      doc.setFontSize(fontSize || 9);
      doc.setFont('helvetica', bold ? 'bold' : 'normal');
      doc.text(String(text), ancho/2, y, { align: 'center' });
      y += (fontSize || 9) * 0.42;
    };
    const left = (text, fontSize, bold) => {
      doc.setFontSize(fontSize || 9);
      doc.setFont('helvetica', bold ? 'bold' : 'normal');
      doc.text(String(text), margen, y);
    };
    const right = (text, fontSize, bold) => {
      doc.setFontSize(fontSize || 9);
      doc.setFont('helvetica', bold ? 'bold' : 'normal');
      doc.text(String(text), ancho - margen, y, { align: 'right' });
    };
    const linea = (text, valor, bold) => {
      doc.setFontSize(9);
      doc.setFont('helvetica', bold ? 'bold' : 'normal');
      doc.text(text, margen, y);
      doc.text(String(valor), ancho - margen, y, { align: 'right' });
      y += 4;
    };
    const sep = () => {
      doc.setLineDashPattern([1, 1], 0);
      doc.line(margen, y, ancho - margen, y);
      doc.setLineDashPattern([], 0);
      y += 3;
    };

    // Header
    center('INTEGRAL SUR', 12, true);
    center('Distribuidora', 8);
    center('Comprobante de venta', 7);
    y += 2;
    sep();

    // Tipo de doc
    const tipoDoc = venta.tipoDoc === 'factura' ? 'FACTURA' : 'BOLETA';
    center(tipoDoc, 10, true);
    const fechaV = new Date(venta.creadoEn || venta.fecha).toLocaleString('es-CL', {
      day: '2-digit', month: '2-digit', year: 'numeric',
      hour: '2-digit', minute: '2-digit',
    });
    center(fechaV, 8);
    y += 2;
    sep();

    // Datos del cliente
    if (cliente) {
      left('Cliente:', 8, true); y += 3.5;
      left(cliente.razonSocial || '', 9); y += 4;
      if (cliente.rut) { left(`RUT: ${cliente.rut}`, 8); y += 3.5; }
      if (cliente.contacto) { left(`Contacto: ${cliente.contacto}`, 8); y += 3.5; }
      if (cliente.direccion) { left(`Dir: ${cliente.direccion.substring(0,40)}`, 8); y += 3.5; }
    }
    y += 1;
    sep();

    // Items
    left('DETALLE', 8, true); y += 4;
    doc.setFontSize(8);
    doc.setFont('helvetica', 'normal');
    (venta.items || []).forEach(item => {
      // Línea 1: descripción
      const partes = [];
      if (item.cajas > 0) partes.push(`${item.cajas} ${item.cajas===1?'caja':'cajas'}`);
      if (item.bandejas > 0) partes.push(`${item.bandejas} ${item.bandejas===1?'bandeja':'bandejas'}`);
      const desc = `${partes.join(' + ')} ${item.calibre}`;
      doc.text(desc, margen, y);
      // Línea 2: unidades y subtotal
      y += 3.5;
      const u = (item.cajas||0)*180 + (item.bandejas||0)*30;
      const sub = item.totalBruto || (u * (item.ventaBrutoUnit || 0));
      doc.text(`${u}u`, margen + 4, y);
      doc.text(fmt$(sub), ancho - margen, y, { align: 'right' });
      y += 4;
      if (item.mermas > 0) {
        doc.setFont('helvetica', 'italic');
        doc.text(`(${item.mermas} mermas: -${fmt$((item.mermas * (item.ventaBrutoUnit || 0)))})`, margen + 4, y);
        doc.setFont('helvetica', 'normal');
        y += 3.5;
      }
    });
    y += 1;
    sep();

    // Totales
    const neto = venta.totalNeto || (venta.totalBruto / (1 + IVA_RATE));
    const iva = venta.totalBruto - neto;
    if (venta.tipoDoc === 'factura') {
      linea('Subtotal neto:', fmt$(neto));
      linea('IVA 19%:', fmt$(iva));
    }
    y += 1;
    doc.setLineWidth(0.5);
    doc.line(margen, y, ancho - margen, y);
    y += 4;
    linea('TOTAL:', fmt$(venta.totalBruto), true);
    doc.setLineWidth(0.2);
    y += 2;
    sep();

    // Forma de pago
    const formaPagoLabel = venta.formaPago === 'efectivo' ? 'EFECTIVO' :
                          venta.formaPago === 'transferencia' ? 'TRANSFERENCIA' :
                          'PENDIENTE / CRÉDITO';
    left('Forma de pago:', 8, true); y += 3.5;
    left(formaPagoLabel, 9); y += 4;
    if (venta.formaPago === 'pendiente' && venta.fechaCompromiso) {
      const fc = new Date(venta.fechaCompromiso + 'T12:00:00').toLocaleDateString('es-CL');
      left(`Compromiso: ${fc}`, 8); y += 4;
    }
    y += 1;
    sep();

    // Footer
    y += 1;
    center('¡Gracias por su compra!', 8, true);
    y += 1;
    center('Integral Sur — Distribuidora', 7);
    center('integral-sur.pages.dev', 7);
    y += 3;

    // Guardar PDF
    const cli = cliente ? (cliente.razonSocial || 'cliente').substring(0,20).replace(/[^a-zA-Z0-9]/g,'_') : 'cliente';
    const fechaArchivo = new Date(venta.creadoEn || venta.fecha).toISOString().slice(0,10);
    const filename = `Comprobante_${cli}_${fechaArchivo}.pdf`;
    doc.save(filename);
    return true;
  } catch(e) {
    console.error('Error imprimiendo:', e);
    alert('Error al generar comprobante: ' + e.message);
    return false;
  }
}

function cleanRut(rut) { return (rut||'').replace(/[^0-9kK]/g,'').toUpperCase(); }
function formatRut(rut) {
  const c = cleanRut(rut);
  if (c.length < 2) return c;
  return `${c.slice(0,-1).replace(/\B(?=(\d{3})+(?!\d))/g, '.')}-${c.slice(-1)}`;
}
function isValidRut(rut) {
  const c = cleanRut(rut);
  if (c.length < 8 || c.length > 9) return false;
  const num = c.slice(0,-1), dv = c.slice(-1);
  let suma = 0, mult = 2;
  for (let i = num.length - 1; i >= 0; i--) { suma += parseInt(num[i]) * mult; mult = mult === 7 ? 2 : mult + 1; }
  const resto = 11 - (suma % 11);
  const dvCalc = resto === 11 ? '0' : resto === 10 ? 'K' : String(resto);
  return dv === dvCalc;
}
function cleanPhone(phone) { return (phone||'').replace(/[^0-9]/g,''); }
function formatPhone(phone) {
  // Limpiar todo excepto dígitos
  let d = (phone||'').replace(/[^0-9]/g, '');
  // Quitar prefijo 569 o 56 al inicio para normalizar
  if (d.startsWith('569')) d = d.slice(3);
  else if (d.startsWith('56')) d = d.slice(2);
  // Limitar a 8 dígitos (número celular chileno sin prefijo)
  d = d.slice(0, 8);
  return d ? `+569${d}` : '';
}
function isValidPhone(phone) {
  const d = cleanPhone(phone);
  if (d.startsWith('569')) return d.length === 11;
  if (d.startsWith('56')) return d.length === 10;
  return d.length === 8;
}

// Calcula cómo distribuir el monto de una venta entre efectivo, transferencia confirmada
// y "por cobrar" (transferencia no confirmada + crédito pendiente).
// Devuelve: { efectivo, transferencia, porCobrar }

// Detecta si una venta es de transferencia y aún no fue confirmada (sin comprobante o sin marca)
// Aplica también para ventas antiguas que quedaron como "cobrado" sin verificar comprobante
// Una venta es ACTIVA si:
// - No está rechazada (descuento rechazado por admin)
// - No está pendiente de aprobación de descuento
// Ventas pendientes/rechazadas NO suman a totales ni descuentan stock
function ventaActiva(v) {
  if (!v) return false;
  if (v.requiereAprobacion && v.aprobacionEstado === 'pendiente') return false;
  if (v.requiereAprobacion && v.aprobacionEstado === 'rechazada') return false;
  return true;
}

// Genera el mensaje de comprobante de compra para enviar al cliente por WhatsApp
// Incluye: productos comprados, precios, descuentos aplicados por unidad y total ahorrado.
function generarMensajeCompra(venta, cliente) {
  const fechaTxt = new Date(venta.creadoEn || Date.now()).toLocaleDateString('es-CL', {day:'numeric', month:'long', year:'numeric'});
  const horaTxt = new Date(venta.creadoEn || Date.now()).toLocaleTimeString('es-CL', {hour:'2-digit', minute:'2-digit'});
  const descPorCal = venta.descuentosPorCalibre || {};
  const tieneDesc = Object.values(descPorCal).some(v => v > 0);

  let msg = `🥚 *INTEGRAL SUR · COMPROBANTE*\n\n`;
  msg += `Hola ${cliente?.contacto || cliente?.razonSocial || ''} 👋\n\n`;
  msg += `Gracias por tu compra del ${fechaTxt} a las ${horaTxt}:\n\n`;
  msg += `*📦 Detalle de productos:*\n`;

  let totalAhorrado = 0;
  (venta.items || []).forEach(item => {
    const desc = descPorCal[item.calibre] || 0;
    const cantTxt = [];
    if (item.cajas > 0) cantTxt.push(`${item.cajas} ${item.cajas===1?'caja':'cajas'}`);
    if (item.bandejas > 0) cantTxt.push(`${item.bandejas} ${item.bandejas===1?'bandeja':'bandejas'}`);
    const cant = cantTxt.join(' y ');
    msg += `• ${cant} ${item.calibre} (${item.unidadesTotal || 0} unidades)\n`;
    if (desc > 0) {
      const ahorroItem = desc * (item.unidadesTotal || 0);
      totalAhorrado += ahorroItem;
      msg += `   💰 Descuento: $${desc}/unidad · Total ahorrado: ${fmt$(ahorroItem)}\n`;
    }
  });

  msg += `\n`;
  if (tieneDesc) {
    msg += `🎁 *Total ahorrado en esta compra: ${fmt$(totalAhorrado)}*\n\n`;
  }
  msg += `💵 *Total a pagar: ${fmt$(venta.totalBruto || 0)}*\n`;
  msg += `📄 Documento: ${venta.tipoDoc === 'factura' ? 'Factura' : 'Boleta'}\n`;
  msg += `💳 Forma de pago: ${
    venta.formaPago === 'efectivo' ? 'Efectivo' :
    venta.formaPago === 'transferencia' ? 'Transferencia' :
    venta.formaPago === 'pendiente' ? 'Por cobrar' :
    venta.formaPago === 'mixto' ? 'Mixto' : ''
  }\n`;

  if (venta.formaPago === 'mixto' && venta.montosMixto) {
    if ((venta.montosMixto.efectivo||0) > 0) msg += `   💵 Efectivo: ${fmt$(venta.montosMixto.efectivo)}\n`;
    if ((venta.montosMixto.transferencia||0) > 0) msg += `   🏦 Transferencia: ${fmt$(venta.montosMixto.transferencia)}\n`;
    if ((venta.montosMixto.pendiente||0) > 0) msg += `   ⏰ Por cobrar: ${fmt$(venta.montosMixto.pendiente)}\n`;
  }

  if (venta.fechaCompromiso) {
    msg += `📅 Compromiso de pago: ${venta.fechaCompromiso}\n`;
  }

  msg += `\n¡Gracias por tu preferencia! 🙌`;
  return msg;
}

function transferenciaPendienteConfirmar(v) {
  if (!v) return false;

  // Si tiene saldo pendiente real (abono parcial) → siempre mostrar
  // aunque tenga comprobante o esté "confirmada"
  const saldo = saldoVenta(v);
  if (saldo > 0 && v.cobroEstado !== 'cobrado') {
    // Solo mostrar en transferencias, no en créditos puros
    if (v.formaPago === 'transferencia' || v.formaPago === 'mixto' ||
        (v.formaPago === 'pendiente' && (v.totalAbonado||0) > 0)) {
      return true;
    }
  }

  // Si está completamente cobrado → fuera
  if (v.cobroEstado === 'cobrado') return false;

  // Estado explícito pendiente de transferencia
  if (v.cobroEstado === 'pendiente_transferencia') return true;

  // Transferencia sin confirmar (sin comprobante y sin confirmación)
  if (v.formaPago === 'transferencia' && !v.transferenciaConfirmada && !v.transferenciaComprobante) return true;

  // Mixto con parte transferencia sin confirmar
  if (v.formaPago === 'mixto' && (v.montosMixto?.transferencia||0) > 0 &&
      !v.transferenciaConfirmada && !v.transferenciaComprobante) return true;

  return false;
}

function desgloseVenta(v) {
  const out = { efectivo: 0, transferencia: 0, porCobrar: 0 };
  if (!v) return out;
  const total = v.totalBruto || 0;

  // CASO ESPECIAL: venta originalmente "pendiente" que ya fue cobrada (cobroEstado=cobrado)
  // y se registró cómo se cobró realmente (cobroFormaReal)
  if (v.formaPago === 'pendiente' && v.cobroEstado === 'cobrado' && v.cobroFormaReal) {
    if (v.cobroFormaReal === 'efectivo') {
      out.efectivo += (v.montoCobradoEfectivo != null ? v.montoCobradoEfectivo : total);
    } else if (v.cobroFormaReal === 'transferencia') {
      out.transferencia += (v.montoCobradoTransferencia != null ? v.montoCobradoTransferencia : total);
    } else if (v.cobroFormaReal === 'mixto') {
      out.efectivo += (v.montoCobradoEfectivo || 0);
      out.transferencia += (v.montoCobradoTransferencia || 0);
    }
    return out;
  }

  // Una transferencia se cuenta como RECIBIDA solo si:
  // - Está marcada explícitamente como confirmada, O
  // - Tiene comprobante adjunto (foto)
  // Si solo tiene cobroEstado=cobrado pero ni confirmación ni foto → es ANTIGUA sin verificar → cuenta como POR COBRAR
  const transfRecibida = v.transferenciaConfirmada === true || !!v.transferenciaComprobante;

  if (v.formaPago === 'mixto' && v.montosMixto) {
    out.efectivo += v.montosMixto.efectivo || 0;
    const partTransf = v.montosMixto.transferencia || 0;
    if (partTransf > 0) {
      if (transfRecibida) out.transferencia += partTransf;
      else out.porCobrar += partTransf;
    }
    out.porCobrar += v.montosMixto.pendiente || 0;
  } else if (v.formaPago === 'efectivo') {
    out.efectivo += total;
  } else if (v.formaPago === 'transferencia') {
    if (transfRecibida) out.transferencia += total;
    else out.porCobrar += total;
  } else if (v.formaPago === 'pendiente') {
    out.porCobrar += total;
  }
  return out;
}

// Reproducir sonido de notificación (beep)
function reproducirSonidoNotif(prioridad) {
  try {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return;

    // Reutilizar el contexto global para evitar bloqueos en móviles
    if (!window._notifAudioCtx) {
      window._notifAudioCtx = new AC();
    }
    const ctx = window._notifAudioCtx;

    // Si el contexto está suspendido (Chrome móvil), intentar reanudar
    if (ctx.state === 'suspended') {
      ctx.resume().catch(()=>{});
    }

    const freqs = prioridad === 'urgente' ? [880, 1100, 880] : [660, 880];
    let t = ctx.currentTime;
    freqs.forEach((f) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = f;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.25, t + 0.02);
      gain.gain.linearRampToValueAtTime(0, t + 0.18);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(t);
      osc.stop(t + 0.2);
      t += 0.25;
    });

    // Vibrar
    if (navigator.vibrate) {
      navigator.vibrate(prioridad === 'urgente' ? [200, 80, 200, 80, 200] : [120, 60, 120]);
    }
  } catch(e) {
    console.warn('Sonido no disponible:', e);
  }
}

// Activar audio (debe llamarse después de una interacción del usuario)
function activarAudioNotif() {
  try {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return false;
    if (!window._notifAudioCtx) {
      window._notifAudioCtx = new AC();
    }
    if (window._notifAudioCtx.state === 'suspended') {
      window._notifAudioCtx.resume().catch(()=>{});
    }
    // Sonido silencioso para confirmar que el audio funciona
    const osc = window._notifAudioCtx.createOscillator();
    const gain = window._notifAudioCtx.createGain();
    gain.gain.value = 0.001;
    osc.connect(gain);
    gain.connect(window._notifAudioCtx.destination);
    osc.start();
    osc.stop(window._notifAudioCtx.currentTime + 0.01);
    return true;
  } catch(e) { return false; }
}

// Solicitar permiso para notificaciones del navegador
async function solicitarPermisoNotif() {
  if (!('Notification' in window)) return false;
  if (Notification.permission === 'granted') return true;
  if (Notification.permission === 'denied') return false;
  try {
    const p = await Notification.requestPermission();
    return p === 'granted';
  } catch(e) { return false; }
}

// Mostrar notificación del navegador (si tiene permiso)
function mostrarNotifNativa(titulo, mensaje, opts) {
  try {
    if (!('Notification' in window)) return;
    if (Notification.permission !== 'granted') return;
    opts = opts || {};

    // Usar Service Worker si está activo (funciona en background)
    if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
      navigator.serviceWorker.controller.postMessage({
        type: 'SHOW_NOTIFICATION',
        title: titulo,
        body: mensaje,
        tag: opts.tag || 'integral-sur',
        prioridad: opts.prioridad || 'normal',
      });
      return;
    }

    // Fallback: notificación directa (solo cuando la pestaña está abierta)
    const n = new Notification(titulo, {
      body: mensaje,
      icon: '/favicon.ico',
      badge: '/favicon.ico',
      tag: opts.tag || 'integral-sur',
      requireInteraction: opts.prioridad === 'urgente',
      vibrate: [200, 100, 200],
    });
    setTimeout(() => n.close(), 8000);
  } catch(e) {}
}

// Retorna el saldo real pendiente de una venta considerando abonos
function saldoVenta(v) {
  if (v.saldoPendiente !== undefined && v.saldoPendiente !== null) return v.saldoPendiente;
  if (v.totalAbonado > 0) return Math.max(0, (v.totalBruto||0) - (v.totalAbonado||0));
  if (v.formaPago === 'mixto' && v.montosMixto?.pendiente > 0) return v.montosMixto.pendiente;
  return v.totalBruto || 0;
}

function getDeudaEstado(fechaCompromiso) {
  if (!fechaCompromiso) return { tipo: 'sinFecha', color: 'var(--ink-soft)', bgColor: 'var(--bg-2)', mensaje: '(sin fecha)', icono: '📅' };
  const hoy = todayStr();
  const dias = Math.floor((new Date(fechaCompromiso) - new Date(hoy)) / 86400000);
  if (dias < 0) {
    return {
      tipo: 'vencida',
      color: 'var(--bad)',
      bgColor: 'var(--bad-bg)',
      mensaje: `🚨 Vencido el ${fechaCompromiso} (hace ${-dias}${-dias===1?' día':' días'})`,
      icono: '🚨',
      dias
    };
  }
  if (dias === 0) {
    return {
      tipo: 'venceHoy',
      color: '#c2410c',
      bgColor: '#ffedd5',
      mensaje: `⏰ VENCE HOY · cobrar urgente`,
      icono: '⏰',
      dias
    };
  }
  if (dias <= 3) {
    return {
      tipo: 'porVencer',
      color: 'var(--warn)',
      bgColor: 'var(--warn-bg)',
      mensaje: `⏰ Vence en ${dias} ${dias===1?'día':'días'} (${fechaCompromiso})`,
      icono: '⏰',
      dias
    };
  }
  return {
    tipo: 'alDia',
    color: 'var(--good)',
    bgColor: 'var(--good-bg)',
    mensaje: `📅 Compromiso: ${fechaCompromiso} (en ${dias} días)`,
    icono: '📅',
    dias
  };
}

function unitsBreakdown(u) {
  u = u || 0;
  const cajasInt = Math.floor(u / 180);
  const sueltasInt = u % 180;
  // Bandejas = equivalente total en bandejas de 30u
  const bandejasEquiv = Math.floor(u / 30);
  return { cajasInt, bandejasInt: bandejasEquiv, sueltasInt };
}

// Calcula precio por formato para un calibre dado, según la fecha
// Redondea un precio según el modo configurado
// modos: 'ninguno' | 'entero' | 'abajo' | 'arriba' | 'multiplo5' | 'multiplo10'
function aplicarRedondeo(valor, modo) {
  if (!modo || modo === 'ninguno') return valor;
  if (modo === 'entero') return Math.round(valor);
  if (modo === 'abajo') return Math.floor(valor);
  if (modo === 'arriba') return Math.ceil(valor);
  if (modo === 'multiplo5') return Math.round(valor / 5) * 5;
  if (modo === 'multiplo10') return Math.round(valor / 10) * 10;
  return valor;
}

// modoRedondeo se obtiene de config global (Firebase: config/redondeo)
let _modoRedondeo = 'ninguno';
function setModoRedondeoGlobal(modo) { _modoRedondeo = modo || 'ninguno'; }

function computePrice(precios, fecha, calibre, formato, tipoDoc='boleta') {
  const fechas = Object.keys(precios || {}).filter(f => f <= fecha).sort();
  if (fechas.length === 0) return null;
  const p = precios[fechas[fechas.length-1]];
  if (!p || !p[calibre] || !p[calibre][formato]) return null;
  const config = p[calibre][formato];
  const unidadesPorFmt = FORMATOS[formato].unidades;

  // MODO 1: precio de venta directo por unidad (campo precioVenta)
  // El admin lo ingresa directamente: $195/u, $205/u, $220/u
  // Es el modo nuevo y correcto — sin derivaciones de float
  if (config.precioVenta && config.precioVenta > 0) {
    const brutoUnit = config.precioVenta;
    // Aplicar redondeo al total por formato completo
    const totalBrutoBase = brutoUnit * unidadesPorFmt;
    const totalBruto = aplicarRedondeo(totalBrutoBase, _modoRedondeo);
    // Recalcular precio exacto por unidad desde total redondeado
    const brutoUnitFinal = totalBruto / unidadesPorFmt;
    const netoUnitFinal  = brutoUnitFinal / (1 + IVA_RATE);
    const totalNeto = netoUnitFinal * unidadesPorFmt;
    const iva = totalBruto - totalNeto;
    const displayPrice = tipoDoc === 'factura' ? totalNeto : totalBruto;
    return {
      neto: totalNeto,
      iva,
      total: totalBruto,
      displayPrice,
      costoNetoUnit: config.costoNeto || 0,
      ventaNetoUnit: netoUnitFinal,
      ventaBrutoUnit: brutoUnitFinal,
    };
  }

  // MODO 2: legacy — costo bruto + margen neto (para compatibilidad con precios ya guardados)
  const costoBrutoUnit = config.costo || config.costoBruto || 0;
  const margenUnit     = config.margen || 0;
  if (costoBrutoUnit === 0 && margenUnit === 0) return null;

  const costoNetoUnit   = costoBrutoUnit / (1 + IVA_RATE);
  const ventaNetoUnit   = costoNetoUnit + margenUnit;
  const ventaBrutoUnitBase = ventaNetoUnit * (1 + IVA_RATE);
  // Redondear el TOTAL por formato completo
  const totalBrutoBase  = ventaBrutoUnitBase * unidadesPorFmt;
  const totalBruto      = aplicarRedondeo(totalBrutoBase, _modoRedondeo);
  // Precio exacto por unidad derivado del total redondeado
  const brutoUnitFinal  = totalBruto / unidadesPorFmt;
  const netoUnitFinal   = brutoUnitFinal / (1 + IVA_RATE);
  const totalNeto = netoUnitFinal * unidadesPorFmt;
  const iva = totalBruto - totalNeto;
  const displayPrice = tipoDoc === 'factura' ? totalNeto : totalBruto;
  return {
    neto: totalNeto,
    iva,
    total: totalBruto,
    displayPrice,
    costoNetoUnit,
    ventaNetoUnit: netoUnitFinal,
    ventaBrutoUnit: brutoUnitFinal,
  };
}

// Verifica si existen precios cargados para una fecha específica
// IMPORTANTE: tienePreciosHoy = true SOLO si hay precios configurados Y APROBADOS para hoy
// Los precios se aprueban con un campo _aprobado = true o por presencia explícita
function verificarPreciosDia(precios, fecha) {
  if (precios === undefined || precios === null) {
    return { tienePrecios: false, tienePreciosHoy: false, preciosAprobadosHoy: false, cargando: true, hayHistoricos: false, calibresConPrecio: [], calibresSinPrecio: CALIBRES, fechaUsada: null, esDeHoy: false };
  }

  // Helper: ¿tiene precio configurado? Soporta formato nuevo (precioVenta) y legacy (costo+margen)
  const tienePrecioCfg = (cfg) => {
    if (!cfg) return false;
    if (cfg.precioVenta > 0) return true;           // formato nuevo
    if (cfg.costo > 0 || cfg.margen > 0) return true; // formato legacy
    return false;
  };

  const preciosHoy = precios[fecha];
  let calibresConPrecioHoy = [];
  let calibresSinPrecioHoy = [];
  if (preciosHoy) {
    CALIBRES.forEach(c => {
      const caja    = preciosHoy[c]?.caja;
      const bandeja = preciosHoy[c]?.bandeja;
      if (tienePrecioCfg(caja) || tienePrecioCfg(bandeja)) calibresConPrecioHoy.push(c);
      else calibresSinPrecioHoy.push(c);
    });
  } else {
    calibresSinPrecioHoy = CALIBRES;
  }
  const tienePreciosHoy = calibresConPrecioHoy.length > 0;
  const preciosAprobadosHoy = tienePreciosHoy && preciosHoy && preciosHoy._aprobado === true;

  const fechas = Object.keys(precios).filter(f => f <= fecha && f !== fecha).sort();
  const fechaUsada = fechas.length > 0 ? fechas[fechas.length-1] : null;
  const hayHistoricos = fechaUsada !== null;

  let calibresConPrecio = [];
  const fechaParaUsar = preciosAprobadosHoy ? fecha : fechaUsada;
  if (fechaParaUsar && precios[fechaParaUsar]) {
    const p = precios[fechaParaUsar];
    CALIBRES.forEach(c => {
      const caja    = p[c]?.caja;
      const bandeja = p[c]?.bandeja;
      if (tienePrecioCfg(caja) || tienePrecioCfg(bandeja)) calibresConPrecio.push(c);
    });
  }

  return {
    tienePrecios: calibresConPrecio.length > 0,
    tienePreciosHoy,
    preciosAprobadosHoy,
    cargando: false,
    hayHistoricos,
    calibresConPrecio,
    calibresSinPrecio: CALIBRES.filter(c => !calibresConPrecio.includes(c)),
    fechaUsada: preciosAprobadosHoy ? fecha : fechaUsada,
    fechaAnterior: fechaUsada,
    esDeHoy: preciosAprobadosHoy,
  };
}

function useToasts() {
  const [toasts, setToasts] = useState([]);
  const toast = useCallback((msg, type='info') => {
    const id = uid();
    setToasts(t => [...t, { id, msg, type }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3000);

  const ToastArea = () => (
    <div className="toast-area">{toasts.map(t => <div key={t.id} className={`toast ${t.type}`}>{t.msg}</div>)}</div>
  );
  return { toast, ToastArea };
}

// ============================================================
// STORE GLOBAL — UNA SOLA conexión Firebase por path
// 80 hooks → 12 conexiones únicas. Todos comparten los mismos datos.
// ============================================================
const _store = {
  data: {},     // path → valor actual
  ready: {},    // path → bool (ya recibió primer dato)
  subs: {},     // path → Set<callback>
  conn: {},     // path → unsubscribe fn
};

function _connect(path) {
  if (_store.conn[path] || !window.firebase || !path) return;
  if (!_store.subs[path]) _store.subs[path] = new Set();
  const { db, ref, onValue } = window.firebase;
  const unsub = onValue(ref(db, path), snap => {
    const val = snap.val();
    _store.data[path] = val;
    _store.ready[path] = true;
    _store.subs[path].forEach(fn => fn(val));
  }, err => {
    console.error('FB:', path, err);
    _store.ready[path] = true;
    _store.subs[path].forEach(fn => fn(null));
  });
  _store.conn[path] = unsub;
}

function useFirebaseValue(path, enabled = true) {
  const [data, setData] = useState(() =>
    (enabled && path && _store.ready[path]) ? _store.data[path] : null
  );
  const [loading, setLoading] = useState(() =>
    !(enabled && path && _store.ready[path])
  );

  useEffect(() => {
    if (!enabled || !path) { setLoading(false); return; }
    // Conectar si no hay listener activo
    _connect(path);
    // Si ya hay datos, usarlos inmediatamente
    if (_store.ready[path]) {
      setData(_store.data[path]);
      setLoading(false);
    }
    // Suscribirse a cambios futuros
    const cb = (val) => { setData(val); setLoading(false); };
    if (!_store.subs[path]) _store.subs[path] = new Set();
    _store.subs[path].add(cb);
    return () => { _store.subs[path]?.delete(cb); };
  }, [path, enabled]);

  return { data, loading };
}

function useFirebaseList(path, enabled = true) {
  const { data, loading } = useFirebaseValue(path, enabled);
  return {
    data: data || {},
    loading,
    list: data ? Object.entries(data).map(([id, v]) => ({ ...v, id })) : [],
  };
}

// Precarga: abre conexiones para todos los paths críticos al autenticar
// Así cuando los componentes los pidan, los datos ya están disponibles
function usePrecarga(user) {
  useEffect(() => {
    if (!user || !window.firebase) return;
    ['ventas','clientes','cargas','retornos','cierres','visitas',
     'precios','reservas','traspasos','stockBodega','compras','proveedores',
     'notificaciones'].forEach(_connect);
  }, [user?.id]);
}

async function fbSet(path, value) { const { db, ref, set } = window.firebase; return set(ref(db, path), value); }
async function fbUpdate(path, value) { const { db, ref, dbUpdate } = window.firebase; return dbUpdate(ref(db, path), value); }
async function fbRemove(path) { const { db, ref, remove } = window.firebase; return remove(ref(db, path)); }
async function fbGet(path) { const { db, ref, get } = window.firebase; const snap = await get(ref(db, path)); return snap.val(); }

          </div>
          <div style={{display:'flex', flexDirection:'column', gap:4}}>
            {/* Llamar y WhatsApp disponibles para TODOS (admin y vendedor) si cliente ya está aprobado */}
            {(c.telefonoContacto || c.telefono) && !esPendiente && (
              <button className="btn sm" style={{background:'#0a84ff', color:'white', border:'none', fontSize:11, padding:'4px 8px'}}
                onClick={(e) => {
                  e.stopPropagation();
                  const tel = c.telefonoContacto || c.telefono;
                  const limpio = cleanPhoneForWA(tel);
                  window.location.href = 'tel:+' + limpio;
                }}>
                📞 Llamar
              </button>
            )}
            {(c.telefonoContacto || c.telefono) && !esPendiente && (
              <button className="btn sm" style={{background:'#25D366', color:'white', border:'none', fontSize:11, padding:'4px 8px'}}
                onClick={(e) => {
                  e.stopPropagation();
                  const tel = c.telefonoContacto || c.telefono;
                  window.open(`https://wa.me/${cleanPhoneForWA(tel)}`, '_blank');
                }}>
                📲 WhatsApp
              </button>
            )}
            {/* Editar/Eliminar: solo admin o el vendedor dueño en estado pendiente */}
            {(session.role === 'admin' || (c.creadoPor === session.id && c.status === 'pendiente')) && (
              <button className="btn ghost sm" onClick={()=>setModal(c)}>{esPendiente && session.role==='admin' ? '✅ Revisar' : 'Editar'}</button>
            )}
            {session.role === 'admin' && <button className="btn danger sm" onClick={()=>eliminar(c)}>Eliminar</button>}
          </div>
        </div>
      </div>
    );
  };
  return (
    <div className="pad">
      <h2 className="section-title">Clientes</h2>
      <div className="section-sub">{visibles.length} {visibles.length===1?'cliente':'clientes'}{(isAdmin && (filtroVendedor !== 'todos' || filtroDia !== 'todos')) && ' (filtrado)'}{busqueda && ' · buscando'}</div>

      <div style={{position:'relative', marginBottom:12}}>
        <input
          type="text"
          className="inp"
          placeholder="🔍 Buscar por nombre, RUT, contacto o teléfono..."
          value={busqueda}
          onChange={e=>setBusqueda(e.target.value)}
          style={{paddingRight: busqueda ? 40 : 14, marginBottom:0}}
        />
        {busqueda && (
          <button
            onClick={()=>setBusqueda('')}
            style={{position:'absolute', right:8, top:'50%', transform:'translateY(-50%)', background:'transparent', border:'none', fontSize:20, color:'var(--ink-mute)', cursor:'pointer', padding:'4px 8px'}}>
            ×
          </button>
        )}
      </div>

      <button className="btn accent full" onClick={()=>setModal({})} style={{marginBottom:14}}>➕ Nuevo cliente</button>

      {isAdmin && (
        <div className="card">
          <label className="fld">Vendedor</label>
          <div style={{display:'flex', gap:4, marginBottom:10}}>
            <button onClick={()=>setFiltroVendedor('todos')} className="btn sm" style={{flex:1, background: filtroVendedor==='todos'?'var(--ink)':'transparent', color: filtroVendedor==='todos'?'var(--ink-on)':'var(--ink-soft)', border:'1.5px solid var(--line)'}}>Todos</button>
            {VENDEDORES.map(v => (
              <button key={v.id} onClick={()=>setFiltroVendedor(v.id)} className="btn sm" style={{flex:1, background: filtroVendedor===v.id?'var(--ink)':'transparent', color: filtroVendedor===v.id?'var(--ink-on)':'var(--ink-soft)', border:'1.5px solid var(--line)'}}>{v.name}</button>
            ))}
          </div>
          <label className="fld">Día de visita</label>
          <div style={{display:'flex', gap:3, flexWrap:'wrap'}}>
            <button onClick={()=>setFiltroDia('todos')} className="btn sm" style={{flex:'1 1 60px', background: filtroDia==='todos'?'var(--ink)':'transparent', color: filtroDia==='todos'?'var(--ink-on)':'var(--ink-soft)', border:'1.5px solid var(--line)'}}>Todos</button>
            {DIAS.slice(0, 6).map((d, i) => (
              <button key={i} onClick={()=>setFiltroDia(String(i))} className="btn sm" style={{flex:'1 1 40px', minWidth:40, background: filtroDia===String(i)?'var(--ink)':'transparent', color: filtroDia===String(i)?'var(--ink-on)':'var(--ink-soft)', border:'1.5px solid var(--line)'}}>{d}</button>
            ))}
          </div>
        </div>
      )}

      {pendientes.length > 0 && (
        <>
          <div style={{fontSize:11, fontWeight:700, color:'var(--warn)', textTransform:'uppercase', letterSpacing:1.4, marginBottom:8}}>⏳ Pendientes ({pendientes.length})</div>
          {pendientes.map(c => renderCliente(c, true))}
          <hr className="div"/>
        </>
      )}
      {aprobados.map(c => renderCliente(c, false))}
      {visibles.length === 0 && <div className="empty">Sin clientes en este filtro</div>}
      {modal && <ModalCliente session={session} cliente={modal.id?modal:null} onClose={()=>setModal(null)} onToast={onToast}/>}
    </div>
  );
}

function ModalCliente({ session, cliente, onClose, onToast }) {
  const isAdmin = session.role === 'admin';
  const eraPendiente = cliente && cliente.status === 'pendiente';

  // Normalizar comuna: si viene en mayúsculas (registros antiguos), buscar la coincidencia
  // en COMUNAS_RM para que el <select> muestre el valor correcto
  const normalizarComuna = (raw) => {
    if (!raw) return '';
    const match = COMUNAS_RM.find(c => c.toUpperCase() === raw.toUpperCase());
    return match || raw;
  };

  const [f, setF] = useState(cliente ? {
    ...cliente,
    comuna: normalizarComuna(cliente.comuna),
    formasPago: cliente.formasPago || { efectivo: true, transferencia: true, pendiente: false },
    diasVisita: cliente.diasVisita || [],
  } : {
    razonSocial: '', rut: '', direccion: '', comuna: '', telefono: '', contacto: '', telefonoContacto: '', correo: '', diasVisita: [],
    formasPago: isAdmin ? { efectivo: true, transferencia: true, pendiente: true } : { efectivo: true, transferencia: true, pendiente: false },
    vendedorId: isAdmin ? 'v1' : session.id,
  });
  const [saving, setSaving] = useState(false);

  const guardar = async () => {
    // Validaciones obligatorias para TODOS (admin y vendedor)
    if (!f.razonSocial.trim()) return onToast('Falta razón social','error');
    if (!isValidRut(f.rut)) return onToast('RUT inválido','error');
    if (!f.direccion.trim()) return onToast('Falta dirección','error');
    if (!f.comuna || !f.comuna.trim()) return onToast('Selecciona comuna','error');
    if (!isValidPhone(f.telefono)) return onToast('Teléfono inválido','error');
    if (!f.contacto.trim()) return onToast('Falta encargado','error');
    if (!isValidPhone(f.telefonoContacto)) return onToast('Tel encargado inválido','error');
    // diasVisita vacío = aparece todos los días (cliente sin día fijo)
    // No se valida como error

    setSaving(true);
    try {
      const datos = {
        razonSocial: f.razonSocial.trim().toUpperCase(),
        rut: f.rut,
        direccion: f.direccion.trim().toUpperCase(),
        comuna: (f.comuna||'').trim(),
        telefono: f.telefono,
        contacto: f.contacto.trim().toUpperCase(),
        telefonoContacto: f.telefonoContacto,
        correo: (f.correo||'').trim().toLowerCase(),
        diasVisita: f.diasVisita, formasPago: f.formasPago,
        vendedorId: f.vendedorId || session.id,
        status: isAdmin ? 'aprobado' : (cliente ? cliente.status : 'pendiente'),
        datosCompletos: true,
        camposFaltantes: [],
      };
      if (cliente) {
        if (eraPendiente && isAdmin) { datos.aprobadoEn = nowISO(); datos.aprobadoPor = session.id; }
        await fbUpdate(`clientes/${cliente.id}`, datos);
        await fbLog(session.id, eraPendiente && isAdmin ? 'approve' : 'update', 'clientes', { id: cliente.id, razonSocial: datos.razonSocial });
        onToast(eraPendiente && isAdmin ? '✅ Cliente aprobado' : 'Actualizado','success');
      } else {
        datos.creadoPor = session.id; datos.creadoEn = nowISO();
        const newId = uid();
        await fbSet(`clientes/${newId}`, datos);
        await fbLog(session.id, 'create', 'clientes', { id: newId, razonSocial: datos.razonSocial });
        // Notificar al admin si lo creó un vendedor
        if (!isAdmin) {
          await crearNotificacion(session, {
            tipo: 'cliente_pendiente',
            titulo: '👤 Nuevo cliente por aprobar',
            mensaje: `${session.name || 'Vendedor'} agregó "${datos.razonSocial}" · pendiente de aprobación`,
            link: 'clientes',
            clienteId: newId,
            prioridad: 'normal',
          });
        }
        onToast(isAdmin ? '✓ Cliente creado' : '✓ Cliente creado · pendiente de aprobación del admin','success');
      }
      onClose();
    } catch(e) { onToast('Error','error'); setSaving(false); }
  };
  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <h3>{cliente ? (eraPendiente && isAdmin ? '✅ Revisar cliente' : 'Editar cliente') : 'Nuevo cliente'}</h3>

        {!isAdmin && !cliente && (
          <div className="alert-banner info" style={{fontSize:11}}>
            <span className="ico">ℹ️</span>
            <div>Al crear el cliente, quedará <strong>pendiente</strong> hasta que el administrador lo apruebe. Igual podrás venderle de inmediato.</div>
          </div>
        )}

        <label className="fld">Razón social *</label>
        <input className="inp" value={f.razonSocial} onChange={e=>setF({...f,razonSocial:e.target.value})}/>
        <div className="row">
          <div><label className="fld">RUT *</label><input className="inp" value={f.rut} onChange={e=>setF({...f,rut:formatRut(e.target.value)})} placeholder="12.345.678-9"/></div>
          <div><label className="fld">Tel local *</label><input className="inp" type="tel" value={f.telefono} onChange={e=>setF({...f,telefono:formatPhone(e.target.value)})} placeholder="+569XXXXXXXX"/></div>
        </div>
        <label className="fld">Dirección *</label>
        <input className="inp" value={f.direccion} onChange={e=>setF({...f,direccion:e.target.value})}/>
        <label className="fld">Comuna *</label>
        <select className="inp" value={f.comuna||''} onChange={e=>setF({...f,comuna:e.target.value})}>
          <option value="">-- Selecciona comuna --</option>
          {COMUNAS_RM.map(co => <option key={co} value={co}>{co}</option>)}
        </select>
        <hr className="div"/>
        <div className="row">
          <div><label className="fld">Encargado *</label><input className="inp" value={f.contacto} onChange={e=>setF({...f,contacto:e.target.value})}/></div>
          <div><label className="fld">Tel enc. *</label><input className="inp" type="tel" value={f.telefonoContacto} onChange={e=>setF({...f,telefonoContacto:formatPhone(e.target.value)})}/></div>
        </div>
        <label className="fld">Correo electrónico (opcional)</label>
        <input className="inp" type="email" placeholder="cliente@correo.cl" value={f.correo||''} onChange={e=>setF({...f,correo:e.target.value})}/>

        <hr className="div"/>

        {/* Días de visita: Lun-Sáb + opción "Todos los días" */}
        <label className="fld">Días de visita *</label>
        <div style={{display:'flex', gap:5, flexWrap:'wrap', marginBottom:6}}>
          {DIAS.slice(0,6).map((d,i) => (
            <button key={i}
              onClick={()=>setF(p => ({
                ...p,
                diasVisita: p.diasVisita.includes(i)
                  ? p.diasVisita.filter(x=>x!==i)
                  : [...p.diasVisita.filter(x=>x!==6), i]   // quitar domingo si había
              }))}
              className="btn sm"
              style={{flex:1, minWidth:40,
                background: f.diasVisita.includes(i) ? 'var(--ink)' : 'transparent',
                color: f.diasVisita.includes(i) ? 'var(--ink-on)' : 'var(--ink-soft)',
                border: '1.5px solid var(--line)'}}>
              {d}
            </button>
          ))}
        </div>
        {/* Opción "Todos los días" — asigna diasVisita vacío = aparece siempre */}
        <button
          onClick={()=>setF(p => ({...p, diasVisita: p.diasVisita.length === 0 ? [] : []}))}
          className="btn sm"
          style={{
            width:'100%', marginBottom:8,
            background: f.diasVisita.length === 0 ? 'var(--accent)' : 'transparent',
            color: f.diasVisita.length === 0 ? 'var(--accent-on)' : 'var(--ink-soft)',
            border: '1.5px solid var(--accent)',
            fontWeight: f.diasVisita.length === 0 ? 700 : 400,
          }}>
          🗓️ Todos los días (sin día fijo)
        </button>
        {f.diasVisita.length === 0 && (
          <div style={{fontSize:11, color:'var(--accent)', marginBottom:8, fontStyle:'italic'}}>
            Este cliente aparecerá en la vista "Todos" de todos los vendedores.
          </div>
        )}

        {/* Formas de pago: vendedor puede sugerir, admin confirma */}
        <label className="fld">Formas de pago sugeridas{!isAdmin && <span style={{fontSize:10, color:'var(--ink-mute)', marginLeft:6}}>(admin las aprueba)</span>}</label>
        <div style={{display:'flex', gap:5}}>
          {['efectivo','transferencia','pendiente'].map(k => (
            <button key={k} onClick={()=>setF(p => ({...p, formasPago: {...p.formasPago, [k]: !p.formasPago[k]}}))} className="btn sm" style={{flex:1, background: f.formasPago[k] ? 'var(--ink)' : 'transparent', color: f.formasPago[k] ? 'var(--ink-on)' : 'var(--ink-soft)', border: '1.5px solid var(--line)'}}>
              {k==='efectivo'?'💵':k==='transferencia'?'🏦':'⏰'} {f.formasPago[k]?'✓':''}
            </button>
          ))}
        </div>

        {/* Solo admin asigna vendedor */}
        {isAdmin && (
          <>
            <hr className="div"/>
            <label className="fld">Vendedor *</label>
            <select className="inp" value={f.vendedorId} onChange={e=>setF({...f, vendedorId: e.target.value})}>
              {VENDEDORES.map(v => <option key={v.id} value={v.id}>{v.name}</option>)}
            </select>
          </>
        )}

        <div className="actions">
          <button className="btn ghost" onClick={onClose}>Cancelar</button>
          <button className="btn accent" onClick={guardar} disabled={saving}>{saving?'...':'Guardar'}</button>
        </div>
      </div>
    </div>
  );
}

function Proveedores({ onToast }) {
  const { list: proveedores, loading } = useFirebaseList('proveedores');
  const [modal, setModal] = useState(null);
  if (loading) return <div className="pad"><div className="empty">Cargando...</div></div>;
  return (
    <div className="pad">
      <h2 className="section-title">Proveedores</h2>
      <div className="section-sub">{proveedores.length} en total</div>
      <button className="btn accent full" onClick={()=>setModal({})} style={{marginBottom:14}}>➕ Nuevo proveedor</button>
      {proveedores.length === 0 ? <div className="empty">Sin proveedores</div> :
        proveedores.map(p => (
          <div key={p.id} className="card">
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', gap:8}}>
              <div style={{flex:1}}>
                <div style={{fontWeight:700, fontSize:15}}>{p.razonSocial}</div>
                <div style={{fontSize:12, color:'var(--ink-soft)', marginTop:4, lineHeight:1.6}}>
                  {p.rut && <><span>RUT: {p.rut}</span><br/></>}
                  {p.correo && <><span>✉️ {p.correo}</span><br/></>}
                  {(p.direccion || p.comuna) && (
                    <><span>📍 {[p.direccion, p.comuna].filter(Boolean).join(', ')}</span><br/></>
                  )}
                </div>
                {/* Encargados */}
                {(p.encargados?.length > 0 ? p.encargados : (p.contacto ? [{nombre:p.contacto, telefono:p.telefonoContacto}] : [])).map((enc, i) => (
                  <div key={i} style={{fontSize:11, color:'var(--ink-soft)', marginTop:3}}>
                    👤 <strong style={{color:'var(--ink)'}}>{enc.nombre || '(sin nombre)'}</strong>
                    {enc.telefono && <> · 📞 {enc.telefono}</>}
                  </div>
                ))}
              </div>
              <div style={{display:'flex', flexDirection:'column', gap:4}}>
                <button className="btn ghost sm" onClick={()=>setModal(p)}>Editar</button>
                <button className="btn danger sm" onClick={async ()=>{
                  if (!confirm(`¿Eliminar ${p.razonSocial}?`)) return;
                  try { await fbRemove(`proveedores/${p.id}`); onToast('Eliminado','warn'); } catch(e){onToast('Error','error');}
                }}>Eliminar</button>
              </div>
            </div>
          </div>
        ))
      }
      {modal && <ModalProveedor proveedor={modal.id?modal:null} onClose={()=>setModal(null)} onToast={onToast}/>}
    </div>
  );
}

function ModalProveedor({ proveedor, onClose, onToast }) {
  const [f, setF] = useState(() => ({
    razonSocial: proveedor?.razonSocial || '',
    rut: proveedor?.rut || '',
    direccion: proveedor?.direccion || '',
    comuna: proveedor?.comuna || '',
    correo: proveedor?.correo || '',
    encargados: proveedor?.encargados?.length > 0
      ? proveedor.encargados
      : [{ nombre: proveedor?.contacto || '', telefono: proveedor?.telefonoContacto || '' }],
  }));
  const [saving, setSaving] = useState(false);

  const addEncargado = () => setF(p => ({ ...p, encargados: [...p.encargados, { nombre:'', telefono:'' }] }));
  const removeEncargado = (i) => setF(p => ({ ...p, encargados: p.encargados.filter((_,idx) => idx!==i) }));
  const setEncargado = (i, field, val) => setF(p => ({
    ...p,
    encargados: p.encargados.map((e, idx) => idx===i ? {...e, [field]: val} : e)
  }));

  const guardar = async () => {
    if (!f.razonSocial.trim()) return onToast('Falta razón social','error');
    if (f.rut && !isValidRut(f.rut)) return onToast('RUT inválido','error');
    for (const enc of f.encargados) {
      if (enc.telefono && !isValidPhone(enc.telefono)) return onToast(`Teléfono inválido: ${enc.nombre||'encargado'}`, 'error');
    }
    setSaving(true);
    try {
      const datos = {
        razonSocial: f.razonSocial.trim(),
        rut: f.rut || '',
        direccion: f.direccion.trim() || '',
        comuna: f.comuna.trim() || '',
        correo: f.correo.trim() || '',
        encargados: f.encargados.filter(e => e.nombre.trim() || e.telefono),
        // Compatibilidad con campos antiguos
        contacto: f.encargados[0]?.nombre || '',
        telefonoContacto: f.encargados[0]?.telefono || '',
      };
      if (proveedor) {
        await fbUpdate(`proveedores/${proveedor.id}`, datos);
        onToast('✓ Proveedor actualizado','success');
      } else {
        await fbSet(`proveedores/${uid()}`, { ...datos, creadoEn: nowISO() });
        onToast('✓ Proveedor creado','success');
      }
      onClose();
    } catch(e) { onToast('Error al guardar','error'); setSaving(false); }
  };

  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <h3>{proveedor ? '✏️ Editar' : '➕ Nuevo'} proveedor</h3>

        {/* Datos del proveedor */}
        <label className="fld">Razón social *</label>
        <input className="inp" value={f.razonSocial}
          onChange={e=>setF({...f, razonSocial:e.target.value})}
          placeholder="Ej: Huevos del Sur SpA"/>

        <div className="row">
          <div>
            <label className="fld">RUT</label>
            <input className="inp" value={f.rut}
              onChange={e=>setF({...f, rut:formatRut(e.target.value)})}
              placeholder="12.345.678-9"/>
          </div>
          <div>
            <label className="fld">Correo</label>
            <input className="inp" type="email" value={f.correo}
              onChange={e=>setF({...f, correo:e.target.value})}
              placeholder="contacto@empresa.cl"/>
          </div>
        </div>

        <label className="fld">Dirección</label>
        <input className="inp" value={f.direccion}
          onChange={e=>setF({...f, direccion:e.target.value})}
          placeholder="Ej: Av. Principal 1234"/>

        <label className="fld">Comuna</label>
        <select className="inp" value={f.comuna} onChange={e=>setF({...f, comuna:e.target.value})}>
          <option value="">-- Sin comuna --</option>
          {COMUNAS_RM.map(c => <option key={c} value={c}>{c}</option>)}
        </select>

        <hr className="div"/>

        {/* Encargados dinámicos */}
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8}}>
          <div style={{fontSize:11, fontWeight:700, color:'var(--ink-soft)', textTransform:'uppercase', letterSpacing:1.4}}>
            Encargados
          </div>
          <button className="btn ghost sm" onClick={addEncargado} style={{fontSize:11}}>
            ➕ Agregar encargado
          </button>
        </div>

        {f.encargados.map((enc, i) => (
          <div key={i} style={{background:'var(--bg-2)', borderRadius:8, padding:'10px 12px', marginBottom:8, border:'1px solid var(--line)'}}>
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:6}}>
              <span style={{fontSize:11, fontWeight:700, color:'var(--accent)'}}>
                Encargado {i+1}
              </span>
              {f.encargados.length > 1 && (
                <button onClick={()=>removeEncargado(i)}
                  style={{background:'none', border:'none', color:'var(--bad)', fontSize:18, cursor:'pointer', padding:'0 4px'}}>
                  ×
                </button>
              )}
            </div>
            <div className="row">
              <div style={{flex:2}}>
                <label className="fld" style={{fontSize:10}}>Nombre</label>
                <input className="inp" value={enc.nombre}
                  onChange={e=>setEncargado(i,'nombre',e.target.value)}
                  placeholder="Nombre del encargado"
                  style={{marginBottom:0}}/>
              </div>
              <div style={{flex:1}}>
                <label className="fld" style={{fontSize:10}}>Celular</label>
                <input className="inp" type="tel" value={enc.telefono}
                  onChange={e=>setEncargado(i,'telefono',formatPhone(e.target.value))}
                  placeholder="+569XXXXXXXX"
                  style={{marginBottom:0}}/>
              </div>
            </div>
          </div>
        ))}

        <div className="actions" style={{marginTop:14}}>
          <button className="btn ghost" onClick={onClose}>Cancelar</button>
          <button className="btn accent" onClick={guardar} disabled={saving}>
            {saving ? '...' : 'Guardar'}
          </button>
        </div>
      </div>
    </div>
  );
}

// =========================== PRECIOS ===========================
const OPCIONES_REDONDEO = [
  { value: 'ninguno',    label: 'Sin redondeo (decimales)' },
  { value: 'entero',     label: 'Al entero más cercano' },
  { value: 'abajo',     label: 'Siempre hacia abajo (piso)' },
  { value: 'arriba',    label: 'Siempre hacia arriba (techo)' },
  { value: 'multiplo5',  label: 'Múltiplo de $5' },
  { value: 'multiplo10', label: 'Múltiplo de $10' },
];

function Precios({ onToast, session }) {
  const [fecha, setFecha] = useState(todayStr());
  const { data: precios } = useFirebaseValue('precios');
  const { data: configRedondeo } = useFirebaseValue('config/redondeo');
  const [draft, setDraft] = useState(null);
  const [saving, setSaving] = useState(false);
  const [recalculando, setRecalculando] = useState(false);
  const [modalRecalculo, setModalRecalculo] = useState(null);

  // Mantener sincronización del modo redondeo global (para corrección de ventas)
  useEffect(() => {
    if (configRedondeo) setModoRedondeoGlobal(configRedondeo.modo || 'ninguno');
  }, [configRedondeo]);

  // Migrar formato legacy (costo+margen) al nuevo (precioVenta) al cargar
  const migrarPrecio = (cfg) => {
    if (!cfg) return { precioVenta: 0, costoBruto: 0 };
    // Ya tiene el formato nuevo
    if (cfg.precioVenta && cfg.precioVenta > 0) return { precioVenta: cfg.precioVenta, costoBruto: cfg.costoBruto || 0 };
    // Formato legacy costo+margen → derivar precioVenta
    if (cfg.costo && cfg.costo > 0) {
      const costoNeto = cfg.costo / (1 + IVA_RATE);
      const ventaNeto = costoNeto + (cfg.margen || 0);
      const precioVenta = Math.round(ventaNeto * (1 + IVA_RATE));
      return { precioVenta, costoBruto: cfg.costo, _legacy: true };
    }
    return { precioVenta: 0, costoBruto: 0 };
  };

  useEffect(() => {
    const p = precios || {};
    let init = {};
    let base = null;
    if (p[fecha]) base = JSON.parse(JSON.stringify(p[fecha]));
    else {
      const fechas = Object.keys(p).filter(f => f <= fecha).sort();
      if (fechas.length > 0) base = JSON.parse(JSON.stringify(p[fechas[fechas.length-1]]));
    }
    // Construir draft con el nuevo formato
    CALIBRES.forEach(c => {
      init[c] = {};
      ['caja','bandeja'].forEach(fmt => {
        init[c][fmt] = migrarPrecio(base?.[c]?.[fmt]);
      });
    });
    // Conservar campos de aprobación si existían
    if (base?._aprobado) { init._aprobado = base._aprobado; init._aprobadoEn = base._aprobadoEn; init._aprobadoPor = base._aprobadoPor; }
    setDraft(init);
  }, [fecha, precios]);

  if (!draft) return <div className="pad"><div className="empty">Cargando...</div></div>;

  const save = async () => {
    setSaving(true);
    try {
      const esHoy = fecha === todayStr();
      const toSave = esHoy
        ? { ...draft, _aprobado: true, _aprobadoEn: nowISO(), _aprobadoPor: session.id }
        : draft;
      await fbSet(`precios/${fecha}`, toSave);
      await fbLog(session.id, esHoy ? 'approve' : 'update', 'precios', { fecha });
      onToast(esHoy ? '✓ Precios guardados y aprobados' : 'Precios guardados','success');
    } catch(e) { console.error(e); onToast('Error','error'); }
    setSaving(false);
  };

  // ============================================================
  // RECALCULAR VENTAS DEL DÍA CON PRECIO CORREGIDO
  // ============================================================
  const previsualizarRecalculo = async () => {
    setRecalculando(true);
    try {
      const hoy = fecha;

      // Cargar precios corregidos del día — envolver en objeto con fecha como clave
      // para que computePrice funcione correctamente
      const preciosDelDia = await fbGet(`precios/${hoy}`);
      if (!preciosDelDia) {
        onToast('No hay precios confirmados para esta fecha. Guarda los precios primero.','error');
        setRecalculando(false);
        return;
      }
      // Estructura que espera computePrice: { 'YYYY-MM-DD': { calibre: { caja: {...} } } }
      const preciosWrapped = { [hoy]: preciosDelDia };

      // Cargar ventas del día
      const ventasRaw = await fbGet('ventas');
      if (!ventasRaw) { onToast('Sin ventas registradas','warn'); setRecalculando(false); return; }

      const ventasHoy = Object.entries(ventasRaw)
        .map(([id, v]) => ({...v, id}))
        .filter(v => isoToLocalDate(v.fecha || v.creadoEn) === hoy && ventaActiva(v));

      if (ventasHoy.length === 0) {
        onToast('No hay ventas registradas para esta fecha','warn');
        setRecalculando(false);
        return;
      }

      // Detectar ventas con cierre aprobado
      const cierresRaw = await fbGet('cierres');
      const cierresHoy = cierresRaw
        ? Object.values(cierresRaw).filter(c =>
            isoToLocalDate(c.creadoEn) === hoy && c.status === 'aprobado')
        : [];
      const vendedoresConCierreAprobado = new Set(cierresHoy.map(c => c.vendedorId));

      // Modo redondeo vigente
      const modoRed = configRedondeo?.modo || 'ninguno';

      const resultados = ventasHoy.map(venta => {
        const tipoDoc = venta.tipoDoc || 'boleta';
        const descPorCal = venta.descuentosPorCalibre || {};
        let nuevoTotalNeto = 0;
        let nuevoTotalBruto = 0;
        let itemsActualizados = [];
        let hayAlMenosUnPrecio = false;

        (venta.items || []).forEach(it => {
          // Los ítems en Firebase: { calibre, cajas, bandejas, mermas, unidadesTotal }
          const cajas        = it.cajas    || 0;
          const bandejas     = it.bandejas || 0;
          const mermasTotales = it.mermas  || 0;
          const descBrutoUnit = (descPorCal[it.calibre] || 0);
          const descNetoUnit  = descBrutoUnit / (1 + IVA_RATE);

          // Procesar CAJAS
          if (cajas > 0) {
            const unidadesCaja = cajas * 180;
            // Mermas proporcionales a cajas vs total
            const mermasCaja = it.unidadesTotal > 0
              ? Math.round(mermasTotales * (unidadesCaja / it.unidadesTotal))
              : (cajas > 0 && bandejas === 0 ? mermasTotales : 0);
            const unidadesEfCaja = unidadesCaja - mermasCaja;

            const pricingCaja = computePrice(preciosWrapped, hoy, it.calibre, 'caja', tipoDoc);
            if (pricingCaja) {
              hayAlMenosUnPrecio = true;
              // Precio exacto por unidad desde total redondeado (evita decimales de float)
              const brutoUnit = pricingCaja.total / 180;  // ej: 35100/180 = 195 exacto
              const netoUnit  = pricingCaja.neto  / 180;
              const sbCaja = Math.round((brutoUnit - descBrutoUnit) * unidadesEfCaja);
              const snCaja = Math.round((netoUnit  - descNetoUnit)  * unidadesEfCaja);
              nuevoTotalBruto += sbCaja;
              nuevoTotalNeto  += snCaja;
            } else {
              const snOrig = it.subtotalNeto
                ? Math.round(it.subtotalNeto * (unidadesCaja / (it.unidadesTotal||1)))
                : 0;
              nuevoTotalNeto  += snOrig;
              nuevoTotalBruto += Math.round(snOrig * (1 + IVA_RATE));
            }
          }

          // Procesar BANDEJAS
          if (bandejas > 0) {
            const unidadesBd = bandejas * 30;
            const mermasBd = it.unidadesTotal > 0
              ? Math.round(mermasTotales * (unidadesBd / it.unidadesTotal))
              : (bandejas > 0 && cajas === 0 ? mermasTotales : 0);
            const unidadesEfBd = unidadesBd - mermasBd;

            const pricingBd = computePrice(preciosWrapped, hoy, it.calibre, 'bandeja', tipoDoc);
            if (pricingBd) {
              hayAlMenosUnPrecio = true;
              // bandeja = 30u
              const brutoUnit = pricingBd.total / 30;
              const netoUnit  = pricingBd.neto  / 30;
              const sbBd = Math.round((brutoUnit - descBrutoUnit) * unidadesEfBd);
              const snBd = Math.round((netoUnit  - descNetoUnit)  * unidadesEfBd);
              nuevoTotalBruto += sbBd;
              nuevoTotalNeto  += snBd;
            } else {
              const snOrig = it.subtotalNeto
                ? Math.round(it.subtotalNeto * (unidadesBd / (it.unidadesTotal||1)))
                : 0;
              nuevoTotalNeto  += snOrig;
              nuevoTotalBruto += Math.round(snOrig * (1 + IVA_RATE));
            }
          }

          itemsActualizados.push({...it});
        });

        nuevoTotalNeto  = Math.round(nuevoTotalNeto);
        nuevoTotalBruto = Math.round(nuevoTotalBruto);
        const nuevoTotalIva = nuevoTotalBruto - nuevoTotalNeto;
        const diferencia    = nuevoTotalBruto - (venta.totalBruto || 0);

        return {
          venta,
          itemsActualizados,
          nuevoTotalNeto,
          nuevoTotalIva,
          nuevoTotalBruto,
          diferencia,
          tieneCierreAprobado: vendedoresConCierreAprobado.has(venta.vendedorId),
          hayPrecio: hayAlMenosUnPrecio,
        };
      });

      // Solo mostrar las que tienen diferencia real
      const afectadas = resultados.filter(r => r.diferencia !== 0 && r.hayPrecio);

      if (afectadas.length === 0) {
        onToast('✓ Todas las ventas ya tienen el precio correcto. No hay diferencias.','success');
        setRecalculando(false);
        return;
      }

      setModalRecalculo({ resultados: afectadas, fecha: hoy, totalVentas: ventasHoy.length });
    } catch(e) {
      console.error('Error recálculo:', e);
      onToast('Error al calcular: ' + e.message,'error');
    }
    setRecalculando(false);
  };

  return (
    <div className="pad">
      <h2 className="section-title">Precios</h2>
      <div className="section-sub">Configuración diaria · IVA 19%</div>

      {/* === RECÁLCULO DE VENTAS DEL DÍA === */}
      {fecha === todayStr() && (
        <div className="card" style={{borderLeft:'4px solid var(--bad)', marginBottom:14}}>
          <div style={{fontWeight:700, fontSize:13, marginBottom:6}}>🔄 Corregir ventas del día</div>
          <div style={{fontSize:12, color:'var(--ink-soft)', marginBottom:10, lineHeight:1.6}}>
            Si confirmaste un precio incorrecto en la mañana, guarda el precio corregido arriba y luego presiona este botón para recalcular todas las ventas del día con el precio correcto. Los descuentos negociados se conservan.
          </div>
          <button className="btn full" onClick={previsualizarRecalculo} disabled={recalculando}
